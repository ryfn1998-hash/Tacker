<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tacker Pro | v667 Flagship</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        :root { --bg: #000; --card: #111; --acc: #23a559; --official: #5865f2; --vip: #f1c40f; --text: #fff; --sub: #888; --danger: #f23f43; }
        * { box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
        body, html { margin:0; padding:0; height:100%; background:var(--bg); color:var(--text); overflow:hidden; user-select: none; }

        .screen { position: absolute; width: 100%; height: 100%; display: none; flex-direction: column; z-index: 10; }
        .active { display: flex; }

        .rail { width: 75px; background: #050505; flex-shrink: 0; display: flex; flex-direction: column; align-items: center; padding: 20px 0; gap: 15px; border-right: 1px solid #222; overflow-y: auto; }
        .nav-icon { width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #555; font-size: 20px; transition: 0.2s; position: relative; flex-shrink: 0; }
        .nav-icon img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 2px solid transparent; }
        .nav-icon.active { color: var(--acc); }
        .nav-icon.active img { border-color: var(--acc); }
        .red-dot { position: absolute; top: 2px; right: 2px; width: 12px; height: 12px; background: var(--danger); border-radius: 50%; border: 2px solid #000; display: none; }

        .tag-official { background: var(--official); color: #fff; font-size: 10px; padding: 2px 5px; border-radius: 3px; margin-left: 5px; font-weight: bold; }
        .tag-vip { color: var(--vip); font-weight: bold; margin-left: 5px; }

        .main { flex-grow: 1; background: #111; display: flex; flex-direction: column; }
        .msg-row { display: flex; gap: 12px; margin-bottom: 20px; padding: 0 15px; }
        .pfp { width: 42px; height: 42px; border-radius: 50%; background: #222; overflow: hidden; cursor: pointer; flex-shrink: 0; }
        .pfp img { width: 100%; height: 100%; object-fit: cover; }

        .input-bar { padding: 15px; border-top: 1px solid #222; background: #0a0a0a; display: flex; gap: 12px; align-items: center; }
        .input-bar input { flex-grow: 1; padding: 12px; background: #1e1e1e; border: none; color: #fff; border-radius: 10px; outline: none; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; }
        .user-card { width: 320px; background: #18191c; border-radius: 15px; overflow: hidden; border: 1px solid #333; position: relative; }
        .card-banner { height: 60px; background: var(--official); }
        .card-pfp { width: 80px; height: 80px; border-radius: 50%; border: 5px solid #18191c; position: absolute; top: 20px; left: 15px; background: #000; overflow: hidden; }
        .card-pfp img { width: 100%; height: 100%; object-fit: cover; }
        .card-body { padding: 50px 20px 20px; }
        
        .btn { width: 100%; padding: 12px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-acc { background: var(--acc); color: #fff; }
        .btn-danger { background: var(--danger); color: #fff; }

        .admin-box { margin-top: 15px; padding-top: 15px; border-top: 1px solid #333; }
        .admin-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-size: 13px; color: var(--sub); }
    </style>
</head>
<body oncontextmenu="return false;">

    <section id="s-app" class="screen active">
        <div style="display:flex; height:100%;">
            <nav class="rail" id="dm-rail">
                <div onclick="switchChat('global')" id="nav-global" class="nav-icon active"><i class="fa-solid fa-earth-asia"></i></div>
                <div id="private-list"></div>
                <div style="flex-grow: 1;"></div>
                <div id="nav-requests" onclick="showRequests()" class="nav-icon" style="display:none; color:var(--official);"><i class="fa-solid fa-user-plus"></i><div class="red-dot" style="display:block;"></div></div>
                <div onclick="tab('me')" id="nav-me" class="nav-icon"><i class="fa-solid fa-shield-halved"></i></div>
            </nav>

            <main id="chat-tab" class="main">
                <header style="height:60px; border-bottom:1px solid #222; display:flex; align-items:center; padding:0 20px; justify-content:space-between;">
                    <b id="chat-title">全球大廳</b>
                </header>
                <div id="chat-flow" style="flex-grow:1; overflow-y:auto; padding:15px;">
                    <div id="messages"></div>
                </div>
                <div class="input-bar">
                    <input id="m-input" placeholder="傳送訊息..." onkeypress="if(event.key==='Enter') send()">
                    <button onclick="send()" style="background:var(--acc); border:none; color:#fff; padding:10px 18px; border-radius:10px;"><i class="fa-solid fa-paper-plane"></i></button>
                </div>
            </main>

            <main id="me-tab" class="main" style="display:none; padding:25px; overflow-y:auto;">
                <h2 style="font-weight:800;">帳戶設定</h2>
                <div style="text-align:center; margin-bottom:30px;">
                    <label for="pfp-input"><img id="current-pfp" style="width:100px; height:100px; border-radius:50%; border:3px solid var(--acc); object-fit:cover;"></label>
                    <input type="file" id="pfp-input" style="display:none;" onchange="handlePfp(this)">
                </div>
                <div style="margin-bottom:15px;">
                    <label style="font-size:11px; color:var(--sub);">顯示名稱</label>
                    <input id="edit-name" style="width:100%; background:#1e1e1e; border:1px solid #333; color:#fff; padding:14px; border-radius:10px;">
                </div>
                <button onclick="saveProfile()" style="width:100%; padding:16px; background:var(--acc); color:#fff; font-weight:bold; border-radius:12px;">儲存變更</button>
                <button onclick="logout()" style="width:100%; margin-top:20px; background:none; border:none; color:var(--danger); cursor:pointer; font-weight:bold;">登出帳號</button>
            </main>
        </div>
    </section>

    <div id="user-modal" class="modal" onclick="this.style.display='none'">
        <div class="user-card" onclick="event.stopPropagation()">
            <div class="card-banner"></div>
            <div class="card-pfp" id="md-pfp-box"></div>
            <div class="card-body">
                <div style="display:flex; align-items:center;">
                    <b id="md-name" style="font-size:20px;"></b>
                    <span id="md-tags"></span>
                </div>
                <div id="md-uid" style="color:var(--sub); font-size:13px; margin-bottom:10px;"></div>
                <button id="dm-btn" class="btn btn-acc">發送訊息</button>
                <div id="admin-panel" class="admin-box" style="display:none;">
                    <div style="font-size:11px; color:var(--official); margin-bottom:10px; font-weight:bold;">後台管理</div>
                    <div class="admin-row">
                        <span>會員名單資格</span>
                        <input type="checkbox" id="md-vip-check" onchange="toggleVip()">
                    </div>
                    <button class="btn btn-danger" style="padding:8px;" onclick="adminAction('kick')">強制登出</button>
                    <button class="btn btn-danger" style="padding:8px;" onclick="adminAction('mute')">禁言成員</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.onkeydown = e => { if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && e.keyCode == 73) || (e.ctrlKey && e.keyCode == 85)) return false; };
        const config = { apiKey: "AIzaSyB56chNeodbgAYa8k3xspOOAMYt6C5M4cw", databaseURL: "https://tacker-ebc5a-default-rtdb.firebaseio.com", projectId: "tacker-ebc5a" };
        firebase.initializeApp(config);
        const db = firebase.database();
        let me = null;
        let currentChat = 'global';
        let targetUID = null;

        async function initApp() {
            const saved = localStorage.getItem('tacker_session');
            if(!saved) return;
            me = JSON.parse(saved);
            db.ref(`users/${me.uid}`).on('value', s => {
                if(s.exists()) {
                    me = { uid: me.uid, ...s.val() };
                    if(me.status === 'kicked') { logout(); location.reload(); }
                    document.getElementById('current-pfp').src = me.pfp || "";
                    document.getElementById('edit-name').value = me.full_name || "";
                }
            });
            listenGlobal();
            listenContacts();
            listenRequests();
        }

        function send() {
            const val = document.getElementById('m-input').value.trim();
            if(!val) return;
            const limit = me.level === 'vip' ? 4000 : 1000;
            if(val.length > limit) return alert("超過字數限制");
            const data = { u: me.full_name, uid: me.uid, pfp: me.pfp || '', t: val, ts: Date.now(), role: me.role||'user', level: me.level||'free' };
            if(currentChat === 'global') {
                db.ref('chats/global').push(data);
            } else {
                const rid = [me.uid, currentChat].sort().join('_');
                db.ref(`chats/private/${rid}/msgs`).push(data);
                db.ref(`chats/private/${rid}/unread/${currentChat}`).set(true);
            }
            document.getElementById('m-input').value = '';
        }

        async function openUserCard(uid) {
            const s = await db.ref(`users/${uid}`).get();
            const u = s.val();
            targetUID = uid;
            document.getElementById('md-name').innerText = u.full_name;
            document.getElementById('md-uid').innerText = "@" + uid;
            document.getElementById('md-pfp-box').innerHTML = `<img src="${u.pfp}">`;
            document.getElementById('md-tags').innerHTML = (u.role === 'official' ? '<span class="tag-official">官方 [v]</span>' : '') + (u.level === 'vip' ? '<span class="tag-vip">★</span>' : '');
            document.getElementById('admin-panel').style.display = (me.role === 'official' && uid !== me.uid) ? 'block' : 'none';
            document.getElementById('md-vip-check').checked = (u.level === 'vip');
            document.getElementById('dm-btn').onclick = () => {
                if(me.role === 'official') { startPrivateChat(uid, u.full_name, u.pfp); } 
                else { requestDM(uid, u.full_name, u.pfp); }
                document.getElementById('user-modal').style.display = 'none';
            };
            document.getElementById('user-modal').style.display = 'flex';
        }

        async function toggleVip() {
            const isVip = document.getElementById('md-vip-check').checked;
            await db.ref(`users/${targetUID}`).update({ level: isVip ? 'vip' : 'free' });
        }

        async function adminAction(type) {
            if(type === 'kick') await db.ref(`users/${targetUID}`).update({ status: 'kicked' });
            if(type === 'mute') alert("禁言成員完成");
        }

        function listenGlobal() { db.ref('chats/global').limitToLast(40).on('value', s => renderMessages(s)); }
        function renderMessages(snap) {
            const box = document.getElementById('messages'); box.innerHTML = '';
            snap.forEach(d => {
                const m = d.val();
                const off = m.role === 'official' ? '<span class="tag-official">官方 [v]</span>' : '';
                const vp = m.level === 'vip' ? '<span class="tag-vip">★</span>' : '';
                box.innerHTML += `<div class="msg-row"><div class="pfp" onclick="openUserCard('${m.uid}')"><img src="${m.pfp}"></div>
                    <div><b style="color:var(--acc);">${m.u}</b>${off}${vp}<div style="color:#eee;">${m.t}</div></div></div>`;
            });
            document.getElementById('chat-flow').scrollTop = document.getElementById('chat-flow').scrollHeight;
        }

        function tab(t) {
            document.getElementById('chat-tab').style.display = t === 'chat' ? 'flex' : 'none';
            document.getElementById('me-tab').style.display = t === 'me' ? 'block' : 'none';
        }

        function logout() { localStorage.removeItem('tacker_session'); location.reload(); }
        initApp();
    </script>
</body>
</html>
