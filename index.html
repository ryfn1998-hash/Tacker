<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tacker</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        :root { --bg: #000; --card: #111; --acc: #23a559; --text: #fff; --sub: #888; --danger: #f23f43; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body, html { margin:0; padding:0; height:100%; background:#fff; overflow:hidden; }

        /* Take OS Toast */
        #toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 9999; }
        .os-toast { background: #1a1a1a; color: #fff; padding: 12px 20px; border-radius: 10px; border-left: 4px solid var(--acc); box-shadow: 0 5px 20px rgba(0,0,0,0.5); margin-top: 10px; animation: slideIn 0.3s forwards; font-size: 14px; }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }

        .screen { position: absolute; width: 100%; height: 100%; display: none; flex-direction: column; z-index: 10; align-items:center; justify-content:center; }
        .active { display: flex; }

        /* 側邊欄：加入好友列表區域 */
        #s-app { background: var(--bg); color: var(--text); align-items: stretch; }
        .rail { width: 72px; background: #050505; flex-shrink: 0; display: flex; flex-direction: column; align-items: center; padding: 15px 0; border-right: 1px solid #222; }
        .nav-icon { width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #444; font-size: 20px; margin-bottom: 12px; overflow: hidden; transition: 0.2s; }
        .nav-icon img { width: 100%; height: 100%; object-fit: cover; }
        .nav-icon.active { color: var(--acc); background: rgba(35, 165, 89, 0.1); }
        #private-list { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 8px; margin: 10px 0; border-top: 1px solid #111; padding-top: 10px; }

        .main { flex-grow: 1; background: #111; display: flex; flex-direction: column; }
        
        /* 頂部狀態 */
        header { height: 55px; border-bottom: 1px solid #222; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; background: #0a0a0a; }
        .stat-group { display: flex; gap: 6px; }
        .stat-tag { background: #151515; padding: 3px 8px; border-radius: 5px; font-size: 10px; color: var(--sub); border: 1px solid #222; }
        .stat-tag b { color: var(--acc); }

        /* 訊息流：修正比例 */
        #chat-flow { flex-grow: 1; overflow-y: auto; background: #0f0f0f; }
        .msg-row { display: flex; gap: 10px; padding: 8px 15px; }
        .pfp-mini { width: 36px; height: 36px; border-radius: 50%; overflow: hidden; flex-shrink: 0; cursor: pointer; }
        .msg-content-wrap { max-width: 85%; }
        .msg-author { color: var(--acc); font-size: 13px; font-weight: bold; margin-bottom: 2px; cursor: pointer; }
        .msg-text { color: #eee; font-size: 14px; line-height: 1.4; word-break: break-word; }
        .msg-img { max-width: 220px; border-radius: 8px; margin-top: 5px; border: 1px solid #333; }

        /* 輸入框修正 */
        .input-area { padding: 10px 15px; border-top: 1px solid #222; background: #0a0a0a; display: flex; gap: 10px; align-items: center; }
        .input-wrap { flex-grow: 1; background: #1a1a1a; border: 1px solid #333; border-radius: 20px; display: flex; align-items: center; padding: 0 15px; }
        .input-wrap input { flex-grow: 1; background: transparent; border: none; color: #fff; padding: 10px 0; outline: none; font-size: 14px; }
        .icon-btn { color: #888; font-size: 20px; cursor: pointer; border: none; background: none; transition: 0.2s; }
        .icon-btn:hover { color: #fff; }
        .send-btn { color: var(--acc); }

        /* 盾牌個人設定 (還原 v667) */
        .me-view { padding: 25px; overflow-y: auto; width: 100%; height: 100%; }
        .me-card { background: #161616; border-radius: 15px; padding: 20px; border: 1px solid #222; margin-bottom: 20px; }
        .me-pfp-row { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
        .pfp-l { width: 65px; height: 65px; border-radius: 50%; border: 3px solid var(--acc); overflow: hidden; }
        .me-input-box { margin-bottom: 15px; }
        .me-label { font-size: 11px; color: var(--sub); font-weight: bold; margin-bottom: 5px; display: block; }
        .v667-field { width: 100%; background: #0a0a0a; border: 1px solid #333; color: #fff; padding: 10px; border-radius: 8px; outline: none; }
        .v667-btn { background: var(--acc); color: #fff; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 13px; margin-top: 5px; }
        #pw-section { display: none; border-top: 1px solid #222; padding-top: 15px; margin-top: 15px; }

        /* 個資卡片 */
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:1000; align-items:center; justify-content:center; backdrop-filter:blur(10px); }
        .user-card { width: 310px; background: #111; border-radius: 20px; border: 1px solid #333; overflow: hidden; }
        .card-banner { height: 80px; background: linear-gradient(45deg, #23a559, #1a7a42); }
        .card-body { padding: 0 20px 20px; text-align: center; margin-top: -40px; }
        .card-pfp { width: 80px; height: 80px; border-radius: 50%; border: 5px solid #111; margin: 0 auto; overflow: hidden; background: #222; }
    </style>
</head>
<body>

    <div id="toast-container"></div>

    <section id="s-intro" class="screen active" style="background:#fff;">
        <div style="font-weight:900; font-size:80px; letter-spacing:-4px; animation: scaleIn 1s forwards;">Tacker</div>
        <button onmousedown="handleEnter()" style="margin-top:40px; padding:15px 60px; background:#000; color:#fff; border-radius:50px; border:none; font-weight:bold; cursor:pointer;">進入系統</button>
    </section>

    <section id="s-login" class="screen" style="background:#f4f4f4;">
        <div style="background:#fff; width:320px; padding:35px; border-radius:20px;">
            <h2 style="color:#000; margin:0 0 25px;">驗證</h2>
            <input id="u-id" placeholder="帳號 ID" style="width:100%; padding:14px; margin-bottom:10px; border:1px solid #eee; border-radius:10px;">
            <input id="u-pw" type="password" placeholder="密碼" style="width:100%; padding:14px; margin-bottom:20px; border:1px solid #eee; border-radius:10px;">
            <button onmousedown="auth()" style="width:100%; padding:15px; background:#000; color:#fff; border:none; border-radius:10px; font-weight:bold;">登入</button>
        </div>
    </section>

    <section id="s-loader" class="screen">
        <div style="font-weight:900; font-size:40px; margin-bottom:15px;">Tacker</div>
        <div style="width:200px; height:3px; background:#222; border-radius:10px; overflow:hidden;">
            <div id="load-bar" style="width:0%; height:100%; background:var(--acc);"></div>
        </div>
        <div id="load-text" style="margin-top:10px; font-family:monospace; color:#555;">0%</div>
    </section>

    <section id="s-app" class="screen">
        <div style="display:flex; height:100%; width:100%;">
            <nav class="rail">
                <div onmousedown="tab('chat')" id="nav-chat" class="nav-icon active"><i class="fa-solid fa-earth-asia"></i></div>
                <div id="private-list"></div>
                <div onmousedown="tab('me')" id="nav-me" class="nav-icon"><i class="fa-solid fa-shield-halved"></i></div>
            </nav>
            
            <main id="chat-tab" class="main">
                <header>
                    <b id="chat-title">全球大廳</b>
                    <div class="stat-group">
                        <div class="stat-tag">用戶數量: <b id="total-u">0</b></div>
                        <div class="stat-tag">在線人數: <b id="online-u">0</b></div>
                    </div>
                </header>
                <div id="chat-flow"><div id="messages"></div></div>
                <div class="input-area">
                    <label for="f-in" class="icon-btn"><i class="fa-solid fa-circle-plus"></i></label>
                    <input type="file" id="f-in" style="display:none;" onchange="handleFile(this)">
                    <div class="input-wrap">
                        <input id="m-input" placeholder="撰寫訊息..." onkeypress="if(event.key==='Enter') send()">
                        <button onmousedown="send()" class="icon-btn send-btn"><i class="fa-solid fa-paper-plane"></i></button>
                    </div>
                </div>
            </main>

            <main id="me-tab" class="main" style="display:none;">
                <div class="me-view">
                    <div class="me-card">
                        <div class="me-pfp-row">
                            <div class="pfp-l"><img id="me-img" src=""></div>
                            <div>
                                <h3 id="me-name-display" style="margin:0;">使用者</h3>
                                <div style="font-size:11px; color:var(--sub);">UID: <span id="me-uid-show"></span></div>
                            </div>
                        </div>
                        <div class="me-input-box">
                            <label class="me-label">顯示名稱</label>
                            <input id="me-name-in" class="v667-field">
                        </div>
                        <div class="me-input-box">
                            <label class="me-label">自我介紹</label>
                            <textarea id="me-bio-in" class="v667-field" style="height:70px; resize:none;"></textarea>
                            <button onmousedown="updateProfile()" class="v667-btn">儲存資訊</button>
                        </div>
                    </div>

                    <div class="me-card">
                        <label class="me-label">安全設定</label>
                        <button onmousedown="togglePw()" class="v667-btn" style="background:#333; width:100%; text-align:left;">更改密碼</button>
                        <div id="pw-section">
                            <input id="pw-old" type="password" placeholder="舊密碼" class="v667-field" style="margin-bottom:8px;">
                            <input id="pw-new" type="password" placeholder="新密碼" class="v667-field" style="margin-bottom:8px;">
                            <input id="pw-cfm" type="password" placeholder="確認新密碼" class="v667-field">
                            <button onmousedown="updatePw()" class="v667-btn">更新密碼</button>
                        </div>
                    </div>

                    <button onmousedown="logout()" style="width:100%; padding:15px; background:var(--danger); border:none; color:#fff; border-radius:10px; font-weight:bold; cursor:pointer;">登出系統</button>
                </div>
            </main>
        </div>
    </section>

    <div id="user-modal" class="modal" onclick="this.style.display='none'">
        <div class="user-card" onclick="event.stopPropagation()">
            <div class="card-banner"></div>
            <div class="card-body">
                <div class="card-pfp" id="modal-pfp"></div>
                <div id="modal-name" style="font-size:20px; font-weight:800; color:#fff; margin-top:10px;"></div>
                <div id="modal-bio" style="color:#888; font-size:13px; margin:10px 0 20px;"></div>
                <button id="dm-btn" style="width:100%; padding:12px; background:var(--acc); color:#fff; border:none; border-radius:10px; font-weight:bold; cursor:pointer;">發送私訊邀請</button>
            </div>
        </div>
    </div>

    <script>
        const config = { apiKey: "AIzaSyB56chNeodbgAYa8k3xspOOAMYt6C5M4cw", databaseURL: "https://tacker-ebc5a-default-rtdb.firebaseio.com", projectId: "tacker-ebc5a" };
        firebase.initializeApp(config);
        const db = firebase.database();
        let me = null;

        function osToast(m) {
            const c = document.getElementById('toast-container');
            const t = document.createElement('div'); t.className = 'os-toast'; t.innerText = m;
            c.appendChild(t); setTimeout(() => t.remove(), 3000);
        }

        function handleEnter() {
            const s = localStorage.getItem('tacker_session');
            if(s) { me = JSON.parse(s); startLoading(); } else go('s-login');
        }

        async function auth() {
            const id = document.getElementById('u-id').value.trim();
            const pw = document.getElementById('u-pw').value.trim();
            const s = await db.ref(`users/${id}`).get();
            if(s.exists() && s.val().temp_pw === pw) {
                me = { uid: id, ...s.val() };
                localStorage.setItem('tacker_session', JSON.stringify(me));
                startLoading();
            } else osToast("驗證失敗");
        }

        function startLoading() {
            go('s-loader');
            let p = 0;
            const t = setInterval(() => {
                p += Math.floor(Math.random() * 8) + 2;
                if(p >= 100) { clearInterval(t); document.getElementById('load-bar').style.width = '100%'; setTimeout(initApp, 400); }
                else { document.getElementById('load-bar').style.width = p + '%'; document.getElementById('load-text').innerText = p + '%'; }
            }, 40);
        }

        function initApp() {
            go('s-app');
            listenGlobal();
            listenStats();
            document.getElementById('me-img').src = me.pfp || '';
            document.getElementById('me-uid-show').innerText = me.uid;
            document.getElementById('me-name-display').innerText = me.full_name;
            document.getElementById('me-name-in').value = me.full_name;
            document.getElementById('me-bio-in').value = me.bio || '';
        }

        function go(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
        function tab(t) {
            document.getElementById('chat-tab').style.display = t==='chat'?'flex':'none';
            document.getElementById('me-tab').style.display = t==='me'?'block':'none';
            document.querySelectorAll('.nav-icon').forEach(i => i.classList.remove('active'));
            document.getElementById(t==='chat'?'nav-chat':'nav-me').classList.add('active');
        }

        function togglePw() { const s = document.getElementById('pw-section'); s.style.display = s.style.display==='block'?'none':'block'; }

        async function updateProfile() {
            const n = document.getElementById('me-name-in').value;
            const b = document.getElementById('me-bio-in').value;
            await db.ref(`users/${me.uid}`).update({ full_name: n, bio: b });
            me.full_name = n; me.bio = b;
            document.getElementById('me-name-display').innerText = n;
            localStorage.setItem('tacker_session', JSON.stringify(me));
            osToast("資訊已更新");
        }

        async function updatePw() {
            const o = document.getElementById('pw-old').value;
            const n1 = document.getElementById('pw-new').value;
            const n2 = document.getElementById('pw-cfm').value;
            if(o === me.temp_pw && n1 === n2 && n1.length > 3) {
                await db.ref(`users/${me.uid}`).update({ temp_pw: n1 });
                osToast("密碼已更新，請重新登入");
                logout();
            } else osToast("輸入有誤");
        }

        function listenGlobal() {
            db.ref('chats/global').limitToLast(40).on('value', snap => {
                const box = document.getElementById('messages'); box.innerHTML = '';
                snap.forEach(d => {
                    const m = d.val();
                    let content = m.t;
                    if(m.t.includes('data:image')) content = `<img src="${m.t}" class="msg-img" onclick="window.open('${m.t}')">`;
                    box.innerHTML += `<div class="msg-row">
                        <div class="pfp-mini" onmousedown="showUser('${m.uid}')"><img src="${m.pfp || ''}"></div>
                        <div class="msg-content-wrap">
                            <div class="msg-author" onmousedown="showUser('${m.uid}')">${m.u}</div>
                            <div class="msg-text">${content}</div>
                        </div>
                    </div>`;
                });
                document.getElementById('chat-flow').scrollTop = document.getElementById('chat-flow').scrollHeight;
            });
        }

        async function showUser(uid) {
            if(uid === me.uid) return;
            const s = await db.ref(`users/${uid}`).get();
            const u = s.val();
            document.getElementById('modal-name').innerText = u.full_name;
            document.getElementById('modal-bio').innerText = u.bio || "Tacker 成員";
            document.getElementById('modal-pfp').innerHTML = `<img src="${u.pfp || ''}">`;
            document.getElementById('dm-btn').onclick = async () => {
                await db.ref(`dm_requests/${uid}/${me.uid}`).set({ fromName: me.full_name, fromPfp: me.pfp || '', ts: Date.now(), type: "friend_request" });
                osToast("邀請已發送");
                document.getElementById('user-modal').style.display = 'none';
            };
            document.getElementById('user-modal').style.display = 'flex';
        }

        function handleFile(i) {
            const f = i.files[0]; if(!f) return;
            if(f.type.startsWith('video/')) { osToast("禁止傳送影片"); return; }
            const r = new FileReader();
            r.onload = (e) => db.ref('chats/global').push({ u: me.full_name, uid: me.uid, pfp: me.pfp || '', t: e.target.result, ts: Date.now() });
            r.readAsDataURL(f);
        }

        function send() {
            const i = document.getElementById('m-input'); if(!i.value.trim()) return;
            db.ref('chats/global').push({ u: me.full_name, uid: me.uid, pfp: me.pfp || '', t: i.value, ts: Date.now() });
            i.value = '';
        }

        function listenStats() {
            db.ref('users').on('value', s => { document.getElementById('total-u').innerText = s.numChildren(); });
            db.ref('online_count').on('value', s => { document.getElementById('online-u').innerText = s.val() || 1; });
        }

        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
