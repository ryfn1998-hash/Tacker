<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tacker Mobile | Professional Engine</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --bg-black: #000000; --bg-dark: #111111; --bg-card: #1e1e1e;
            --accent: #23a559; --text-p: #ffffff; --text-s: #aaaaaa;
            --danger: #f23f43;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg-black); color: var(--text-p); font-family: -apple-system, sans-serif; overflow: hidden; }

        /* --- 1. 首頁 (對標手稿 1: 進入頁) --- */
        .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; }
        #home-screen { display: flex; align-items: center; justify-content: center; background: #fff; color: #000; }
        .tacker-box { border: 2px solid #000; padding: 40px; text-align: center; }
        .enter-btn { margin-top: 20px; background: #007bff; color: #fff; border: none; padding: 10px 30px; cursor: pointer; border-radius: 4px; }

        /* --- 2. 登入頁 (對標手稿 2: 登入) --- */
        #login-screen { background: #eee; color: #333; align-items: center; justify-content: center; }
        .login-card { background: #fff; width: 85%; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 14px; margin-bottom: 5px; color: #666; }
        .input-group input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 4px; }
        .submit-btn { width: 100%; padding: 12px; background: #23a559; border: none; color: #fff; font-weight: bold; border-radius: 4px; }

        /* --- 3. 加載進度條 (對標手稿 3: 40% 進度條) --- */
        #loading-screen { background: var(--bg-black); align-items: center; justify-content: center; }
        .progress-container { width: 70%; text-align: center; }
        .progress-bar { width: 100%; height: 12px; background: #333; border-radius: 10px; overflow: hidden; margin-bottom: 10px; }
        #progress-fill { width: 0%; height: 100%; background: var(--accent); transition: width 0.1s linear; }

        /* --- 4. 主介面 (對標手稿: 手機側邊導航) --- */
        #main-app { flex-direction: row; }
        .mobile-rail { width: 65px; background: #050505; display: flex; flex-direction: column; align-items: center; padding-top: 15px; gap: 15px; }
        .content-area { flex-grow: 1; display: flex; flex-direction: column; background: var(--bg-dark); }
        .chat-header { height: 55px; border-bottom: 1px solid #222; display: flex; align-items: center; padding: 0 15px; justify-content: space-between; }
        
        /* --- 5. 訊息與設定 --- */
        #chat-flow { flex-grow: 1; overflow-y: auto; padding: 15px; }
        .msg-box { margin-bottom: 15px; display: flex; gap: 12px; }
        .pfp { width: 38px; height: 38px; border-radius: 50%; background: #444; flex-shrink: 0; overflow: hidden; }
        .pfp img { width: 100%; height: 100%; object-fit: cover; }
        
        .input-bar { padding: 10px; background: var(--bg-dark); border-top: 1px solid #222; }
        .input-inner { background: #222; border-radius: 20px; padding: 5px 15px; display: flex; align-items: center; }
        .input-inner input { background: none; border: none; color: #fff; flex-grow: 1; padding: 8px; outline: none; }

        /* --- 6. 個人設定頁面 (對標手稿: 可改自介/橫幅) --- */
        #profile-screen { background: var(--bg-black); padding: 20px; }
        .profile-banner { height: 120px; border-radius: 8px; background: var(--accent); position: relative; margin-bottom: 50px; }
        .profile-pfp-edit { width: 80px; height: 80px; border-radius: 50%; border: 4px solid var(--bg-black); position: absolute; bottom: -40px; left: 20px; background: #444; }
        .uneditable { background: #222; color: #666; padding: 10px; border-radius: 4px; font-size: 13px; margin-top: 5px; }

        /* 通知系統 */
        .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--danger); padding: 10px 20px; border-radius: 4px; display: none; z-index: 10000; }
    </style>
</head>
<body>

    <div id="toast" class="toast"></div>

    <section id="home-screen" class="screen" style="display: flex;">
        <div class="tacker-box">
            <h1 style="margin:0; letter-spacing: 2px;">Tacker</h1>
            <p style="font-size: 14px; color: #666;">永遠. 贊.</p>
            <button class="enter-btn" onclick="goToLogin()">進入</button>
        </div>
    </section>

    <section id="login-screen" class="screen">
        <div class="login-card">
            <h2 style="margin:0 0 20px 0;">登入 Tacker</h2>
            <div class="input-group">
                <label>帳號</label>
                <input id="l-uid" placeholder="請輸入帳號">
            </div>
            <div class="input-group">
                <label>密碼</label>
                <input id="l-pw" type="password" placeholder="請輸入密碼">
            </div>
            <button class="submit-btn" onclick="startLoading()">確認登入</button>
        </div>
    </section>

    <section id="loading-screen" class="screen">
        <div class="progress-container">
            <div class="progress-bar"><div id="progress-fill"></div></div>
            <div id="progress-text" style="color: var(--text-s); font-size: 14px;">正在加載數據... 0%</div>
        </div>
    </section>

    <section id="main-app" class="screen">
        <nav class="mobile-rail">
            <div style="width:45px; height:45px; background:var(--accent); border-radius:12px; display:flex; align-items:center; justify-content:center;" onclick="showTab('chat')">
                <i class="fa-solid fa-comments"></i>
            </div>
            <div style="width:45px; height:45px; background:#222; border-radius:50%; display:flex; align-items:center; justify-content:center;" onclick="showTab('profile')">
                <i class="fa-solid fa-user"></i>
            </div>
        </nav>

        <div id="chat-tab" class="content-area">
            <header class="chat-header">
                <span style="font-weight: bold;"># 全球大廳</span>
                <span style="font-size: 12px; color: var(--accent);">● <span id="online-num">0</span> 在線</span>
            </header>
            <div id="chat-flow"></div>
            <div class="input-bar">
                <div class="input-inner">
                    <input id="chat-input" placeholder="說點什麼..." onkeypress="if(event.key==='Enter') sendMsg()">
                    <i class="fa-solid fa-paper-plane" style="color:var(--accent);" onclick="sendMsg()"></i>
                </div>
            </div>
        </div>

        <div id="profile-tab" class="content-area" style="display:none; overflow-y:auto;">
            <header class="chat-header"><b>個人帳號設定</b></header>
            <div style="padding: 15px;">
                <div class="profile-banner" id="p-banner">
                    <div class="profile-pfp-edit" id="p-pfp"></div>
                </div>
                
                <div style="margin-top:10px;">
                    <label style="font-size:12px; color:var(--text-s);">使用者代碼 (不可修改)</label>
                    <div class="uneditable" id="p-id-display">#0000</div>
                </div>

                <div style="margin-top:20px;">
                    <label style="font-size:12px; color:var(--text-s);">顯示名稱 (可修改)</label>
                    <input id="edit-name" style="width:100%; padding:10px; background:#222; border:1px solid #444; color:#fff; margin-top:5px;">
                </div>

                <div style="margin-top:20px;">
                    <label style="font-size:12px; color:var(--text-s);">個人簡介 (可修改)</label>
                    <textarea id="edit-bio" style="width:100%; height:80px; padding:10px; background:#222; border:1px solid #444; color:#fff; margin-top:5px;"></textarea>
                </div>
                
                <button onclick="saveProfile()" style="width:100%; margin-top:20px; padding:12px; background:var(--accent); border:none; color:#fff; border-radius:4px; font-weight:bold;">儲存設定</button>
            </div>
        </div>
    </section>

    <script>
        const config = { 
            apiKey: "AIzaSyB56chNeodbgAYa8k3xspOOAMYt6C5M4cw",
            databaseURL: "https://tacker-ebc5a-default-rtdb.firebaseio.com",
            projectId: "tacker-ebc5a"
        };
        firebase.initializeApp(config);
        const db = firebase.database();

        let me = null;
        let spamGuard = 0;

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
            document.getElementById(id).style.display = 'flex';
        }

        function goToLogin() { showScreen('login-screen'); }

        // --- 加載進度條邏輯 ---
        async function startLoading() {
            const uid = document.getElementById('l-uid').value.trim();
            const pw = document.getElementById('l-pw').value.trim();
            
            const snap = await db.ref(`users/${uid}`).get();
            if(snap.exists() && snap.val().temp_pw === pw) {
                me = { uid, ...snap.val() };
                showScreen('loading-screen');
                let p = 0;
                const interval = setInterval(() => {
                    p += Math.floor(Math.random() * 15);
                    if(p >= 100) {
                        p = 100;
                        clearInterval(interval);
                        initApp();
                    }
                    document.getElementById('progress-fill').style.width = p + '%';
                    document.getElementById('progress-text').innerText = `正在載入核心組件... ${p}%`;
                }, 150);
            } else { alert("帳密錯誤！"); }
        }

        function initApp() {
            showScreen('main-app');
            syncProfileUI();
            
            // 監聽訊息
            db.ref('chats/global').limitToLast(50).on('value', snap => {
                const flow = document.getElementById('chat-flow');
                flow.innerHTML = '';
                snap.forEach(c => {
                    const m = c.val();
                    flow.innerHTML += `
                        <div class="msg-box">
                            <div class="pfp"></div>
                            <div>
                                <div style="font-size:13px; font-weight:bold; color:var(--accent);">${m.u} <span style="font-weight:normal; color:#555; font-size:11px;">${new Date(m.ts).toLocaleTimeString()}</span></div>
                                <div style="font-size:14px; margin-top:3px; line-height:1.4;">${m.t}</div>
                            </div>
                        </div>`;
                });
                flow.scrollTop = flow.scrollHeight;
            });

            // 在線人數
            const pRef = db.ref(`presence/${me.uid}`);
            pRef.set(me.full_name);
            pRef.onDisconnect().remove();
            db.ref('presence').on('value', s => document.getElementById('online-num').innerText = s.numChildren());
        }

        function sendMsg() {
            const inp = document.getElementById('chat-input');
            const val = inp.value.trim();
            if(!val) return;
            
            // 防刷屏
            spamGuard++;
            if(spamGuard > 8) {
                alert("刷屏檢測！觸發系統警告視窗。");
                return;
            }
            setTimeout(()=> spamGuard = 0, 2000);

            db.ref('chats/global').push({ u: me.full_name, t: val, ts: Date.now(), uid: me.uid });
            inp.value = '';
        }

        function showTab(tab) {
            document.getElementById('chat-tab').style.display = tab === 'chat' ? 'flex' : 'none';
            document.getElementById('profile-tab').style.display = tab === 'profile' ? 'flex' : 'none';
        }

        function syncProfileUI() {
            document.getElementById('p-id-display').innerText = `#${me.uid}`;
            document.getElementById('edit-name').value = me.full_name;
            document.getElementById('edit-bio').value = me.bio || "";
            document.getElementById('p-banner').style.background = me.banner_color || '#23a559';
        }

        async function saveProfile() {
            const newName = document.getElementById('edit-name').value;
            const newBio = document.getElementById('edit-bio').value;
            await db.ref(`users/${me.uid}`).update({ full_name: newName, bio: newBio });
            me.full_name = newName;
            me.bio = newBio;
            alert("設定已同步到雲端！");
        }
    </script>
</body>
</html>
