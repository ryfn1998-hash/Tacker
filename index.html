<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tacker | 手稿 1:1 還原版</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg-p: #313338; --bg-s: #2b2d31; --bg-t: #232428; --brand: #5865f2; --text: #dbdee1; --muted: #949ba4; --danger: #f23f43; }
        body { margin: 0; background: var(--bg-p); color: white; font-family: sans-serif; height: 100vh; overflow: hidden; }
        .hidden { display: none !important; }
        
        /* --- 登入介面 --- */
        #login-page { display: flex; justify-content: center; align-items: center; height: 100vh; flex-direction: column; }
        .login-card { background: var(--bg-s); padding: 40px; border-radius: 8px; text-align: center; width: 320px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
        .btn-google { width: 100%; padding: 12px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; background: white; color: black; display: flex; align-items: center; justify-content: center; gap: 10px; }

        /* --- 主佈局 (圖一/圖三) --- */
        #app-root { display: none; grid-template-columns: 240px 1fr; height: 100vh; }
        .sidebar { background: var(--bg-s); border-right: 1px solid #1e1f22; display: flex; flex-direction: column; position: relative; }
        
        /* 訊息流 (P2 要求的頭像/名字點擊功能) */
        #msg-flow { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; }
        .msg-item { display: flex; gap: 14px; }
        .msg-ava { width: 40px; height: 40px; border-radius: 50%; background: #444; cursor: pointer; }
        .msg-user { font-weight: bold; cursor: pointer; color: white; }
        .msg-user:hover { text-decoration: underline; }

        /* 左下角區塊 (圖一) */
        .user-footer { background: var(--bg-t); padding: 8px 10px; position: absolute; bottom: 0; width: 100%; box-sizing: border-box; display: flex; align-items: center; gap: 8px; }
        .footer-ava { width: 32px; height: 32px; border-radius: 50%; cursor: pointer; background: var(--brand); }
        .footer-info { flex: 1; font-size: 11px; overflow: hidden; }
        .pencil-icon { cursor: pointer; font-size: 16px; color: var(--muted); }

        /* --- 他人個資彈窗 (圖二) --- */
        .pop-card { position: fixed; background: var(--bg-t); width: 280px; border-radius: 8px; overflow: hidden; box-shadow: 0 8px 24px rgba(0,0,0,0.5); z-index: 2000; display: none; }
        .pop-banner { height: 60px; background: var(--brand); }
        .pop-body { padding: 15px; padding-top: 40px; position: relative; }
        .pop-ava { width: 64px; height: 64px; border-radius: 50%; border: 4px solid var(--bg-t); position: absolute; top: -32px; left: 15px; }

        /* --- 詳細設定大視窗 (圖二詳細功能) --- */
        .settings-overlay { position: fixed; inset: 0; background: var(--bg-p); z-index: 3000; display: none; }
        .settings-grid { display: grid; grid-template-columns: 200px 1fr; height: 100vh; }
        .settings-side { background: var(--bg-s); padding: 60px 20px; text-align: right; }
        .settings-main { padding: 60px 40px; max-width: 600px; position: relative; }
        .tab-btn { padding: 10px; color: var(--muted); cursor: pointer; border-radius: 4px; font-size: 14px; margin-bottom: 2px; }
        .tab-btn.active, .tab-btn:hover { background: #3f4147; color: white; }
        .close-btn { position: absolute; top: 60px; right: -50px; cursor: pointer; width: 30px; height: 30px; border: 2px solid var(--muted); border-radius: 50%; display: flex; justify-content: center; align-items: center; }

        /* 輸入組件 */
        input.dark, textarea.dark { width: 100%; background: #1e1f22; border: none; padding: 12px; color: white; border-radius: 4px; margin: 10px 0; box-sizing: border-box; }
        .btn-save { background: var(--brand); color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div id="login-page">
        <div class="login-card">
            <h1>Tacker</h1>
            <button class="btn-google" onclick="login()">
                <img src="https://www.google.com/favicon.ico" width="18"> Google 登入
            </button>
        </div>
    </div>

    <div id="app-root">
        <aside class="sidebar">
            <div style="padding:15px; font-weight:bold;">好友列表 <span onclick="alert('新增好友彈窗')" style="cursor:pointer; color:var(--brand); margin-left:10px;">⊕</span></div>
            <div class="user-footer">
                <img id="my-footer-ava" class="footer-ava" onclick="openSettings()">
                <div class="footer-info">
                    <div id="my-footer-name" style="font-weight:bold;">載入中...</div>
                    <div id="my-footer-id" style="color:var(--muted);">@ID</div>
                </div>
                <div class="pencil-icon" onclick="openSettings()">✎</div>
            </div>
        </aside>

        <main style="display:flex; flex-direction:column;">
            <div id="msg-flow"></div>
            <div style="padding: 0 20px 24px;">
                <div style="background:#383a40; border-radius:8px; padding:12px; display:flex; gap:12px;">
                    <input type="text" id="m-in" placeholder="打字區" style="background:transparent; border:none; flex:1; color:white; outline:none;">
                    <button onclick="send()" style="background:none; border:none; color:var(--brand); font-weight:bold; cursor:pointer;">發送</button>
                </div>
            </div>
        </main>
    </div>

    <div id="pop-card" class="pop-card">
        <div class="pop-banner" id="pop-banner"></div>
        <div class="pop-body">
            <img class="pop-ava" id="pop-ava-img">
            <h3 id="pop-name" style="margin:0;"></h3>
            <div id="pop-tag" style="color:var(--muted); font-size:13px; margin-bottom:10px;"></div>
            <div style="font-size:12px; border-top:1px solid #444; padding-top:10px;">
                <b>自我介紹</b>
                <p id="pop-bio" style="margin-top:5px;"></p>
            </div>
        </div>
    </div>

    <div id="settings-ui" class="settings-overlay">
        <div class="settings-grid">
            <div class="settings-side">
                <div style="font-size:11px; font-weight:bold; color:var(--muted); margin-bottom:10px;">使用者設定</div>
                <div class="tab-btn active" onclick="switchTab('base')">基本資訊</div>
                <div class="tab-btn" onclick="switchTab('look')">外觀</div>
                <div class="tab-btn" onclick="switchTab('acc')">帳戶</div>
                <hr style="opacity:0.05; margin:15px 0;">
                <div class="tab-btn" style="color:var(--danger);" onclick="logout()">登出帳號</div>
            </div>
            <div class="settings-main">
                <div class="close-btn" onclick="closeSettings()">✕</div>
                
                <div id="tab-base">
                    <h2>基本資訊</h2>
                    <label>顯示名稱</label>
                    <input type="text" id="edit-name" class="dark">
                    <label>帳號 ID (更改需密碼認證)</label>
                    <input type="text" id="edit-id" class="dark">
                    <button class="btn-save" onclick="save()">儲存記憶</button>
                </div>

                <div id="tab-look" class="hidden">
                    <h2>外觀設定</h2>
                    <p>頭像與橫幅 (貼上網址)</p>
                    <input type="text" id="edit-ava" class="dark" placeholder="頭像網址">
                    <input type="text" id="edit-banner" class="dark" placeholder="橫幅顏色或網址">
                    <p>自我介紹</p>
                    <textarea id="edit-bio" class="dark" rows="3"></textarea>
                    <button class="btn-save" onclick="save()">更新外觀</button>
                </div>

                <div id="tab-acc" class="hidden">
                    <h2>帳戶設定</h2>
                    <button class="btn-save" style="background:#4e5058;">變更密碼</button>
                    <div style="margin-top:50px; border-top:1px solid #444; padding-top:20px;">
                        <button class="btn-save" style="background:var(--danger);">移除帳戶 (需 Gmail 驗證)</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const _s = supabase.createClient('https://coyiifxxfopvabpjszis.supabase.co', 'Sb_publishable_ZaDrVW5Goe5QFqL4rBvNCg_JrwHKIFH');

        // 1. Google 登入
        async function login() {
            await _s.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: window.location.href } });
        }

        async function logout() { await _s.auth.signOut(); location.reload(); }

        function openSettings() { document.getElementById('settings-ui').style.display = 'block'; }
        function closeSettings() { document.getElementById('settings-ui').style.display = 'none'; }
        
        function switchTab(t) {
            ['base','look','acc'].forEach(x => document.getElementById('tab-'+x).classList.add('hidden'));
            document.getElementById('tab-'+t).classList.remove('hidden');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            event.currentTarget.classList.add('active');
        }

        // 2. 查看他人個資邏輯 (手稿 P2)
        async function showUserCard(uid, e) {
            e.stopPropagation();
            const { data } = await _s.from('profiles').select('*').eq('id', uid).maybeSingle();
            if(!data) return;
            const pop = document.getElementById('pop-card');
            document.getElementById('pop-name').innerText = data.full_name;
            document.getElementById('pop-tag').innerText = "@" + data.tacker_id;
            document.getElementById('pop-ava-img').src = data.avatar_url;
            document.getElementById('pop-bio').innerText = data.bio || "沒自介。";
            document.getElementById('pop-banner').style.background = data.banner_color || "var(--brand)";
            pop.style.display = 'block';
            pop.style.left = e.clientX + 'px';
            pop.style.top = (e.clientY > window.innerHeight - 300 ? e.clientY - 300 : e.clientY) + 'px';
        }

        document.addEventListener('click', () => document.getElementById('pop-card').style.display = 'none');

        // 3. 儲存與記憶功能
        async function save() {
            const { data: { user } } = await _s.auth.getUser();
            await _s.from('profiles').upsert({
                id: user.id,
                full_name: document.getElementById('edit-name').value,
                tacker_id: document.getElementById('edit-id').value,
                avatar_url: document.getElementById('edit-ava').value,
                bio: document.getElementById('edit-bio').value,
                banner_color: document.getElementById('edit-banner').value
            });
            location.reload();
        }

        async function send() {
            const val = document.getElementById('m-in').value;
            const { data: { user } } = await _s.auth.getUser();
            if(!val) return;
            await _s.from('messages').insert([{ user_id: user.id, user_name: document.getElementById('my-footer-name').innerText, content: val }]);
            document.getElementById('m-in').value = '';
        }

        function render(m) {
            const flow = document.getElementById('msg-flow');
            const div = document.createElement('div');
            div.className = "msg-item";
            div.innerHTML = `
                <img class="msg-ava" src="https://via.placeholder.com/40" onclick="showUserCard('${m.user_id}', event)">
                <div>
                    <div style="display:flex; gap:10px; align-items:center;">
                        <span class="msg-user" onclick="showUserCard('${m.user_id}', event)">${m.user_name}</span>
                        <span style="font-size:10px; color:var(--muted);">${new Date(m.created_at).toLocaleTimeString()}</span>
                    </div>
                    <div style="font-size:14px; margin-top:4px;">${m.content}</div>
                </div>
            `;
            flow.appendChild(div);
            flow.scrollTop = flow.scrollHeight;
        }

        async function init() {
            const { data: { session } } = await _s.auth.getSession();
            if (session) {
                document.getElementById('login-page').style.display = 'none';
                document.getElementById('app-root').style.display = 'grid';
                
                const { data: profile } = await _s.from('profiles').select('*').eq('id', session.user.id).maybeSingle();
                if(profile) {
                    document.getElementById('my-footer-name').innerText = profile.full_name;
                    document.getElementById('my-footer-id').innerText = "@" + profile.tacker_id;
                    document.getElementById('my-footer-ava').src = profile.avatar_url;
                    document.getElementById('edit-name').value = profile.full_name;
                    document.getElementById('edit-id').value = profile.tacker_id;
                    document.getElementById('edit-ava').value = profile.avatar_url;
                    document.getElementById('edit-bio').value = profile.bio;
                }
                const { data: msgs } = await _s.from('messages').select('*').order('created_at');
                if(msgs) msgs.forEach(render);
            }
        }

        _s.channel('room').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, p => render(p.new)).subscribe();
        window.onload = init;
    </script>
</body>
</html>
