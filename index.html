<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tacker | Official Protocol</title>
    <style>
        :root { --bg-dark: #1e1f22; --bg-side: #2b2d31; --bg-main: #313338; --accent: #5865f2; --text: #dbdee1; }
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        body { background: #000; color: var(--text); height: 100vh; overflow: hidden; }

        /* --- 流程一：登入與 Gmail 驗證 (P1 頂部) --- */
        #auth-flow { position: fixed; inset: 0; background: var(--bg-dark); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .auth-card { background: var(--bg-main); width: 400px; padding: 32px; border-radius: 8px; text-align: center; }
        .input-box { width: 100%; padding: 12px; background: #1e1f22; border: none; border-radius: 4px; color: white; margin: 10px 0; outline: none; }
        .btn-primary { width: 100%; padding: 12px; background: var(--accent); color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; }

        /* --- 流程二：主畫面排版 (圖一) --- */
        #app-root { display: none; height: 100vh; width: 100%; flex-direction: row; }
        #sidebar { width: 260px; background: var(--bg-side); border-right: 1px solid #1e1f22; display: flex; flex-direction: column; }
        #main-view { flex: 1; background: var(--bg-main); position: relative; display: flex; flex-direction: column; }

        /* 左側好友欄 (手稿標註：目前沒有好友) */
        .friend-header { padding: 16px; font-weight: bold; border-bottom: 1px solid #1e1f22; font-size: 14px; }
        .friend-item-trigger { padding: 10px 16px; color: #949ba4; cursor: pointer; display: flex; align-items: center; gap: 8px; }
        .friend-item-trigger:hover { background: #35373c; color: white; }

        /* 左下角個人資訊 (圖一左下) */
        .footer-user { height: 52px; background: #232428; padding: 0 8px; display: flex; align-items: center; gap: 8px; position: relative; }
        .pfp-circle { width: 32px; height: 32px; border-radius: 50%; background: var(--accent); }
        .user-id-text { font-size: 11px; color: #949ba4; }
        .edit-pen { cursor: pointer; font-size: 14px; }

        /* 圖一中央空白狀態 */
        #empty-ui { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0.6; }
        .empty-icon { width: 80px; height: 80px; border-radius: 50%; border: 4px solid #4e5058; display: flex; align-items: center; justify-content: center; font-size: 40px; margin-bottom: 16px; }

        /* --- 流程三：加好友小視窗 (圖二) --- */
        #friend-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 10000; display: none; align-items: center; justify-content: center; }
        .modal-card { background: var(--bg-main); width: 340px; padding: 24px; border-radius: 8px; position: relative; }

        /* --- 流程四：聊天介面 (圖三) --- */
        #chat-ui { display: none; flex: 1; flex-direction: column; }
        .chat-msgs { flex: 1; overflow-y: auto; padding: 16px; }
        .chat-input-area { padding: 0 16px 24px; display: flex; align-items: center; gap: 10px; }
        .chat-input-wrap { flex: 1; background: #383a40; border-radius: 8px; display: flex; align-items: center; padding: 0 12px; }
        .chat-input-wrap input { flex: 1; padding: 11px 0; background: transparent; border: none; color: white; outline: none; }
        .send-btn { background: none; border: none; font-size: 20px; cursor: pointer; color: var(--accent); }

        /* --- 流程五：設定頁 (P1 詳細分支) --- */
        #settings-view { position: fixed; inset: 0; background: var(--bg-main); z-index: 11000; display: none; padding: 40px; overflow-y: auto; }
    </style>
</head>
<body>

    <div id="auth-flow">
        <div class="auth-card" id="reg-box">
            <h2>註冊 Tacker</h2>
            <input type="email" id="reg-email" class="input-box" placeholder="Gmail 地址">
            <input type="password" id="reg-pass" class="input-box" placeholder="設定密碼">
            <button class="btn-primary" onclick="goToVerify()">註冊並發送驗證碼</button>
        </div>
        <div class="auth-card" id="verify-box" style="display:none;">
            <h2>Gmail 驗證</h2>
            <p style="font-size:13px; color:#949ba4;">驗證碼已發送至您的信箱</p>
            <input type="text" id="otp-code" class="input-box" placeholder="輸入 6 位驗證碼">
            <button class="btn-primary" onclick="finishAuth()">驗證成功並進入主頁</button>
        </div>
    </div>

    <div id="app-root">
        <aside id="sidebar">
            <div class="friend-header">目前沒有好友</div>
            <div id="friend-container">
                <div class="friend-item-trigger" onclick="openFriendModal()">目前沒有好友 ⊕</div>
            </div>
            <div style="flex:1;"></div>
            <div class="footer-user">
                <div class="pfp-circle" id="nav-pfp"></div>
                <div style="flex:1;">
                    <div style="font-size:13px; font-weight:bold;" id="nav-name">ABC1234</div>
                    <div class="user-id-text">ID: ryfn888</div>
                </div>
                <div class="edit-pen" onclick="openSettings()">✏️</div>
            </div>
        </aside>

        <main id="main-view">
            <div id="empty-ui">
                <div class="empty-icon">#</div>
                <h3>這裡什麼都沒有 :/</h3>
                <p style="font-size:13px;">因為你沒有在任何頻道</p>
            </div>

            <div id="chat-ui">
                <div class="chat-msgs" id="msg-box"></div>
                <div class="chat-input-area">
                    <div class="chat-input-wrap">
                        <span style="cursor:pointer; margin-right:12px;" onclick="document.getElementById('file-in').click()">⊕</span>
                        <input type="text" id="msg-in" placeholder="發送訊息..." onkeypress="if(event.key==='Enter')sendMsg()">
                        <button class="send-btn" onclick="sendMsg()">➤</button>
                    </div>
                </div>
                <input type="file" id="file-in" style="display:none" onchange="checkFile(this)">
            </div>
        </main>
    </div>

    <div id="friend-modal">
        <div class="modal-card">
            <span style="position:absolute; right:15px; top:10px; cursor:pointer;" onclick="closeFriendModal()">✕</span>
            <h3 style="margin-bottom:15px;">新增好友</h3>
            <input type="text" id="target-id" class="input-box" placeholder="打對方帳戶 ID (英文/數字)">
            <button class="btn-primary" onclick="confirmFriend()">確認 ✓</button>
        </div>
    </div>

    <div id="settings-view">
        <button onclick="closeSettings()" style="color:white; background:none; border:none; cursor:pointer; margin-bottom:20px;">← 返回</button>
        <h2 style="margin-bottom:30px;">用戶設定</h2>
        <div style="background:#1e1f22; padding:20px; border-radius:8px;">
            <div style="margin-bottom:20px;">
                <label style="font-size:12px; color:#949ba4;">基本資訊</label>
                <p>顯示名稱 / 帳號 ID (ryfn888)</p>
            </div>
            <div style="margin-bottom:20px;">
                <label style="font-size:12px; color:#949ba4;">外觀</label>
                <div style="display:flex; gap:20px; margin-top:10px;">
                    <div style="width:60px; height:60px; border-radius:50%; background:var(--accent);"></div>
                    <button class="btn-primary" style="width:auto; padding:5px 15px;">上傳頭像</button>
                    <button class="btn-primary" style="width:auto; padding:5px 15px; background:#4e5058;">上傳橫幅</button>
                </div>
            </div>
            <div style="border-top:1px solid #2b2d31; padding-top:20px; margin-top:20px;">
                <button class="btn-primary" style="background:var(--danger);" onclick="alert('需經 Gmail 驗證移除帳戶')">移除帳戶</button>
            </div>
        </div>
    </div>

    <script>
        // 流程一：Gmail 驗證碼跳轉
        function goToVerify() {
            const email = document.getElementById('reg-email').value;
            if(!email.includes('@')) return alert("請輸入正確 Gmail");
            document.getElementById('reg-box').style.display = 'none';
            document.getElementById('verify-box').style.display = 'block';
        }

        function finishAuth() {
            document.getElementById('auth-flow').style.display = 'none';
            document.getElementById('app-root').style.display = 'flex';
        }

        // 流程二：圖二 加好友確認 (需對方接受邏輯模擬)
        function openFriendModal() { document.getElementById('friend-modal').style.display = 'flex'; }
        function closeFriendModal() { document.getElementById('friend-modal').style.display = 'none'; }
        
        function confirmFriend() {
            const id = document.getElementById('target-id').value;
            if(!id) return;
            alert("好友請求已發送！需等對方「按接受」才會在左邊顯示個資。");
            closeFriendModal();
            // 模擬對方已接受 (用於展示圖三介面)
            setTimeout(() => {
                document.getElementById('friend-container').innerHTML = `<div class="friend-item-trigger active" onclick="openChat('${id}')">👤 ${id} (好友)</div>`;
            }, 2000);
        }

        // 流程三：圖三 通訊介面與檔案限制
        function openChat(name) {
            document.getElementById('empty-ui').style.display = 'none';
            document.getElementById('chat-ui').style.display = 'flex';
            document.getElementById('msg-box').innerHTML = `<p style="text-align:center; color:#949ba4; font-size:12px;">正在與 ${name} 進行安全通訊</p>`;
        }

        function sendMsg() {
            const val = document.getElementById('msg-in').value;
            if(!val) return;
            document.getElementById('msg-box').innerHTML += `<div style="margin-top:10px;"><b>你:</b> ${val}</div>`;
            document.getElementById('msg-in').value = '';
        }

        function checkFile(input) {
            const file = input.files[0];
            if(file.size > 10 * 1024 * 1024) { // P2 標註：10MB 以內
                alert("檔案過大！請限制在 10MB 以內。");
                input.value = '';
            } else {
                alert("檔案已就緒：" + file.name);
            }
        }

        // P1 分支：設定與自訂
        function openSettings() { document.getElementById('settings-view').style.display = 'block'; }
        function closeSettings() { document.getElementById('settings-view').style.display = 'none'; }
    </script>
</body>
</html>
