<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tacker | Discord Style</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --discord-bg: #313338;
            --discord-card: #2b2d31;
            --discord-blurple: #5865f2;
            --text-muted: #b5bac1;
            --online-green: #23a55a;
        }
        body { margin: 0; background: var(--discord-bg); color: white; font-family: 'gg sans', 'Noto Sans TC', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }

        /* 🎴 Discord 登入卡片 */
        .login-container {
            background: var(--discord-card);
            padding: 32px;
            border-radius: 8px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.24);
            width: 90%;
            max-width: 480px;
            text-align: center;
        }
        h2 { margin: 0 0 8px 0; font-size: 24px; font-weight: 600; color: #fff; }
        p.subtitle { color: var(--text-muted); margin-bottom: 20px; font-size: 16px; }

        .btn-google {
            width: 100%;
            background: var(--discord-blurple);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 3px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .btn-google:hover { background: #4752c4; }

        /* 📋 P1 註冊介面樣式 */
        #registration-screen { display: none; }
        .input-group { text-align: left; margin-bottom: 20px; }
        label { color: var(--text-muted); font-size: 12px; font-weight: bold; text-transform: uppercase; margin-bottom: 8px; display: block; }
        input { width: 100%; background: #1e1f22; border: none; padding: 10px; color: white; border-radius: 3px; font-size: 16px; box-sizing: border-box; }
        input:focus { outline: 1px solid #00a8fc; }

        /* 🚀 主介面 (隱藏) */
        #main-app { display: none; width: 100vw; height: 100vh; flex-direction: column; justify-content: center; align-items: center; }

        /* 🌀 載入中 */
        #loader { position: fixed; inset: 0; background: #000; z-index: 100; display: flex; justify-content: center; align-items: center; font-size: 14px; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div id="loader">正在啟動 TACKER 系統...</div>

    <div id="login-screen" class="login-container">
        <h2>歡迎回來！</h2>
        <p class="subtitle">我們很高興再次見到您！</p>
        <button class="btn-google" onclick="signIn()">
            <img src="https://www.google.com/favicon.ico" width="18"> 使用 Google 帳號登入
        </button>
        <p style="font-size: 12px; color: var(--text-muted); margin-top: 15px;">
            需要帳號？ <span style="color: #00a8fc; cursor: pointer;">註冊</span>
        </p>
    </div>

    <div id="registration-screen" class="login-container">
        <h2 style="color: #fff;">建立個人檔案</h2>
        <p class="subtitle">請設定您的專屬 Tacker 識別碼</p>
        <div class="input-group">
            <label>Tacker ID (不可更改)</label>
            <input type="text" id="tacker-id" placeholder="例如: Ryfn_1998">
        </div>
        <button class="btn-google" onclick="saveProfile()" style="background: var(--online-green);">完成並進入系統</button>
    </div>

    <div id="main-app">
        <div class="login-container">
            <h2 style="color: var(--online-green);">● 系統已授權</h2>
            <p id="display-name" style="font-size: 20px; margin: 10px 0;"></p>
            <p id="display-id" style="color: var(--text-muted); font-size: 14px;"></p>
            <hr style="border: 0; border-top: 1px solid #3f4147; margin: 20px 0;">
            <button onclick="signOut()" style="background:none; border: 1px solid #f23f43; color:#f23f43; padding: 8px 16px; border-radius: 3px; cursor:pointer;">登出 Tacker</button>
        </div>
    </div>

    <script>
        // 初始化 Supabase
        const _s = supabase.createClient(
            'https://coyiifxxfopvabpjszis.supabase.co', 
            'Sb_publishable_ZaDrVW5Goe5QFqL4rBvNCg_JrwHKIFH'
        );

        // 登入功能
        async function signIn() {
            await _s.auth.signInWithOAuth({
                provider: 'google',
                options: { 
                    // 這裡已經修正為你的 GitHub Pages 官方路徑
                    redirectTo: 'https://ryfn1998-hash.github.io/Tacker/' 
                }
            });
        }

        async function signOut() {
            await _s.auth.signOut();
            location.reload();
        }

        // 核心檢查邏輯
        async function checkStatus() {
            const { data: { session } } = await _s.auth.getSession();
            const loader = document.getElementById('loader');
            const login = document.getElementById('login-screen');
            const reg = document.getElementById('registration-screen');
            const app = document.getElementById('main-app');

            if (session) {
                // 檢查資料庫是否有 ID 資料
                const { data: profile, error } = await _s
                    .from('profiles')
                    .select('tacker_id')
                    .eq('id', session.user.id)
                    .maybeSingle();

                if (profile && profile.tacker_id) {
                    // 已註冊：顯示主介面
                    login.style.display = 'none';
                    reg.style.display = 'none';
                    app.style.display = 'flex';
                    document.getElementById('display-name').innerText = session.user.user_metadata.full_name;
                    document.getElementById('display-id').innerText = "@" + profile.tacker_id;
                } else {
                    // 未註冊：顯示 P1 介面
                    login.style.display = 'none';
                    reg.style.display = 'block';
                    app.style.display = 'none';
                }
            } else {
                // 未登入：顯示登入介面
                login.style.display = 'block';
                reg.style.display = 'none';
                app.style.display = 'none';
            }
            loader.style.display = 'none';
        }

        // 儲存 P1 資料
        async function saveProfile() {
            const tackerId = document.getElementById('tacker-id').value.trim();
            if (!tackerId) return alert('請輸入 Tacker ID');

            const { data: { user } } = await _s.auth.getUser();
            const { error } = await _s.from('profiles').upsert({
                id: user.id,
                tacker_id: tackerId,
                full_name: user.user_metadata.full_name,
                avatar_url: user.user_metadata.avatar_url,
                updated_at: new Date()
            });

            if (error) {
                alert('註冊失敗：' + error.message);
            } else {
                location.reload();
            }
        }

        window.onload = checkStatus;
    </script>
</body>
</html>
