<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tacker</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --brand: #5865f2; --success: #23a559; --danger: #f23f43; --gray-card: #313338; }
        body, html { margin: 0; padding: 0; font-family: sans-serif; height: 100vh; overflow: hidden; background: #fff; }
        .hidden { display: none !important; }

        /* 首頁 */
        #welcome { position: fixed; inset: 0; background: #fff; z-index: 100; display: flex; flex-direction: column; padding: 10% 8%; }
        .title { font-size: 5rem; font-weight: 800; color: #000; margin: 0; }
        .sub { font-size: 1.5rem; font-weight: bold; margin-top: 10px; }
        .btn-enter { position: absolute; bottom: 10%; right: 10%; background: #3c78e6; color: #fff; border: none; padding: 12px 25px; border-radius: 8px; font-size: 1.2rem; cursor: pointer; }

        /* 登入牆 */
        #auth { position: fixed; inset: 0; background: #fff; z-index: 50; display: none; justify-content: center; align-items: center; }
        .card { background: var(--gray-card); width: 300px; padding: 40px; border-radius: 8px; text-align: center; color: #fff; }
        .card input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 4px; border: none; background: #1e1f22; color: #fff; box-sizing: border-box; outline: none; }
        .btn-go { background: var(--success); color: #fff; border: none; width: 60px; height: 40px; border-radius: 4px; cursor: pointer; font-size: 20px; margin-top: 10px; }
        .err { color: var(--danger); font-size: 12px; height: 18px; margin-top: 5px; }
        .link { position: absolute; bottom: 10px; right: 10px; color: #5865f2; font-size: 10px; text-decoration: none; }

        /* 主畫面簡單框架 */
        #app { display: none; height: 100vh; background: #313338; color: #fff; justify-content: center; align-items: center; flex-direction: column; }
    </style>
</head>
<body>

    <div id="welcome">
        <h1 class="title">Tacker</h1>
        <p class="sub">永遠.免費</p>
        <button class="btn-enter" onclick="toAuth()">進入</button>
    </div>

    <div id="auth">
        <div class="card">
            <h2 style="margin:0 0 20px 0;">登入</h2>
            <input type="text" id="user-id" placeholder="帳號 ID">
            <input type="password" id="user-pw" placeholder="密碼">
            <div id="err-box" class="err"></div>
            <button class="btn-go" onclick="login()"> → </button>
            <a href="XXXXXXXXXXXXXXXXXXXX" class="link">點擊申請帳號</a>
        </div>
    </div>

    <div id="app">
        <h1>登入成功</h1>
        <p id="display-name"></p>
        <p id="display-id" style="color:#949ba4;"></p>
    </div>

    <script>
        // 使用你的正確專案資訊
        const _s = supabase.createClient('https://coyiifxxfopvabpjszis.supabase.co', 'Sb_publishable_ZaDrVW5Goe5QFqL4rBvNCg_JrwHKIFH');

        function toAuth() {
            document.getElementById('welcome').classList.add('hidden');
            document.getElementById('auth').style.display = 'flex';
        }

        async function login() {
            const id = document.getElementById('user-id').value;
            const pw = document.getElementById('user-pw').value;
            const err = document.getElementById('err-box');

            // 這裡修正了查詢邏輯，確保比對到正確的欄位
            const { data, error } = await _s.from('profiles')
                .select('*')
                .eq('tacker_id', id)
                .eq('temp_pw', pw)
                .maybeSingle();

            if (data) {
                err.innerText = "";
                document.getElementById('auth').style.display = 'none';
                document.getElementById('app').style.display = 'flex';
                document.getElementById('display-name').innerText = "歡迎，" + data.full_name;
                document.getElementById('display-id').innerText = "@" + data.tacker_id;
            } else {
                err.innerText = "帳號或密碼錯誤";
            }
        }
    </script>
</body>
</html>
