<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tacker | Private Social</title>
    <style>
        :root {
            --bg-body: #050508; /* 極深黑 */
            --bg-side: #0b0b12; /* 深紫色塊 */
            --bg-item: #13131f; 
            --accent: #a855f7;  /* 亮紫色 (用於線條) */
            --border: rgba(168, 85, 247, 0.15);
            --text: #ececf1;
            --text-dim: #71717a;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; cursor: default; }
        body { margin: 0; background: var(--bg-body); color: var(--text); font-family: 'Inter', sans-serif; height: 100vh; display: flex; overflow: hidden; }

        /* --- 左側精簡選單 --- */
        .rail { width: 64px; background: #000; display: flex; flex-direction: column; align-items: center; padding: 20px 0; border-right: 1px solid var(--border); }
        .rail-btn { width: 42px; height: 42px; border-radius: 12px; background: var(--bg-item); margin-bottom: 15px; display: flex; align-items: center; justify-content: center; font-size: 18px; border: 1px solid transparent; transition: 0.2s; }
        .rail-btn.active { border-color: var(--accent); color: var(--accent); box-shadow: 0 0 15px rgba(168, 85, 247, 0.2); }

        /* --- 好友與私人群組欄 --- */
        .sidebar { width: 260px; background: var(--bg-side); display: flex; flex-direction: column; border-right: 1px solid var(--border); }
        .side-title { padding: 25px 20px 15px; font-size: 12px; font-weight: 800; color: var(--accent); letter-spacing: 2px; text-transform: uppercase; }
        
        .list-container { flex: 1; padding: 0 10px; overflow-y: auto; }
        .chat-item { padding: 12px; border-radius: 10px; display: flex; align-items: center; gap: 12px; margin-bottom: 4px; transition: 0.2s; }
        .chat-item:hover { background: rgba(255,255,255,0.03); }
        .chat-item.active { background: var(--bg-item); border: 1px solid var(--border); }
        .avatar { width: 38px; height: 38px; border-radius: 10px; background: #27272a; border: 1px solid var(--border); }

        /* --- 個人資料 (兩段式) --- */
        .user-panel { padding: 15px; background: rgba(0,0,0,0.3); border-top: 1px solid var(--border); }
        .user-card { display: flex; align-items: center; gap: 10px; cursor: pointer; padding: 8px; border-radius: 8px; }
        .user-card:hover { background: rgba(168, 85, 247, 0.1); }
        .u-info { flex: 1; line-height: 1.2; }
        .u-info b { font-size: 14px; display: block; }
        .u-info span { font-size: 11px; color: var(--text-dim); }

        /* --- 右側對話區 --- */
        main { flex: 1; display: flex; flex-direction: column; background: #08080c; }
        .chat-h { height: 64px; border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; font-weight: bold; background: rgba(0,0,0,0.2); }
        .msg-area { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .msg-bubble { max-width: 70%; padding: 12px 16px; border-radius: 12px; background: var(--bg-item); border: 1px solid var(--border); font-size: 15px; line-height: 1.5; }
        .msg-me { align-self: flex-end; background: var(--accent); color: black; border: none; font-weight: 500; }
        
        .input-box { padding: 20px; border-top: 1px solid var(--border); display: flex; gap: 12px; }
        #m-in { flex: 1; background: #000; border: 1px solid var(--border); color: white; padding: 12px 18px; border-radius: 12px; outline: none; }

        /* --- 設定牆 (Overlay) --- */
        #settings-ui { position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(20px); display: none; z-index: 1000; }
        .settings-win { width: 90%; max-width: 800px; height: 80%; background: var(--bg-side); margin: 5vh auto; border-radius: 20px; border: 1px solid var(--border); display: flex; overflow: hidden; }
        .set-side { width: 200px; background: rgba(0,0,0,0.2); padding: 30px 15px; border-right: 1px solid var(--border); }
        .set-main { flex: 1; padding: 40px; }
        .set-btn { padding: 10px; margin-bottom: 5px; border-radius: 6px; cursor: pointer; color: var(--text-dim); }
        .set-btn.active { color: var(--accent); background: rgba(168, 85, 247, 0.1); }
    </style>
</head>
<body>

    <nav class="rail">
        <div class="rail-btn active">💬</div>
        <div class="rail-btn">👥</div>
    </nav>

    <aside class="sidebar">
        <div class="side-title">直連好友</div>
        <div class="list-container">
            <div class="chat-item active" onclick="setRoom('Shadow (管理員)')">
                <div class="avatar" style="background: url('https://ui-avatars.com/api/?name=S&background=a855f7&color=fff') center/cover;"></div>
                <div class="u-info"><b>Shadow</b><span>線上</span></div>
            </div>
            <div class="side-title">私人小群組</div>
            <div class="chat-item" onclick="setRoom('FR 核心工程組')">
                <div class="avatar" style="background: #a855f7; display:flex; align-items:center; justify-content:center; font-weight:bold;">FR</div>
                <div class="u-info"><b>FR 核心工程組</b><span>3 位成員</span></div>
            </div>
        </div>

        <div class="user-panel">
            <div class="user-card" onclick="openSet()">
                <div class="avatar" id="my-avatar" style="width:32px; height:32px; background: var(--accent);"></div>
                <div class="u-info">
                    <b id="my-name">新成員</b>
                    <span id="my-id">@ryfn888</span>
                </div>
                <span style="font-size:12px;">⚙️</span>
            </div>
        </div>
    </aside>

    <main>
        <div class="chat-h" id="chat-title"># Shadow</div>
        <div class="msg-area" id="msg-list">
            <div class="msg-bubble">歡迎進入 Tacker 加密頻道。</div>
        </div>
        <div class="input-box">
            <input type="text" id="m-in" placeholder="發送加密訊息..." onkeypress="if(event.key==='Enter')send()">
            <button onclick="send()" style="background:var(--accent); border:none; padding:0 20px; border-radius:10px; font-weight:bold; cursor:pointer;">發送</button>
        </div>
    </main>

    <div id="settings-ui">
        <div class="settings-win">
            <div class="set-side">
                <div style="font-weight:bold; margin-bottom:20px; color:var(--accent);">帳戶設定</div>
                <div class="set-btn active">個人資料</div>
                <div class="set-btn" onclick="alert('安全加密已啟動')">隱私與安全</div>
                <div class="set-btn" style="color: #ff4d4d; margin-top: 50px;" onclick="logout()">登出</div>
            </div>
            <div class="set-main">
                <div style="display:flex; justify-content:space-between;">
                    <h2>個人資料</h2>
                    <span style="cursor:pointer;" onclick="closeSet()">✕</span>
                </div>
                <div style="margin-top:30px;">
                    <label style="color:var(--text-dim); font-size:12px;">顯示名稱</label>
                    <input type="text" id="set-n" style="width:100%; margin-top:8px; background:#000; border:1px solid var(--border); padding:10px; color:white; border-radius:8px;">
                    
                    <label style="color:var(--text-dim); font-size:12px; display:block; margin-top:20px;">個人代號 (ID)</label>
                    <input type="text" id="set-t" style="width:100%; margin-top:8px; background:#000; border:1px solid var(--border); padding:10px; color:white; border-radius:8px;">
                    
                    <button onclick="save()" style="margin-top:30px; width:100%; background:var(--accent); border:none; padding:12px; border-radius:8px; font-weight:bold; cursor:pointer;">儲存變更</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function openSet() { document.getElementById('settings-ui').style.display = 'block'; }
        function closeSet() { document.getElementById('settings-ui').style.display = 'none'; }
        
        function save() {
            const n = document.getElementById('set-n').value;
            const t = document.getElementById('set-t').value;
            if(n) {
                document.getElementById('my-name').innerText = n;
                localStorage.setItem('n', n);
            }
            if(t) {
                document.getElementById('my-id').innerText = "@" + t;
                localStorage.setItem('t', t);
            }
            closeSet();
        }

        function setRoom(name) {
            document.getElementById('chat-title').innerText = "# " + name;
            document.getElementById('msg-list').innerHTML = `<div class="msg-bubble">已進入 ${name} 的加密對話。</div>`;
        }

        function send() {
            const i = document.getElementById('m-in');
            if(!i.value) return;
            document.getElementById('msg-list').innerHTML += `<div class="msg-bubble msg-me">${i.value}</div>`;
            i.value = '';
            const m = document.getElementById('msg-list');
            m.scrollTop = m.scrollHeight;
        }

        function logout() { localStorage.clear(); location.reload(); }

        window.onload = () => {
            const n = localStorage.getItem('n');
            const t = localStorage.getItem('t');
            if(n) { document.getElementById('my-name').innerText = n; document.getElementById('set-n').value = n; }
            if(t) { document.getElementById('my-id').innerText = "@" + t; document.getElementById('set-t').value = t; }
        }
    </script>
</body>
</html>
