<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tacker | Terminal</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.7/dist/umd/supabase.js"></script>
    <style>
        :root { 
            --p-green: #00ff41; 
            --bg-deep: #010409; 
            --bg-main: #0d1117; 
            --bg-sidebar: #161b22;
            --border: #30363d;
            --text-muted: #8b949e;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg-deep); color: white; font-family: 'Segoe UI', sans-serif; height: 100vh; overflow: hidden; }

        /* --- 登入畫面 --- */
        #login-screen { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: var(--bg-deep); z-index: 10000; }
        .login-box { background: var(--bg-sidebar); padding: 35px; border-radius: 4px; border: 1px solid var(--border); width: 90%; max-width: 400px; text-align: center; }
        h2 { color: var(--p-green); margin-bottom: 25px; letter-spacing: 4px; font-weight: 900; }
        input { width: 100%; padding: 14px; margin-bottom: 15px; background: #010409; border: 1px solid var(--border); color: white; border-radius: 4px; outline: none; font-size: 16px; }
        .btn { width: 100%; padding: 14px; border-radius: 4px; font-weight: bold; cursor: pointer; border: none; margin-top: 10px; font-size: 15px; }
        .btn-main { background: var(--p-green); color: black; }
        .btn-discord { background: #5865F2; color: white; }

        /* --- 主程式佈局 (三欄式) --- */
        #main-app { display: none; height: 100vh; flex-direction: row; }

        /* 1. 伺服器欄 (最左) */
        .guild-bar { width: 72px; background: var(--bg-deep); border-right: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; padding-top: 12px; gap: 12px; }
        .g-icon { width: 48px; height: 48px; background: var(--bg-sidebar); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; border: 1px solid var(--border); }
        .g-icon:hover { border-radius: 15px; border-color: var(--p-green); color: var(--p-green); }
        .g-logout { margin-top: auto; margin-bottom: 12px; color: #ff4d4d; border-color: #442222; }

        /* 2. 頻道欄 (中) */
        .channel-bar { width: 240px; background: var(--bg-sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .ch-header { height: 50px; display: flex; align-items: center; padding: 0 16px; font-weight: bold; border-bottom: 1px solid var(--border); color: var(--p-green); font-size: 14px; }
        .ch-list { padding: 10px 0; flex: 1; }
        .ch-item { padding: 8px 16px; color: var(--text-muted); cursor: pointer; font-size: 15px; }
        .ch-item:hover { background: #21262d; color: white; }
        .ch-active { color: white; background: #1c2128; border-left: 3px solid var(--p-green); }

        /* 3. 聊天區 (右) */
        .chat-view { flex: 1; display: flex; flex-direction: column; background: var(--bg-main); }
        .chat-header { height: 50px; border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; font-weight: bold; }
        .msg-container { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; }
        .msg-box { display: flex; gap: 12px; }
        .avatar { width: 40px; height: 40px; background: #30363d; border-radius: 50%; flex-shrink: 0; }
        .msg-content { font-size: 15px; }
        .u-name { font-weight: bold; color: var(--p-green); font-size: 13px; margin-bottom: 4px; }
        .input-area { padding: 20px; }
        .input-wrapper { background: #383a40; border-radius: 8px; padding: 10px 16px; }
        .chat-input { width: 100%; background: transparent; border: none; color: white; outline: none; font-size: 15px; }

        /* 手機 RWD */
        @media (max-width: 768px) {
            .channel-bar { display: none; }
        }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2>TACKER</h2>
            <input type="email" id="email" placeholder="Terminal ID (Email)">
            <input type="password" id="pw" placeholder="Access Code (Password)">
            <button class="btn btn-main" onclick="handleAuth()">進入系統</button>
            <button class="btn btn-discord" onclick="handleDiscord()">DISCORD 授權</button>
            <p onclick="toggleMode()" id="mode-text" style="color:var(--p-green); cursor:pointer; margin-top:20px; font-size:13px;">[ 請求新帳號 ]</p>
        </div>
    </div>

    <div id="main-app">
        <nav class="guild-bar">
            <div class="g-icon" style="color:var(--p-green); border-color:var(--p-green);">T</div>
            <div class="g-icon">+</div>
            <div class="g-icon g-logout" onclick="doLogout()" title="登出系統">🚪</div>
        </nav>

        <aside class="channel-bar">
            <div class="ch-header">FR TECHNOLOGY</div>
            <div class="ch-list">
                <div class="ch-item ch-active"># 🧊 大廳聊天</div>
                <div class="ch-item"># 🛠️ 開發日誌</div>
                <div class="ch-item"># 🔐 秘密頻道</div>
            </div>
        </aside>

        <main class="chat-view">
            <div class="chat-header"># 🧊 大廳聊天</div>
            <div class="msg-container" id="msg-list">
                <div class="msg-box">
                    <div class="avatar"></div>
                    <div class="msg-content">
                        <div class="u-name">SYSTEM</div>
                        <div style="color: #8b949e;">連線加密成功。歡迎進入 Tacker 終端。</div>
                    </div>
                </div>
            </div>
            <div class="input-area">
                <div class="input-wrapper">
                    <input type="text" class="chat-input" placeholder="發送訊息至 #大廳聊天..." id="chat-msg">
                </div>
            </div>
        </main>
    </div>

    <script>
        // 配置資料 (請確認與你之前成功連線的資料一致)
        const S_URL = 'https://coyiifxxfopvabpjszis.supabase.co';
        const S_KEY = 'sb_publishable_ZaDrVW5Goe5QFqL4rBvNCg_JrwHKIFH'; 
        const supabase = window.supabase.createClient(S_URL, S_KEY);

        let isSignUp = false;

        // 核心：檢查登入狀態 (解決「下次進來會自動登入」)
        async function checkStatus() {
            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-app').style.display = 'flex';
                console.log("登入者:", session.user.email);
            } else {
                document.getElementById('login-screen').style.display = 'flex';
                document.getElementById('main-app').style.display = 'none';
            }
        }

        // 登出功能
        async function doLogout() {
            const { error } = await supabase.auth.signOut();
            if (error) alert(error.message);
            else location.reload(); // 重新整理網頁回到登入畫面
        }

        function toggleMode() {
            isSignUp = !isSignUp;
            document.getElementById('mode-text').innerText = isSignUp ? "[ 返回登入 ]" : "[ 請求新帳號 ]";
            document.querySelector('.btn-main').innerText = isSignUp ? "立即註冊" : "進入系統";
        }

        async function handleAuth() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('pw').value;
            const { error } = isSignUp 
                ? await supabase.auth.signUp({ email, password })
                : await supabase.auth.signInWithPassword({ email, password });
            
            if (error) alert(error.message);
            else checkStatus();
        }

        async function handleDiscord() {
            await supabase.auth.signInWithOAuth({
                provider: 'discord',
                options: { redirectTo: window.location.origin + window.location.pathname }
            });
        }

        // 初始化
        checkStatus();

        // 監聽狀態改變 (處理 Discord 跳轉回來的瞬間)
        supabase.auth.onAuthStateChange((event, session) => {
            if (session) checkStatus();
        });

        // 聊天輸入 Enter 偵測 (範例)
        document.getElementById('chat-msg').addEventListener('keypress', function (e) {
            if (e.key === 'Enter' && this.value) {
                const text = this.value;
                const list = document.getElementById('msg-list');
                list.innerHTML += `<div class="msg-box"><div class="avatar"></div><div class="msg-content"><div class="u-name">YOU</div><div>${text}</div></div></div>`;
                this.value = '';
                list.scrollTop = list.scrollHeight;
            }
        });
    </script>
</body>
</html>
