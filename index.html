<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tacker Private | FR Tech</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --p-green: #00ff41; --bg-main: #0d1117; --bg-side: #161b22; --brd: #30363d; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { margin: 0; background: #010409; color: white; font-family: "Microsoft JhengHei", sans-serif; height: 100vh; overflow: hidden; }
        
        /* 登入牆保持不變，確保穩定性 */
        #login-screen { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: #010409; z-index: 10000; }
        .login-box { background: var(--bg-side); padding: 40px; border-radius: 12px; border: 1px solid var(--brd); width: 90%; max-width: 400px; text-align: center; }
        input { width: 100%; padding: 14px; margin-bottom: 12px; background: #000; border: 1px solid var(--brd); color: white; border-radius: 6px; }
        .btn { width: 100%; padding: 14px; border-radius: 6px; font-weight: bold; cursor: pointer; border: none; margin-top: 10px; font-size: 16px; }
        .btn-main { background: var(--p-green); color: black; }

        /* 新版主程式佈局：移除最左側伺服器欄 */
        #main-app { display: none; height: 100vh; flex-direction: row; }

        /* 側邊欄：好友與群組合一 */
        .side-bar { width: 280px; background: var(--bg-side); border-right: 1px solid var(--brd); display: flex; flex-direction: column; }
        .user-profile { padding: 20px; border-bottom: 1px solid var(--brd); display: flex; align-items: center; justify-content: space-between; }
        .tabs { display: flex; border-bottom: 1px solid var(--brd); }
        .tab { flex: 1; padding: 15px; text-align: center; cursor: pointer; font-size: 14px; color: #8b949e; }
        .tab-active { color: var(--p-green); border-bottom: 2px solid var(--p-green); background: rgba(0,255,65,0.05); }
        
        .list-content { flex: 1; overflow-y: auto; }
        .list-item { padding: 12px 20px; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: 0.2s; }
        .list-item:hover { background: #21262d; }
        .list-item i { font-style: normal; opacity: 0.6; }
        .add-btn { padding: 10px 20px; color: var(--p-green); cursor: pointer; font-size: 13px; text-align: center; border-top: 1px solid var(--brd); }

        /* 聊天區 */
        .chat-area { flex: 1; display: flex; flex-direction: column; background: var(--bg-main); }
        .chat-header { height: 60px; padding: 0 25px; display: flex; align-items: center; border-bottom: 1px solid var(--brd); font-weight: bold; font-size: 18px; }
        .messages { flex: 1; padding: 25px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; }
        .msg-row { display: flex; gap: 15px; }
        .u-avatar { width: 40px; height: 40px; background: #30363d; border-radius: 8px; flex-shrink: 0; }
        .msg-content { flex: 1; }
        .u-info { font-size: 12px; color: var(--p-green); margin-bottom: 5px; font-weight: bold; }
        .u-text { font-size: 15px; color: #e6edf3; line-height: 1.6; }

        .input-wrap { padding: 20px; }
        .input-box { background: #1c2128; border: 1px solid var(--brd); border-radius: 10px; padding: 12px 18px; display: flex; gap: 10px; }
        #msg-input { flex: 1; background: transparent; border: none; color: white; font-size: 16px; }

        @media (max-width: 600px) { .side-bar { width: 100%; } .chat-area { display: none; } }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2 style="color:var(--p-green)">TACKER PRIVATE</h2>
            <input type="email" id="email" placeholder="信箱">
            <input type="password" id="pw" placeholder="密碼">
            <button class="btn btn-main" onclick="handleAuth()">進入通訊</button>
            <p id="mode-text" onclick="toggleMode()" style="color:var(--p-green); cursor:pointer; margin-top:20px; font-size:14px;">[ 註冊新帳號 ]</p>
        </div>
    </div>

    <div id="main-app">
        <aside class="side-bar">
            <div class="user-profile">
                <span id="my-name" style="font-weight:bold; color:var(--p-green)">載入中...</span>
                <span onclick="doLogout()" style="cursor:pointer; font-size:18px;">🚪</span>
            </div>
            <div class="tabs">
                <div class="tab tab-active" id="t-fr" onclick="switchTab('fr')">好友</div>
                <div class="tab" id="t-gr" onclick="switchTab('gr')">私人群組</div>
            </div>
            <div class="list-content" id="list-box"></div>
            <div class="add-btn" onclick="addNew()">+ 新增項目</div>
        </aside>

        <main class="chat-area">
            <div class="chat-header" id="target-name">選擇一個對話...</div>
            <div class="messages" id="msg-box"></div>
            <div class="input-wrap">
                <div class="input-box">
                    <input type="text" id="msg-input" placeholder="撰寫訊息..." onkeypress="if(event.key==='Enter') send()">
                    <b onclick="send()" style="color:var(--p-green); cursor:pointer">發送</b>
                </div>
            </div>
        </main>
    </div>

    <script>
        const S_URL = 'https://coyiifxxfopvabpjszis.supabase.co';
        const S_KEY = 'sb_publishable_ZaDrVW5Goe5QFqL4rBvNCg_JrwHKIFH'; 
        const supabase = window.supabase.createClient(S_URL, S_KEY);

        let user = null;
        let isSignUp = false;
        let activeMode = 'fr';

        async function init() {
            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                user = session.user;
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-app').style.display = 'flex';
                document.getElementById('my-name').innerText = user.email.split('@')[0];
                render();
            }
        }

        async function handleAuth() {
            const e = document.getElementById('email').value;
            const p = document.getElementById('pw').value;
            if(!e || !p) return alert("請輸入完整資訊");
            const { error } = isSignUp ? await supabase.auth.signUp({email:e, password:p}) : await supabase.auth.signInWithPassword({email:e, password:p});
            if(error) alert(error.message); else init();
        }

        function toggleMode() {
            isSignUp = !isSignUp;
            document.getElementById('mode-text').innerText = isSignUp ? "[ 返回登入 ]" : "[ 註冊新帳號 ]";
            document.querySelector('h2').innerText = isSignUp ? "註冊 TACKER" : "TACKER PRIVATE";
        }

        function switchTab(m) {
            activeMode = m;
            document.getElementById('t-fr').className = m==='fr' ? 'tab tab-active' : 'tab';
            document.getElementById('t-gr').className = m==='gr' ? 'tab tab-active' : 'tab';
            render();
        }

        function render() {
            const box = document.getElementById('list-box');
            if(activeMode === 'fr') {
                box.innerHTML = `<div class="list-item" onclick="openChat('Shadow')">👤 <i>好友:</i> Shadow</div>`;
            } else {
                box.innerHTML = `<div class="list-item" onclick="openChat('FR 開發團隊')">🔒 <i>群組:</i> FR 開發團隊</div>`;
            }
        }

        function openChat(name) {
            document.getElementById('target-name').innerText = name;
            document.getElementById('msg-box').innerHTML = `<div class="msg-row"><div class="u-avatar"></div><div class="msg-content"><div class="u-info">系統</div><div class="u-text">已建立與 ${name} 的加密連線。</div></div></div>`;
        }

        function addNew() {
            const name = prompt(activeMode==='fr' ? "請輸入好友 Email:" : "請輸入群組名稱:");
            if(name) {
                const box = document.getElementById('list-box');
                const icon = activeMode==='fr' ? '👤' : '🔒';
                box.innerHTML += `<div class="list-item" onclick="openChat('${name}')">${icon} <i>新加:</i> ${name}</div>`;
            }
        }

        function send() {
            const i = document.getElementById('msg-input');
            if(!i.value) return;
            const m = document.getElementById('msg-box');
            m.innerHTML += `<div class="msg-row"><div class="u-avatar"></div><div class="msg-content"><div class="u-info">我</div><div class="u-text">${i.value}</div></div></div>`;
            i.value = ''; m.scrollTop = m.scrollHeight;
        }

        async function doLogout() { await supabase.auth.signOut(); location.reload(); }
        window.onload = init;
    </script>
</body>
</html>
