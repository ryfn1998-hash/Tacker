<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tacker | Secure Communication Network</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg-primary: #313338; --bg-secondary: #2b2d31; --bg-tertiary: #232428; --brand: #5865f2; --success: #23a55a; --text-normal: #dbdee1; --text-muted: #b5bac1; }
        body { margin: 0; background: var(--bg-primary); color: white; font-family: 'gg sans', 'Noto Sans TC', sans-serif; height: 100vh; overflow: hidden; }
        input { width: 100%; background: #1e1f22; border: none; padding: 12px; color: white; border-radius: 4px; margin-bottom: 15px; outline: none; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; border-radius: 4px; border: none; cursor: pointer; font-weight: 600; transition: background 0.2s; }
        .btn-google { background: white; color: #000; display: flex; align-items: center; justify-content: center; gap: 10px; }
        
        .auth-container { height: 100vh; display: none; justify-content: center; align-items: center; background: #1e1f22; }
        .auth-card { background: var(--bg-secondary); padding: 40px; border-radius: 8px; width: 100%; max-width: 420px; box-shadow: 0 8px 16px rgba(0,0,0,0.3); }
        .active { display: flex ! grandparent; }

        /* App Layout */
        #app-root { display: none; height: 100vh; grid-template-columns: 240px 1fr; }
        .nav-sidebar { background: var(--bg-secondary); position: relative; border-right: 1px solid rgba(0,0,0,0.2); display: flex; flex-direction: column; }
        .user-settings-bar { background: var(--bg-tertiary); padding: 8px 12px; display: flex; align-items: center; gap: 8px; position: absolute; bottom: 0; width: 100%; box-sizing: border-box; cursor: pointer; }
        .user-avatar { width: 32px; height: 32px; border-radius: 50%; background: #4e5058; overflow: hidden; }
        
        .content-view { display: flex; flex-direction: column; background: var(--bg-primary); }
        .empty-state { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; opacity: 0.15; pointer-events: none; }
        .message-input-container { padding: 0 20px 24px; }
        .input-wrapper { background: #383a40; border-radius: 8px; padding: 11px 15px; display: flex; align-items: center; gap: 12px; }
    </style>
</head>
<body>

    <div id="view-login" class="auth-container active">
        <div class="auth-card">
            <h2 style="text-align:center; margin-bottom:28px;">Tacker</h2>
            <button class="btn btn-google" onclick="triggerOAuth(false)">
                <img src="https://www.google.com/favicon.ico" width="18"> Continue with Google
            </button>
            <div style="text-align:center; margin-top:24px; font-size:14px; color:var(--text-muted);">
                New here? <span style="color:#00a8fc; cursor:pointer;" onclick="switchAuthView('view-register')">Register Account</span>
            </div>
        </div>
    </div>

    <div id="view-register" class="auth-container">
        <div class="auth-card">
            <h2 style="text-align:center; margin-bottom:8px;">Create Account</h2>
            <p style="text-align:center; color:var(--text-muted); font-size:14px; margin-bottom:24px;">Join the Tacker network</p>
            
            <button class="btn btn-google" id="reg-oauth-trigger" onclick="triggerOAuth(true)">
                <img src="https://www.google.com/favicon.ico" width="18"> 1. Verify Google Identity
            </button>
            
            <div id="extended-profile-fields" style="display:none; margin-top:24px; border-top:1px solid #3f4147; padding-top:20px;">
                <label style="font-size:11px; font-weight:800; color:var(--text-muted); text-transform:uppercase;">Account ID</label>
                <input type="text" id="field-tacker-id" placeholder="lowercase letters and numbers">
                
                <label style="font-size:11px; font-weight:800; color:var(--text-muted); text-transform:uppercase;">Date of Birth</label>
                <div style="display:flex; gap:8px;">
                    <input type="number" placeholder="YYYY" id="dob-y">
                    <input type="number" placeholder="MM" id="dob-m">
                    <input type="number" placeholder="DD" id="dob-d">
                </div>
                
                <button class="btn" style="background:var(--brand); color:white; margin-top:10px;" onclick="finalizeRegistration()">Complete Setup</button>
            </div>
        </div>
    </div>

    <div id="app-root">
        <nav class="nav-sidebar">
            <div style="flex:1; padding:20px; font-size:14px; color:var(--text-muted); text-align:center;">
                No active conversations
            </div>
            <div class="user-settings-bar" onclick="toggleSettings(true)">
                <div class="user-avatar"><img id="display-avatar" style="width:100%; height:100%; object-fit:cover;"></div>
                <div style="font-size:12px; line-height:1.2;">
                    <div id="display-name" style="font-weight:700; white-space:nowrap;"></div>
                    <div id="display-id" style="color:var(--text-muted);"></div>
                </div>
            </div>
        </nav>
        
        <main class="content-view">
            <div class="empty-state">
                <div style="font-size:120px; font-weight:800;">#</div>
                <p style="font-size:18px;">No channel selected</p>
            </div>
            <div class="message-input-container">
                <div class="input-wrapper">
                    <span style="color:var(--text-muted); cursor:pointer; font-size:20px;" onclick="console.log('File upload limit: 10MB')">⊕</span>
                    <input type="text" style="background:transparent; flex:1; color:white;" placeholder="Message Tacker">
                </div>
            </div>
        </main>
    </div>

    <script>
        const supabaseUrl = 'https://coyiifxxfopvabpjszis.supabase.co';
        const supabaseKey = 'Sb_publishable_ZaDrVW5Goe5QFqL4rBvNCg_JrwHKIFH';
        const _s = supabase.createClient(supabaseUrl, supabaseKey);

        function switchAuthView(viewId) {
            document.querySelectorAll('.auth-container').forEach(c => c.style.display = 'none');
            document.getElementById(viewId).style.display = 'flex';
        }

        async function triggerOAuth(isRegistration) {
            if(isRegistration) localStorage.setItem('flow_type', 'registration');
            else localStorage.removeItem('flow_type');

            const redirectTarget = window.location.origin + window.location.pathname;
            const { error } = await _s.auth.signInWithOAuth({
                provider: 'google',
                options: { redirectTo: redirectTarget }
            });
            if(error) console.error('Auth Error:', error.message);
        }

        async function syncSessionStatus() {
            const { data: { session } } = await _s.auth.getSession();
            if (session) {
                const { data: profile } = await _s.from('profiles').select('*').eq('id', session.user.id).maybeSingle();
                
                if (localStorage.getItem('flow_type') === 'registration' && !profile) {
                    switchAuthView('view-register');
                    document.getElementById('reg-oauth-trigger').style.display = 'none';
                    document.getElementById('extended-profile-fields').style.display = 'block';
                } else if (profile) {
                    initAppInstance(profile);
                } else {
                    switchAuthView('view-login');
                }
            }
        }

        async function finalizeRegistration() {
            const tackerId = document.getElementById('field-tacker-id').value.toLowerCase().replace(/[^a-z0-9]/g, '');
            if(!tackerId || tackerId.length < 3) return alert('Invalid Account ID');
            
            const { data: { user } } = await _s.auth.getUser();
            const { error } = await _s.from('profiles').upsert({
                id: user.id,
                tacker_id: tackerId,
                full_name: user.user_metadata.full_name,
                avatar_url: user.user_metadata.avatar_url
            });

            if(!error) {
                localStorage.removeItem('flow_type');
                location.reload();
            }
        }

        function initAppInstance(profile) {
            document.querySelectorAll('.auth-container').forEach(c => c.style.display = 'none');
            document.getElementById('app-root').style.display = 'grid';
            document.getElementById('display-name').innerText = profile.full_name;
            document.getElementById('display-id').innerText = `@${profile.tacker_id}`;
            document.getElementById('display-avatar').src = profile.avatar_url;
        }

        window.onload = syncSessionStatus;
    </script>
</body>
</html>
