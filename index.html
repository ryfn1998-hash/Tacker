<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tacker | Obsidian</title>
    <style>
        :root {
            --bg-dark: #09090b; --bg-side: #121214; --bg-card: #18181b;
            --text-main: #f4f4f5; --text-muted: #a1a1aa;
            --accent: #8b5cf6; --border: #27272a;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: sans-serif; }
        body { margin: 0; background: var(--bg-dark); color: var(--text-main); height: 100vh; overflow: hidden; }

        /* --- 登入頁面 (主畫面) --- */
        #auth-page { 
            display: flex; align-items: center; justify-content: center; height: 100vh; background: var(--bg-dark); 
        }
        .login-card { 
            background: var(--bg-side); padding: 40px; border-radius: 16px; border: 1px solid var(--border); 
            width: 90%; max-width: 400px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .login-card input { 
            width: 100%; padding: 12px; margin-bottom: 15px; background: #000; border: 1px solid var(--border); 
            color: white; border-radius: 8px; outline: none; 
        }
        .btn-main { 
            width: 100%; padding: 12px; background: var(--accent); color: white; border: none; 
            border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s;
        }
        .btn-main:hover { opacity: 0.9; }

        /* --- 主程式介面 --- */
        #app { display: none; height: 100vh; width: 100%; }
        
        .rail { width: 64px; background: #000; display: flex; flex-direction: column; align-items: center; padding: 20px 0; border-right: 1px solid var(--border); gap: 15px; }
        .rail-btn { width: 44px; height: 44px; border-radius: 12px; background: var(--bg-side); display: flex; align-items: center; justify-content: center; cursor: pointer; border: 1px solid transparent; }
        .rail-btn.active { border-color: var(--accent); color: var(--accent); }

        .sidebar { width: 260px; background: var(--bg-side); display: flex; flex-direction: column; border-right: 1px solid var(--border); }
        .side-head { padding: 20px; font-size: 12px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; }
        
        .user-panel { padding: 10px; background: rgba(0,0,0,0.2); border-top: 1px solid var(--border); }
        .user-pill { display: flex; align-items: center; gap: 10px; padding: 6px 10px; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        .user-pill:hover { background: var(--border); }

        main { flex: 1; background: var(--bg-dark); display: flex; align-items: center; justify-content: center; color: var(--text-muted); }

        /* --- 設定牆 --- */
        #settings-ui { position: fixed; inset: 0; background: var(--bg-dark); z-index: 1000; display: none; }
        .settings-win { display: flex; height: 100%; width: 100%; max-width: 1200px; margin: 0 auto; }
        .set-side { width: 280px; background: var(--bg-side); padding: 60px 40px; border-right: 1px solid var(--border); }
        .set-main { flex: 1; padding: 60px 40px; overflow-y: auto; position: relative; }
        .close-x { position: absolute; right: 40px; top: 40px; font-size: 24px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="auth-page">
        <div class="login-card">
            <h1 style="color:var(--accent); margin-bottom: 30px;">TACKER</h1>
            <input type="email" id="email" placeholder="電子信箱">
            <input type="password" id="pass" placeholder="密碼">
            <button class="btn-main" onclick="mockLogin()">登入系統</button>
            <p style="font-size:12px; color:var(--text-muted); margin-top:20px;">FR Technology 安全加密連線</p>
        </div>
    </div>

    <div id="app">
        <nav class="rail">
            <div class="rail-btn active">💬</div>
            <div class="rail-btn">👥</div>
        </nav>

        <aside class="sidebar">
            <div class="side-head">訊息 <span onclick="alert('加好友功能開發中')">＋</span></div>
            <div style="flex:1; padding:20px; font-size:13px; color:var(--text-muted); text-align:center;">目前沒有對話</div>
            <div class="user-panel">
                <div class="user-pill" onclick="openSettings()">
                    <div style="width:32px; height:32px; border-radius:50%; background:var(--accent); display:flex; align-items:center; justify-content:center; font-weight:bold;">U</div>
                    <div style="flex:1;">
                        <b style="font-size:13px; display:block;" id="nav-name">未設定名稱</b>
                        <span style="font-size:11px; color:var(--text-muted);" id="nav-tag">@tacker_user</span>
                    </div>
                    <span>⚙️</span>
                </div>
            </div>
        </aside>

        <main>
            <div style="text-align:center;">
                <h2 style="color:var(--accent)">歡迎回來</h2>
                <p>選擇一個對話開始加密連線</p>
            </div>
        </main>
    </div>

    <div id="settings-ui">
        <div class="settings-win">
            <div class="set-side">
                <div style="font-weight:800; color:var(--text-muted); margin-bottom:30px;">使用者設定</div>
                <div style="padding:10px; background:var(--border); border-radius:8px; margin-bottom:10px;">個人檔案</div>
                <div style="padding:10px; color:#ff4d4d; cursor:pointer;" onclick="logout()">登出</div>
            </div>
            <div class="set-main">
                <div class="close-x" onclick="closeSettings()">✕</div>
                <h2>個人檔案設定</h2>
                <div style="margin-top:30px; background:var(--bg-side); padding:30px; border-radius:12px; border:1px solid var(--border);">
                    <label style="color:var(--text-muted); font-size:12px;">顯示名稱</label>
                    <input type="text" id="set-n" style="width:100%; background:#000; border:1px solid var(--border); color:white; padding:12px; border-radius:8px; margin-bottom:20px;">
                    
                    <label style="color:var(--text-muted); font-size:12px;">帳號代碼</label>
                    <input type="text" id="set-t" style="width:100%; background:#000; border:1px solid var(--border); color:white; padding:12px; border-radius:8px; margin-bottom:30px;">
                    
                    <button class="btn-main" onclick="saveProfile()">儲存變更</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 核心跳轉邏輯
        function checkAuth() {
            const token = localStorage.getItem('tacker_token');
            if (token) {
                document.getElementById('auth-page').style.display = 'none';
                document.getElementById('app').style.display = 'flex';
                loadProfile();
            } else {
                document.getElementById('auth-page').style.display = 'flex';
                document.getElementById('app').style.display = 'none';
            }
        }

        function mockLogin() {
            // 這裡之後接 Supabase 真登入
            localStorage.setItem('tacker_token', 'dummy_token');
            checkAuth();
        }

        function logout() {
            localStorage.removeItem('tacker_token');
            closeSettings(); // 先關閉設定窗
            checkAuth();     // 觸發 UI 切換回到登入頁
        }

        // 個資控制
        function openSettings() { document.getElementById('settings-ui').style.display = 'block'; }
        function closeSettings() { document.getElementById('settings-ui').style.display = 'none'; }

        function saveProfile() {
            const n = document.getElementById('set-n').value;
            const t = document.getElementById('set-t').value;
            if(n) localStorage.setItem('t_name', n);
            if(t) localStorage.setItem('t_tag', t);
            loadProfile();
            alert("個資已更新");
        }

        function loadProfile() {
            const n = localStorage.getItem('t_name') || "新成員";
            const t = localStorage.getItem('t_tag') || "tacker_user";
            document.getElementById('nav-name').innerText = n;
            document.getElementById('nav-tag').innerText = "@" + t;
            document.getElementById('set-n').value = n;
            document.getElementById('set-t').value = t;
        }

        // 初始化
        window.onload = checkAuth;
    </script>
</body>
</html>
