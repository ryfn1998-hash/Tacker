<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tacker Pro | Ultimate Final Edition</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        :root { --bg: #000; --card: #111; --acc: #23a559; --official: #3498db; --staff-tag: #3498db; --text: #fff; --sub: #888; --danger: #f23f43; }
        * { box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
        body, html { margin:0; padding:0; height:100%; background:var(--bg); color:var(--text); overflow:hidden; }

        .screen { position: absolute; width: 100%; height: 100%; display: none; flex-direction: column; z-index: 10; }
        .active { display: flex; }

        /* --- 側邊欄 --- */
        .rail { width: 65px; background: #050505; flex-shrink: 0; display: flex; flex-direction: column; align-items: center; padding: 25px 0; gap: 20px; border-right: 1px solid #222; overflow-y: auto; }
        .dm-nav { width: 45px; height: 45px; border-radius: 50%; border: 2px solid transparent; position: relative; cursor: pointer; }
        .dm-nav img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        .dm-nav.active { border-color: var(--acc); }

        /* --- 主區域 --- */
        .main { flex-grow: 1; background: #111; display: flex; flex-direction: column; }
        header { height: 60px; border-bottom: 1px solid #222; display: flex; align-items: center; padding: 0 20px; justify-content: space-between; }
        .sys-tag { background: var(--staff-tag); color: #fff; font-size: 10px; padding: 2px 6px; border-radius: 4px; margin-left: 5px; font-weight: 900; }
        .badge { background: rgba(255,255,255,0.05); padding: 4px 10px; border-radius: 20px; color: var(--sub); border: 1px solid #222; font-size: 11px; }

        /* --- 訊息串流 --- */
        #chat-flow { flex-grow: 1; overflow-y: auto; padding: 15px 0; }
        .msg-row { display: flex; gap: 12px; margin-bottom: 20px; padding: 0 15px; }
        .pfp { width: 42px; height: 42px; border-radius: 50%; overflow: hidden; border: 1px solid #333; flex-shrink: 0; cursor: pointer; }
        .pfp img { width: 100%; height: 100%; object-fit: cover; }
        .msg-img { max-width: 80%; border-radius: 12px; margin-top: 8px; border: 1px solid #333; cursor: zoom-in; }

        /* --- 輸入欄位 --- */
        .input-bar { padding: 12px; border-top: 1px solid #222; background: #0a0a0a; display: flex; gap: 10px; align-items: center; }
        .input-bar input { flex-grow: 1; padding: 12px; background: #1e1e1e; border: 1px solid #333; color: #fff; border-radius: 10px; outline: none; }
        .icon-btn { color: var(--sub); font-size: 20px; cursor: pointer; padding: 5px; transition: 0.2s; }
        .icon-btn:hover { color: var(--acc); }

        /* --- 彈窗 --- */
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:1000; align-items:center; justify-content:center; }
        .panel { background: var(--card); border: 1px solid #333; border-radius: 20px; width: 340px; padding: 25px; }
        .panel input, .panel textarea { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #333; color: #fff; border-radius: 8px; }
        .panel button { width: 100%; padding: 12px; background: var(--acc); color: #fff; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }

        /* 動畫 */
        #s-home { background: #fff; color: #000; align-items: center; justify-content: center; }
        .big-tacker { font-weight: 900; font-size: 80px; animation: zoomIn 1s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes zoomIn { from { transform: scale(8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

    <section id="s-home" class="screen active">
        <div class="big-tacker">Tacker</div>
        <button onclick="checkAuth()" style="margin-top:50px; padding:18px 60px; background:#000; color:#fff; border:none; border-radius:50px; font-weight:bold; cursor:pointer;">開始使用 ——＞</button>
    </section>

    <section id="s-login" class="screen" style="background:#f5f5f5; align-items:center; justify-content:center;">
        <div style="background:#fff; width:320px; padding:35px; border-radius:15px; color:#333;">
            <h2 style="margin:0 0 20px 0;">登入</h2>
            <input id="u-id" placeholder="帳號 ID">
            <input id="u-pw" type="password" placeholder="密碼">
            <button onclick="auth()" style="background:#000; color:#fff; width:100%; padding:15px; border-radius:8px; border:none; font-weight:bold;">登入</button>
        </div>
    </section>

    <section id="s-load" class="screen" style="align-items:center; justify-content:center;">
        <div style="width:150px; height:4px; background:#222; border-radius:10px; overflow:hidden;">
            <div id="bar" style="width:0%; height:100%; background:var(--acc);"></div>
        </div>
    </section>

    <section id="s-app" class="screen">
        <div style="display:flex; height:100%;">
            <nav class="rail">
                <div onclick="tab('chat')" id="nav-chat" style="color:var(--acc); font-size:24px;"><i class="fa-solid fa-earth-asia"></i></div>
                <div onclick="tab('me')" id="nav-me" style="color:#444; font-size:24px;"><i class="fa-solid fa-user-gear"></i></div>
                <div style="width:30px; height:1px; background:#222;"></div>
                <div id="dm-list" style="display:flex; flex-direction:column; gap:15px;"></div>
            </nav>

            <main id="chat-tab" class="main">
                <header>
                    <b id="main-title">全球大廳</b>
                    <div style="display:flex; align-items:center;">
                        <i id="block-btn" class="fa-solid fa-ban" style="display:none; cursor:pointer; font-size:20px; margin-right:15px;" onclick="toggleBlock()"></i>
                        <span class="badge">用戶 <b id="total-count">0</b></span>
                    </div>
                </header>
                <div id="chat-flow"><div id="messages"></div></div>
                <div class="input-bar">
                    <label class="icon-btn">
                        <i class="fa-solid fa-image"></i>
                        <input type="file" id="img-select" accept="image/*" style="display:none;" onchange="handleImage(this)">
                    </label>
                    <input id="m-input" placeholder="說點什麼..." onkeypress="if(event.key==='Enter') send()">
                    <button onclick="send()" style="background:var(--acc); border:none; color:#fff; padding:10px 15px; border-radius:8px;"><i class="fa-solid fa-paper-plane"></i></button>
                </div>
            </main>

            <main id="me-tab" class="main" style="display:none; padding:30px; overflow-y:auto;">
                <h2 style="font-weight:900;">個人設定</h2>
                <div style="background:#1a1a1a; padding:20px; border-radius:15px; border:1px solid #333; margin-bottom:20px;">
                    <label style="color:var(--sub); font-size:12px;">更換頭像 (網址或 Base64)</label>
                    <div style="display:flex; align-items:center; gap:15px; margin:10px 0;">
                        <img id="current-pfp" style="width:60px; height:60px; border-radius:50%; object-fit:cover;">
                        <input id="edit-pfp" style="flex-grow:1; background:#000;">
                    </div>
                    <label style="color:var(--sub); font-size:12px;">顯示名稱</label>
                    <input id="edit-name">
                    <label style="color:var(--sub); font-size:12px;">個人簡介</label>
                    <textarea id="edit-bio"></textarea>
                </div>
                <button onclick="saveProfile()" style="background:var(--acc); width:100%; padding:15px; border-radius:10px; color:#fff; font-weight:bold; border:none;">儲存變更</button>
                <button onclick="openPwdFlow()" style="width:100%; margin-top:15px; padding:12px; background:#333; color:#fff; border:none; border-radius:8px;">🔒 修改密碼</button>
                <button onclick="logout()" style="width:100%; margin-top:20px; color:var(--danger); background:none; border:none; cursor:pointer;">登出帳號</button>
            </main>
        </div>
    </section>

    <div id="pwd-modal" class="modal">
        <div id="pwd-step1" class="panel">
            <h3>驗證原密碼</h3>
            <input type="password" id="old-pw-input" placeholder="請輸入原密碼">
            <button onclick="verifyOldPw()">驗證</button>
            <button onclick="closeModal('pwd-modal')" style="background:none;">取消</button>
        </div>
        <div id="pwd-step2" class="panel" style="display:none;">
            <h3>設定新密碼</h3>
            <input type="password" id="new-pw1" placeholder="新密碼">
            <input type="password" id="new-pw2" placeholder="確認新密碼">
            <button onclick="submitNewPw()">完成更改</button>
        </div>
    </div>

    <div id="user-modal" class="modal" onclick="this.style.display='none'">
        <div class="panel" onclick="event.stopPropagation()">
            <div id="modal-pfp-box" style="width:70px; height:70px; border-radius:50%; overflow:hidden; border:2px solid var(--acc); margin-bottom:15px;"></div>
            <h2 id="modal-name"></h2><span id="modal-sys-tag" class="sys-tag" style="display:none;">官方帳號</span>
            <p id="modal-bio" style="color:#aaa; font-size:14px; margin:15px 0; border-top:1px solid #222; padding-top:10px;"></p>
            <div id="modal-actions"></div>
        </div>
    </div>

    <script>
        const config = { apiKey: "AIzaSyB56chNeodbgAYa8k3xspOOAMYt6C5M4cw", databaseURL: "https://tacker-ebc5a-default-rtdb.firebaseio.com", projectId: "tacker-ebc5a" };
        firebase.initializeApp(config);
        const db = firebase.database();

        const OFFICIAL_UIDS = ['admin', 'your_id_here']; 
        let me = null, currentChat = 'global';

        function isOfficial(uid) { return OFFICIAL_UIDS.includes(uid); }

        window.onload = () => {
            const saved = localStorage.getItem('tacker_session');
            if(saved) { me = JSON.parse(saved); startLoad(); }
        };

        function checkAuth() { if(!me) go('s-login'); else startLoad(); }

        async function auth() {
            const uid = document.getElementById('u-id').value.trim(), pw = document.getElementById('u-pw').value.trim();
            const s = await db.ref(`users/${uid}`).get();
            if(s.exists() && s.val().temp_pw === pw) {
                me = {uid, ...s.val()};
                localStorage.setItem('tacker_session', JSON.stringify(me));
                startLoad();
            } else alert("密碼錯誤");
        }

        function startLoad() {
            go('s-load'); let p = 0;
            const t = setInterval(() => {
                p += 20; document.getElementById('bar').style.width = p + '%';
                if(p >= 100) { clearInterval(t); initApp(); }
            }, 50);
        }

        function initApp() {
            go('s-app');
            db.ref(`presence/${me.uid}`).set(true);
            db.ref(`users`).on('value', s => document.getElementById('total-count').innerText = s.numChildren());
            document.getElementById('current-pfp').src = me.pfp || "";
            document.getElementById('edit-pfp').value = me.pfp || "";
            document.getElementById('edit-name').value = me.full_name || "";
            document.getElementById('edit-bio').value = me.bio || "";
            listenGlobal(); listenContacts();
        }

        // --- 核心：直接選照片處理 ---
        function handleImage(input) {
            const file = input.files[0];
            if (!file) return;
            if (file.size > 1024 * 1024) return alert("圖片太大囉，請選擇小於 1MB 的圖片。");

            const reader = new FileReader();
            reader.onload = function(e) {
                // 選完直接發送 Base64 代碼
                send(e.target.result);
                input.value = ""; // 重設 input
            };
            reader.readAsDataURL(file);
        }

        // --- 渲染 (含標籤、圖片偵測、神權垃圾桶) ---
        function render(snap, path) {
            const box = document.getElementById('messages'); box.innerHTML = '';
            const iAmOfficial = isOfficial(me.uid);

            snap.forEach(d => {
                const m = d.val();
                const isMsgOfficial = isOfficial(m.uid);
                const canDel = iAmOfficial || (m.uid === me.uid);
                
                let body = `<div style="color:#eee; font-size:15px; word-break:break-all;">${m.t}</div>`;
                // 圖片偵測邏輯 (支援網址與 Base64)
                if (m.t.startsWith('data:image') || m.t.match(/\.(jpeg|jpg|gif|png|webp|bmp|svg)/i)) {
                    body = `<img src="${m.t}" class="msg-img" onclick="window.open('${m.t}')">`;
                }

                box.innerHTML += `
                    <div class="msg-row">
                        <div class="pfp" onclick="showUser('${m.uid}')"><img src="${m.pfp}"></div>
                        <div style="flex-grow:1">
                            <div style="display:flex; justify-content:space-between; align-items:center;">
                                <span>
                                    <b style="color:${isMsgOfficial ? 'var(--official)' : 'var(--acc)'}; font-size:12px;">${m.u}</b>
                                    ${isMsgOfficial ? '<span class="sys-tag">官方帳號</span>' : ''}
                                </span>
                                ${canDel ? `<i class="fa-solid fa-trash-can" style="cursor:pointer; color:var(--danger); font-size:12px; padding:5px;" onclick="deleteMsg('${path}/${d.key}')"></i>` : ''}
                            </div>
                            ${body}
                        </div>
                    </div>`;
            });
            document.getElementById('chat-flow').scrollTop = document.getElementById('chat-flow').scrollHeight;
        }

        // --- 發送 (支援手動傳參給圖片使用) ---
        async function send(directContent) {
            const inp = document.getElementById('m-input');
            const val = directContent || inp.value.trim();
            if(!val) return;

            if(!isOfficial(me.uid)) {
                if(currentChat === 'global') {
                    if((await db.ref(`global_mutes/${me.uid}`).get()).exists()) return alert("禁言中");
                } else if((await db.ref(`users/${currentChat}/blocks/${me.uid}`).get()).exists()) return alert("對方已封鎖你");
            }

            const data = { u: me.full_name, uid: me.uid, pfp: me.pfp, t: val, ts: Date.now() };
            if(currentChat === 'global') db.ref('chats/global').push(data);
            else {
                const rid = getRoomId(currentChat);
                db.ref(`chats/private/${rid}/msgs`).push(data);
                db.ref(`chats/private/${rid}/unread/${currentChat}`).set(true);
            }
            if(!directContent) inp.value = '';
        }

        // --- 設定同步 (名字、頭像、簡介) ---
        async function saveProfile() {
            const up = { pfp: document.getElementById('edit-pfp').value, full_name: document.getElementById('edit-name').value, bio: document.getElementById('edit-bio').value };
            await db.ref(`users/${me.uid}`).update(up);
            me = {...me, ...up}; localStorage.setItem('tacker_session', JSON.stringify(me));
            document.getElementById('current-pfp').src = me.pfp; alert("同步成功！");
        }

        // --- 改密碼邏輯 ---
        function openPwdFlow() { document.getElementById('pwd-modal').style.display='flex'; }
        function verifyOldPw() {
            if(document.getElementById('old-pw-input').value === me.temp_pw) {
                document.getElementById('pwd-step1').style.display='none';
                document.getElementById('pwd-step2').style.display='block';
            } else alert("驗證失敗");
        }
        async function submitNewPw() {
            const p1 = document.getElementById('new-pw1').value;
            if(p1 === document.getElementById('new-pw2').value && p1) {
                await db.ref(`users/${me.uid}`).update({temp_pw: p1});
                me.temp_pw = p1; localStorage.setItem('tacker_session', JSON.stringify(me));
                alert("修改成功！"); closeModal('pwd-modal');
            }
        }

        // --- 其他工具 ---
        function switchChat(id, name) {
            currentChat = id; tab('chat');
            document.getElementById('main-title').innerText = name;
            document.getElementById('block-btn').style.display = 'block';
            db.ref(`users/${me.uid}/blocks/${id}`).on('value', s => {
                document.getElementById('block-btn').style.color = s.exists() ? 'var(--danger)' : '#444';
            });
            listenPrivate(id);
        }
        async function toggleBlock() {
            const ref = db.ref(`users/${me.uid}/blocks/${currentChat}`);
            if((await ref.get()).exists()) await ref.remove(); else await ref.set(true);
        }
        function tab(t) {
            document.getElementById('chat-tab').style.display = t==='chat'?'flex':'none';
            document.getElementById('me-tab').style.display = t==='me'?'block':'none';
            if(t==='chat') { currentChat='global'; document.getElementById('main-title').innerText='全球大廳'; document.getElementById('block-btn').style.display='none'; listenGlobal(); }
        }
        function go(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
        function closeModal(id) { document.getElementById(id).style.display='none'; }
        function getRoomId(uid) { return [me.uid, uid].sort().join('_'); }
        function listenGlobal() { db.ref('chats/global').limitToLast(40).on('value', snap => render(snap, 'chats/global')); }
        function listenPrivate(uid) { db.ref(`chats/private/${getRoomId(uid)}/msgs`).on('value', snap => render(snap, `chats/private/${getRoomId(uid)}/msgs`)); }
        function listenContacts() {
            db.ref(`users/${me.uid}/contacts`).on('value', snap => {
                const list = document.getElementById('dm-list'); list.innerHTML = '';
                snap.forEach(d => {
                    list.innerHTML += `<div class="dm-nav" onclick="switchChat('${d.key}', '${d.val().name}')"><img src="${d.val().pfp}"></div>`;
                });
            });
        }
        async function showUser(uid) {
            const s = await db.ref(`users/${uid}`).get(); const u = s.val();
            document.getElementById('modal-name').innerText = u.full_name;
            document.getElementById('modal-sys-tag').style.display = isOfficial(uid) ? 'inline-block' : 'none';
            document.getElementById('modal-bio').innerText = u.bio || "";
            document.getElementById('modal-pfp-box').innerHTML = `<img src="${u.pfp}" style="width:100%;height:100%;object-fit:cover;">`;
            const actions = document.getElementById('modal-actions'); actions.innerHTML = '';
            const dmBtn = document.createElement('button');
            dmBtn.innerText = isOfficial(me.uid) ? "【官方】直接開啟" : "發送私訊邀請";
            dmBtn.onclick = async () => {
                await db.ref(`users/${me.uid}/contacts/${uid}`).set({name: u.full_name, pfp: u.pfp});
                await db.ref(`users/${uid}/contacts/${me.uid}`).set({name: me.full_name, pfp: me.pfp});
                switchChat(uid, u.full_name); closeModal('user-modal');
            };
            actions.appendChild(dmBtn);
            if(isOfficial(me.uid) && uid !== me.uid) {
                const muteBtn = document.createElement('button');
                const isMuted = (await db.ref(`global_mutes/${uid}`).get()).exists();
                muteBtn.innerText = isMuted ? "解封" : "全球禁言";
                muteBtn.style.background = isMuted ? "#444" : "var(--danger)";
                muteBtn.onclick = async () => {
                    if(isMuted) await db.ref(`global_mutes/${uid}`).remove(); else await db.ref(`global_mutes/${uid}`).set(true);
                    closeModal('user-modal');
                };
                actions.appendChild(muteBtn);
            }
            document.getElementById('user-modal').style.display='flex';
        }
        async function deleteMsg(p) { if(confirm("確定刪除？")) await db.ref(p).remove(); }
        function logout() { localStorage.removeItem('tacker_session'); location.reload(); }
    </script>
</body>
</html>
