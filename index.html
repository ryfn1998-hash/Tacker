<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tacker v3.0 | Discord Edition</title>
    <style>
        :root { 
            --p-green: #00ff41; --bg-dark: #010409; --bg-panel: #0d1117; 
            --bg-side: #161b22; --border: #30363d; --ds-blue: #5865F2; --danger: #f85149;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg-dark); color: white; font-family: sans-serif; height: 100vh; display: flex; }

        /* 左側伺服器導覽列 (類似 Discord 最左邊那排) */
        .guild-bar { 
            width: 72px; background: #010409; display: flex; flex-direction: column; 
            align-items: center; padding: 12px 0; border-right: 1px solid var(--border);
        }
        .guild-icon { 
            width: 48px; height: 48px; background: var(--bg-side); border-radius: 50%; 
            margin-bottom: 8px; cursor: pointer; display: flex; align-items: center; 
            justify-content: center; font-weight: bold; transition: 0.2s; border: 1px solid var(--border);
        }
        .guild-icon:hover { border-radius: 15px; background: var(--p-green); color: black; }
        .guild-icon.active { border-radius: 15px; border: 2px solid var(--p-green); }

        /* 中間列表列 */
        .sidebar { 
            width: 240px; background: var(--bg-side); display: flex; flex-direction: column; 
            border-right: 1px solid var(--border);
        }
        .sidebar-header { padding: 15px; font-weight: bold; border-bottom: 1px solid var(--border); }
        .nav-item { padding: 10px 15px; cursor: pointer; border-radius: 4px; margin: 2px 8px; }
        .nav-item:hover { background: #21262d; }
        .nav-item.active { background: #393d43; color: var(--p-green); }

        /* 右側主視窗 */
        main { flex: 1; display: flex; flex-direction: column; background: var(--bg-panel); position: relative; }
        
        /* 各個頁面區塊 */
        .page { display: none; height: 100%; width: 100%; flex-direction: column; }
        .page.active { display: flex; }

        /* 個資設定樣式 */
        .settings-form { padding: 40px; max-width: 600px; }
        .setting-group { margin-bottom: 20px; }
        .setting-group label { display: block; margin-bottom: 8px; color: #8b949e; }
        input, textarea { 
            width: 100%; padding: 10px; background: #000; border: 1px solid var(--border); 
            color: white; border-radius: 4px; 
        }

        /* 底部用戶控制欄 */
        .user-control { 
            margin-top: auto; padding: 10px; background: #0d1117; 
            display: flex; align-items: center; gap: 10px; border-top: 1px solid var(--border);
        }
        .avatar-sm { width: 32px; height: 32px; background: var(--p-green); border-radius: 50%; }

        @media (max-width: 768px) { .sidebar { display: none; } }
    </style>
</head>
<body>

    <nav class="guild-bar">
        <div class="guild-icon active" onclick="showView('home')">🏠</div>
        <div class="guild-icon" onclick="showView('servers')">💬</div>
        <div style="flex:1"></div>
        <div class="guild-icon" onclick="showView('settings')" style="color:var(--p-green)">⚙️</div>
    </nav>

    <aside class="sidebar">
        <div class="sidebar-header">TACKER PRIVATE</div>
        <div id="side-nav-content">
            <div class="nav-item active">好友</div>
            <div class="nav-item">待處理邀請</div>
            <div style="margin: 20px 15px 5px; font-size: 12px; color: #8b949e;">直接訊息</div>
            <div class="nav-item">👤 Shadow</div>
        </div>
        
        <div class="user-control">
            <div class="avatar-sm"></div>
            <div style="flex:1; font-size:12px; overflow:hidden;">
                <b id="my-display-name">使用者名稱</b><br>
                <span style="color:#8b949e">#id_888</span>
            </div>
        </div>
    </aside>

    <main>
        <section id="view-home" class="page active">
            <div style="padding:20px; border-bottom: 1px solid var(--border); display:flex; justify-content:space-between;">
                <b>好友</b>
                <button onclick="addFriendPrompt()" style="background:var(--p-green); border:none; padding:5px 10px; border-radius:4px; font-weight:bold;">發送好友申請</button>
            </div>
            <div style="padding:20px; color:#8b949e">你目前還沒有好友，輸入對方的「帳號代號」來添加吧！</div>
        </section>

        <section id="view-settings" class="page">
            <div class="settings-form">
                <h2 style="color:var(--p-green)">使用者設定</h2>
                <div class="setting-group">
                    <label>顯示名稱 (Display Name)</label>
                    <input type="text" id="set-display-name" placeholder="大家看到的稱呼">
                </div>
                <div class="setting-group">
                    <label>帳號代號 (Unique ID - 加好友用)</label>
                    <input type="text" id="set-username" placeholder="例如: ryfn_01">
                </div>
                <div class="setting-group">
                    <label>個人簡介</label>
                    <textarea id="set-bio" rows="3"></textarea>
                </div>
                <button class="btn" style="background:var(--p-green); color:black;" onclick="saveProfile()">儲存個資</button>
                <hr style="border:0; border-top:1px solid var(--border); margin:30px 0;">
                <button class="btn" style="background:var(--danger); color:white;" onclick="logout()">登出 Tacker</button>
            </div>
        </section>
    </main>

    <script>
        // 頁面切換邏輯
        function showView(viewName) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.guild-icon').forEach(i => i.classList.remove('active'));
            
            if(viewName === 'settings') {
                document.getElementById('view-settings').classList.add('active');
            } else {
                document.getElementById('view-home').classList.add('active');
            }
        }

        // 功能彈窗模擬
        function addFriendPrompt() {
            const id = prompt("請輸入對方的帳號代號 (例如: Shadow#001):");
            if(id) alert("好友申請已發送給 " + id);
        }

        function saveProfile() {
            const name = document.getElementById('set-display-name').value;
            if(name) {
                document.getElementById('my-display-name').innerText = name;
                alert("個資已更新！");
            }
        }

        function logout() {
            if(confirm("確定要登出嗎？")) {
                localStorage.removeItem('tacker_token');
                location.reload();
            }
        }
    </script>
</body>
</html>
