<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tacker | Official</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg-p: #313338; --bg-s: #2b2d31; --bg-t: #232428; --brand: #5865f2; --success: #23a559; --danger: #f23f43; --text: #dbdee1; --muted: #949ba4; --white: #ffffff; --gray-card: #383a40; }
        
        body, html { margin: 0; padding: 0; font-family: 'PingFang TC', sans-serif; background: var(--white); height: 100vh; overflow: hidden; color: white; }
        .hidden { display: none !important; }

        /* --- 1. 進入首頁 (image_1.png ①) --- */
        #welcome-screen { position: fixed; inset: 0; background: var(--white); z-index: 1000; display: flex; justify-content: center; align-items: center; color: black; }
        .welcome-box { text-align: center; border: 2px solid #000; padding: 60px; position: relative; }
        .welcome-box h1 { font-size: 48px; margin: 0; letter-spacing: 8px; }
        .welcome-box p { font-size: 18px; margin: 10px 0; }
        .entry-btn { position: absolute; bottom: 10px; right: 10px; background: #5865f2; color: white; border: none; padding: 5px 15px; cursor: pointer; border-radius: 4px; }

        /* --- 2. 登入介面 (image_1.png ②) --- */
        #auth-wall { position: fixed; inset: 0; background: var(--white); z-index: 900; display: none; justify-content: center; align-items: center; }
        .login-card { background: var(--gray-card); width: 320px; padding: 40px; border-radius: 8px; position: relative; box-shadow: 0 8px 24px rgba(0,0,0,0.2); }
        .login-card h2 { margin: 0 0 20px 0; text-align: center; font-size: 24px; }
        .login-card input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 4px; border: none; background: #1e1f22; color: white; box-sizing: border-box; outline: none; }
        .login-card .error-text { color: var(--danger); font-size: 12px; height: 18px; margin-top: 4px; text-align: left; }
        .login-card .green-arrow { background: var(--success); color: white; border: none; width: 50px; height: 35px; border-radius: 4px; cursor: pointer; display: block; margin: 15px auto 0; font-size: 20px; }
        .apply-link { position: absolute; bottom: 10px; right: 10px; color: var(--brand); font-size: 10px; text-decoration: none; }

        /* --- 3. 過場動畫 (image_2.png) --- */
        #loading-screen { position: fixed; inset: 0; background: var(--white); z-index: 1100; display: none; justify-content: center; align-items: center; flex-direction: column; color: black; }
        .loader { width: 48px; height: 48px; border: 5px solid #FFF; border-bottom-color: var(--brand); border-radius: 50%; display: inline-block; box-sizing: border-box; animation: rotation 1s linear infinite; }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #mc-intro { position: fixed; inset: 0; background: black; z-index: 1200; display: none; justify-content: center; align-items: center; }

        /* --- 4. 主程式介面 (image_3.png) --- */
        #main-app { display: none; grid-template-columns: 240px 1fr; height: 100vh; background: var(--bg-p); }
        .sidebar { background: var(--bg-s); border-right: 1px solid #1e1f22; position: relative; }
        .u-panel { background: #232428; padding: 8px 12px; position: absolute; bottom: 0; width: 100%; box-sizing: border-box; display: flex; align-items: center; gap: 10px; }
        .u-ava { width: 32px; height: 32px; border-radius: 50%; background: var(--brand); cursor: pointer; object-fit: cover; }
        .u-meta { flex: 1; overflow: hidden; font-size: 12px; }
        .u-pencil { cursor: pointer; color: var(--muted); font-size: 14px; }
        
        #msg-list { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .msg-box { background: #383a40; border-radius: 8px; display: flex; padding: 12px; margin: 20px; gap: 12px; }
        .msg-box input { background: transparent; border: none; flex: 1; color: white; outline: none; }

        /* 個資小卡 */
        #user-card { position: fixed; width: 280px; background: var(--bg-t); border-radius: 8px; overflow: hidden; display: none; z-index: 5000; border: 1px solid #444; }
        .c-banner { height: 60px; background: var(--brand); }
        .c-body { padding: 15px; padding-top: 40px; position: relative; }
        .c-ava { width: 64px; height: 64px; border-radius: 50%; border: 4px solid var(--bg-t); position: absolute; top: -32px; left: 15px; background: #333; }
    </style>
</head>
<body>

    <div id="welcome-screen">
        <div class="welcome-box">
            <h1>Tacker</h1>
            <p>永遠.免費</p>
            <button class="entry-btn" onclick="showLogin()">進入</button>
        </div>
    </div>

    <div id="auth-wall">
        <div class="login-card">
            <h2>登入</h2>
            <input type="text" id="login-id" placeholder="帳號 ID">
            <input type="password" id="login-pw" placeholder="密碼">
            <div id="error-msg" class="error-text"></div>
            <button class="green-arrow" onclick="handleLogin()"> → </button>
            <a href="XXXXXXXXXXXXXXXXXXXX" class="apply-link">點擊申請帳號</a>
        </div>
    </div>

    <div id="loading-screen">
        <div class="loader"></div>
        <p style="margin-top:20px; font-weight:bold;">載入中...</p>
    </div>
    <div id="mc-intro">
        <h2 style="color:white; letter-spacing:10px;">MINECRAFT STYLE INTRO</h2>
    </div>

    <div id="main-app">
        <aside class="sidebar">
            <div style="padding:15px; font-weight:bold; color:var(--muted); font-size:12px;">頻道列表</div>
            <div class="u-panel">
                <img id="my-ava" class="u-ava">
                <div class="u-meta">
                    <div id="my-name" style="font-weight:bold;">Loading...</div>
                    <div id="my-id" style="color:var(--muted); font-size:10px;">@id</div>
                </div>
                <div class="u-pencil">✎</div>
            </div>
        </aside>
        <main style="display:flex; flex-direction:column; flex:1;">
            <div id="msg-list"></div>
            <div class="msg-box">
                <input type="text" id="m-input" placeholder="發送訊息...">
                <button onclick="sendMsg()" style="background:none; border:none; color:var(--brand); font-weight:bold; cursor:pointer;">發送</button>
            </div>
        </main>
    </div>

    <script>
        const _s = supabase.createClient('https://coyiifxxfopvabpjszis.supabase.co', 'Sb_publishable_ZaDrVW5Goe5QFqL4rBvNCg_JrwHKIFH');

        // 顯示登入牆
        function showLogin() {
            document.getElementById('welcome-screen').classList.add('hidden');
            document.getElementById('auth-wall').style.display = 'flex';
        }

        // 登入邏輯 (人工帳密版)
        async function handleLogin() {
            const tid = document.getElementById('login-id').value;
            const tpw = document.getElementById('login-pw').value;
            const errorEl = document.getElementById('error-msg');

            // 從 profiles 檢查人工設定的帳密
            const { data, error } = await _s.from('profiles')
                .select('*')
                .eq('tacker_id', tid)
                .eq('temp_pw', tpw)
                .maybeSingle();

            if (data) {
                errorEl.innerText = "";
                // 成功過場動畫流
                document.getElementById('auth-wall').style.display = 'none';
                document.getElementById('loading-screen').style.display = 'flex';
                
                setTimeout(() => {
                    document.getElementById('loading-screen').style.display = 'none';
                    document.getElementById('mc-intro').style.display = 'flex';
                    
                    setTimeout(() => {
                        document.getElementById('mc-intro').style.display = 'none';
                        startApp(data);
                    }, 800); // Minecraft 動態時間
                }, 600); // 載入圈時間
            } else {
                errorEl.innerText = "帳號或密碼錯誤"; // 紅字提醒
            }
        }

        function startApp(profile) {
            document.getElementById('main-app').style.display = 'grid';
            document.getElementById('my-name').innerText = profile.full_name;
            document.getElementById('my-id').innerText = "@" + profile.tacker_id;
            document.getElementById('my-ava').src = profile.avatar_url || "https://via.placeholder.com/32";
            loadMessages();
        }

        async function loadMessages() {
            const { data } = await _s.from('messages').select('*').order('created_at');
            if(data) {
                const list = document.getElementById('msg-list');
                list.innerHTML = '';
                data.forEach(m => renderMsg(m));
            }
        }

        function renderMsg(m) {
            const list = document.getElementById('msg-list');
            const div = document.createElement('div');
            div.style = "display:flex; gap:10px; margin-bottom:10px;";
            div.innerHTML = `<img src="https://via.placeholder.com/40" style="border-radius:50%; width:40px; height:40px;">
                <div><div style="font-weight:bold; font-size:14px;">${m.user_name}</div>
                <div style="font-size:14px; color:var(--text);">${m.content}</div></div>`;
            list.appendChild(div);
            list.scrollTop = list.scrollHeight;
        }

        async function sendMsg() {
            const input = document.getElementById('m-input');
            const name = document.getElementById('my-name').innerText;
            if(!input.value) return;
            // 訊息長度限制 1000 字
            if(input.value.length > 1000) { alert("訊息太長了！"); return; }
            
            await _s.from('messages').insert([{ user_name: name, content: input.value }]);
            input.value = "";
        }

        _s.channel('room').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, p => renderMsg(p.new)).subscribe();
    </script>
</body>
</html>
