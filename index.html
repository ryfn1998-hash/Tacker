<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tacker v2.1.0 | Official</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg-p: #313338; --bg-s: #2b2d31; --bg-t: #232428; --brand: #5865f2; --text: #dbdee1; --muted: #b5bac1; }
        body { margin: 0; background: var(--bg-p); color: white; font-family: 'gg sans', sans-serif; height: 100vh; overflow: hidden; }
        
        /* 全域樣式 */
        .hidden { display: none !important; }
        .flex-center { display: flex; justify-content: center; align-items: center; height: 100vh; }
        .card { background: var(--bg-s); padding: 40px; border-radius: 8px; width: 400px; box-shadow: 0 8px 16px rgba(0,0,0,0.3); }
        input { width: 100%; background: #1e1f22; border: none; padding: 12px; color: white; border-radius: 4px; margin: 10px 0; outline: none; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; border-radius: 4px; border: none; cursor: pointer; font-weight: 600; }
        
        /* 主介面佈局 */
        #main-layout { display: grid; grid-template-columns: 240px 1fr; height: 100vh; }
        .side-nav { background: var(--bg-s); display: flex; flex-direction: column; border-right: 1px solid #1e1f22; position: relative; }
        .user-footer { background: var(--bg-t); padding: 8px 12px; display: flex; align-items: center; gap: 8px; position: absolute; bottom: 0; width: 100%; box-sizing: border-box; }
        
        .chat-container { display: flex; flex-direction: column; }
        #message-flow { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; }
        .msg-unit { border-radius: 4px; }
        .msg-unit b { color: var(--brand); font-size: 14px; margin-right: 8px; }
        .msg-unit i { color: var(--muted); font-size: 11px; font-style: normal; }
        .msg-text { margin-top: 4px; line-height: 1.4; color: #e0e0e0; }

        .input-zone { padding: 0 20px 24px; }
        .input-bar { background: #383a40; border-radius: 8px; padding: 11px 15px; display: flex; align-items: center; gap: 12px; }
    </style>
</head>
<body>

    <div id="auth-overlay" class="flex-center">
        <div class="card" id="login-box">
            <h2 style="text-align:center;">Tacker</h2>
            <button class="btn" style="background:white; color:black;" onclick="doAuth(false)">Google 登入</button>
            <p style="text-align:center; font-size:13px; color:var(--muted); margin-top:20px;">
                沒有帳號？ <span style="color:#00a8fc; cursor:pointer;" onclick="toggleAuth(true)">註冊新帳號</span>
            </p>
        </div>
        <div class="card hidden" id="reg-box">
            <h2 style="text-align:center;">建立 Tacker 帳號</h2>
            <button class="btn" id="reg-google-trigger" style="background:white; color:black;" onclick="doAuth(true)">1. 驗證 Google</button>
            <div id="reg-info" class="hidden">
                <input type="text" id="reg-t-id" placeholder="設定你的 Tacker ID">
                <input type="number" id="reg-year" placeholder="出生年份">
                <button class="btn" style="background:var(--brand); color:white;" onclick="finishReg()">完成註冊</button>
            </div>
        </div>
    </div>

    <div id="main-layout" class="hidden">
        <aside class="side-nav">
            <div style="padding:20px; color:var(--muted); text-align:center; flex:1;">好友列表目前為空</div>
            <div class="user-footer">
                <img id="my-avatar" style="width:32px; height:32px; border-radius:50%; background:#444;">
                <div style="font-size:12px; overflow:hidden;">
                    <div id="my-name" style="font-weight:bold; white-space:nowrap;">載入中...</div>
                    <div id="my-id" style="color:var(--muted);">@id</div>
                </div>
            </div>
        </aside>
        <main class="chat-container">
            <div id="message-flow">
                </div>
            <div class="input-zone">
                <div class="input-bar">
                    <span style="color:var(--muted); cursor:pointer;">⊕</span>
                    <input type="text" id="chat-input" placeholder="傳送訊息..." style="margin:0; background:transparent;">
                    <button onclick="postMsg()" style="background:none; border:none; color:var(--brand); cursor:pointer; font-weight:bold;">發送</button>
                </div>
            </div>
        </main>
    </div>

    <script>
        const _s = supabase.createClient('https://coyiifxxfopvabpjszis.supabase.co', 'Sb_publishable_ZaDrVW5Goe5QFqL4rBvNCg_JrwHKIFH');
        let sessionUser = null;

        function toggleAuth(isReg) {
            document.getElementById('login-box').classList.toggle('hidden', isReg);
            document.getElementById('reg-box').classList.toggle('hidden', !isReg);
        }

        async function doAuth(isReg) {
            if(isReg) localStorage.setItem('reg_active', '1');
            await _s.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: window.location.href } });
        }

        async function checkSession() {
            const { data: { session } } = await _s.auth.getSession();
            if (session) {
                const { data: profile } = await _s.from('profiles').select('*').eq('id', session.user.id).maybeSingle();
                if (localStorage.getItem('reg_active') && !profile) {
                    toggleAuth(true);
                    document.getElementById('reg-google-trigger').classList.add('hidden');
                    document.getElementById('reg-info').classList.remove('hidden');
                } else if (profile) {
                    sessionUser = profile;
                    launchApp();
                }
            }
        }

        async function finishReg() {
            const tid = document.getElementById('reg-t-id').value;
            const { data: { user } } = await _s.auth.getUser();
            await _s.from('profiles').upsert({ id: user.id, tacker_id: tid, full_name: user.user_metadata.full_name, avatar_url: user.user_metadata.avatar_url });
            localStorage.removeItem('reg_active');
            location.reload();
        }

        function launchApp() {
            document.getElementById('auth-overlay').classList.add('hidden');
            document.getElementById('main-layout').classList.remove('hidden');
            document.getElementById('my-name').innerText = sessionUser.full_name;
            document.getElementById('my-id').innerText = "@" + sessionUser.tacker_id;
            document.getElementById('my-avatar').src = sessionUser.avatar_url;

            // 實時監聽
            _s.channel('chat').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, p => pushMsg(p.new)).subscribe();
            // 載入歷史
            _s.from('messages').select('*').order('created_at').then(({data}) => data && data.forEach(pushMsg));
        }

        async function postMsg() {
            const val = document.getElementById('chat-input').value;
            if(!val) return;
            await _s.from('messages').insert([{ user_id: sessionUser.id, user_name: sessionUser.full_name, content: val }]);
            document.getElementById('chat-input').value = '';
        }

        function pushMsg(m) {
            const flow = document.getElementById('message-flow');
            const div = document.createElement('div');
            div.className = 'msg-unit';
            div.innerHTML = `<b>${m.user_name}</b><i>${new Date(m.created_at).toLocaleTimeString()}</i><div class="msg-text">${m.content}</div>`;
            flow.appendChild(div);
            flow.scrollTop = flow.scrollHeight;
        }

        window.onload = checkSession;
    </script>
</body>
</html>
