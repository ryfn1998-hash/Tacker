<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tacker</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        :root { --bg: #000; --card: #151515; --acc: #23a559; --text: #fff; --sub: #aaa; --glass: rgba(255, 255, 255, 0.05); }
        * { box-sizing: border-box; font-family: 'Inter', 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body, html { margin:0; padding:0; height:100%; background:#fff; color:#000; overflow:hidden; }

        .screen { position: absolute; width: 100%; height: 100%; display: none; flex-direction: column; z-index: 10; align-items:center; justify-content:center; }
        .active { display: flex; }

        /* --- OS 啟動動畫 --- */
        @keyframes titleZoom { 0% { transform: scale(3); opacity: 0; filter: blur(30px); } 100% { transform: scale(1); opacity: 1; filter: blur(0); } }
        .zoom-title { font-weight: 900; font-size: 100px; letter-spacing: -4px; animation: titleZoom 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .slide-up-btn { margin-top: 50px; padding: 18px 70px; background: #000; color: #fff; border-radius: 50px; font-weight: bold; border:none; cursor: pointer; font-size: 18px; transition: 0.3s; }
        .slide-up-btn:hover { transform: scale(1.05); }

        /* --- Loading --- */
        .load-bar-wrap { width: 280px; height: 6px; background: #eee; margin: 30px auto; border-radius: 20px; overflow: hidden; }
        #load-bar-fill { width: 0%; height: 100%; background: #000; transition: 0.1s; }

        /* --- 主程式 OS 介面 --- */
        #s-app { background: var(--bg); color: var(--text); align-items: stretch; justify-content: flex-start; }
        .rail { width: 85px; background: #080808; flex-shrink: 0; display: flex; flex-direction: column; align-items: center; padding: 25px 0; border-right: 1px solid #1a1a1a; height: 100%; }
        .nav-icon { width: 54px; height: 54px; border-radius: 16px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #555; font-size: 22px; margin-bottom: 20px; transition: 0.3s; overflow: hidden; }
        .nav-icon:active { transform: scale(0.85); }
        .nav-icon img { width: 100%; height: 100%; object-fit: cover; border: 2px solid transparent; border-radius: 16px; }
        .nav-icon.active { color: var(--acc); background: var(--glass); }
        .nav-icon.active img { border-color: var(--acc); }

        .main { flex-grow: 1; background: #0d0d0d; display: flex; flex-direction: column; }
        .msg-row { display: flex; gap: 15px; margin-bottom: 25px; padding: 0 25px; }
        .pfp { width: 48px; height: 48px; border-radius: 14px; background: #222; overflow: hidden; flex-shrink: 0; cursor: pointer; }
        .pfp img { width: 100%; height: 100%; object-fit: cover; }
        .msg-img { max-width: 300px; border-radius: 16px; margin-top: 10px; border: 1px solid #333; }

        .input-bar { padding: 20px 25px; background: #080808; display: flex; gap: 15px; align-items: center; }
        .input-bar input { flex-grow: 1; padding: 15px 20px; background: #1a1a1a; border: 1px solid #222; color: #fff; border-radius: 15px; outline: none; font-size: 16px; }

        /* --- OS 質感個人資料面板 --- */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(20px); }
        .os-profile-card { width: 450px; background: #1a1a1a; border-radius: 35px; border: 1px solid #333; overflow: hidden; box-shadow: 0 30px 60px rgba(0,0,0,0.5); position: relative; }
        .os-banner { height: 160px; background: linear-gradient(135deg, #23a559 0%, #104d2a 100%); position: relative; }
        .os-close { position: absolute; top: 20px; right: 20px; font-size: 24px; color: rgba(255,255,255,0.5); cursor: pointer; z-index: 5; }
        .os-content { padding: 0 40px 40px; text-align: center; margin-top: -60px; }
        .os-pfp-big { width: 120px; height: 120px; border-radius: 35px; border: 8px solid #1a1a1a; margin: 0 auto; overflow: hidden; background: #222; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .os-pfp-big img { width: 100%; height: 100%; object-fit: cover; }
        .os-name { font-size: 28px; font-weight: 800; margin: 15px 0 5px; color: #fff; }
        .os-bio { font-size: 16px; color: #888; line-height: 1.5; margin-bottom: 30px; }
        .os-btn { width: 100%; padding: 18px; background: var(--acc); color: #fff; border: none; border-radius: 20px; font-weight: bold; font-size: 18px; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .os-btn:hover { background: #2bc269; }
    </style>
</head>
<body>

    <section id="s-intro" class="screen active">
        <div class="zoom-title">Tacker</div>
        <button class="slide-up-btn" onmousedown="handleEnter()">進入系統</button>
    </section>

    <section id="s-login" class="screen" style="background:#f0f0f0;">
        <div style="background:#fff; width:350px; padding:40px; border-radius:30px; color:#000; box-shadow: 0 20px 40px rgba(0,0,0,0.05);">
            <h2 style="font-weight:900; font-size:24px; margin-bottom:30px;">IDENTITY AUTH</h2>
            <input id="u-id" placeholder="USER ID" style="width:100%; padding:16px; margin-bottom:15px; border:1px solid #eee; border-radius:12px; background:#f9f9f9;">
            <input id="u-pw" type="password" placeholder="PASSWORD" style="width:100%; padding:16px; margin-bottom:30px; border:1px solid #eee; border-radius:12px; background:#f9f9f9;">
            <button onmousedown="auth()" style="width:100%; padding:18px; background:#000; color:#fff; border:none; border-radius:15px; font-weight:bold; cursor:pointer;">SIGN IN</button>
        </div>
    </section>

    <section id="s-loader" class="screen">
        <div style="text-align: center;">
            <div style="font-weight:900; font-size:40px; letter-spacing:-1px;">SYSTEM BOOTING</div>
            <div class="load-bar-wrap"><div id="load-bar-fill"></div></div>
            <div id="load-text" style="font-family: monospace; font-weight: bold; color:#888;">0%</div>
        </div>
    </section>

    <section id="s-app" class="screen">
        <div style="display:flex; height:100%; width:100%;">
            <nav class="rail">
                <div onmousedown="switchChat('global')" id="nav-chat" class="nav-icon active"><i class="fa-solid fa-earth-asia"></i></div>
                <div id="private-list" style="display:flex; flex-direction:column; align-items:center; width:100%;"></div>
                <div onmousedown="tab('me')" id="nav-me" class="nav-icon" style="margin-top:auto;"><i class="fa-solid fa-shield-halved"></i></div>
            </nav>
            <main id="chat-tab" class="main">
                <header style="height:70px; border-bottom:1px solid #1a1a1a; display:flex; align-items:center; padding:0 30px;">
                    <b id="chat-title" style="font-size:20px;">全球大廳</b>
                </header>
                <div id="chat-flow" style="flex-grow:1; overflow-y:auto; padding-top:20px;"><div id="messages"></div></div>
                <div class="input-bar">
                    <input id="m-input" placeholder="撰寫訊息..." onkeypress="if(event.key==='Enter') send()">
                    <button onmousedown="send()" style="background:var(--acc); border:none; color:#fff; width:50px; height:50px; border-radius:15px; cursor:pointer;"><i class="fa-solid fa-paper-plane"></i></button>
                </div>
            </main>
        </div>
    </section>

    <div id="user-modal" class="modal" onclick="closeModal()">
        <div class="os-profile-card" onclick="event.stopPropagation()">
            <div class="os-close" onclick="closeModal()"><i class="fa-solid fa-xmark"></i></div>
            <div class="os-banner"></div>
            <div class="os-content">
                <div class="os-pfp-big" id="modal-pfp"></div>
                <div class="os-name" id="modal-name"></div>
                <div class="os-bio" id="modal-bio"></div>
                <button id="dm-btn" class="os-btn">
                    <i class="fa-solid fa-comment"></i> 傳送私訊
                </button>
            </div>
        </div>
    </div>

    <script>
        const config = { apiKey: "AIzaSyB56chNeodbgAYa8k3xspOOAMYt6C5M4cw", databaseURL: "https://tacker-ebc5a-default-rtdb.firebaseio.com", projectId: "tacker-ebc5a" };
        firebase.initializeApp(config);
        const db = firebase.database();
        let me = null;
        let currentChat = 'global';

        function handleEnter() {
            const saved = localStorage.getItem('tacker_session');
            if(saved) { me = JSON.parse(saved); startLoading(); } 
            else { go('s-login'); }
        }

        async function auth() {
            const uid = document.getElementById('u-id').value.trim();
            const pw = document.getElementById('u-pw').value.trim();
            const s = await db.ref(`users/${uid}`).get();
            if(s.exists() && s.val().temp_pw === pw) {
                me = { uid, ...s.val() };
                localStorage.setItem('tacker_session', JSON.stringify(me));
                startLoading();
            } else alert("驗證失敗");
        }

        function startLoading() {
            go('s-loader');
            let prog = 0;
            const timer = setInterval(() => {
                prog += Math.floor(Math.random() * 10) + 2;
                if(prog >= 100) {
                    prog = 100; clearInterval(timer);
                    document.getElementById('load-bar-fill').style.width = '100%';
                    setTimeout(initApp, 500);
                } else {
                    document.getElementById('load-bar-fill').style.width = prog + '%';
                    document.getElementById('load-text').innerText = prog + '%';
                }
            }, 30);
        }

        function initApp() {
            go('s-app');
            listenGlobalChat();
            listenPrivateContacts();
        }

        function go(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        // --- 優化的私訊邏輯與 OS 卡片 ---
        async function showUser(uid) {
            if(uid === me.uid) return;
            const s = await db.ref(`users/${uid}`).get();
            const u = s.val();
            document.getElementById('modal-name').innerText = u.full_name;
            document.getElementById('modal-bio').innerText = u.bio || "系統成員";
            document.getElementById('modal-pfp').innerHTML = `<img src="${u.pfp || ''}">`;
            
            const btn = document.getElementById('dm-btn');
            
            // 檢查是否已是好友
            const contactCheck = await db.ref(`users/${me.uid}/contacts/${uid}`).get();
            
            if(contactCheck.exists()) {
                btn.innerHTML = `<i class="fa-solid fa-message"></i> 直接聊天`;
                btn.onclick = () => {
                    closeModal();
                    switchChat(uid, u.full_name);
                };
            } else {
                btn.innerHTML = `<i class="fa-solid fa-user-plus"></i> 發送私訊邀請`;
                btn.onclick = () => {
                    db.ref(`dm_requests/${uid}/${me.uid}`).set({ fromName: me.full_name, fromPfp: me.pfp || '', ts: Date.now() });
                    alert("請求已送出");
                    closeModal();
                };
            }
            document.getElementById('user-modal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('user-modal').style.display = 'none'; }

        function renderMessages(snap) {
            const box = document.getElementById('messages'); box.innerHTML = '';
            snap.forEach(d => {
                const m = d.val();
                let content = m.t;
                // 圖片連結處理
                const isImg = m.t.match(/\.(jpeg|jpg|gif|png|webp|svg)$/i) || m.t.startsWith('data:image');
                if(isImg) content = `<img src="${m.t}" class="msg-img" onclick="window.open('${m.t}')">`;
                
                box.innerHTML += `<div class="msg-row">
                    <div class="pfp" onmousedown="showUser('${m.uid}')"><img src="${m.pfp || ''}"></div>
                    <div><b style="color:var(--acc); font-size:13px; cursor:pointer;" onmousedown="showUser('${m.uid}')">${m.u}</b>
                    <div style="color:#eee; font-size:16px;">${content}</div></div></div>`;
            });
            document.getElementById('chat-flow').scrollTop = document.getElementById('chat-flow').scrollHeight;
        }

        function switchChat(uid, name = '全球大廳') {
            currentChat = uid;
            document.getElementById('chat-title').innerText = name;
            document.querySelectorAll('.nav-icon').forEach(el => el.classList.remove('active'));
            if(uid === 'global') {
                document.getElementById('nav-chat').classList.add('active');
                listenGlobalChat();
            } else {
                const targetIcon = document.getElementById(`nav-${uid}`);
                if(targetIcon) targetIcon.classList.add('active');
                db.ref(`chats/private/${[me.uid, uid].sort().join('_')}/msgs`).on('value', s => renderMessages(s));
            }
        }

        function listenGlobalChat() { db.ref('chats/global').limitToLast(30).on('value', s => renderMessages(s)); }
        
        function send() {
            const inp = document.getElementById('m-input'); const val = inp.value.trim(); if(!val) return;
            const data = { u: me.full_name, uid: me.uid, pfp: me.pfp || '', t: val, ts: Date.now() };
            if(currentChat === 'global') db.ref('chats/global').push(data);
            else db.ref(`chats/private/${[me.uid, currentChat].sort().join('_')}/msgs`).push(data);
            inp.value = '';
        }

        function listenPrivateContacts() {
            db.ref(`users/${me.uid}/contacts`).on('value', snap => {
                const list = document.getElementById('private-list'); list.innerHTML = '';
                snap.forEach(d => {
                    const c = d.val();
                    const div = document.createElement('div');
                    div.className = 'nav-icon';
                    div.id = `nav-${d.key}`;
                    div.innerHTML = `<img src="${c.pfp}">`;
                    div.onmousedown = () => switchChat(d.key, c.name);
                    list.appendChild(div);
                });
            });
        }
    </script>
</body>
</html>
