<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Tacker Pro | Ultimate Engine</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        /* --- 1. 基礎核心樣式 --- */
        :root {
            --b0: #0f1012; --b1: #1e1f22; --b2: #2b2d31; --b3: #313338;
            --acc: #5865f2; --text: #dbdee1; --sub: #949ba4; --danger: #f23f43;
            --wood: #8b4513; /* 手稿提到的木頭色 */
        }
        body { margin:0; background:var(--b0); color:var(--text); font-family: sans-serif; overflow:hidden; }

        /* --- 2. 佈局架構 (對標手稿 Rail 佈局) --- */
        #app-ui { display:none; height:100vh; flex-direction: row; }
        .rail { width:72px; background:var(--b0); flex-shrink:0; display:flex; flex-direction:column; align-items:center; padding:12px 0; gap:10px; }
        .side { width:240px; background:var(--b1); flex-shrink:0; display:flex; flex-direction:column; }
        .chat-main { flex-grow:1; background:var(--b2); display:flex; flex-direction:column; min-width:0; }
        .member-side { width:240px; background:var(--b1); flex-shrink:0; display:flex; flex-direction:column; border-left: 1px solid rgba(0,0,0,0.2); }

        /* --- 3. 元件樣式 --- */
        .server-icon { width:48px; height:48px; background:var(--b3); border-radius:50%; cursor:pointer; transition:0.2s; display:flex; align-items:center; justify-content:center; }
        .server-icon:hover, .server-icon.active { border-radius:35%; background:var(--acc); color:#fff; }
        
        .msg-row { display:flex; gap:16px; margin-bottom:18px; padding:0 20px; transition: 0.1s; }
        .msg-row:hover { background: rgba(0,0,0,0.05); }
        .msg-pfp { width:40px; height:40px; border-radius:50%; background:var(--sub); flex-shrink:0; cursor:pointer; }
        .msg-name { font-weight:bold; color:#fff; cursor:pointer; }
        .msg-time { font-size:12px; color:var(--sub); margin-left:8px; }

        /* --- 4. 實體個人檔案卡 --- */
        .user-modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:9999; align-items:center; justify-content:center; }
        .card { width:340px; background:var(--b0); border-radius:8px; overflow:hidden; box-shadow:0 10px 40px rgba(0,0,0,0.8); }
        .card-banner { height:100px; background:var(--acc); position:relative; }
        .card-pfp { width:80px; height:80px; border:6px solid var(--b0); border-radius:50%; background:var(--sub); position:absolute; bottom:-40px; left:16px; }

        /* --- 5. 木視窗 (Wood Alert) --- */
        .wood-alert { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); width:300px; background:var(--wood); border:4px solid #5d2e0a; color:#fff; padding:20px; text-align:center; border-radius:12px; z-index:10000; box-shadow:0 0 50px #000; }
        .wood-btn { background:#5d2e0a; border:none; color:#fff; padding:10px 20px; margin-top:15px; cursor:pointer; }
    </style>
</head>
<body>

    <div id="login-screen" style="height:100vh; display:flex; align-items:center; justify-content:center; background:var(--b1);">
        <div style="width:400px; background:var(--b2); padding:40px; border-radius:8px; box-shadow:0 10px 30px rgba(0,0,0,0.5);">
            <h2 style="text-align:center; margin-bottom:30px;">Tacker 驗證入口</h2>
            <input id="l-uid" placeholder="使用者代碼 (ID)" style="width:100%; padding:15px; background:#111; border:1px solid #333; color:#fff; margin-bottom:15px;">
            <input id="l-pw" type="password" placeholder="存取密碼" style="width:100%; padding:15px; background:#111; border:1px solid #333; color:#fff; margin-bottom:20px;">
            <button onclick="realLogin()" style="width:100%; padding:15px; background:var(--acc); border:none; color:#fff; font-weight:bold; cursor:pointer;">登入</button>
            <p style="font-size:12px; color:var(--sub); text-align:center; margin-top:15px;">如需建立帳號，請聯繫負責人手動新增。</p>
        </div>
    </div>

    <div id="app-ui">
        <nav class="rail">
            <div class="server-icon active" onclick="switchSid('global')" id="btn-global"><i class="fa-solid fa-earth-asia"></i></div>
            <div class="server-icon" onclick="switchSid('private')" id="btn-private"><i class="fa-solid fa-user-group"></i></div>
            <div id="admin-entry" class="server-icon" style="display:none; color:var(--danger);" onclick="openAdmin()"><i class="fa-solid fa-gears"></i></div>
        </nav>

        <aside class="side">
            <div style="padding:16px; font-weight:bold; font-size:14px; border-bottom:1px solid rgba(0,0,0,0.2);">Tacker 社群核心</div>
            <div id="channel-list" style="flex-grow:1; padding:10px;">
                <div style="color:var(--sub); font-size:12px; margin:10px 0;">頻道列表</div>
                <div style="padding:10px; background:rgba(255,255,255,0.05); border-radius:4px; cursor:pointer;"># 全球大廳</div>
            </div>
            <div style="padding:10px; background:rgba(0,0,0,0.2); display:flex; align-items:center; gap:10px;">
                <div id="my-pfp" class="msg-pfp" style="width:32px; height:32px;"></div>
                <div style="overflow:hidden">
                    <div id="my-name" style="font-weight:bold; font-size:13px;">載入中...</div>
                    <div id="my-id" style="font-size:11px; color:var(--sub);">#0000</div>
                </div>
            </div>
        </aside>

        <main class="chat-main">
            <header style="height:48px; border-bottom:1px solid #222; padding:0 16px; display:flex; align-items:center; justify-content:space-between;">
                <div style="font-weight:bold;"><i class="fa-solid fa-hashtag"></i> <span id="sid-label">全球大廳</span></div>
                <div style="font-size:13px; color:var(--sub);">
                    <i class="fa-solid fa-users" style="margin-right:5px;"></i> 在線：<span id="online-count">0</span>
                </div>
            </header>
            <div id="chat-flow" style="flex-grow:1; overflow-y:auto; padding-top:20px;"></div>
            <div style="padding:0 20px 24px;">
                <div style="background:#383a40; border-radius:8px; padding:12px; display:flex; align-items:center; gap:12px;">
                    <i class="fa-solid fa-circle-plus" style="color:var(--sub); cursor:pointer;"></i>
                    <input id="chat-input" placeholder="說點什麼..." style="background:none; border:none; color:#fff; width:100%; outline:none;" onkeypress="if(event.key==='Enter') realSend()">
                </div>
            </div>
        </main>

        <aside class="member-side" id="member-list-ui">
            <div style="padding:20px; font-weight:bold; font-size:12px; color:var(--sub);">成員列表</div>
            <div id="members-online" style="padding:0 10px;"></div>
        </aside>
    </div>

    <div id="wood-window" class="wood-alert">
        <h3 style="margin-top:0;">🛑 刷屏警告</h3>
        <p>你的發言速度過快！為了社群品質，系統已將你暫時禁言。</p>
        <button class="wood-btn" onclick="document.getElementById('wood-window').style.display='none'">我知道了</button>
    </div>

    <div id="admin-panel" class="user-modal">
        <div class="card" style="width:500px; padding:20px;">
            <h3>Tacker 後台控制器</h3>
            <div style="display:flex; flex-direction:column; gap:10px;">
                <input id="adm-uid" placeholder="要建立/修改的 UID">
                <input id="adm-name" placeholder="顯示名稱">
                <input id="adm-pw" placeholder="設定密碼">
                <button onclick="adminAction('create')" style="padding:10px; background:var(--acc); color:#fff; border:none; cursor:pointer;">建立/更新帳戶資料</button>
                <div style="height:1px; background:#444; margin:10px 0;"></div>
                <div id="user-stats" style="font-size:12px; color:var(--sub);"></div>
            </div>
            <button onclick="this.parentElement.parentElement.style.display='none'" style="width:100%; margin-top:20px; padding:8px; background:#444; border:none; color:#fff;">關閉</button>
        </div>
    </div>

    <script>
        // --- 初始化 Firebase ---
        const config = { 
            apiKey: "AIzaSyB56chNeodbgAYa8k3xspOOAMYt6C5M4cw",
            databaseURL: "https://tacker-ebc5a-default-rtdb.firebaseio.com",
            projectId: "tacker-ebc5a"
        };
        firebase.initializeApp(config);
        const db = firebase.database();

        let me = null;
        let currentSid = 'global';
        let spamCount = 0;
        let lastMsgTime = 0;

        // --- 核心：登入系統 ---
        async function realLogin() {
            const uid = document.getElementById('l-uid').value.trim();
            const pw = document.getElementById('l-pw').value.trim();
            
            const snap = await db.ref(`users/${uid}`).get();
            if(snap.exists() && snap.val().temp_pw === pw) {
                me = { uid, ...snap.val() };
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('app-ui').style.display = 'flex';
                launchApp();
            } else { alert("驗證失敗：帳號不存在或密碼錯誤"); }
        }

        function launchApp() {
            // 設定個人資料
            document.getElementById('my-name').innerText = me.full_name;
            document.getElementById('my-id').innerText = `#${me.uid}`;
            if(me.role === 'admin') document.getElementById('admin-entry').style.display = 'flex';

            // 啟動 Presence (在線系統)
            const pRef = db.ref(`presence/${me.uid}`);
            pRef.set({ name: me.full_name, status: 'online' });
            pRef.onDisconnect().remove();

            // 監聽在線人數
            db.ref('presence').on('value', s => {
                document.getElementById('online-count').innerText = s.numChildren();
                const list = document.getElementById('members-online');
                list.innerHTML = '';
                s.forEach(u => {
                    list.innerHTML += `<div style="padding:10px; display:flex; align-items:center; gap:8px;"><div class="msg-pfp" style="width:24px; height:24px;"></div><span style="font-size:13px;">${u.val().name}</span></div>`;
                });
            });

            switchSid('global');
        }

        // --- 核心：訊息系統 (含圖片解析 & 刷屏偵測) ---
        function switchSid(sid) {
            currentSid = sid;
            document.getElementById('sid-label').innerText = sid === 'global' ? '全球大廳' : '私密頻道';
            const chatRef = db.ref(`chats/${sid}`);
            chatRef.limitToLast(100).off();
            chatRef.limitToLast(100).on('value', snap => {
                const flow = document.getElementById('chat-flow');
                flow.innerHTML = '';
                snap.forEach(c => {
                    const m = c.val();
                    const isImg = m.t.match(/\.(jpeg|jpg|gif|png|webp)$/i) && !m.t.includes('.gif'); // 禁 GIF
                    flow.innerHTML += `
                        <div class="msg-row">
                            <div class="msg-pfp"></div>
                            <div class="msg-content">
                                <span class="msg-name">${m.u}</span><span class="msg-time">${new Date(m.ts).toLocaleTimeString()}</span>
                                <div class="msg-text">${isImg ? `<img src="${m.t}" style="max-width:300px; display:block; margin-top:8px; border-radius:8px;">` : m.t}</div>
                            </div>
                        </div>`;
                });
                flow.scrollTop = flow.scrollHeight;
            });
        }

        function realSend() {
            const inp = document.getElementById('chat-input');
            const val = inp.value.trim();
            if(!val) return;

            // 刷屏偵測
            const now = Date.now();
            if(now - lastMsgTime < 1000) {
                spamCount++;
                if(spamCount >= 5) {
                    document.getElementById('wood-window').style.display = 'block';
                    return;
                }
            } else { spamCount = 0; }
            lastMsgTime = now;

            db.ref(`chats/${currentSid}`).push({
                u: me.full_name, uid: me.uid, t: val, ts: now
            });
            inp.value = '';
        }

        // --- 核心：後台管理功能 (手動建立帳戶) ---
        function openAdmin() { document.getElementById('admin-panel').style.display = 'flex'; }

        async function adminAction(type) {
            const uid = document.getElementById('adm-uid').value.trim();
            const name = document.getElementById('adm-name').value.trim();
            const pw = document.getElementById('adm-pw').value.trim();
            if(!uid || !name || !pw) return alert("後台欄位必填！");

            await db.ref(`users/${uid}`).set({
                full_name: name,
                temp_pw: pw,
                role: 'user',
                banner_color: '#5865f2',
                bio: '新加入的 Tacker 成員'
            });
            alert(`成功建立/更新用戶：${name} (#${uid})`);
        }
    </script>
</body>
</html>
