<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tacker | Official</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg-p: #313338; --bg-s: #2b2d31; --bg-t: #232428; --brand: #5865f2; --success: #23a559; --danger: #f23f43; --text: #dbdee1; --muted: #949ba4; --white: #ffffff; --gray-card: #383a40; }
        body, html { margin: 0; padding: 0; font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; height: 100vh; overflow: hidden; }
        .hidden { display: none !important; }

        /* --- 1. 純程式碼首頁 (image_1.png ①, 還原 image_4.png 電繪風格) --- */
        #welcome-screen { position: fixed; inset: 0; background: #fff; z-index: 2000; display: flex; flex-direction: column; padding: 10% 8%; box-sizing: border-box; }
        .welcome-title { font-size: 8rem; font-weight: 800; color: #000; margin: 0; letter-spacing: 5px; } /* Tacker大標題 */
        .welcome-sub { font-size: 2rem; font-weight: bold; color: #000; margin: 2rem 0; letter-spacing: 2px; } /* 永遠.免費副標題 */
        .welcome-entry-btn { position: absolute; bottom: 8%; right: 8%; background: #3c78e6; color: white; border: none; padding: 1rem 2rem; cursor: pointer; border-radius: 8px; font-size: 1.5rem; font-weight: bold; font-family: 'PingFang TC', sans-serif; box-shadow: 0 4px 10px rgba(0,0,0,0.2); } /* 藍色進入按鈕 */

        /* --- 2. 登入介面 (image_1.png ②) --- */
        #auth-wall { position: fixed; inset: 0; background: var(--white); z-index: 1500; display: none; justify-content: center; align-items: center; }
        .login-card { background: var(--gray-card); width: 320px; padding: 40px; border-radius: 8px; position: relative; color: white; text-align: center; }
        .login-card h2 { margin: 0 0 20px 0; font-size: 24px; }
        .login-card input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 4px; border: none; background: #1e1f22; color: white; outline: none; }
        .login-card .green-arrow { background: var(--success); color: white; border: none; width: 60px; height: 40px; border-radius: 4px; cursor: pointer; display: block; margin: 15px auto 0; font-size: 20px; }
        .error-hint { color: var(--danger); font-size: 12px; height: 18px; margin-top: 5px; text-align: left; }
        .apply-link { position: absolute; bottom: 10px; right: 10px; color: var(--brand); font-size: 10px; text-decoration: none; }

        /* --- 3. 過場動畫 (image_2.png) --- */
        #loader { position: fixed; inset: 0; background: #fff; z-index: 3000; display: none; justify-content: center; align-items: center; flex-direction: column; color: black; }
        .loader-circle { width: 48px; height: 48px; border: 5px solid #f3f3f3; border-top: 5px solid var(--brand); border-radius: 50%; animation: rotation 1s linear infinite; }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* --- 4. 主程式介面 (image_3.png & P1/P2手稿) --- */
        #main-app { display: none; grid-template-columns: 240px 1fr; height: 100vh; background: var(--bg-p); color: white; }
        .sidebar { background: var(--bg-s); border-right: 1px solid #1e1f22; position: relative; display: flex; flex-direction: column; }
        .u-panel { background: #232428; padding: 10px 15px; position: absolute; bottom: 0; width: 100%; box-sizing: border-box; display: flex; align-items: center; gap: 10px; }
        .u-ava { width: 32px; height: 32px; border-radius: 50%; background: var(--brand); object-fit: cover; }
        .friend-placeholder { flex: 1; padding: 20px; font-size: 12px; color: var(--muted); font-weight: bold; }
        .add-f-btn { background: none; border: 1px dashed var(--muted); color: var(--muted); width: 30px; height: 30px; border-radius: 50%; cursor: pointer; float: right; }
    </style>
</head>
<body>

    <div id="welcome-screen">
        <h1 class="welcome-title">Tacker</h1>
        <p class="welcome-sub">永遠.免費</p>
        <button class="welcome-entry-btn" onclick="showAuth()">進入</button>
    </div>

    <div id="auth-wall">
        <div class="login-card">
            <h2>登入</h2>
            <input type="text" id="t-id" placeholder="帳號 ID">
            <input type="password" id="t-pw" placeholder="密碼">
            <div id="err-hint" class="error-hint"></div>
            <button class="green-arrow" onclick="doLogin()"> → </button>
            <a href="XXXXXXXXXXXXXXXXXXXX" class="apply-link">點擊申請帳號</a>
        </div>
    </div>

    <div id="loader">
        <div class="loader-circle"></div>
        <p style="margin-top:20px; font-weight:bold;">載入數據中...</p>
    </div>

    <div id="main-app">
        <aside class="sidebar">
            <div class="friend-placeholder">
                目前尚未有好朋友 
                <button class="add-f-btn" onclick="alert('新增好友功能對接中...')">+</button>
            </div>
            <div class="u-panel">
                <img id="my-ava" class="u-ava" src="https://via.placeholder.com/32">
                <div style="flex:1; overflow:hidden;">
                    <div id="my-name" style="font-weight:bold; font-size:14px; text-overflow:ellipsis; white-space:nowrap;">Loading...</div>
                    <div id="my-id" style="color:var(--muted); font-size:10px;">@id</div>
                </div>
                <div style="cursor:pointer;" onclick="alert('設定開發中')">✎</div>
            </div>
        </aside>
        <main style="display:flex; flex-direction:column; justify-content:center; align-items:center; color:var(--muted);">
            <div style="font-size:60px;">#</div>
            <p>聊天頻道還沒就緒 (等待 P2 手稿對接)</p>
        </main>
    </div>

    <script>
        const _s = supabase.createClient('https://coyiifxxfopvabpjszis.supabase.co', 'Sb_publishable_ZaDrVW5Goe5QFqL4rBvNCg_JrwHKIFH');

        // 首頁跳轉
        function showAuth() {
            document.getElementById('welcome-screen').classList.add('hidden');
            document.getElementById('auth-wall').style.display = 'flex';
        }

        // 人工帳密登入
        async function doLogin() {
            const tid = document.getElementById('t-id').value;
            const tpw = document.getElementById('t-pw').value;
            const hint = document.getElementById('err-hint');

            const { data } = await _s.from('profiles')
                .select('*').eq('tacker_id', tid).eq('temp_pw', tpw).maybeSingle();

            if (data) {
                hint.innerText = "";
                document.getElementById('auth-wall').style.display = 'none';
                document.getElementById('loader').style.display = 'flex';
                
                setTimeout(() => {
                    document.getElementById('loader').style.display = 'none';
                    document.getElementById('main-app').style.display = 'grid';
                    document.getElementById('my-name').innerText = data.full_name;
                    document.getElementById('my-id').innerText = "@" + data.tacker_id;
                }, 800);
            } else {
                hint.innerText = "帳號或密碼錯誤";
            }
        }
    </script>
</body>
</html>
