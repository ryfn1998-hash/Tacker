<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tacker Client | FR Technology</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, set, update, get, push, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // --- Firebase 配置 ---
        const firebaseConfig = {
            apiKey: "AIzaSyB56chNeodbgAYa8k3xspOOAMYt6C5M4cw",
            authDomain: "tacker-ebc5a.firebaseapp.com",
            projectId: "tacker-ebc5a",
            storageBucket: "tacker-ebc5a.firebasestorage.app",
            messagingSenderId: "689763297968",
            appId: "1:689763297968:web:7acf6b857fc89a17d62975"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- 全域變數 ---
        let currentUser = null;
        let currentView = 'login';

        // --- 核心邏輯：介面切換 ---
        window.switchView = (viewId) => {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(viewId + '-view').classList.add('active');
            currentView = viewId;
        };

        // --- 核心邏輯：登入檢查 ---
        window.handleLogin = async () => {
            const id = document.getElementById('l-id').value;
            const pw = document.getElementById('l-pw').value;
            const btn = document.getElementById('l-btn');

            if(!id || !pw) return alert("請填寫完整資訊");
            btn.innerText = "驗證中...";

            try {
                const userSnap = await get(ref(db, 'users/' + id));
                if(userSnap.exists()) {
                    const data = userSnap.val();
                    
                    // --- 行政制裁檢查 ---
                    if(data.is_active === false) {
                        alert("🚫 登入失敗：您的帳號已被 CEO 停動。");
                        btn.innerText = "登入";
                        return;
                    }

                    if(data.temp_pw === pw) {
                        currentUser = { id, ...data };
                        initApp();
                    } else {
                        alert("密碼錯誤");
                    }
                } else {
                    alert("帳號不存在");
                }
            } catch(e) { console.error(e); }
            btn.innerText = "登入";
        };

        // --- 核心邏輯：初始化 App ---
        function initApp() {
            switchView('main');
            loadUserProfile();
            loadGlobalChat();
            loadServers();
            
            // 監聽用戶資料變動（若 CEO 遠端改名，這裡會跟著變）
            onValue(ref(db, 'users/' + currentUser.id), (snap) => {
                const updated = snap.val();
                if(updated.is_active === false) {
                    alert("⚠️ 您的權限已被 CEO 即時停用，將強制登出。");
                    location.reload();
                }
                currentUser = { id: currentUser.id, ...updated };
                document.getElementById('nav-user-name').innerText = currentUser.full_name;
            });
        }

        // --- 聊天系統 ---
        window.sendMessage = () => {
            const msgInput = document.getElementById('chat-input');
            const text = msgInput.value.trim();
            if(!text) return;

            push(ref(db, 'global_chat'), {
                uid: currentUser.id,
                name: currentUser.full_name,
                text: text,
                time: serverTimestamp()
            });
            msgInput.value = '';
        };

        function loadGlobalChat() {
            onValue(ref(db, 'global_chat'), (snap) => {
                const chatBox = document.getElementById('chat-messages');
                chatBox.innerHTML = '';
                const messages = snap.val();
                for(let mid in messages) {
                    const m = messages[mid];
                    const isMe = m.uid === currentUser.id;
                    chatBox.innerHTML += `
                        <div class="msg-item ${isMe ? 'me' : ''}">
                            <div class="msg-bubble">
                                <small>${m.name}</small>
                                <p>${m.text}</p>
                            </div>
                        </div>`;
                }
                chatBox.scrollTop = chatBox.scrollHeight;
            });
        }

        // --- 設定系統 ---
        window.saveProfile = () => {
            const newName = document.getElementById('p-name').value;
            const newBio = document.getElementById('p-bio').value;
            const newBanner = document.getElementById('p-banner').value;

            update(ref(db, 'users/' + currentUser.id), {
                full_name: newName,
                bio: newBio,
                banner_url: newBanner
            }).then(() => alert("設定已同步至雲端"));
        };

        function loadUserProfile() {
            document.getElementById('p-name').value = currentUser.full_name || '';
            document.getElementById('p-bio').value = currentUser.bio || '';
            document.getElementById('p-banner').value = currentUser.banner_url || '';
        }

        function loadServers() {
            onValue(ref(db, 'servers'), (snap) => {
                const list = document.getElementById('server-list');
                list.innerHTML = '';
                const data = snap.val();
                for(let id in data) {
                    list.innerHTML += `<div class="server-icon" title="${data[id].server_name}">${data[id].server_name[0]}</div>`;
                }
            });
        }
    </script>
    <style>
        :root {
            --bg-primary: #313338;
            --bg-secondary: #2b2d31;
            --bg-tertiary: #1e1f22;
            --text-main: #dbdee1;
            --brand: #5865f2;
            --danger: #f23f43;
            --success: #23a559;
        }

        body, html { margin: 0; padding: 0; height: 100%; font-family: 'PingFang TC', sans-serif; background: var(--bg-tertiary); color: var(--text-main); overflow: hidden; }

        /* 視圖控制 */
        .view { display: none; height: 100vh; width: 100vw; }
        .view.active { display: flex; }

        /* 登入介面樣式 */
        #login-view { align-items: center; justify-content: center; background: url('https://w.wallhaven.cc/full/85/wallhaven-85m88y.jpg') center/cover; }
        .login-card { background: rgba(30, 31, 34, 0.95); padding: 40px; border-radius: 8px; box-shadow: 0 8px 16px rgba(0,0,0,0.3); width: 100%; max-width: 400px; text-align: center; backdrop-filter: blur(10px); }
        .login-card h2 { margin-bottom: 8px; color: #fff; }
        .login-card p { color: #b5bac1; font-size: 14px; margin-bottom: 25px; }
        .input-group { text-align: left; margin-bottom: 20px; }
        .input-group label { display: block; font-size: 12px; font-weight: bold; color: #b5bac1; margin-bottom: 8px; text-transform: uppercase; }
        input, textarea { width: 100%; background: #1e1f22; border: none; padding: 10px; border-radius: 3px; color: #fff; box-sizing: border-box; outline: none; border: 1px solid #111; }
        input:focus { border-color: var(--brand); }
        .primary-btn { width: 100%; background: var(--brand); color: #fff; border: none; padding: 12px; border-radius: 3px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .primary-btn:hover { background: #4752c4; }

        /* 主介面佈局 (Discord 風) */
        .server-sidebar { width: 72px; background: var(--bg-tertiary); display: flex; flex-direction: column; align-items: center; padding-top: 12px; gap: 8px; }
        .server-icon { width: 48px; height: 48px; background: var(--bg-primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; color: var(--text-main); font-weight: bold; }
        .server-icon:hover { border-radius: 15px; background: var(--brand); color: #fff; }

        .main-sidebar { width: 240px; background: var(--bg-secondary); display: flex; flex-direction: column; }
        .sidebar-header { height: 48px; border-bottom: 1px solid #1f2023; display: flex; align-items: center; padding: 0 16px; font-weight: bold; box-shadow: 0 1px 0 rgba(0,0,0,0.1); }
        .nav-items { flex: 1; padding: 10px; }
        .nav-link { padding: 8px 12px; border-radius: 4px; cursor: pointer; margin-bottom: 2px; display: flex; align-items: center; gap: 10px; color: #949ba4; transition: 0.1s; }
        .nav-link:hover, .nav-link.active { background: #3f4147; color: #fff; }

        .user-bar { height: 52px; background: #232428; padding: 0 8px; display: flex; align-items: center; gap: 8px; }
        .user-avatar { width: 32px; height: 32px; background: #5865f2; border-radius: 50%; }

        .content-area { flex: 1; display: flex; flex-direction: column; background: var(--bg-primary); }
        .chat-header { height: 48px; border-bottom: 1px solid #2e2f34; display: flex; align-items: center; padding: 0 16px; font-weight: bold; gap: 10px; }
        #chat-messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg-item { display: flex; flex-direction: column; max-width: 80%; }
        .msg-item.me { align-self: flex-end; }
        .msg-bubble { background: #383a40; padding: 10px 15px; border-radius: 8px; position: relative; }
        .msg-item.me .msg-bubble { background: var(--brand); color: #fff; }
        .msg-bubble small { font-size: 10px; color: #b5bac1; display: block; margin-bottom: 4px; }
        .msg-item.me small { color: #e0e0e0; }

        .chat-input-area { padding: 0 20px 20px 20px; }
        .input-wrapper { background: #383a40; border-radius: 8px; display: flex; align-items: center; padding: 10px 15px; }
        .input-wrapper input { background: transparent; border: none; flex: 1; font-size: 15px; }

        /* 設定介面細節 */
        .settings-container { padding: 40px; max-width: 600px; }
        .setting-section { margin-bottom: 30px; }
        .setting-section h3 { border-bottom: 1px solid #3f4147; padding-bottom: 10px; margin-bottom: 20px; font-size: 14px; text-transform: uppercase; color: #b5bac1; }
        .profile-preview { height: 120px; background: #5865f2; border-radius: 8px; margin-bottom: 20px; overflow: hidden; position: relative; }
        .banner-img { width: 100%; height: 100%; object-fit: cover; }
        
        /* 響應式 */
        @media (max-width: 768px) {
            .main-sidebar { display: none; }
        }
    </style>
</head>
<body>

    <div id="login-view" class="view active">
        <div class="login-card">
            <h2>歡迎回來！</h2>
            <p>很高興再次見到你！</p>
            <div class="input-group">
                <label>Tacker ID</label>
                <input type="text" id="l-id" placeholder="輸入您的 ID">
            </div>
            <div class="input-group">
                <label>密碼</label>
                <input type="password" id="l-pw" placeholder="輸入您的密碼">
            </div>
            <button id="l-btn" class="primary-btn" onclick="handleLogin()">登入</button>
            <div style="margin-top: 15px; font-size: 12px; color: #b5bac1;">
                忘記密碼？請聯繫 FR Technology 管理員
            </div>
        </div>
    </div>

    <div id="main-view" class="view">
        <nav class="server-sidebar">
            <div class="server-icon" style="background: var(--brand); color:#fff"><i class="fa-solid fa-house"></i></div>
            <hr style="width: 32px; border: 1px solid #3f4147; margin: 4px 0;">
            <div id="server-list"></div>
            <div class="server-icon" style="color: var(--success);"><i class="fa-solid fa-plus"></i></div>
        </nav>

        <aside class="main-sidebar">
            <header class="sidebar-header">Tacker 大廳</header>
            <div class="nav-items">
                <div class="nav-link active" onclick="switchViewContent('chat')">
                    <i class="fa-solid fa-hashtag"></i> 全球大廳
                </div>
                <div class="nav-link" onclick="switchViewContent('settings')">
                    <i class="fa-solid fa-gear"></i> 個人設定
                </div>
            </div>
            <div class="user-bar">
                <div class="user-avatar"></div>
                <div style="flex:1; overflow: hidden;">
                    <div id="nav-user-name" style="font-weight:bold; font-size:13px; white-space:nowrap; text-overflow:ellipsis;">User Name</div>
                    <div style="font-size:11px; color:#b5bac1;">#TackerUser</div>
                </div>
                <i class="fa-solid fa-microphone" style="cursor:pointer; color:#b5bac1;"></i>
                <i class="fa-solid fa-right-from-bracket" style="cursor:pointer; color:#b5bac1;" onclick="location.reload()"></i>
            </div>
        </aside>

        <main class="content-area" id="content-chat">
            <header class="chat-header">
                <i class="fa-solid fa-hashtag" style="color: #80848e;"></i>
                <span>全球大廳</span>
            </header>
            <div id="chat-messages">
                </div>
            <div class="chat-input-area">
                <div class="input-wrapper">
                    <input type="text" id="chat-input" placeholder="在 #全球大廳 傳送訊息" onkeypress="if(event.key==='Enter') sendMessage()">
                    <i class="fa-solid fa-circle-plus" style="margin-right:15px; cursor:pointer;"></i>
                    <i class="fa-solid fa-gift" style="margin-right:15px; cursor:pointer;"></i>
                    <i class="fa-solid fa-face-smile" style="cursor:pointer;"></i>
                </div>
            </div>
        </main>

        <main class="content-area" id="content-settings" style="display:none; overflow-y:auto;">
            <div class="settings-container">
                <h2 style="margin-bottom:30px;">用戶設定</h2>
                
                <div class="setting-section">
                    <h3>我的帳號</h3>
                    <div class="profile-preview">
                        <img id="banner-preview" class="banner-img" src="" alt="">
                        <div style="position:absolute; bottom:10px; left:20px; font-weight:bold; text-shadow: 1px 1px 4px rgba(0,0,0,0.8);">預覽模式</div>
                    </div>
                    <label>顯示名稱</label>
                    <input id="p-name" style="margin-bottom:15px;">
                    <label>個人簡介 (Bio)</label>
                    <textarea id="p-bio" rows="3" style="margin-bottom:15px;"></textarea>
                    <label>橫幅圖片 URL</label>
                    <input id="p-banner" placeholder="https://..." onchange="document.getElementById('banner-preview').src=this.value">
                </div>

                <div class="setting-section">
                    <h3>安全與登入</h3>
                    <button class="primary-btn" style="background:#4e5058; width:auto; padding: 10px 20px;" onclick="alert('請聯繫 CEO 修改密碼')">修改密碼</button>
                </div>

                <div style="display:flex; gap:10px;">
                    <button class="primary-btn" onclick="saveProfile()" style="width:120px; background:var(--success)">儲存變更</button>
                    <button class="primary-btn" onclick="switchViewContent('chat')" style="width:120px; background:#4e5058">返回聊天</button>
                </div>
            </div>
        </main>
    </div>

    <script>
        // 切換主區域顯示內容的純 JS
        function switchViewContent(view) {
            if(view === 'chat') {
                document.getElementById('content-chat').style.display = 'flex';
                document.getElementById('content-settings').style.display = 'none';
            } else {
                document.getElementById('content-chat').style.display = 'none';
                document.getElementById('content-settings').style.display = 'block';
            }
        }
    </script>
</body>
</html>
