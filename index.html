<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tacker Pro | Ultimate God Edition</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        :root { --bg: #000; --card: #111; --acc: #23a559; --official: #3498db; --admin: #f1c40f; --text: #fff; --sub: #888; --danger: #f23f43; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body, html { margin:0; padding:0; height:100%; background:var(--bg); color:var(--text); overflow:hidden; }

        .screen { position: absolute; width: 100%; height: 100%; display: none; flex-direction: column; z-index: 10; }
        .active { display: flex; }

        /* --- 開場 --- */
        #s-home { background: #fff; color: #000; align-items: center; justify-content: center; text-align: center; z-index: 100; }
        .big-tacker { font-weight: 900; transform: scale(1); font-size: 80px; letter-spacing: 2px; pointer-events: none; }
        .float-btn { position: relative; z-index: 101; margin-top: 50px; padding: 18px 60px; background: #000; color: #fff; border: none; border-radius: 50px; font-size: 18px; font-weight: bold; cursor: pointer; }

        /* --- 主畫面 --- */
        .rail { width: 65px; background: #050505; flex-shrink: 0; display: flex; flex-direction: column; align-items: center; padding: 25px 0; gap: 20px; border-right: 1px solid #222; }
        .dm-nav { width: 45px; height: 45px; border-radius: 50%; position: relative; cursor: pointer; }
        .dm-nav img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        .red-dot { position: absolute; top: 0; right: 0; width: 12px; height: 12px; background: var(--danger); border-radius: 50%; border: 2px solid #000; display: none; }

        .main { flex-grow: 1; background: #111; display: flex; flex-direction: column; position: relative; }
        header { height: 60px; border-bottom: 1px solid #222; display: flex; align-items: center; padding: 0 20px; justify-content: space-between; }
        
        .sys-tag { background: var(--official); color: #fff; font-size: 10px; padding: 2px 6px; border-radius: 4px; margin-left: 6px; font-weight: 900; }

        #chat-flow { flex-grow: 1; overflow-y: auto; padding: 15px 0; }
        .msg-row { display: flex; gap: 12px; margin-bottom: 22px; padding: 0 15px; }
        .pfp { width: 44px; height: 44px; border-radius: 50%; background: #222; overflow: hidden; cursor: pointer; flex-shrink: 0; border: 1px solid #333; }
        .pfp img { width: 100%; height: 100%; object-fit: cover; }
        
        .msg-body { flex-grow: 1; }
        .msg-content { color: #eee; font-size: 15px; word-break: break-all; margin-top: 4px; }
        .msg-img { max-width: 250px; border-radius: 12px; margin-top: 8px; border: 1px solid #333; cursor: zoom-in; }

        .input-bar { padding: 12px; border-top: 1px solid #222; background: #0a0a0a; display: flex; gap: 12px; align-items: center; }
        .input-bar input { flex-grow: 1; padding: 12px; background: #1e1e1e; border: none; color: #fff; border-radius: 12px; outline: none; }
        
        /* 刪除鍵樣式 - 神權專屬 */
        .trash-btn { color: var(--danger); cursor: pointer; font-size: 14px; padding: 5px; opacity: 0.5; transition: 0.2s; }
        .trash-btn:hover { opacity: 1; transform: scale(1.2); }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; align-items: center; justify-content: center; }
        .user-card { width: 320px; background: var(--card); border-radius: 20px; overflow: hidden; border: 1px solid #333; padding-bottom: 20px; }
    </style>
</head>
<body>

    <section id="s-home" class="screen active">
        <div class="big-tacker">Tacker</div>
        <button class="float-btn" onclick="checkAuth()">進入 ——＞</button>
    </section>

    <section id="s-login" class="screen" style="background:#f5f5f5; align-items:center; justify-content:center;">
        <div style="background:#fff; width:320px; padding:35px; border-radius:15px; color:#333;">
            <h2 style="margin:0 0 25px; font-weight:800;">身分驗證</h2>
            <input id="u-id" placeholder="帳號 ID" style="width:100%; padding:14px; margin-bottom:12px; border:1px solid #ddd; border-radius:8px;">
            <input id="u-pw" type="password" placeholder="密碼" style="width:100%; padding:14px; margin-bottom:25px; border:1px solid #ddd; border-radius:8px;">
            <button onclick="auth()" style="width:100%; padding:15px; background:var(--acc); color:#fff; border:none; border-radius:8px; font-weight:bold;">登入</button>
        </div>
    </section>

    <section id="s-load" class="screen" style="align-items:center; justify-content:center;">
        <div style="width:70%; height:4px; background:#222; border-radius:10px; overflow:hidden;">
            <div id="bar" style="width:0%; height:100%; background:var(--acc); transition:0.1s;"></div>
        </div>
        <p id="percent" style="color:var(--sub); margin-top:10px;">SYNCING...</p>
    </section>

    <section id="s-app" class="screen">
        <div style="display:flex; height:100%;">
            <nav class="rail">
                <div onclick="tab('chat')" id="nav-chat" style="color:var(--acc); font-size:24px;"><i class="fa-solid fa-earth-asia"></i></div>
                <div onclick="tab('me')" id="nav-me" style="color:#444; font-size:24px;"><i class="fa-solid fa-user-gear"></i></div>
                <div style="width:30px; height:1px; background:#222; margin:5px 0;"></div>
                <div id="dm-list" style="display:flex; flex-direction:column; gap:15px;"></div>
            </nav>

            <main id="chat-tab" class="main">
                <header>
                    <b id="main-title">全球大廳</b>
                    <div style="font-size:12px; color:var(--sub);">在線: <span id="online-count">0</span></div>
                </header>
                <div id="chat-flow"><div id="messages"></div></div>
                <div class="input-bar">
                    <label style="color:var(--sub); font-size:22px; cursor:pointer;">
                        <i class="fa-solid fa-image"></i>
                        <input type="file" id="img-input" accept="image/*" style="display:none;" onchange="handleImg(this)">
                    </label>
                    <input id="m-input" placeholder="說點什麼..." onkeypress="if(event.key==='Enter') send()">
                    <button onclick="send()" style="background:var(--acc); border:none; color:#fff; padding:10px 18px; border-radius:12px;"><i class="fa-solid fa-paper-plane"></i></button>
                </div>
            </main>

            <main id="me-tab" class="main" style="display:none; padding:30px;">
                <h2>帳戶設定</h2>
                <div style="text-align:center; margin: 20px 0;">
                    <label><img id="current-pfp" style="width:100px; height:100px; border-radius:50%; object-fit:cover; border:3px solid var(--acc); cursor:pointer;">
                    <input type="file" id="pfp-input" style="display:none;" onchange="handlePfp(this)"></label>
                </div>
                <input id="edit-name" placeholder="名字" style="width:100%; padding:14px; background:#1e1e1e; color:#fff; border:1px solid #333; border-radius:10px; margin-bottom:10px;">
                <textarea id="edit-bio" placeholder="簡介" style="width:100%; height:80px; padding:14px; background:#1e1e1e; color:#fff; border:1px solid #333; border-radius:10px;"></textarea>
                <button onclick="saveProfile()" style="width:100%; padding:16px; background:var(--acc); color:#fff; border:none; border-radius:12px; font-weight:bold; margin-top:20px;">儲存變更</button>
                <button onclick="logout()" style="width:100%; color:var(--danger); background:none; border:none; margin-top:20px;">登出系統</button>
            </main>
        </div>
    </section>

    <div id="user-modal" class="modal" onclick="this.style.display='none'">
        <div class="user-card" onclick="event.stopPropagation()">
            <div style="height:80px; background:#222;"></div>
            <div style="padding:0 20px;">
                <div id="modal-pfp-box" style="width:80px; height:80px; border-radius:50%; border:5px solid var(--card); margin-top:-40px; background:#000; overflow:hidden;"></div>
                <h2 id="modal-name" style="margin:10px 0 5px;"></h2>
                <p id="modal-bio" style="color:#aaa; font-size:14px;"></p>
                <div id="modal-actions" style="margin-top:20px; display:flex; flex-direction:column; gap:10px;"></div>
            </div>
        </div>
    </div>

    <script>
        const config = { apiKey: "AIzaSyB56chNeodbgAYa8k3xspOOAMYt6C5M4cw", databaseURL: "https://tacker-ebc5a-default-rtdb.firebaseio.com", projectId: "tacker-ebc5a" };
        firebase.initializeApp(config);
        const db = firebase.database();

        // ⚠️【神權設定】在此填入你的 ID
        const GODS = ['admin', 'your_id_here']; 
        let me = null, currentChat = 'global';

        function isGod(id) { return GODS.includes(id); }

        function go(id) { document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
        
        function checkAuth() {
            const s = localStorage.getItem('tacker_session');
            if(s) { me = JSON.parse(s); startLoad(); } else go('s-login');
        }

        async function auth() {
            const uid = document.getElementById('u-id').value, pw = document.getElementById('u-pw').value;
            const s = await db.ref(`users/${uid}`).get();
            if(s.exists() && s.val().temp_pw === pw) {
                me = {uid, ...s.val()};
                localStorage.setItem('tacker_session', JSON.stringify(me));
                startLoad();
            } else alert("身分驗證失敗");
        }

        function startLoad() {
            go('s-load'); let p = 0;
            const t = setInterval(() => {
                p += 10; document.getElementById('bar').style.width = p+'%'; document.getElementById('percent').innerText = `SYNCING... ${p}%`;
                if(p>=100) { clearInterval(t); initApp(); }
            }, 50);
        }

        function initApp() {
            go('s-app');
            db.ref(`presence/${me.uid}`).set(true); db.ref(`presence/${me.uid}`).onDisconnect().remove();
            db.ref('presence').on('value', s => document.getElementById('online-count').innerText = s.numChildren());
            document.getElementById('current-pfp').src = me.pfp || '';
            document.getElementById('edit-name').value = me.full_name;
            document.getElementById('edit-bio').value = me.bio || '';
            listenGlobal(); listenContacts();
        }

        // --- 核心神權渲染渲染 ---
        function render(snap, path) {
            const box = document.getElementById('messages'); box.innerHTML = '';
            const iAmGod = isGod(me.uid); // 我是不是神

            snap.forEach(d => {
                const m = d.val();
                const isUserGod = isGod(m.uid);
                // 關鍵判斷：我是神，或者這封信是我發的，我就有刪除權
                const canDelete = iAmGod || (m.uid === me.uid);

                let body = `<div class="msg-content">${m.t}</div>`;
                if(m.t.startsWith('data:image')) body = `<img src="${m.t}" class="msg-img" onclick="window.open('${m.t}')">`;

                box.innerHTML += `
                    <div class="msg-row">
                        <div class="pfp" onclick="showUser('${m.uid}')"><img src="${m.pfp}"></div>
                        <div class="msg-body">
                            <div style="display:flex; justify-content:space-between; align-items:center;">
                                <span>
                                    <b style="color:${isUserGod ? 'var(--admin)' : 'var(--acc)'}; font-size:13px;">${m.u}</b>
                                    ${isUserGod ? '<span class="sys-tag">官方</span>' : ''}
                                </span>
                                ${canDelete ? `<i class="fa-solid fa-trash-can trash-btn" onclick="killMsg('${path}/${d.key}')"></i>` : ''}
                            </div>
                            ${body}
                        </div>
                    </div>`;
            });
            document.getElementById('chat-flow').scrollTop = document.getElementById('chat-flow').scrollHeight;
        }

        async function killMsg(fullPath) {
            if(confirm("神權指令：抹除此訊息？")) await db.ref(fullPath).remove();
        }

        async function send() {
            const inp = document.getElementById('m-input'), val = inp.value.trim();
            if(!val) return;
            await pushMsg(val);
            inp.value = '';
        }

        function handleImg(input) {
            const file = input.files[0]; if(!file) return;
            const r = new FileReader();
            r.onload = e => pushMsg(e.target.result);
            r.readAsDataURL(file);
        }

        async function pushMsg(content) {
            const god = isGod(me.uid);
            if(!god) {
                if(currentChat === 'global' && (await db.ref(`mutes/${me.uid}`).get()).exists()) return alert("你已被禁言");
            }
            const data = { u: me.full_name, uid: me.uid, pfp: me.pfp || '', t: content, ts: Date.now() };
            if(currentChat === 'global') db.ref('chats/global').push(data);
            else {
                const rid = [me.uid, currentChat].sort().join('_');
                db.ref(`chats/private/${rid}/msgs`).push(data);
                db.ref(`chats/private/${rid}/unread/${currentChat}`).set(true);
            }
        }

        async function showUser(uid) {
            const s = await db.ref(`users/${uid}`).get(), u = s.val();
            const iAmGod = isGod(me.uid);
            document.getElementById('modal-name').innerText = u.full_name;
            document.getElementById('modal-bio').innerText = u.bio || '無簡介';
            document.getElementById('modal-pfp-box').innerHTML = `<img src="${u.pfp}" style="width:100%;height:100%;object-fit:cover;">`;
            
            const acts = document.getElementById('modal-actions'); acts.innerHTML = '';
            const dm = document.createElement('button');
            dm.style = "padding:12px; background:var(--acc); color:#fff; border:none; border-radius:10px; font-weight:bold; cursor:pointer;";
            dm.innerText = "私訊對話";
            dm.onclick = async () => {
                await db.ref(`users/${me.uid}/contacts/${uid}`).set({name: u.full_name, pfp: u.pfp});
                await db.ref(`users/${uid}/contacts/${me.uid}`).set({name: me.full_name, pfp: me.pfp});
                switchChat(uid, u.full_name); document.getElementById('user-modal').style.display='none';
            };
            acts.appendChild(dm);

            if(iAmGod && uid !== me.uid) {
                const mute = document.createElement('button');
                const isMuted = (await db.ref(`mutes/${uid}`).get()).exists();
                mute.style = `padding:12px; background:${isMuted?'#444':'var(--danger)'}; color:#fff; border:none; border-radius:10px; font-weight:bold; cursor:pointer;`;
                mute.innerText = isMuted ? "解除禁言" : "神權：全球禁言";
                mute.onclick = async () => {
                    if(isMuted) await db.ref(`mutes/${uid}`).remove();
                    else await db.ref(`mutes/${uid}`).set(true);
                    document.getElementById('user-modal').style.display='none';
                };
                acts.appendChild(mute);
            }
            document.getElementById('user-modal').style.display = 'flex';
        }

        function tab(t) {
            document.getElementById('chat-tab').style.display = t==='chat'?'flex':'none';
            document.getElementById('me-tab').style.display = t==='me'?'block':'none';
            if(t==='chat') { currentChat = 'global'; document.getElementById('main-title').innerText='全球大廳'; listenGlobal(); }
        }

        function switchChat(id, name) {
            currentChat = id; tab('chat');
            document.getElementById('main-title').innerText = `與 ${name} 的私訊`;
            const rid = [me.uid, id].sort().join('_');
            db.ref(`chats/private/${rid}/unread/${me.uid}`).set(false);
            db.ref(`chats/private/${rid}/msgs`).limitToLast(50).on('value', snap => render(snap, `chats/private/${rid}/msgs`));
        }

        function listenGlobal() { db.ref('chats/global').limitToLast(50).on('value', snap => render(snap, 'chats/global')); }

        function listenContacts() {
            db.ref(`users/${me.uid}/contacts`).on('value', snap => {
                const list = document.getElementById('dm-list'); list.innerHTML = '';
                snap.forEach(d => {
                    list.innerHTML += `<div class="dm-nav" onclick="switchChat('${d.key}', '${d.val().name}')"><img src="${d.val().pfp}"><div class="red-dot" id="dot-${d.key}"></div></div>`;
                    db.ref(`chats/private/${[me.uid, d.key].sort().join('_')}/unread/${me.uid}`).on('value', s => {
                        const dot = document.getElementById(`dot-${d.key}`); if(dot) dot.style.display = s.val()?'block':'none';
                    });
                });
            });
        }

        async function saveProfile() {
            const up = { full_name: document.getElementById('edit-name').value, bio: document.getElementById('edit-bio').value, pfp: document.getElementById('current-pfp').src };
            await db.ref(`users/${me.uid}`).update(up);
            me = {...me, ...up}; localStorage.setItem('tacker_session', JSON.stringify(me)); alert("儲存成功");
        }

        function handlePfp(input) {
            const r = new FileReader(); r.onload = e => document.getElementById('current-pfp').src = e.target.result;
            r.readAsDataURL(input.files[0]);
        }

        function logout() { localStorage.removeItem('tacker_session'); location.reload(); }
    </script>
</body>
</html>
