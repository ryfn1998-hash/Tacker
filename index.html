<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tacker | FR Technology</title>
    <style>
        :root {
            /* Discord 官方色系 */
            --bg-guilds: #1e1f22;
            --bg-sidebar: #2b2d31;
            --bg-main: #313338;
            --bg-user-bar: #232428;
            --text-normal: #dbdee1;
            --text-muted: #949ba4;
            --p-green: #23a559;
            --p-blue: #5865f2;
            --glass: rgba(0, 0, 0, 0.3);
            --border: rgba(255, 255, 255, 0.05);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; cursor: default; }
        body { margin: 0; background: var(--bg-guilds); color: var(--text-normal); font-family: 'PingFang TC', sans-serif; height: 100vh; display: flex; overflow: hidden; }

        /* --- 左側：伺服器列表 --- */
        .guild-nav { width: 72px; background: var(--bg-guilds); display: flex; flex-direction: column; align-items: center; padding: 12px 0; gap: 8px; }
        .guild-item { width: 48px; height: 48px; background: var(--bg-main); border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: 0.2s; position: relative; }
        .guild-item:hover { border-radius: 15px; background: var(--p-blue); color: white; }
        .guild-item.active::before { content: ""; position: absolute; left: -12px; width: 4px; height: 40px; background: white; border-radius: 0 4px 4px 0; }

        /* --- 中間：頻道/好友列表 --- */
        .sidebar { width: 240px; background: var(--bg-sidebar); display: flex; flex-direction: column; }
        .sidebar-search { padding: 12px; border-bottom: 1px solid var(--border); }
        .search-box { width: 100%; background: #1e1f22; border: none; padding: 6px 10px; border-radius: 4px; color: white; font-size: 14px; }
        
        .nav-list { flex: 1; padding: 8px; overflow-y: auto; }
        .nav-btn { padding: 8px 12px; border-radius: 4px; display: flex; align-items: center; gap: 12px; margin-bottom: 2px; color: var(--text-muted); }
        .nav-btn:hover { background: rgba(255,255,255,0.05); color: var(--text-normal); }
        .nav-btn.active { background: rgba(255,255,255,0.1); color: white; }

        /* --- 底部：使用者控制欄 (極高級感) --- */
        .user-bar { background: var(--bg-user-bar); padding: 8px; display: flex; align-items: center; gap: 8px; }
        .user-avatar-wrap { position: relative; width: 32px; height: 32px; cursor: pointer; }
        .user-avatar { width: 100%; height: 100%; border-radius: 50%; background: var(--p-blue); }
        .status-dot { position: absolute; bottom: -2px; right: -2px; width: 12px; height: 12px; border-radius: 50%; background: var(--p-green); border: 3px solid var(--bg-user-bar); }
        .user-info { flex: 1; font-size: 13px; line-height: 1.2; cursor: pointer; }
        .user-tag { color: var(--text-muted); font-size: 11px; }

        /* --- 右側：主內容區 --- */
        main { flex: 1; background: var(--bg-main); display: flex; flex-direction: column; position: relative; }
        
        /* --- Discord 風格個人資料卡片 (浮動) --- */
        #profile-modal {
            position: fixed; left: 80px; bottom: 60px; width: 300px; 
            background: #111214; border-radius: 8px; overflow: hidden;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5); display: none; z-index: 1000;
        }
        .profile-banner { height: 60px; background: var(--p-blue); }
        .profile-pfp { width: 80px; height: 80px; border-radius: 50%; border: 6px solid #111214; margin-top: -40px; margin-left: 16px; background: #2b2d31; }
        .profile-content { padding: 16px; background: #111214; }
        .profile-name { font-size: 20px; font-weight: bold; margin-bottom: 4px; }
        .profile-username { font-size: 14px; color: var(--text-muted); margin-bottom: 12px; }
        .profile-section { border-top: 1px solid var(--border); padding-top: 12px; margin-top: 12px; font-size: 12px; }
        .section-title { font-size: 11px; font-weight: bold; color: white; margin-bottom: 6px; text-transform: uppercase; }

        .input-dark { background: #1e1f22; border: none; width: 100%; padding: 8px; color: white; border-radius: 4px; margin-top: 4px; font-size: 13px; }
        .btn-save { background: var(--p-green); color: white; border: none; padding: 8px 16px; border-radius: 3px; font-weight: bold; margin-top: 12px; width: 100%; cursor: pointer; }

        /* 頁面隱藏/顯示 */
        .page { display: none; height: 100%; flex-direction: column; }
        .page.active { display: flex; }
    </style>
</head>
<body>

    <nav class="guild-nav">
        <div class="guild-item active">🏠</div>
        <div style="width: 32px; height: 2px; background: var(--border);"></div>
        <div class="guild-item" title="伺服器 1">F</div>
        <div class="guild-item" onclick="alert('創建伺服器')">➕</div>
    </nav>

    <aside class="sidebar">
        <div class="sidebar-search">
            <input type="text" class="search-box" placeholder="尋找或開始對話">
        </div>
        <div class="nav-list">
            <div class="nav-btn active">👤 好友</div>
            <div class="nav-btn">🎲 Nitro</div>
            <div class="nav-btn">💬 訊息請求</div>
            <div style="margin-top: 20px; font-size: 11px; color: var(--text-muted); font-weight: bold; padding: 0 10px;">直接訊息</div>
            <div class="nav-btn">👤 Shadow</div>
        </div>
        
        <div class="user-bar">
            <div class="user-avatar-wrap" onclick="toggleProfile()">
                <div class="user-avatar"></div>
                <div class="status-dot"></div>
            </div>
            <div class="user-info" onclick="toggleProfile()">
                <div id="u-display">未設定名稱</div>
                <div class="user-tag" id="u-tag">#ryfn888</div>
            </div>
            <div style="color: var(--text-muted); font-size: 18px;">⚙️</div>
        </div>
    </aside>

    <main>
        <section id="page-home" class="page active">
            <div style="padding: 12px 16px; border-bottom: 1px solid var(--border); font-weight: bold;">好友</div>
            <div style="flex: 1; display: flex; align-items: center; justify-content: center; color: var(--text-muted);">
                <div style="text-align: center;">
                    <img src="https://discord.com/assets/d90667da672809f6b215.svg" width="200">
                    <p>正在等待好友...</p>
                </div>
            </div>
        </section>
    </main>

    <div id="profile-modal">
        <div class="profile-banner"></div>
        <div class="profile-pfp"></div>
        <div class="profile-content">
            <div class="profile-name" id="p-display">New User</div>
            <div class="profile-username" id="p-tag">@ryfn888</div>
            
            <div class="profile-section">
                <div class="section-title">關於我</div>
                <textarea id="p-bio" class="input-dark" rows="2" placeholder="編輯你的個人簡介..."></textarea>
            </div>

            <div class="profile-section">
                <div class="section-title">自訂顯示名稱</div>
                <input type="text" id="p-edit-name" class="input-dark" placeholder="輸入名稱">
                <button class="btn-save" onclick="updateProfile()">儲存個資變更</button>
            </div>
            
            <div class="profile-section">
                <button onclick="logout()" style="background:none; border:none; color: #f23f42; font-size: 11px; cursor: pointer;">登出 Tacker</button>
            </div>
        </div>
    </div>

    <script>
        // 切換個資卡片顯示
        function toggleProfile() {
            const modal = document.getElementById('profile-modal');
            modal.style.display = modal.style.display === 'block' ? 'none' : 'block';
        }

        // 更新個資邏輯
        function updateProfile() {
            const newName = document.getElementById('p-edit-name').value;
            if(newName) {
                document.getElementById('u-display').innerText = newName;
                document.getElementById('p-display').innerText = newName;
                localStorage.setItem('display_name', newName);
                alert("個資更新成功！");
                toggleProfile();
            }
        }

        function logout() {
            localStorage.clear();
            location.reload();
        }

        // 初始化檢查
        window.onload = () => {
            const savedName = localStorage.getItem('display_name');
            if(savedName) {
                document.getElementById('u-display').innerText = savedName;
                document.getElementById('p-display').innerText = savedName;
            }
        };

        // 點擊外面關閉個資卡
        window.onclick = function(event) {
            const modal = document.getElementById('profile-modal');
            if (!event.target.closest('.user-bar') && !event.target.closest('#profile-modal')) {
                modal.style.display = 'none';
            }
        }
    </script>
</body>
</html>
