<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Tacker | FR Tech</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, set, update, get, push, remove, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = { databaseURL: "https://tacker-ebc5a-default-rtdb.firebaseio.com" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let currentUser = null;

        // 1. 自動跳轉：真正具備記憶功能
        window.entry = async () => {
            const id = localStorage.getItem('t_id'), pw = localStorage.getItem('t_pw');
            if (id && pw) {
                const s = await get(ref(db, `users/${id}`));
                if (s.exists() && s.val().temp_pw === pw) {
                    currentUser = { id, ...s.val() };
                    return start();
                }
            }
            document.getElementById('home').style.display = 'none';
            document.getElementById('login').style.display = 'flex';
        };

        window.doLogin = async () => {
            const id = document.getElementById('l-id').value, pw = document.getElementById('l-pw').value;
            const s = await get(ref(db, `users/${id}`));
            if(s.exists() && s.val().temp_pw === pw) {
                localStorage.setItem('t_id', id); localStorage.setItem('t_pw', pw);
                currentUser = { id, ...s.val() };
                start();
            } else { alert("驗證不通過"); }
        };

        function start() {
            document.getElementById('login').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
            sync();
        }

        // 2. 自由好友系統：純 ID 對接
        window.sendFriend = async () => {
            const tid = document.getElementById('s-id').value;
            if(!tid || tid === currentUser.id) return;
            await set(ref(db, `invites/${tid}/${currentUser.id}`), { name: currentUser.full_name });
            alert("邀請已送出"); document.getElementById('s-id').value = '';
        };

        window.accept = async (sid) => {
            await update(ref(db, `friends/${currentUser.id}/${sid}`), { status: 'friend' });
            await update(ref(db, `friends/${sid}/${currentUser.id}`), { status: 'friend' });
            await remove(ref(db, `invites/${currentUser.id}/${sid}`));
        };

        // 3. 名片功能：只保留自介與橫幅
        window.saveProfile = async () => {
            const bio = document.getElementById('i-bio').value;
            const color = document.getElementById('i-color').value;
            await update(ref(db, `users/${currentUser.id}`), { bio, banner: color });
            document.getElementById('modal').style.display = 'none';
        };

        function sync() {
            onValue(ref(db, `users/${currentUser.id}`), s => {
                const d = s.val();
                document.getElementById('u-name').innerText = d.full_name;
                document.getElementById('u-id').innerText = `#${currentUser.id}`;
                document.getElementById('m-bio').innerText = d.bio || "使用者尚未定義自介";
                document.getElementById('m-head').style.background = d.banner || '#5865f2';
            });
            onValue(ref(db, `invites/${currentUser.id}`), s => {
                const l = document.getElementById('inv-list'); l.innerHTML = '';
                s.forEach(c => {
                    l.innerHTML += `<div class="inv"><b>${c.val().name}</b> <button onclick="accept('${c.key}')">✔</button></div>`;
                });
            });
            onValue(ref(db, 'chats/global'), s => {
                const c = document.getElementById('chat'); c.innerHTML = '';
                s.forEach(m => { c.innerHTML += `<div class="msg"><b>${m.val().u}:</b> ${m.val().t}</div>`; });
                c.scrollTop = c.scrollHeight;
            });
        }

        window.sendMsg = () => {
            const i = document.getElementById('msg-i');
            if(!i.value) return;
            push(ref(db, 'chats/global'), { u: currentUser.full_name, t: i.value });
            i.value = '';
        };
    </script>
    <style>
        :root { --b1: #1e1f22; --b2: #2b2d31; --b3: #313338; --acc: #5865f2; --t1: #dbdee1; }
        body { margin:0; background:#000; color:var(--t1); font-family: sans-serif; overflow:hidden; }
        #home { height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; }
        #login { display:none; height:100vh; align-items:center; justify-content:center; }
        #app { display:none; height:100vh; }
        .rail { width:72px; background:var(--b1); padding:15px 0; display:flex; flex-direction:column; align-items:center; gap:10px; }
        .side { width:240px; background:var(--b2); display:flex; flex-direction:column; }
        .chat-v { flex:1; background:var(--b3); display:flex; flex-direction:column; }
        .pfp-area { padding:15px; background:rgba(0,0,0,0.2); cursor:pointer; }
        .btn { background:var(--acc); color:#fff; border:none; padding:10px 20px; border-radius:4px; cursor:pointer; }
        input { background:#111; border:1px solid #333; color:#fff; padding:10px; border-radius:4px; width:100%; margin:5px 0; }
        #chat { flex:1; padding:20px; overflow-y:auto; }
        .msg { margin-bottom:10px; }
        .modal { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); display:none; align-items:center; justify-content:center; }
        .inv { background:var(--b1); padding:10px; margin-top:5px; border-radius:4px; display:flex; justify-content:space-between; align-items:center; }
    </style>
</head>
<body onload="document.getElementById('home').style.display='flex'">

    <div id="home">
        <h1 style="color:var(--acc); letter-spacing:10px;">TACKER</h1>
        <button class="btn" style="position:fixed; bottom:40px; right:40px;" onclick="entry()">進入 Tacker</button>
    </div>

    <div id="login">
        <div style="background:var(--b1); padding:30px; border-radius:8px; width:300px;">
            <h3 style="margin-top:0;">身分驗證</h3>
            <input id="l-id" placeholder="Tacker ID">
            <input id="l-pw" type="password" placeholder="Password">
            <button class="btn" style="width:100%; margin-top:10px;" onclick="doLogin()">登入</button>
        </div>
    </div>

    <div id="app">
        <div class="rail">
            <div style="width:48px; height:48px; background:var(--acc); border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer;" onclick="alert('建立功能開發中')"><i class="fa-solid fa-plus"></i></div>
        </div>
        <aside class="side">
            <div class="pfp-area" onclick="document.getElementById('modal').style.display='flex'">
                <b id="u-name">Loading...</b><br><small id="u-id">#0000</small>
            </div>
            <div style="padding:15px; flex:1;">
                <p style="font-size:11px; font-weight:bold; color:#888;">搜尋好友</p>
                <input id="s-id" placeholder="輸入 ID 並按 Enter" onkeypress="if(event.key==='Enter') sendFriend()">
                <p style="font-size:11px; font-weight:bold; color:#888; margin-top:20px;">好友請求</p>
                <div id="inv-list"></div>
            </div>
        </aside>
        <main class="chat-v">
            <header style="height:48px; border-bottom:1px solid #222; display:flex; align-items:center; padding:0 15px;"># 全球大廳</header>
            <div id="chat"></div>
            <div style="padding:20px;"><input id="msg-i" placeholder="在 #全球大廳 聊天..." onkeypress="if(event.key==='Enter') sendMsg()"></div>
        </main>
    </div>

    <div id="modal" class="modal">
        <div style="background:var(--b2); width:350px; border-radius:8px; overflow:hidden;">
            <div id="m-head" style="height:80px;"></div>
            <div style="padding:20px;">
                <h3 style="margin:0 0 10px 0;">個人設定</h3>
                <p id="m-bio" style="font-size:13px; color:#aaa; margin-bottom:15px;"></p>
                <hr style="border:0; border-top:1px solid #333; margin:15px 0;">
                <label style="font-size:12px;">修改自我介紹</label><input id="i-bio">
                <label style="font-size:12px;">橫幅顏色 (HEX)</label><input id="i-color" placeholder="#5865f2">
                <div style="display:flex; gap:10px; margin-top:15px;">
                    <button class="btn" style="flex:1" onclick="saveProfile()">儲存</button>
                    <button class="btn" style="flex:1; background:#444;" onclick="document.getElementById('modal').style.display='none'">關閉</button>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
