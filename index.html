<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tacker | FR Tech</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #00ff41; --bg: #0d1117; --card: #161b22; --border: #30363d; }
        * { box-sizing: border-box; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: white; height: 100vh; overflow: hidden; }

        /* 登入牆層級拉到最高 */
        #login-screen {
            position: fixed; top:0; left:0; width:100%; height:100%;
            display: flex; align-items: center; justify-content: center;
            background: var(--bg); z-index: 9999;
        }
        .login-box {
            background: var(--card); padding: 30px; border-radius: 8px;
            width: 90%; max-width: 380px; border: 1px solid var(--border);
            text-align: center;
        }
        h2 { color: var(--primary); margin-bottom: 20px; }
        input {
            width: 100%; padding: 12px; margin-bottom: 15px; background: #010409;
            border: 1px solid var(--border); color: white; border-radius: 4px; font-size: 16px;
        }
        /* 增加按鈕的觸發區域與視覺回饋 */
        .btn {
            width: 100%; padding: 15px; margin-top: 10px; border-radius: 4px;
            font-weight: bold; font-size: 16px; cursor: pointer; border: none;
            display: block; transition: opacity 0.2s;
        }
        .btn:active { opacity: 0.7; }
        .btn-main { background: var(--primary); color: black; }
        .btn-discord { background: #5865f2; color: white; }
        .footer-link { margin-top: 20px; color: var(--primary); cursor: pointer; font-size: 14px; text-decoration: underline; }

        /* 聊天介面預設隱藏 */
        #main-app { display: none; height: 100vh; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2 id="title">TACKER</h2>
            <input type="email" id="email" placeholder="電子郵件">
            <input type="password" id="password" placeholder="密碼">
            
            <button class="btn btn-main" onclick="doAuth()">登入</button>
            <button class="btn btn-discord" onclick="doDiscord()">Discord 登入</button>
            
            <div class="footer-link" onclick="toggleMode()" id="toggle-text">還沒有帳號？註冊一個</div>
        </div>
    </div>

    <div id="main-app" style="padding: 20px;">
        <h1 style="color: var(--primary);">歡迎進入 Tacker 系統</h1>
        <p>登入成功，這就是你的開發基地。</p>
    </div>

    <script>
        // 1. 偵測 Supabase 是否載入成功
        window.onload = function() {
            if (typeof supabase === 'undefined') {
                alert("錯誤：無法連線到 Supabase 伺服器，請檢查網路！");
            }
        }

        const supabaseUrl = 'https://coyiifxxfopvabpjszis.supabase.co';
        const supabaseKey = 'sb_publishable_auth_coyiifxxfopvabpjszis';
        const client = supabase.createClient(supabaseUrl, supabaseKey);

        let mode = 'login';

        function toggleMode() {
            mode = (mode === 'login') ? 'signup' : 'login';
            document.getElementById('title').innerText = (mode === 'login') ? 'TACKER' : '註冊帳號';
            document.getElementById('toggle-text').innerText = (mode === 'login') ? '還沒有帳號？註冊一個' : '已有帳號？返回登入';
            document.querySelector('.btn-main').innerText = (mode === 'login') ? '登入' : '立即註冊';
        }

        async function doAuth() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if (!email || !password) return alert("請填寫帳密");

            if (mode === 'signup') {
                const { error } = await client.auth.signUp({ email, password });
                if (error) alert("註冊失敗: " + error.message);
                else alert("註冊請求已送出！若已關閉驗證可直接登入。");
            } else {
                const { error } = await client.auth.signInWithPassword({ email, password });
                if (error) alert("登入失敗: " + error.message);
                else location.reload();
            }
        }

        async function doDiscord() {
            const { error } = await client.auth.signInWithOAuth({
                provider: 'discord',
                options: { redirectTo: window.location.href }
            });
            if (error) alert("Discord 登入出錯: " + error.message);
        }

        async function check() {
            const { data: { session } } = await client.auth.getSession();
            if (session) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-app').style.display = 'block';
            }
        }
        check();
    </script>
</body>
</html>
