<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tacker | Official Production</title>
    <style>
        :root {
            --bg-side: #2b2d31; --bg-main: #313338; --bg-dark: #1e1f22;
            --accent: #5865f2; --text: #dbdee1; --text-muted: #949ba4;
            --popout: #111214; --danger: #f23f43;
        }
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        body { background: #000; color: var(--text); height: 100vh; overflow: hidden; display: flex; }

        /* --- 左側好友欄 (圖一) --- */
        #friend-sidebar { width: 260px; background: var(--bg-side); display: flex; flex-direction: column; border-right: 1px solid rgba(0,0,0,0.2); }
        .side-header { height: 48px; padding: 0 16px; display: flex; align-items: center; border-bottom: 1px solid rgba(0,0,0,0.2); font-weight: bold; }
        .friend-list { flex: 1; padding: 10px; overflow-y: auto; }
        .no-friend-text { color: var(--text-muted); font-size: 14px; display: flex; align-items: center; gap: 8px; cursor: pointer; }
        .no-friend-text:hover { color: white; }

        /* --- 左下角個資區 (圖一左下) --- */
        .user-footer { height: 52px; background: #232428; padding: 0 8px; display: flex; align-items: center; gap: 8px; }
        .footer-pfp { width: 32px; height: 32px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; }
        .footer-info { flex: 1; line-height: 1.2; overflow: hidden; }
        .footer-name { font-size: 13px; font-weight: bold; color: white; }
        .footer-id { font-size: 11px; color: var(--text-muted); }
        .edit-btn { cursor: pointer; opacity: 0.7; transition: 0.2s; }
        .edit-btn:hover { opacity: 1; }

        /* --- 右側主區域 (圖一右) --- */
        #main-view { flex: 1; background: var(--bg-main); display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        .empty-state { text-align: center; opacity: 0.5; }
        .empty-icon { font-size: 80px; margin-bottom: 16px; filter: grayscale(1); }

        /* --- 新增好友彈窗 (圖二) --- */
        #add-friend-modal { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; 
            display: none; align-items: center; justify-content: center; 
        }
        .modal-card { background: var(--bg-main); width: 360px; border-radius: 8px; padding: 20px; position: relative; box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
        .modal-close { position: absolute; right: 15px; top: 15px; cursor: pointer; color: var(--text-muted); }
        .modal-card h3 { margin-bottom: 15px; font-size: 18px; }
        .id-input { width: 100%; padding: 10px; background: var(--bg-dark); border: none; border-radius: 4px; color: white; margin-bottom: 15px; outline: none; }
        .confirm-btn { width: 100%; padding: 10px; background: var(--accent); color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; }

        /* --- 設定全屏頁 (P1 詳細細節) --- */
        #settings-page { 
            position: fixed; inset: 0; background: var(--bg-main); z-index: 2000; 
            display: none; flex-direction: row; 
        }
        .settings-nav { width: 240px; background: var(--bg-side); padding: 60px 20px; display: flex; flex-direction: column; gap: 4px; }
        .nav-label { font-size: 12px; font-weight: bold; color: var(--text-muted); margin-bottom: 8px; padding-left: 10px; }
        .nav-item { padding: 8px 10px; border-radius: 4px; cursor: pointer; font-size: 15px; color: var(--text-muted); }
        .nav-item.active { background: #3f4147; color: white; }
        .nav-item.danger { color: var(--danger); }
        .settings-content { flex: 1; padding: 60px 40px; overflow-y: auto; max-width: 800px; }
        .settings-section { margin-bottom: 40px; }
        .settings-section h2 { margin-bottom: 20px; font-size: 20px; }
        
        .banner-upload { height: 100px; background: var(--accent); border-radius: 8px; position: relative; margin-bottom: 40px; cursor: pointer; }
        .pfp-large { width: 80px; height: 80px; border-radius: 50%; border: 6px solid var(--bg-main); position: absolute; left: 20px; bottom: -30px; background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: bold; }
        
        .field-group { margin-bottom: 20px; background: var(--bg-dark); padding: 15px; border-radius: 8px; }
        .field-label { font-size: 12px; color: var(--text-muted); text-transform: uppercase; font-weight: bold; }
        .field-value { margin-top: 5px; font-size: 16px; color: white; display: flex; justify-content: space-between; }
        .field-btn { color: #00a8fc; font-size: 13px; cursor: pointer; }

    </style>
</head>
<body>

    <aside id="friend-sidebar">
        <div class="side-header">好友列表</div>
        <div class="friend-list" id="f-list">
            <div class="no-friend-text" onclick="toggleModal('add', true)">目前沒有好友 <span style="font-size:20px;">⊕</span></div>
        </div>
        
        <div class="user-footer">
            <div class="footer-pfp" id="f-pfp">A</div>
            <div class="footer-info">
                <div class="footer-name" id="f-name">Admin</div>
                <div class="footer-id" id="f-id">ABC1234</div>
            </div>
            <div class="edit-btn" onclick="toggleSettings(true)">✏️</div>
        </div>
    </aside>

    <main id="main-view">
        <div class="empty-state" id="empty-ui">
            <div class="empty-icon">#</div>
            <p>這裡什麼都沒有 :/</p>
            <p style="font-size: 13px; margin-top: 8px;">因為你沒有在任何頻道</p>
        </div>
    </main>

    <div id="add-friend-modal" onclick="toggleModal('add', false)">
        <div class="modal-card" onclick="event.stopPropagation()">
            <div class="modal-close" onclick="toggleModal('add', false)">✕</div>
            <h3>新增好友</h3>
            <p style="font-size:13px; color:var(--text-muted); margin-bottom:15px;">請輸入對方的帳號 ID 以發送好友請求。</p>
            <input type="text" class="id-input" id="target-id" placeholder="例如：ryfn888">
            <button class="confirm-btn" onclick="sendFriendRequest()">確認</button>
        </div>
    </div>

    <div id="settings-page">
        <div class="settings-nav">
            <div class="nav-label">用戶設定</div>
            <div class="nav-item active">個人檔案</div>
            <div class="nav-item">隱私與安全</div>
            <div class="nav-label">帳號管理</div>
            <div class="nav-item">更改密碼</div>
            <div class="nav-item danger" onclick="alert('需前往 Gmail 驗證移除帳戶')">移除帳戶</div>
            <div class="nav-item" style="margin-top:20px;" onclick="location.reload()">登出</div>
            <div class="nav-item" onclick="toggleSettings(false)">← 返回</div>
        </div>
        <div class="settings-content">
            <div class="settings-section">
                <h2>外觀與個資</h2>
                <div class="banner-upload" onclick="alert('上傳橫幅圖片 (10MB以內)')">
                    <div class="pfp-large" id="set-pfp">A</div>
                </div>
                
                <div class="field-group">
                    <div class="field-label">顯示名稱</div>
                    <div class="field-value"><span id="set-name-val">Admin</span> <span class="field-btn">編輯</span></div>
                </div>
                <div class="field-group">
                    <div class="field-label">帳號 ID (僅限英文/數字)</div>
                    <div class="field-value"><span id="set-id-val">ABC1234</span> <span class="field-btn">編輯</span></div>
                </div>
                <div class="field-group">
                    <div class="field-label">自介 (文字)</div>
                    <div class="field-value"><span style="font-size:14px; color:var(--text-muted);">尚未設定自介...</span> <span class="field-btn">編輯</span></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 核心邏輯
        let currentUser = { name: "Admin", id: "ABC1234", pfp: "A" };
        
        function toggleModal(type, show) {
            document.getElementById(type + '-friend-modal').style.display = show ? 'flex' : 'none';
        }

        function toggleSettings(show) {
            document.getElementById('settings-page').style.display = show ? 'flex' : 'none';
        }

        function sendFriendRequest() {
            const id = document.getElementById('target-id').value;
            if(!id) return alert("請輸入 ID");
            if(!/^[a-zA-Z0-9]+$/.test(id)) return alert("ID 僅限英文與數字！");
            
            alert(`好友請求已發送給 ${id}！\n等待對方接受後，將顯示在左側。`);
            toggleModal('add', false);
            document.getElementById('target-id').value = '';
        }

        // 初始化
        window.onload = () => {
            document.getElementById('f-name').innerText = currentUser.name;
            document.getElementById('f-id').innerText = currentUser.id;
            document.getElementById('set-name-val').innerText = currentUser.name;
            document.getElementById('set-id-val').innerText = currentUser.id;
        }
    </script>
</body>
</html>
