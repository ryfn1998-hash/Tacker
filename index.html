<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tacker Pro | Admin Edition</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        :root { --bg: #000; --card: #111; --acc: #23a559; --official: #f1c40f; --text: #fff; --sub: #888; --danger: #f23f43; }
        * { box-sizing: border-box; font-family: sans-serif; }
        body { margin:0; background:var(--bg); color:var(--text); overflow:hidden; }

        .screen { position: absolute; width: 100%; height: 100%; display: none; flex-direction: column; }
        .active { display: flex; }

        /* 導航與主區 */
        .rail { width: 60px; background: #050505; flex-shrink: 0; display: flex; flex-direction: column; align-items: center; padding: 20px 0; gap: 20px; border-right: 1px solid #222; }
        .main { flex-grow: 1; background: #111; display: flex; flex-direction: column; }

        /* 訊息樣式 */
        .msg-row { display: flex; gap: 12px; margin-bottom: 20px; padding: 0 15px; position: relative; }
        .pfp { width: 42px; height: 42px; border-radius: 50%; background: #333; flex-shrink: 0; overflow: hidden; cursor: pointer; }
        .pfp img { width: 100%; height: 100%; object-fit: cover; }
        
        /* 圖片訊息預覽 */
        .msg-img { max-width: 250px; max-height: 350px; border-radius: 8px; margin-top: 8px; cursor: zoom-in; display: block; }
        
        /* 刪除按鈕 */
        .del-btn { position: absolute; right: 15px; top: 0; color: #444; font-size: 14px; cursor: pointer; padding: 5px; }
        .del-btn:hover { color: var(--danger); }

        .input-bar { padding: 15px; border-top: 1px solid #222; background: #0a0a0a; display: flex; gap: 10px; align-items: center; }
        .input-bar input { flex-grow: 1; padding: 12px; background: #1e1e1e; border: none; color: #fff; border-radius: 8px; }
        .img-icon { color: var(--sub); font-size: 20px; cursor: pointer; }
        .img-icon.active { color: var(--acc); }
    </style>
</head>
<body>

    <section id="s-login" class="screen active" style="align-items:center; justify-content:center; background:#eee;">
        <div style="background:#fff; width:300px; padding:25px; border-radius:8px; color:#333;">
            <h2 style="margin:0 0 15px;">登入 Tacker</h2>
            <input id="u-id" placeholder="帳號" style="width:100%; padding:10px; margin-bottom:10px;">
            <input id="u-pw" type="password" placeholder="密碼" style="width:100%; padding:10px;">
            <button onclick="auth()" style="width:100%; padding:10px; background:var(--acc); color:#fff; border:none; margin-top:10px; border-radius:4px;">進入</button>
        </div>
    </section>

    <section id="s-app" class="screen">
        <div style="display:flex; height:100%;">
            <nav class="rail">
                <div onclick="tab('chat')" style="color:var(--acc);"><i class="fa-solid fa-comments"></i></div>
                <div onclick="tab('me')"><i class="fa-solid fa-user-gear"></i></div>
            </nav>

            <main id="chat-tab" class="main">
                <header style="height:55px; border-bottom:1px solid #222; display:flex; align-items:center; padding:0 15px; justify-content:space-between;">
                    <b>全球大廳</b>
                    <span style="font-size:12px; color:var(--acc);">● <span id="online-count">0</span> 在線</span>
                </header>
                <div id="chat-flow" style="flex-grow:1; overflow-y:auto; padding-top:15px;"></div>
                
                <div class="input-bar">
                    <i id="img-toggle" class="fa-solid fa-image img-icon" onclick="toggleImgMode()"></i>
                    <input id="m-input" placeholder="說點什麼..." onkeypress="if(event.key==='Enter') send()">
                    <button onclick="send()" style="background:var(--acc); border:none; color:#fff; padding:8px 15px; border-radius:8px;"><i class="fa-solid fa-paper-plane"></i></button>
                </div>
            </main>

            <main id="me-tab" class="main" style="display:none; padding:20px;">
                <h3>帳戶設定</h3>
                <input id="edit-pfp" placeholder="頭像圖片連結">
                <input id="edit-name" placeholder="顯示名稱">
                <textarea id="edit-bio" placeholder="個人自介"></textarea>
                <button onclick="saveProfile()" style="width:100%; padding:12px; background:var(--acc); border:none; color:#fff; margin-top:20px;">儲存設定</button>
            </main>
        </div>
    </section>

    <script>
        const config = { 
            apiKey: "AIzaSyB56chNeodbgAYa8k3xspOOAMYt6C5M4cw",
            databaseURL: "https://tacker-ebc5a-default-rtdb.firebaseio.com",
            projectId: "tacker-ebc5a"
        };
        firebase.initializeApp(config);
        const db = firebase.database();
        let me = null;
        let isImgMode = false;

        async function auth() {
            const uid = document.getElementById('u-id').value.trim();
            const pw = document.getElementById('u-pw').value.trim();
            const s = await db.ref(`users/${uid}`).get();
            if(s.exists() && s.val().temp_pw === pw) { me = { uid, ...s.val() }; initApp(); }
            else alert("驗證失敗");
        }

        function toggleImgMode() {
            isImgMode = !isImgMode;
            const btn = document.getElementById('img-toggle');
            const inp = document.getElementById('m-input');
            btn.className = isImgMode ? "fa-solid fa-circle-xmark img-icon active" : "fa-solid fa-image img-icon";
            inp.placeholder = isImgMode ? "請貼上圖片網址..." : "說點什麼...";
            if(!isImgMode) btn.style.color = "#888";
        }

        function initApp() {
            document.getElementById('s-login').classList.remove('active');
            document.getElementById('s-app').classList.add('active');
            db.ref(`presence/${me.uid}`).set(true);
            
            // 監聽訊息流與刪除權限
            db.ref('chats/global').limitToLast(50).on('value', snap => {
                const flow = document.getElementById('chat-flow');
                flow.innerHTML = '';
                snap.forEach(d => {
                    const m = d.val();
                    const key = d.key;
                    const isOfficial = m.u === "Tacker官方";
                    const isMine = m.uid === me.uid;
                    const canDelete = isMine || (me.full_name === "Tacker官方");

                    flow.innerHTML += `
                        <div class="msg-row">
                            <div class="pfp"><img src="${m.pfp || ''}"></div>
                            <div style="flex-grow:1">
                                <div class="msg-meta">
                                    <b style="color:${isOfficial?'var(--official)':'var(--acc)'};">${m.u}</b>
                                    <span class="msg-time">${new Date(m.ts).toLocaleTimeString()}</span>
                                </div>
                                ${m.type === 'img' ? `<img src="${m.t}" class="msg-img">` : `<div style="font-size:15px; color:#ddd;">${m.t}</div>`}
                            </div>
                            ${canDelete ? `<i class="fa-solid fa-trash-can del-btn" onclick="deleteMsg('${key}')"></i>` : ''}
                        </div>`;
                });
                flow.scrollTop = flow.scrollHeight;
            });
        }

        function send() {
            const inp = document.getElementById('m-input');
            const val = inp.value.trim();
            if(!val) return;

            const msgData = {
                u: me.full_name,
                uid: me.uid,
                pfp: me.pfp || '',
                t: val,
                type: isImgMode ? 'img' : 'text',
                ts: Date.now()
            };

            db.ref('chats/global').push(msgData);
            inp.value = '';
            if(isImgMode) toggleImgMode();
        }

        // --- 實體化刪除邏輯 ---
        async function deleteMsg(key) {
            if(confirm("確定要刪除這條訊息嗎？")) {
                await db.ref(`chats/global/${key}`).remove();
            }
        }

        // 其餘 saveProfile, tab 功能維持...
        async function saveProfile() {
            const n = document.getElementById('edit-name').value;
            const b = document.getElementById('edit-bio').value;
            const p = document.getElementById('edit-pfp').value;
            await db.ref(`users/${me.uid}`).update({ full_name:n, bio:b, pfp:p });
            me.full_name = n; me.pfp = p;
            alert("更新成功");
        }
        function tab(t) {
            document.getElementById('chat-tab').style.display = t === 'chat' ? 'flex' : 'none';
            document.getElementById('me-tab').style.display = t === 'me' ? 'block' : 'none';
        }
    </script>
</body>
</html>
