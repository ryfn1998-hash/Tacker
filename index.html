<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tacker</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        :root { --bg: #000; --card: #111; --acc: #23a559; --text: #fff; --sub: #888; --danger: #f23f43; }
        * { box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
        body, html { margin:0; padding:0; height:100%; background:var(--bg); color:var(--text); overflow:hidden; }

        .screen { position: absolute; width: 100%; height: 100%; display: none; flex-direction: column; z-index: 10; }
        .active { display: flex; }

        /* --- 靈敏度優化 --- */
        button, .dm-nav, label, .pfp { cursor: pointer !important; pointer-events: auto !important; transition: transform 0.1s; }
        button:active, label:active, .dm-nav:active { transform: scale(0.9); opacity: 0.7; }

        #s-home { background: #fff; color: #000; align-items: center; justify-content: center; }
        .big-tacker { font-weight: 900; font-size: clamp(60px, 15vw, 100px); }
        .float-btn { margin-top: 50px; padding: 18px 60px; background: #000; color: #fff; border: none; border-radius: 50px; font-size: 18px; font-weight: bold; }

        .rail { width: 65px; background: #050505; flex-shrink: 0; display: flex; flex-direction: column; align-items: center; padding: 25px 0; gap: 20px; border-right: 1px solid #222; overflow-y: auto; }
        .main { flex-grow: 1; background: #111; display: flex; flex-direction: column; }
        
        .dm-nav { width: 45px; height: 45px; border-radius: 50%; border: 2px solid transparent; position: relative; flex-shrink: 0; }
        .dm-nav img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        .dm-nav.active { border-color: var(--acc); }

        .msg-row { display: flex; gap: 12px; margin-bottom: 22px; padding: 0 15px; }
        .pfp { width: 44px; height: 44px; border-radius: 50%; background: #222; overflow: hidden; border: 1px solid #333; flex-shrink: 0; }
        .pfp img { width: 100%; height: 100%; object-fit: cover; }
        
        /* 圖片顯示樣式 */
        .msg-img { max-width: 80%; max-height: 300px; border-radius: 10px; margin-top: 8px; border: 1px solid #333; display: block; }

        .input-bar { padding: 12px; border-top: 1px solid #222; background: #0a0a0a; display: flex; gap: 12px; align-items: center; }
        .input-bar input { flex-grow: 1; padding: 12px; background: #1e1e1e; border: none; color: #fff; border-radius: 12px; outline: none; }
        
        /* 保持 + 號按鈕樣式 */
        .plus-btn { color: var(--sub); font-size: 20px; padding: 5px 10px; display: flex; align-items: center; }
    </style>
</head>
<body>

    <section id="s-home" class="screen active">
        <div class="big-tacker">Tacker</div>
        <button class="float-btn" onclick="checkAuth()">進入 ——＞</button>
    </section>

    <section id="s-login" class="screen" style="justify-content:center; align-items:center;">
        <div style="width:300px; background:#111; padding:30px; border-radius:15px; border:1px solid #222;">
            <h2 style="margin-bottom:20px;">登入</h2>
            <input id="u-id" placeholder="帳號 ID" style="width:100%; padding:14px; margin-bottom:10px; background:#222; border:none; color:#fff; border-radius:8px;">
            <input id="u-pw" type="password" placeholder="密碼" style="width:100%; padding:14px; margin-bottom:20px; background:#222; border:none; color:#fff; border-radius:8px;">
            <button onclick="auth()" style="width:100%; padding:15px; background:var(--acc); color:#fff; border:none; border-radius:8px; font-weight:bold;">登入</button>
        </div>
    </section>

    <section id="s-load" class="screen" style="justify-content:center; align-items:center;">
        <div style="width:60%; height:4px; background:#222; border-radius:2px;"><div id="bar" style="width:0%; height:100%; background:var(--acc);"></div></div>
    </section>

    <section id="s-app" class="screen">
        <div style="display:flex; height:100%;">
            <nav class="rail">
                <div onclick="tab('chat')" style="color:var(--acc); font-size:24px;"><i class="fa-solid fa-earth-asia"></i></div>
                <div onclick="tab('me')" style="color:#444; font-size:24px;"><i class="fa-solid fa-user-gear"></i></div>
                <div id="dm-list"></div>
            </nav>
            <main class="main">
                <header style="padding:15px; border-bottom:1px solid #222;"><b id="main-title">全球大廳</b></header>
                <div id="chat-flow" style="flex-grow:1; overflow-y:auto; padding:15px 0;"><div id="messages"></div></div>
                <div id="upload-preview" style="display:none; padding:10px; background:#000; align-items:center; gap:10px; border-top:1px solid #222;">
                    <img id="preview-img" style="height:40px; border-radius:4px;">
                    <i class="fa-solid fa-times" onclick="cancelUpload()" style="margin-left:auto; color:var(--danger);"></i>
                </div>
                <div class="input-bar">
                    <label for="file-input" class="plus-btn"><i class="fa-solid fa-plus"></i></label>
                    <input type="file" id="file-input" accept="image/*" style="display:none;" onchange="handleFile(this)">
                    <input id="m-input" placeholder="傳送訊息..." onkeypress="if(event.key==='Enter') send()">
                    <button onclick="send()" style="background:var(--acc); color:#fff; border:none; padding:10px 15px; border-radius:10px;"><i class="fa-solid fa-paper-plane"></i></button>
                </div>
            </main>
        </div>
    </section>

    <script>
        const config = { apiKey: "AIzaSyB56chNeodbgAYa8k3xspOOAMYt6C5M4cw", databaseURL: "https://tacker-ebc5a-default-rtdb.firebaseio.com", projectId: "tacker-ebc5a" };
        firebase.initializeApp(config);
        const db = firebase.database();
        let me = null, pendingImg = "", currentChat = "global";

        function go(id) { document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
        function checkAuth() { const s = localStorage.getItem('tacker_session'); if(s){ me = JSON.parse(s); startLoad(); } else go('s-login'); }
        async function auth() {
            const uid = document.getElementById('u-id').value, pw = document.getElementById('u-pw').value;
            const s = await db.ref(`users/${uid}`).get();
            if(s.exists() && s.val().temp_pw === pw) { me = {uid, ...s.val()}; localStorage.setItem('tacker_session', JSON.stringify(me)); startLoad(); } else alert("密碼錯誤");
        }
        function startLoad() { go('s-load'); let p=0; const t=setInterval(()=>{ p+=20; document.getElementById('bar').style.width=p+'%'; if(p>=100){clearInterval(t); initApp();} }, 50); }

        function initApp() { go('s-app'); listenGlobal(); }

        // --- 核心修正：正確渲染圖片 ---
        function renderMsgs(snap) {
            const box = document.getElementById('messages'); box.innerHTML = '';
            snap.forEach(d => {
                const m = d.val();
                const isImg = (m.t && m.t.startsWith('data:image'));
                const content = isImg ? `<img src="${m.t}" class="msg-img">` : `<div style="color:#eee; font-size:15px;">${m.t}</div>`;
                box.innerHTML += `<div class="msg-row"><div class="pfp"><img src="${m.pfp}"></div><div><b style="color:var(--acc);font-size:12px;">${m.u}</b>${content}</div></div>`;
            });
            document.getElementById('chat-flow').scrollTop = document.getElementById('chat-flow').scrollHeight;
        }

        function listenGlobal() { db.ref('chats/global').limitToLast(30).on('value', s => renderMsgs(s)); }

        function send() {
            const inp = document.getElementById('m-input'); if(!inp.value && !pendingImg) return;
            const data = { u: me.full_name, uid: me.uid, pfp: me.pfp || '', t: pendingImg || inp.value, ts: Date.now() };
            db.ref('chats/global').push(data);
            inp.value = ''; cancelUpload();
        }

        function handleFile(input) {
            const f = input.files[0]; const r = new FileReader();
            r.onload = e => { pendingImg = e.target.result; document.getElementById('preview-img').src = pendingImg; document.getElementById('upload-preview').style.display = 'flex'; };
            r.readAsDataURL(f);
        }
        function cancelUpload() { pendingImg = ""; document.getElementById('upload-preview').style.display = 'none'; }
        function tab(t) { if(t==='me') alert("設定功能開發中"); }
    </script>
</body>
</html>
