<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Tacker Pro | Community Engine</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyB56chNeodbgAYa8k3xspOOAMYt6C5M4cw",
            databaseURL: "https://tacker-ebc5a-default-rtdb.firebaseio.com",
            projectId: "tacker-ebc5a",
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let currentUser = null;
        let currentServer = 'global';
        let lastMsgTime = 0;

        // --- 核心邏輯 ---
        function navToLogin() {
            document.getElementById('gate-screen').style.display = 'none';
            document.getElementById('login-screen').style.display = 'flex';
        }

        async function doLogin() {
            const id = document.getElementById('l-id').value.trim();
            const pw = document.getElementById('l-pw').value.trim();
            const s = await db.ref('users/' + id).get();
            if(s.exists() && s.val().temp_pw === pw) {
                currentUser = { id, ...s.val() };
                launch();
            } else { alert("驗證失敗，請檢查帳密"); }
        }

        function launch() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('gate-screen').style.display = 'none';
            document.getElementById('app-ui').style.display = 'flex';
            
            switchServer('global');
            syncUserCard();
            
            // 只有負責人（你）可以看到後台按鈕
            if(currentUser.role === 'admin') {
                document.getElementById('admin-btn').style.display = 'flex';
            }
        }

        function switchServer(sid) {
            currentServer = sid;
            document.getElementById('channel-name').innerText = sid === 'global' ? '全球大廳' : '開發者專區';
            
            db.ref('chats/' + sid).limitToLast(50).off();
            db.ref('chats/' + sid).limitToLast(50).on('value', (s) => {
                const flow = document.getElementById('chat-flow');
                flow.innerHTML = '';
                s.forEach(child => {
                    const m = child.val();
                    const isImg = m.t.match(/\.(jpeg|jpg|gif|png|webp)$/);
                    flow.innerHTML += `
                        <div class="msg-unit">
                            <div class="msg-pfp" onclick="showProfile('${m.uid}')"></div>
                            <div class="msg-main">
                                <b onclick="showProfile('${m.uid}')" style="cursor:pointer">${m.u}</b> 
                                <small>${new Date(m.ts).toLocaleTimeString()}</small>
                                <div class="msg-text">${isImg ? `<img src="${m.t}" class="chat-img">` : m.t}</div>
                            </div>
                        </div>`;
                });
                flow.scrollTop = flow.scrollHeight;
            });
        }

        async function showProfile(uid) {
            const s = await db.ref('users/' + uid).get();
            if(!s.exists()) return;
            const d = s.val();
            document.getElementById('modal-banner').style.background = d.banner || '#5865f2';
            document.getElementById('modal-name').innerText = d.full_name;
            document.getElementById('modal-tag').innerText = '#' + uid;
            document.getElementById('modal-bio').innerText = d.bio || '這傢伙很懶，什麼都沒寫...';
            document.getElementById('profile-modal').style.display = 'flex';
        }

        function syncUserCard() {
            document.getElementById('u-name').innerText = currentUser.full_name;
            document.getElementById('u-tag').innerText = '#' + currentUser.id;
        }

        function sendChat() {
            const now = Date.now();
            if(now - lastMsgTime < 500) return alert("發言太快了！(防刷屏機制觸發)");
            
            const inp = document.getElementById('chat-input');
            if(!inp.value.trim()) return;
            
            db.ref('chats/' + currentServer).push({
                u: currentUser.full_name, t: inp.value, ts: now, uid: currentUser.id
            });
            lastMsgTime = now;
            inp.value = '';
        }
    </script>

    <style>
        :root { --b0: #1e1f22; --b1: #2b2d31; --b2: #313338; --acc: #5865f2; --text: #dbdee1; --sub: #949ba4; --green: #23a559; }
        body, html { margin:0; padding:0; height:100vh; background:#000; color:var(--text); font-family: sans-serif; overflow:hidden; }

        /* 側邊伺服器列表 (Rail) */
        #app-ui { display:none; height:100vh; flex-direction: row; }
        .rail { width:72px; background:var(--b0); display:flex; flex-direction:column; align-items:center; padding-top:12px; flex-shrink:0; gap:8px; }
        .s-icon { width:48px; height:48px; background:var(--b2); border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:0.2s; }
        .s-icon:hover { border-radius:30%; background:var(--acc); }
        .s-icon.active { border-radius:30%; background:var(--acc); }

        /* 頻道列表 (Side) */
        .side { width:240px; background:var(--b1); display:flex; flex-direction:column; flex-shrink:0; }
        .u-card { margin-top:auto; background:rgba(0,0,0,0.3); padding:10px; display:flex; align-items:center; gap:10px; height:52px; }

        /* 聊天區 (Main) */
        .chat { flex-grow:1; background:var(--b2); display:flex; flex-direction:column; min-width:0; }
        #chat-flow { flex-grow:1; overflow-y:auto; padding:20px; }
        .msg-unit { display:flex; gap:16px; margin-bottom:18px; }
        .msg-pfp { width:40px; height:40px; background:var(--acc); border-radius:50%; flex-shrink:0; cursor:pointer; }
        .chat-img { max-width:100%; max-height:250px; border-radius:8px; margin-top:5px; border:1px solid #444; }

        /* 個人檔案彈窗 (User Card Modal) */
        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:1000; align-items:center; justify-content:center; }
        .modal-card { width:340px; background:var(--b0); border-radius:8px; overflow:hidden; box-shadow:0 20px 50px rgba(0,0,0,0.5); }
        .banner { height:60px; background:var(--acc); position:relative; }
        .m-pfp { width:80px; height:80px; background:var(--b0); border-radius:50%; position:absolute; bottom:-40px; left:16px; padding:6px; }
        .m-pfp-inner { width:100%; height:100%; background:var(--sub); border-radius:50%; }

        /* 入口與登入 */
        .full { height:100vh; width:100vw; display:flex; flex-direction:column; align-items:center; justify-content:center; }
        .btn-p { background:var(--acc); color:#fff; border:none; padding:15px 40px; border-radius:4px; font-weight:bold; cursor:pointer; }
    </style>
</head>
<body>

    <div id="gate-screen" class="full">
        <h1 style="font-size:80px; letter-spacing:15px; color:var(--acc); margin:0;">TACKER</h1>
        <p style="color:var(--sub); margin-bottom:40px;">THE SOCIAL ENGINE FOR PROS</p>
        <button class="btn-p" onclick="navToLogin()">進入</button>
    </div>

    <div id="login-screen" class="full" style="display:none">
        <div style="background:var(--b0); padding:40px; border-radius:8px; width:350px;">
            <h2 style="text-align:center; margin-top:0;">驗證</h2>
            <input id="l-id" placeholder="Tacker ID" style="width:100%; padding:12px; margin:10px 0; background:#1e1f22; border:1px solid #111; color:#fff;">
            <input id="l-pw" type="password" placeholder="密碼" style="width:100%; padding:12px; margin:10px 0; background:#1e1f22; border:1px solid #111; color:#fff;">
            <button class="btn-p" style="width:100%; margin-top:10px;" onclick="doLogin()">登入</button>
        </div>
    </div>

    <div id="app-ui">
        <nav class="rail">
            <div class="s-icon active" onclick="switchServer('global')"><i class="fa-solid fa-house"></i></div>
            <div class="s-icon" onclick="switchServer('dev')"><i class="fa-solid fa-code"></i></div>
            <div id="admin-btn" class="s-icon" style="display:none; color:#f04747;" title="後台管理"><i class="fa-solid fa-screwdriver-wrench"></i></div>
        </nav>
        
        <aside class="side">
            <div style="padding:15px; font-weight:bold; font-size:12px; color:var(--sub);">頻道列表</div>
            <div style="margin:0 8px; padding:10px; background:rgba(255,255,255,0.05); border-radius:4px;"><i class="fa-solid fa-hashtag" style="margin-right:8px;"></i> <span id="channel-name">全球大廳</span></div>
            
            <div class="u-card">
                <div style="width:32px; height:32px; background:var(--acc); border-radius:50%;"></div>
                <div style="overflow:hidden">
                    <div id="u-name" style="font-weight:bold; font-size:13px;">User</div>
                    <div id="u-tag" style="font-size:11px; color:var(--sub);">#0000</div>
                </div>
                <i class="fa-solid fa-gear" style="margin-left:auto; color:var(--sub); cursor:pointer;"></i>
            </div>
        </aside>

        <main class="chat">
            <header style="height:48px; border-bottom:1px solid #222; padding:0 16px; display:flex; align-items:center; font-weight:bold;"># <span id="channel-header">大廳</span></header>
            <div id="chat-flow"></div>
            <div style="padding:0 20px 24px;">
                <div style="background:#383a40; border-radius:8px; padding:12px; display:flex;">
                    <input id="chat-input" placeholder="說點什麼..." onkeypress="if(event.key==='Enter') sendChat()" style="background:none; border:none; color:#fff; width:100%; outline:none;">
                </div>
            </div>
        </main>
    </div>

    <div id="profile-modal" class="modal" onclick="this.style.display='none'">
        <div class="modal-card" onclick="event.stopPropagation()">
            <div id="modal-banner" class="banner">
                <div class="m-pfp"><div class="m-pfp-inner"></div></div>
            </div>
            <div style="padding:50px 16px 16px;">
                <div id="modal-name" style="font-size:20px; font-weight:bold; color:#fff;">User Name</div>
                <div id="modal-tag" style="color:var(--sub); font-size:14px; margin-bottom:15px;">#0000</div>
                <div style="background:#111; padding:12px; border-radius:4px;">
                    <div style="font-size:12px; font-weight:bold; color:var(--sub); margin-bottom:5px;">個人簡介</div>
                    <div id="modal-bio" style="font-size:14px;">...</div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
