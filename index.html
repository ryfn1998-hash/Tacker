<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tacker</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        :root { --bg: #000; --card: #111; --acc: #23a559; --text: #fff; --sub: #888; --danger: #f23f43; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body, html { margin:0; padding:0; height:100%; background:#fff; overflow:hidden; }

        #toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 9999; }
        .os-toast { background: #1a1a1a; color: #fff; padding: 12px 20px; border-radius: 10px; border-left: 4px solid var(--acc); box-shadow: 0 5px 20px rgba(0,0,0,0.5); margin-top: 10px; animation: slideIn 0.3s forwards; font-size: 14px; }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }

        .screen { position: absolute; width: 100%; height: 100%; display: none; flex-direction: column; z-index: 10; align-items:center; justify-content:center; }
        .active { display: flex; }

        /* 側邊欄 */
        #s-app { background: var(--bg); color: var(--text); align-items: stretch; }
        .rail { width: 72px; background: #050505; flex-shrink: 0; display: flex; flex-direction: column; align-items: center; padding: 15px 0; border-right: 1px solid #222; position: relative; }
        .nav-icon { width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #444; font-size: 20px; margin-bottom: 12px; overflow: hidden; aspect-ratio: 1/1; }
        .nav-icon img { width: 100%; height: 100%; object-fit: cover; }
        .nav-icon.active { color: var(--acc); background: rgba(35, 165, 89, 0.1); }
        #private-list { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 8px; border-top: 1px solid #111; padding-top: 10px; overflow-y: auto; }
        #nav-me { position: absolute; bottom: 20px; }

        .main { flex-grow: 1; background: #111; display: flex; flex-direction: column; }
        
        /* 修正：右上角 Tag 左右橫排 */
        header { height: 55px; border-bottom: 1px solid #222; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; background: #0a0a0a; }
        .stat-group { display: flex; flex-direction: row; gap: 8px; } /* 強制橫排 */
        .stat-tag { background: #151515; padding: 4px 10px; border-radius: 5px; font-size: 11px; color: #fff; border: 1px solid #333; font-weight: 900; white-space: nowrap; }
        .stat-tag b { color: var(--acc); }

        #chat-flow { flex-grow: 1; overflow-y: auto; background: #0f0f0f; }
        .msg-row { display: flex; gap: 12px; padding: 10px 15px; }
        .pfp-mini { width: 38px; height: 38px; border-radius: 50%; overflow: hidden; flex-shrink: 0; cursor: pointer; aspect-ratio: 1/1; }
        .pfp-mini img { width: 100%; height: 100%; object-fit: cover; }
        .msg-author { color: var(--acc); font-size: 13px; font-weight: 900; margin-bottom: 2px; }

        /* 盾牌：密碼修改回歸 */
        .me-view { padding: 25px; overflow-y: auto; width: 100%; height: 100%; }
        .me-card { background: #161616; border-radius: 20px; padding: 20px; border: 1px solid #222; margin-bottom: 20px; }
        .pfp-l { width: 80px; height: 80px; border-radius: 50%; border: 3px solid var(--acc); overflow: hidden; aspect-ratio: 1/1; }
        .pfp-l img { width: 100%; height: 100%; object-fit: cover; }
        .v667-field { width: 100%; background: #0a0a0a; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 10px; outline: none; margin-bottom: 10px; }
        .v667-btn { background: var(--acc); color: #fff; border: none; padding: 10px 20px; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 5px; }
        #pw-section { display: none; margin-top: 15px; border-top: 1px solid #333; padding-top: 15px; }

        .input-area { padding: 12px 15px; border-top: 1px solid #222; background: #0a0a0a; display: flex; gap: 10px; }
        .input-wrap { flex-grow: 1; background: #1a1a1a; border: 1px solid #333; border-radius: 25px; display: flex; align-items: center; padding: 0 15px; }
        .input-wrap input { flex-grow: 1; background: transparent; border: none; color: #fff; padding: 10px 0; outline: none; }

        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:1000; align-items:center; justify-content:center; backdrop-filter:blur(10px); }
        .user-card { width: 310px; background: #111; border-radius: 25px; border: 1px solid #333; overflow: hidden; }
        .card-pfp { width: 90px; height: 90px; border-radius: 50%; border: 6px solid #111; margin: -45px auto 0; overflow: hidden; aspect-ratio: 1/1; }
        .card-pfp img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

    <div id="toast-container"></div>

    <section id="s-intro" class="screen active" style="background:#fff;">
        <div style="font-weight:900; font-size:80px; letter-spacing:-4px; color:#000;">Tacker</div>
        <button onmousedown="handleEnter()" style="margin-top:40px; padding:15px 70px; background:#000; color:#fff; border-radius:50px; border:none; font-weight:bold; cursor:pointer;">進入系統</button>
    </section>

    <section id="s-login" class="screen" style="background:#f4f4f4;">
        <div style="background:#fff; width:320px; padding:35px; border-radius:25px;">
            <h2 style="color:#000; margin:0 0 25px; font-weight:900;">驗證</h2>
            <input id="u-id" placeholder="帳號 ID" class="v667-field" style="color:#000; border-color:#eee;">
            <input id="u-pw" type="password" placeholder="密碼" class="v667-field" style="color:#000; border-color:#eee;">
            <button onmousedown="auth()" style="width:100%;" class="v667-btn">登入</button>
        </div>
    </section>

    <section id="s-app" class="screen">
        <div style="display:flex; height:100%; width:100%;">
            <nav class="rail">
                <div onmousedown="tab('chat')" id="nav-chat" class="nav-icon active"><i class="fa-solid fa-earth-asia"></i></div>
                <div id="private-list"></div>
                <div onmousedown="tab('me')" id="nav-me" class="nav-icon"><i class="fa-solid fa-shield-halved"></i></div>
            </nav>
            
            <main id="chat-tab" class="main">
                <header>
                    <b style="font-size:18px;">全球大廳</b>
                    <div class="stat-group">
                        <div class="stat-tag">用戶數量: <b id="total-u">0</b></div>
                        <div class="stat-tag">在線人數: <b id="online-u">0</b></div>
                    </div>
                </header>
                <div id="chat-flow"><div id="messages"></div></div>
                <div class="input-area">
                    <label for="f-in" style="font-size:24px; color:#555; cursor:pointer;"><i class="fa-solid fa-circle-plus"></i></label>
                    <input type="file" id="f-in" style="display:none;" onchange="handleFile(this)">
                    <div class="input-wrap">
                        <input id="m-input" placeholder="撰寫訊息..." onkeypress="if(event.key==='Enter') send()">
                        <i class="fa-solid fa-paper-plane" onmousedown="send()" style="color:var(--acc); cursor:pointer;"></i>
                    </div>
                </div>
            </main>

            <main id="me-tab" class="main" style="display:none;">
                <div class="me-view">
                    <div class="me-card">
                        <div style="display:flex; align-items:center; gap:20px; margin-bottom:20px;">
                            <div class="pfp-l"><img id="me-img" src=""></div>
                            <div>
                                <input type="file" id="pfp-up" style="display:none;" onchange="uploadPfp(this)">
                                <button onmousedown="document.getElementById('pfp-up').click()" class="v667-btn" style="padding:6px 12px; font-size:11px;">更換頭像</button>
                                <h3 id="me-name-display" style="margin:5px 0 0;">使用者</h3>
                            </div>
                        </div>
                        <label style="font-size:11px; color:#555; font-weight:bold;">顯示名稱</label>
                        <input id="me-name-in" class="v667-field">
                        <label style="font-size:11px; color:#555; font-weight:bold;">自我介紹</label>
                        <textarea id="me-bio-in" class="v667-field" style="height:80px; resize:none;"></textarea>
                        <button onmousedown="updateProfile()" class="v667-btn" style="width:100%;">儲存資訊</button>
                    </div>

                    <div class="me-card">
                        <button onmousedown="togglePw()" class="v667-btn" style="background:#333; width:100%; text-align:left;">更改安全密碼</button>
                        <div id="pw-section">
                            <input id="pw-old" type="password" placeholder="舊密碼" class="v667-field">
                            <input id="pw-new" type="password" placeholder="新密碼" class="v667-field">
                            <input id="pw-cfm" type="password" placeholder="確認新密碼" class="v667-field">
                            <button onmousedown="updatePw()" class="v667-btn">更新密碼</button>
                        </div>
                    </div>
                    <button onmousedown="logout()" style="width:100%; background:var(--danger);" class="v667-btn">登出系統</button>
                </div>
            </main>
        </div>
    </section>

    <div id="user-modal" class="modal" onclick="this.style.display='none'">
        <div class="user-card" onclick="event.stopPropagation()">
            <div style="height:80px; background:linear-gradient(45deg, #23a559, #1a7a42);"></div>
            <div style="padding: 0 20px 25px; text-align: center;">
                <div class="card-pfp" id="modal-pfp"></div>
                <div id="modal-name" style="font-size:22px; font-weight:900; color:#fff; margin-top:15px;"></div>
                <div id="modal-uid" style="font-size:10px; color:var(--sub); margin-bottom:10px;"></div>
                <div id="modal-bio" style="color:#aaa; font-size:14px; margin-bottom:20px;"></div>
                <button id="dm-btn" style="width:100%; padding:14px; background:var(--acc); color:#fff; border:none; border-radius:12px; font-weight:bold; cursor:pointer;">發送私訊邀請</button>
            </div>
        </div>
    </div>

    <script>
        const config = { apiKey: "AIzaSyB56chNeodbgAYa8k3xspOOAMYt6C5M4cw", databaseURL: "https://tacker-ebc5a-default-rtdb.firebaseio.com", projectId: "tacker-ebc5a" };
        firebase.initializeApp(config);
        const db = firebase.database();
        let me = null;

        function osToast(m) {
            const c = document.getElementById('toast-container');
            const t = document.createElement('div'); t.className = 'os-toast'; t.innerText = m;
            c.appendChild(t); setTimeout(() => t.remove(), 3000);
        }

        function handleEnter() {
            const s = localStorage.getItem('tacker_session');
            if(s) { me = JSON.parse(s); initApp(); } else go('s-login');
        }

        async function auth() {
            const id = document.getElementById('u-id').value.trim();
            const pw = document.getElementById('u-pw').value.trim();
            const s = await db.ref(`users/${id}`).get();
            if(s.exists() && s.val().temp_pw === pw) {
                me = { uid: id, ...s.val() };
                localStorage.setItem('tacker_session', JSON.stringify(me));
                initApp();
            } else osToast("驗證失敗");
        }

        function initApp() {
            go('s-app');
            listenGlobal(); listenStats(); listenDMRequests();
            document.getElementById('me-img').src = me.pfp || '';
            document.getElementById('me-name-display').innerText = me.full_name;
            document.getElementById('me-name-in').value = me.full_name;
            document.getElementById('me-bio-in').value = me.bio || '';
        }

        function go(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
        function tab(t) {
            document.getElementById('chat-tab').style.display = t==='chat'?'flex':'none';
            document.getElementById('me-tab').style.display = t==='me'?'block':'none';
            document.querySelectorAll('.nav-icon').forEach(i => i.classList.remove('active'));
            document.getElementById(t==='chat'?'nav-chat':'nav-me').classList.add('active');
        }

        function togglePw() { const s = document.getElementById('pw-section'); s.style.display = s.style.display==='block'?'none':'block'; }

        async function uploadPfp(input) {
            const f = input.files[0]; if(!f) return;
            const r = new FileReader();
            r.onload = async (e) => {
                await db.ref(`users/${me.uid}`).update({ pfp: e.target.result });
                me.pfp = e.target.result;
                document.getElementById('me-img').src = me.pfp;
                localStorage.setItem('tacker_session', JSON.stringify(me));
                osToast("頭像已更新");
            };
            r.readAsDataURL(f);
        }

        async function updatePw() {
            const o = document.getElementById('pw-old').value;
            const n = document.getElementById('pw-new').value;
            if(o === me.temp_pw && n.length >= 4) {
                await db.ref(`users/${me.uid}`).update({ temp_pw: n });
                osToast("密碼已更新，請重新登入"); logout();
            } else osToast("輸入錯誤");
        }

        async function updateProfile() {
            const n = document.getElementById('me-name-in').value;
            const b = document.getElementById('me-bio-in').value;
            await db.ref(`users/${me.uid}`).update({ full_name: n, bio: b });
            me.full_name = n; me.bio = b;
            document.getElementById('me-name-display').innerText = n;
            localStorage.setItem('tacker_session', JSON.stringify(me));
            osToast("資訊已儲存");
        }

        function listenGlobal() {
            db.ref('chats/global').limitToLast(40).on('value', snap => {
                const box = document.getElementById('messages'); box.innerHTML = '';
                snap.forEach(d => {
                    const m = d.val();
                    box.innerHTML += `<div class="msg-row">
                        <div class="pfp-mini" onmousedown="showUser('${m.uid}')"><img src="${m.pfp || ''}"></div>
                        <div><div class="msg-author">${m.u}</div><div style="color:#eee; font-size:14px;">${m.t}</div></div>
                    </div>`;
                });
                document.getElementById('chat-flow').scrollTop = document.getElementById('chat-flow').scrollHeight;
            });
        }

        async function showUser(uid) {
            if(uid === me.uid) return;
            const s = await db.ref(`users/${uid}`).get();
            const u = s.val();
            document.getElementById('modal-name').innerText = u.full_name;
            document.getElementById('modal-uid').innerText = "UID: " + uid;
            document.getElementById('modal-bio').innerText = u.bio || "Tacker 會員";
            document.getElementById('modal-pfp').innerHTML = `<img src="${u.pfp || ''}">`;
            document.getElementById('dm-btn').onclick = async () => {
                // 發送私訊邀請至對方的專屬路徑
                await db.ref(`dm_requests/${uid}/${me.uid}`).set({ 
                    fromName: me.full_name, 
                    fromPfp: me.pfp || '', 
                    ts: Date.now() 
                });
                osToast("邀請已發送");
                document.getElementById('user-modal').style.display = 'none';
            };
            document.getElementById('user-modal').style.display = 'flex';
        }

        // 監聽邀請，顯示在側邊欄
        function listenDMRequests() {
            db.ref(`dm_requests/${me.uid}`).on('value', snap => {
                const list = document.getElementById('private-list');
                list.innerHTML = '';
                snap.forEach(d => {
                    const r = d.val();
                    const icon = document.createElement('div');
                    icon.className = 'nav-icon';
                    icon.innerHTML = `<img src="${r.fromPfp}" title="${r.fromName}">`;
                    icon.onmousedown = () => osToast("與 " + r.fromName + " 的私訊模組尚未開啟");
                    list.appendChild(icon);
                });
            });
        }

        function listenStats() {
            db.ref('users').on('value', s => { document.getElementById('total-u').innerText = s.numChildren(); });
            db.ref('online_count').on('value', s => { document.getElementById('online-u').innerText = s.val() || 1; });
        }

        function send() {
            const i = document.getElementById('m-input'); if(!i.value.trim()) return;
            db.ref('chats/global').push({ u: me.full_name, uid: me.uid, pfp: me.pfp || '', t: i.value, ts: Date.now() });
            i.value = '';
        }

        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
