<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tacker | Next-Gen Communication</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --main-green: #00ff88; --bg-black: #0a0a0a; }
        body { margin: 0; background: var(--bg-black); color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        /* 登入卡片樣式 */
        #login-screen { height: 100vh; display: flex; justify-content: center; align-items: center; background: radial-gradient(circle, #1a1a1a 0%, #000 100%); }
        .login-card { background: #111; padding: 40px; border-radius: 20px; border: 1px solid var(--main-green); text-align: center; box-shadow: 0 0 20px rgba(0,255,136,0.2); }
        .btn-google { background: white; color: black; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-weight: bold; border: none; transition: 0.3s; }
        .btn-google:hover { transform: scale(1.05); box-shadow: 0 0 15px white; }

        /* 主程式樣式 (預設隱藏) */
        #main-app { display: none; height: 100vh; grid-template-columns: 260px 1fr; }
        .sidebar { background: #151515; border-right: 1px solid #222; padding: 20px; }
        .content { padding: 40px; }
        .status-online { color: var(--main-green); font-size: 14px; }
        
        /* 載入動畫 */
        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; display: flex; justify-content: center; align-items: center; z-index: 9999; }
    </style>
</head>
<body>

    <div id="loader"><h1>TACKER LOADING...</h1></div>

    <div id="login-screen">
        <div class="login-card">
            <h1 style="color: var(--main-green); letter-spacing: 5px;">TACKER</h1>
            <p>請使用 Google 帳號啟動通訊系統</p>
            <button class="btn-google" onclick="signInWithGoogle()">Login with Google</button>
        </div>
    </div>

    <div id="main-app">
        <div class="sidebar">
            <h2 style="color: var(--main-green);">Tacker</h2>
            <div id="user-info">
                <p id="user-name">載入中...</p>
                <span class="status-online">● 系統在線</span>
            </div>
            <hr style="border: 0.5px solid #333; margin: 20px 0;">
            <button onclick="signOut()" style="background:none; border:1px solid red; color:red; cursor:pointer;">登出系統</button>
        </div>
        <div class="content">
            <h1>歡迎回來，負責人</h1>
            <p>目前版本：v1.6.0 (穩定版)</p>
            <div id="app-status" style="padding: 20px; border: 1px dashed var(--main-green);">
                系統狀態：正常運行中
            </div>
        </div>
    </div>

    <script>
        // --- 初始化 Supabase ---
        const _s = supabase.createClient(
            'https://coyiifxxfopvabpjszis.supabase.co', 
            '你的_SUPABASE_ANON_KEY' // 負責人，請把這裡換成你的金鑰！
        );

        // --- 登入邏輯 ---
        async function signInWithGoogle() {
            const { error } = await _s.auth.signInWithOAuth({
                provider: 'google',
                options: {
                    // 這裡一定要對齊你的 GitHub 網址！
                    redirectTo: 'https://ryfn1998-hash.github.io/Tacker/'
                }
            });
            if (error) console.error('登入失敗:', error.message);
        }

        // --- 登出邏輯 ---
        async function signOut() {
            await _s.auth.signOut();
            location.reload();
        }

        // --- 狀態檢查 (核心邏輯) ---
        async function checkStatus() {
            const { data: { session } } = await _s.auth.getSession();
            const loader = document.getElementById('loader');
            const loginScreen = document.getElementById('login-screen');
            const mainApp = document.getElementById('main-app');

            if (session) {
                // 已登入：顯示主程式，隱藏登入頁
                loginScreen.style.display = 'none';
                mainApp.style.display = 'grid';
                document.getElementById('user-name').innerText = session.user.user_metadata.full_name || '使用者';
            } else {
                // 未登入：顯示登入頁，隱藏主程式
                loginScreen.style.display = 'flex';
                mainApp.style.display = 'none';
            }
            loader.style.display = 'none'; // 關閉載入動畫
        }

        // 網頁開啟後立刻執行檢查
        window.onload = checkStatus;
    </script>
</body>
</html>
