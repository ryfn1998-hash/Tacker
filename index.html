<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tacker | Neural Network v1.0.1</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-main: #313338;
            --bg-sidebar: #2b2d31;
            --bg-user: #232428;
            --discord-blurple: #5865f2;
            --text-muted: #b5bac1;
            --online-green: #23a55a;
        }
        * { box-sizing: border-box; }
        body { margin: 0; background: var(--bg-main); color: white; font-family: 'gg sans', 'Noto Sans TC', sans-serif; height: 100vh; overflow: hidden; }

        /* --- 登入畫面 --- */
        #login-screen { height: 100vh; display: flex; justify-content: center; align-items: center; background: #1e1f22; }
        .login-card { background: var(--bg-sidebar); padding: 32px; border-radius: 8px; box-shadow: 0 8px 16px rgba(0,0,0,0.2); width: 100%; max-width: 480px; text-align: center; }
        .btn-login { width: 100%; background: var(--discord-blurple); color: white; border: none; padding: 12px; border-radius: 3px; font-size: 16px; cursor: pointer; font-weight: 500; margin-top: 20px; }

        /* --- P1: 註冊 ID 畫面 (照紙稿) --- */
        #registration-screen { display: none; height: 100vh; justify-content: center; align-items: center; background: #1e1f22; }
        .reg-input { width: 100%; background: #1e1f22; border: 1px solid #1e1f22; padding: 10px; color: white; border-radius: 3px; margin: 10px 0; outline: none; }
        .reg-input:focus { border: 1px solid var(--discord-blurple); }

        /* --- P2: 主介面 (圖一/圖三) --- */
        #main-app { display: none; height: 100vh; grid-template-columns: 240px 1fr; }
        .sidebar { background: var(--bg-sidebar); display: flex; flex-direction: column; border-right: 1px solid #1e1f22; }
        .friend-list { flex: 1; padding: 20px; color: var(--text-muted); font-size: 14px; text-align: center; }
        
        /* 底部個資卡 (圖一左下) */
        .user-footer { background: var(--bg-user); padding: 8px 12px; display: flex; align-items: center; gap: 10px; position: absolute; bottom: 0; width: 240px; }
        .avatar-sm { width: 32px; height: 32px; border-radius: 50%; background: #555; object-fit: cover; }
        .user-meta { font-size: 12px; overflow: hidden; }

        .chat-area { display: flex; flex-direction: column; background: var(--bg-main); }
        .chat-empty { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; color: var(--text-muted); }
        
        /* 打字區 (圖三底部) */
        .input-bar { padding: 0 20px 24px; }
        .input-box { background: #383a40; border-radius: 8px; padding: 10px 15px; display: flex; align-items: center; gap: 12px; }
        .input-box input { flex: 1; background: transparent; border: none; color: white; outline: none; }
        .btn-plus { color: var(--text-muted); font-size: 20px; cursor: pointer; }

        #loader { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; justify-content: center; align-items: center; color: var(--online-green); font-size: 12px; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div id="loader">TACKER SYSTEM LOADING...</div>

    <div id="login-screen">
        <div class="login-card">
            <h2>歡迎回來！</h2>
            <p style="color: var(--text-muted);">請使用 Google 帳號進行身份驗證</p>
            <button class="btn-login" onclick="signIn()">使用 Google 登入 / 註冊</button>
        </div>
    </div>

    <div id="registration-screen">
        <div class="login-card">
            <h2 style="color: var(--online-green);">初始化 Tacker ID</h2>
            <p style="color: var(--text-muted); font-size: 14px;">請設定您的專屬識別碼（註冊後不可更改）</p>
            <input type="text" id="reg-id" class="reg-input" placeholder="帳號 ID (例如: ryfn1998)">
            <button class="btn-login" style="background: var(--online-green);" onclick="completeRegistration()">確認並進入系統</button>
        </div>
    </div>

    <div id="main-app">
        <div class="sidebar">
            <div class="friend-list">
                <div style="margin-top: 40px; opacity: 0.5;">目前沒有好友 :)</div>
                <button onclick="alert('圖二：加好友功能開發中')" style="background:none; border:none; color:var(--online-green); margin-top:20px; cursor:pointer;">➕ 新增好友</button>
            </div>
            <div class="user-footer">
                <img id="my-avatar" class="avatar-sm" src="">
                <div class="user-meta">
                    <div id="my-name" style="font-weight: bold; white-space: nowrap; text-overflow: ellipsis; overflow: hidden;"></div>
                    <div id="my-id" style="color: var(--text-muted); font-size: 11px;"></div>
                </div>
                <div style="margin-left: auto; cursor:pointer; opacity: 0.5;" onclick="signOut()">🚪</div>
            </div>
        </div>

        <div class="chat-area">
            <div class="chat-empty">
                <div style="font-size: 60px; opacity: 0.1; font-weight: bold;">#</div>
                <p>因為你沒有在任何頻道</p>
            </div>
            <div class="input-bar">
                <div class="input-box">
                    <span class="btn-plus" onclick="alert('上傳檔案 (限制 10MB 以內)')">⊕</span>
                    <input type="text" placeholder="傳送訊息到 Tacker">
                    <span style="cursor:pointer;" onclick="alert('發送訊息')">🚀</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const _s = supabase.createClient(
            'https://coyiifxxfopvabpjszis.supabase.co', 
            'Sb_publishable_ZaDrVW5Goe5QFqL4rBvNCg_JrwHKIFH'
        );

        async function signIn() {
            const { error } = await _s.auth.signInWithOAuth({
                provider: 'google',
                options: { redirectTo: window.location.href }
            });
            if (error) alert('登入失敗：' + error.message);
        }

        async function signOut() {
            await _s.auth.signOut();
            location.reload();
        }

        async function checkStatus() {
            const { data: { session } } = await _s.auth.getSession();
            const loader = document.getElementById('loader');
            
            if (session) {
                // 1. 檢查 Profiles 表
                const { data: profile } = await _s
                    .from('profiles')
                    .select('*')
                    .eq('id', session.user.id)
                    .maybeSingle();

                if (profile && profile.tacker_id) {
                    // 已註冊 ID -> 進入主介面 P2
                    showApp(session.user, profile);
                } else {
                    // 未註冊 ID -> 進入註冊介面 P1
                    document.getElementById('login-screen').style.display = 'none';
                    document.getElementById('registration-screen').style.display = 'flex';
                }
            } else {
                // 未登入 -> 顯示登入頁
                document.getElementById('login-screen').style.display = 'flex';
            }
            loader.style.display = 'none';
        }

        function showApp(user, profile) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('registration-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'grid';
            document.getElementById('my-name').innerText = user.user_metadata.full_name || "無名負責人";
            document.getElementById('my-id').innerText = "@" + profile.tacker_id;
            document.getElementById('my-avatar').src = user.user_metadata.avatar_url || "";
        }

        async function completeRegistration() {
            const rawId = document.getElementById('reg-id').value;
            // 照紙稿要求：小寫英文+數字
            const cleanId = rawId.toLowerCase().replace(/[^a-z0-9]/g, '');
            
            if (!cleanId || cleanId.length < 3) {
                return alert('請輸入至少 3 個字元的合法 ID (小寫英文或數字)');
            }

            const { data: { user } } = await _s.auth.getUser();
            
            // 寫入資料庫
            const { error } = await _s.from('profiles').upsert({
                id: user.id,
                tacker_id: cleanId,
                full_name: user.user_metadata.full_name,
                avatar_url: user.user_metadata.avatar_url
            });

            if (error) {
                alert('註冊失敗：' + error.message + '\n請確認資料表 profiles 是否已建立。');
            } else {
                location.reload();
            }
        }

        window.onload = checkStatus;
    </script>
</body>
</html>
