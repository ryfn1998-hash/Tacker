<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tacker | Developer Preview</title>
    <style>
        :root { --bg-p: #313338; --bg-s: #2b2d31; --bg-t: #232428; --brand: #5865f2; --text: #dbdee1; --muted: #b5bac1; }
        body { margin: 0; background: var(--bg-p); color: white; font-family: sans-serif; height: 100vh; overflow: hidden; }
        .hidden { display: none !important; }
        
        /* 測試用登入頁 */
        .dev-auth { height: 100vh; display: flex; justify-content: center; align-items: center; background: #1e1f22; flex-direction: column; }
        .card { background: var(--bg-s); padding: 40px; border-radius: 8px; text-align: center; width: 300px; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; margin-top: 10px; }

        /* 主介面 (遵照 P1 手稿) */
        #main-app { display: none; height: 100vh; grid-template-columns: 240px 1fr; }
        .sidebar { background: var(--bg-s); border-right: 1px solid #1e1f22; display: flex; flex-direction: column; position: relative; }
        .user-status { background: var(--bg-t); padding: 10px; position: absolute; bottom: 0; width: 100%; display: flex; align-items: center; gap: 10px; border-top: 1px solid #1e1f22; cursor: pointer; }
        .avatar { width: 32px; height: 32px; border-radius: 50%; background: #5865f2; }

        /* 聊天區域 */
        .chat-view { display: flex; flex-direction: column; }
        .msg-flow { flex: 1; padding: 20px; display: flex; flex-direction: column; justify-content: center; align-items: center; opacity: 0.2; }
        .input-area { padding: 20px; }
        .input-box { background: #383a40; border-radius: 8px; padding: 12px; display: flex; align-items: center; gap: 10px; }

        /* 設定頁面彈窗 (圖二內容) */
        #settings-page { display: none; position: fixed; inset: 0; background: var(--bg-p); z-index: 100; padding: 40px; }
        .set-item { margin-bottom: 20px; padding: 15px; background: var(--bg-s); border-radius: 8px; }
    </style>
</head>
<body>

    <div id="dev-gate" class="dev-auth">
        <div class="card">
            <h2>Tacker 預覽模式</h2>
            <p style="font-size:12px; color:var(--muted);">跳過驗證，直接檢查 UI</p>
            <button class="btn" style="background:var(--brand); color:white;" onclick="enterApp()">進入查看內部介面</button>
        </div>
    </div>

    <div id="main-app">
        <aside class="sidebar">
            <div style="padding:20px; color:var(--muted); text-align:center;">好友列表</div>
            <div class="user-status" onclick="openSettings()">
                <div class="avatar"></div>
                <div style="font-size:12px;">
                    <div style="font-weight:bold;">測試管理員</div>
                    <div style="color:var(--muted);">@dev_admin</div>
                </div>
            </div>
        </aside>
        <main class="chat-view">
            <div class="msg-flow">
                <div style="font-size:80px;">#</div>
                <p>因為你沒有在任何頻道 :/</p>
            </div>
            <div class="input-area">
                <div class="input-box">
                    <span style="color:var(--muted);">⊕</span>
                    <input type="text" placeholder="鍵入訊息..." style="background:transparent; border:none; flex:1; color:white; outline:none;">
                    <button style="background:none; border:none; color:var(--brand); font-weight:bold;">發送</button>
                </div>
            </div>
        </main>
    </div>

    <div id="settings-page">
        <div style="max-width: 600px; margin: 0 auto;">
            <button onclick="closeSettings()" style="background:none; color:var(--brand); border:none; cursor:pointer; margin-bottom:20px;">← 返回對話</button>
            <h1>使用者設定</h1>
            
            <div class="set-item">
                <h3>基本資訊</h3>
                <p style="color:var(--muted);">顯示名稱：測試管理員</p>
                <p style="color:var(--muted);">帳號 ID：dev_admin</p>
            </div>

            <div class="set-item">
                <h3>外觀設定</h3>
                <button class="btn" style="width:auto; background:#4e5058; color:white;">更換頭像</button>
                <button class="btn" style="width:auto; background:#4e5058; color:white; margin-left:10px;">更換橫幅</button>
            </div>

            <div class="set-item">
                <h3>帳戶安全</h3>
                <button class="btn" style="width:auto; background:#f23f43; color:white;">登出帳號</button>
                <button class="btn" style="width:auto; background:none; border:1px solid #f23f43; color:#f23f43; margin-left:10px;">移除帳戶</button>
            </div>
        </div>
    </div>

    <script>
        function enterApp() {
            document.getElementById('dev-gate').style.display = 'none';
            document.getElementById('main-app').style.display = 'grid';
        }
        function openSettings() {
            document.getElementById('settings-page').style.display = 'block';
        }
        function closeSettings() {
            document.getElementById('settings-page').style.display = 'none';
        }
    </script>
</body>
</html>
