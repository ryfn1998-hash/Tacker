<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tacker | Official</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #313338; --side: #2b2d31; --dark: #1e1f22; --accent: #5865f2; --text: #f2f3f5; --muted: #949ba4; }
        * { box-sizing: border-box; font-family: sans-serif; margin: 0; padding: 0; }
        body { background: var(--dark); color: var(--text); height: 100vh; overflow: hidden; display: flex; align-items: center; justify-content: center; }

        /* 介面切換 */
        .hidden { display: none !important; }
        .full-screen { position: fixed; inset: 0; background: var(--bg); z-index: 100; display: flex; align-items: center; justify-content: center; }

        /* 註冊卡片 (P1) */
        .auth-card { background: var(--side); padding: 30px; border-radius: 8px; width: 400px; text-align: center; }
        .input-group { text-align: left; margin-top: 15px; }
        .input-group label { font-size: 12px; color: var(--muted); font-weight: bold; }
        input { width: 100%; padding: 10px; background: var(--dark); border: none; color: white; margin-top: 5px; border-radius: 4px; }

        /* 主畫面佈局 (圖一/圖三) */
        #app { display: none; width: 100vw; height: 100vh; }
        aside { width: 240px; background: var(--side); display: flex; flex-direction: column; }
        main { flex: 1; background: var(--bg); position: relative; display: flex; flex-direction: column; }

        /* 個人資訊欄 (P1) */
        .user-bar { padding: 10px; background: #232428; display: flex; align-items: center; gap: 10px; font-size: 13px; }
        .pfp { width: 32px; height: 32px; border-radius: 50%; background: var(--accent); }

        /* 聊天室 (圖三) */
        #chat-view { display: none; flex: 1; flex-direction: column; }
        .input-area { padding: 20px; display: flex; gap: 10px; align-items: center; }
        .msg-box { flex: 1; background: #383a40; border-radius: 8px; padding: 10px; display: flex; align-items: center; }
        .msg-box input { margin: 0; padding: 0; background: transparent; }

        /* 彈窗 (圖二) */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 200; }
    </style>
</head>
<body>

    <div id="login-screen" class="full-screen">
        <div class="auth-card">
            <h2>Tacker</h2>
            <button onclick="login()" style="width:100%; padding:12px; margin-top:20px; cursor:pointer;">Google 一鍵登入</button>
        </div>
    </div>

    <div id="setup-screen" class="full-screen hidden">
        <div class="auth-card">
            <h3>完善註冊資料</h3>
            <div class="input-group">
                <label>顯示名稱</label>
                <input type="text" id="set-name" placeholder="例如: 暗影">
            </div>
            <div class="input-group">
                <label>帳號 ID (英文與數字)</label>
                <input type="text" id="set-id" placeholder="例如: ryfn888">
            </div>
            <button onclick="saveProfile()" style="width:100%; padding:12px; background:var(--accent); color:white; border:none; margin-top:20px; cursor:pointer;">完成註冊</button>
        </div>
    </div>

    <div id="app">
        <aside>
            <div style="padding:15px; font-weight:bold;">目前沒有好友</div>
            <div style="flex:1; padding:10px;">
                <div onclick="showAddFriend()" style="cursor:pointer; color:var(--muted);">目前沒有好友 ⊕</div>
                <div id="friend-list"></div>
            </div>
            <div class="user-bar">
                <div class="pfp"></div>
                <div style="flex:1">
                    <b id="my-name">User</b><br>
                    <small id="my-id" style="color:var(--muted)">ID: ---</small>
                </div>
                <span style="cursor:pointer" onclick="alert('進入 P1 自訂設定頁')">✏️</span>
            </div>
        </aside>
        
        <main>
            <div id="empty-ui" style="text-align:center; margin:auto;">
                <div style="font-size:50px; opacity:0.3;">#</div>
                <h3>這裡什麼都沒有 :/</h3>
                <p style="color:var(--muted)">因為你沒有在任何頻道</p>
            </div>

            <div id="chat-view">
                <div id="msgs" style="flex:1; padding:20px; overflow-y:auto;"></div>
                <div class="input-area">
                    <div class="msg-box">
                        <span style="cursor:pointer; padding-right:10px;" onclick="document.getElementById('f').click()">⊕</span>
                        <input type="text" id="msg-in" placeholder="發送訊息..." onkeypress="if(event.key==='Enter')send()">
                        <button onclick="send()" style="background:none; border:none; color:var(--accent); cursor:pointer;">➤</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="add-modal" class="modal">
        <div class="auth-card">
            <h3>新增好友</h3>
            <input type="text" id="target-id" placeholder="輸入對方帳號 ID">
            <button onclick="addFriend()" style="margin-top:15px; padding:10px 20px; background:var(--accent); color:white; border:none; border-radius:4px;">確認 ✓</button>
            <button onclick="closeModal()" style="background:none; border:none; color:white; margin-left:10px;">取消</button>
        </div>
    </div>

    <input type="file" id="f" class="hidden" onchange="checkFile(this)">

    <script>
        const _s = supabase.createClient('https://coyiifxxfopvabpjszis.supabase.co', 'sb_publishable_ZaDrVW5Goe5QFqL4rBvNCg_JrwHKIFH');

        async function login() {
            await _s.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: window.location.href } });
        }

        async function checkUser() {
            const { data: { user } } = await _s.auth.getUser();
            if (!user) return;
            
            document.getElementById('login-screen').classList.add('hidden');
            // 這裡模擬：如果沒設定過 ID 就顯示補完畫面
            document.getElementById('setup-screen').classList.remove('hidden');
            document.getElementById('set-name').value = user.user_metadata.full_name;
        }

        function saveProfile() {
            const id = document.getElementById('set-id').value;
            const name = document.getElementById('set-name').value;
            if(!/^[a-zA-Z0-9]+$/.test(id)) return alert("ID 只能用英文數字！");

            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('app').style.display = 'flex';
            document.getElementById('my-name').innerText = name;
            document.getElementById('my-id').innerText = "ID: " + id;
        }

        function showAddFriend() { document.getElementById('add-modal').style.display = 'flex'; }
        function closeModal() { document.getElementById('add-modal').style.display = 'none'; }

        function addFriend() {
            const tid = document.getElementById('target-id').value;
            alert("請求已發送至 " + tid);
            closeModal();
            // 模擬接受後出現在左側 (圖三)
            const list = document.getElementById('friend-list');
            list.innerHTML += `<div style="padding:10px; cursor:pointer;" onclick="startChat('${tid}')">👤 ${tid}</div>`;
        }

        function startChat(name) {
            document.getElementById('empty-ui').classList.add('hidden');
            document.getElementById('chat-view').style.display = 'flex';
        }

        function checkFile(input) {
            if (input.files[0].size > 10 * 1024 * 1024) {
                alert("檔案超過 10MB！無法傳送。");
                input.value = "";
            } else {
                alert("檔案已準備好 (10MB 以內)");
            }
        }

        window.onload = checkUser;
    </script>
</body>
</html>
