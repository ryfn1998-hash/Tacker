<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tacker</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        :root { --bg: #000; --card: #111; --acc: #23a559; --official: #f1c40f; --text: #fff; --sub: #888; --danger: #f23f43; }
        * { box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
        body, html { margin:0; padding:0; height:100%; background:var(--bg); color:var(--text); overflow:hidden; }

        .screen { position: absolute; width: 100%; height: 100%; display: none; flex-direction: column; z-index: 10; }
        .active { display: flex; }

        /* --- 還原原始開場動畫 --- */
        #s-home { background: #fff; color: #000; align-items: center; justify-content: center; text-align: center; }
        .big-tacker { font-weight: 900; transform: scale(10); opacity: 0; animation: zoomIn 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes zoomIn { 0% { transform: scale(12); opacity: 0; } 100% { transform: scale(1); opacity: 1; font-size: clamp(60px, 15vw, 100px); letter-spacing: 2px; } }
        .float-btn { margin-top: 50px; padding: 18px 60px; background: #000; color: #fff; border: none; border-radius: 50px; font-size: 18px; font-weight: bold; cursor: pointer; opacity: 0; transform: translateY(30px); animation: fadeUp 0.8s 1s forwards; transition: 0.3s; }
        @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

        /* --- 還原主導航佈局 --- */
        .rail { width: 65px; background: #050505; flex-shrink: 0; display: flex; flex-direction: column; align-items: center; padding: 25px 0; gap: 20px; border-right: 1px solid #222; overflow-y: auto; }
        .main { flex-grow: 1; background: #111; display: flex; flex-direction: column; }
        
        .badge-box { font-size: 10px; display: flex; gap: 6px; }
        .badge { background: rgba(255,255,255,0.05); padding: 4px 10px; border-radius: 20px; color: var(--sub); border: 1px solid #222; }
        .badge b { color: var(--acc); }

        .dm-nav { width: 45px; height: 45px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; position: relative; flex-shrink: 0; }
        .dm-nav img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        .dm-nav.active { border-color: var(--acc); }
        .red-dot { position: absolute; top: 0; right: 0; width: 12px; height: 12px; background: var(--danger); border-radius: 50%; border: 2px solid #000; display: none; }

        .msg-row { display: flex; gap: 12px; margin-bottom: 22px; padding: 0 15px; }
        .pfp { width: 44px; height: 44px; border-radius: 50%; background: #222; overflow: hidden; cursor: pointer; border: 1px solid #333; flex-shrink: 0; }
        .pfp img { width: 100%; height: 100%; object-fit: cover; }
        .msg-img { max-width: 85%; max-height: 350px; border-radius: 10px; margin-top: 8px; border: 1px solid #333; display: block; }
        .del-icon { color: var(--danger); font-size: 12px; margin-left: 8px; cursor: pointer; opacity: 0.5; }

        .input-bar { padding: 12px; border-top: 1px solid #222; background: #0a0a0a; display: flex; gap: 12px; align-items: center; }
        .input-bar input { flex-grow: 1; padding: 12px; background: #1e1e1e; border: none; color: #fff; border-radius: 12px; outline: none; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; }
        .user-card { width: 300px; background: var(--card); border-radius: 20px; overflow: hidden; border: 1px solid #333; }
        
        /* --- 改密碼面板樣式 --- */
        .pwd-panel { background: #fff; color: #000; padding: 30px; border-radius: 15px; width: 300px; text-align: center; }
        .pwd-panel input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; }
        .pwd-panel button { width: 100%; padding: 12px; background: #000; color: #fff; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <section id="s-home" class="screen active">
        <div class="big-tacker">Tacker</div>
        <button class="float-btn" onclick="checkAuth()">進入 ——＞</button>
    </section>

    <section id="s-login" class="screen" style="background:#f5f5f5; align-items:center; justify-content:center;">
        <div style="background:#fff; width:320px; padding:35px; border-radius:15px; color:#333;">
            <h2 style="margin:0 0 25px; font-weight:800;">驗證身分</h2>
            <input id="u-id" placeholder="帳號 ID" style="width:100%; padding:14px; margin-bottom:12px; border:1px solid #ddd; border-radius:8px;">
            <input id="u-pw" type="password" placeholder="密碼" style="width:100%; padding:14px; margin-bottom:25px; border:1px solid #ddd; border-radius:8px;">
            <button onclick="auth()" style="width:100%; padding:15px; background:var(--acc); color:#fff; border:none; border-radius:8px; font-weight:bold; cursor:pointer;">登入 Tacker</button>
        </div>
    </section>

    <section id="s-load" class="screen" style="align-items:center; justify-content:center;">
        <div style="width:70%; height:4px; background:#222; border-radius:10px; overflow:hidden; margin-bottom:12px;">
            <div id="bar" style="width:0%; height:100%; background:var(--acc); transition:0.1s;"></div>
        </div>
        <div id="percent" style="font-size:12px; color:var(--sub);">同步雲端環境... 0%</div>
    </section>

    <section id="s-app" class="screen">
        <div style="display:flex; height:100%;">
            <nav class="rail">
                <div onclick="tab('chat')" id="nav-chat" style="color:var(--acc); font-size:24px; cursor:pointer;"><i class="fa-solid fa-earth-asia"></i></div>
                <div onclick="tab('me')" id="nav-me" style="color:#444; font-size:24px; cursor:pointer;"><i class="fa-solid fa-shield-halved"></i></div>
                <div style="width:30px; height:1px; background:#222; margin:5px 0;"></div>
                <div id="dm-list" style="display:flex; flex-direction:column; gap:15px; align-items:center;"></div>
            </nav>

            <main id="chat-tab" class="main">
                <header style="height:60px; border-bottom:1px solid #222; display:flex; align-items:center; padding:0 20px; justify-content:space-between;">
                    <b id="main-title" style="font-size:18px;">全球大廳</b>
                    <div class="badge-box">
                        <div class="badge">用戶 <b><span id="total-count">0</span></b></div>
                        <div class="badge">在線 <b><span id="online-count">0</span></b></div>
                        <i id="ban-icon" class="fa-solid fa-ban" style="display:none; cursor:pointer; color:#555;" onclick="toggleBan()"></i>
                    </div>
                </header>
                
                <div id="chat-flow" style="flex-grow:1; overflow-y:auto; padding-top:15px;">
                    <div id="messages"></div>
                </div>

                <div class="input-bar">
                    <label for="file-input"><i class="fa-solid fa-plus-circle" style="color:var(--sub); font-size:26px; cursor:pointer;"></i></label>
                    <input type="file" id="file-input" accept="image/*" style="display:none;" onchange="handleFile(this, 'chat')">
                    <input id="m-input" placeholder="在這裡說點什麼..." onkeypress="if(event.key==='Enter') send()">
                    <button onclick="send()" style="background:var(--acc); border:none; color:#fff; padding:10px 18px; border-radius:12px;"><i class="fa-solid fa-paper-plane"></i></button>
                </div>
            </main>

            <main id="me-tab" class="main" style="display:none; padding:25px; overflow-y:auto;">
                <h2 style="margin-bottom:30px; font-weight:800;">帳戶與安全</h2>
                <div style="text-align:center; margin-bottom:35px;">
                    <label for="pfp-input" style="cursor:pointer;"><div style="width:100px; height:100px; border-radius:50%; background:#222; overflow:hidden; border:3px solid var(--acc); margin:0 auto;"><img id="current-pfp" style="width:100%; height:100%; object-fit:cover;"></div></label>
                    <input type="file" id="pfp-input" accept="image/*" style="display:none;" onchange="handleFile(this, 'pfp')">
                </div>
                <div style="margin-bottom:20px;">
                    <label style="font-size:11px; color:var(--sub);">顯示名稱</label>
                    <input id="edit-name" style="width:100%; background:#1e1e1e; border:1px solid #333; color:#fff; padding:14px; border-radius:10px; margin-top:8px;">
                </div>
                <div style="margin-bottom:20px;">
                    <label style="font-size:11px; color:var(--sub);">安全設定</label>
                    <button onclick="openPwdModal()" style="width:100%; background:#333; border:none; color:#fff; padding:14px; border-radius:10px; margin-top:8px; font-weight:bold; cursor:pointer;">🔒 修改帳號密碼</button>
                </div>
                <button onclick="saveProfile()" style="width:100%; padding:16px; background:var(--acc); border:none; color:#fff; font-weight:bold; border-radius:12px; cursor:pointer;">儲存所有變更</button>
                <button onclick="logout()" style="width:100%; padding:16px; background:transparent; border:1px solid #333; color:var(--danger); font-weight:bold; border-radius:12px; margin-top:15px; cursor:pointer;">登出目前帳號</button>
            </main>
        </div>
    </section>

    <div id="pwd-modal" class="modal">
        <div id="pwd-step1" class="pwd-panel">
            <h3>驗證身分</h3>
            <input type="password" id="old-pw-input" placeholder="請輸入舊密碼">
            <button onclick="verifyOldPw()">驗證舊密碼</button>
            <p onclick="closePwdModal()" style="font-size:12px; cursor:pointer; margin-top:15px; color:#666;">取消</p>
        </div>
        <div id="pwd-step2" class="pwd-panel" style="display:none;">
            <h3>設定新密碼</h3>
            <input type="password" id="new-pw-input" placeholder="請輸入新密碼">
            <button onclick="submitNewPw()">確認更改</button>
        </div>
    </div>

    <div id="user-modal" class="modal" onclick="this.style.display='none'">
        <div class="user-card" onclick="event.stopPropagation()">
            <div id="modal-pfp" style="width:70px; height:70px; border-radius:50%; margin:20px auto; overflow:hidden; background:#000;"></div>
            <div style="padding:0 20px 25px; text-align:center;">
                <div id="modal-name" style="font-weight:800; font-size:22px;"></div>
                <button id="dm-btn" style="width:100%; padding:12px; background:var(--acc); border:none; color:#fff; border-radius:10px; margin-top:15px; font-weight:bold; cursor:pointer;">發起私訊</button>
            </div>
        </div>
    </div>

    <div id="dm-req-modal" class="modal">
        <div class="pwd-panel">
            <h3 id="dm-req-title">私訊請求</h3>
            <div style="display:flex; gap:10px; margin-top:20px;">
                <button id="dm-yes" style="background:var(--acc);">同意</button>
                <button id="dm-no" style="background:var(--danger);">拒絕</button>
            </div>
        </div>
    </div>

    <script>
        const config = { apiKey: "AIzaSyB56chNeodbgAYa8k3xspOOAMYt6C5M4cw", databaseURL: "https://tacker-ebc5a-default-rtdb.firebaseio.com", projectId: "tacker-ebc5a" };
        firebase.initializeApp(config);
        const db = firebase.database();
        let me = null, pendingImg = "", currentChat = "global";

        function checkAuth() { const saved = localStorage.getItem('tacker_session'); if(saved) { me = JSON.parse(saved); startLoad(); } else { go('s-login'); } }
        function go(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
        
        async function auth() {
            const uid = document.getElementById('u-id').value.trim(); const pw = document.getElementById('u-pw').value.trim();
            const s = await db.ref(`users/${uid}`).get();
            if(s.exists() && s.val().temp_pw === pw) { me = { uid, ...s.val() }; localStorage.setItem('tacker_session', JSON.stringify(me)); startLoad(); } else alert("帳號或密碼錯誤");
        }

        function startLoad() {
            go('s-load'); let p = 0;
            const t = setInterval(() => { p += 10; if(p >= 100) { clearInterval(t); initApp(); } 
            document.getElementById('bar').style.width = p + '%';
            document.getElementById('percent').innerText = `同步雲端環境... ${p}%`; }, 50);
        }

        function initApp() {
            go('s-app');
            db.ref(`presence/${me.uid}`).set(true); db.ref(`presence/${me.uid}`).onDisconnect().remove();
            db.ref('presence').on('value', s => document.getElementById('online-count').innerText = s.numChildren());
            db.ref('users').on('value', s => document.getElementById('total-count').innerText = s.numChildren());
            listenGlobal(); listenContacts(); listenRequests();
            document.getElementById('current-pfp').src = me.pfp || "";
            document.getElementById('edit-name').value = me.full_name;
        }

        function renderMsgs(snap) {
            const box = document.getElementById('messages'); box.innerHTML = '';
            snap.forEach(d => {
                const m = d.val(); const mid = d.key;
                const isImg = (m.t && m.t.startsWith('data:image'));
                const canDel = (m.uid === me.uid || me.role === 'admin');
                box.innerHTML += `
                    <div class="msg-row">
                        <div class="pfp" onclick="showUser('${m.uid}')"><img src="${m.pfp}"></div>
                        <div style="flex-grow:1">
                            <b style="color:var(--acc); font-size:12px;">${m.u}</b>
                            ${canDel ? `<i class="fa-solid fa-trash del-icon" onclick="deleteMsg('${mid}')"></i>` : ''}
                            ${isImg ? `<img src="${m.t}" class="msg-img">` : `<div style="color:#eee; font-size:15px; word-break:break-all;">${m.t}</div>`}
                        </div>
                    </div>`;
            });
            document.getElementById('chat-flow').scrollTop = document.getElementById('chat-flow').scrollHeight;
        }

        function deleteMsg(mid) {
            const path = currentChat === 'global' ? `chats/global/${mid}` : `chats/private/${getRid(currentChat)}/msgs/${mid}`;
            if(confirm("確定要刪除這條訊息嗎？")) db.ref(path).remove();
        }

        function listenGlobal() { db.ref('chats/global').off(); db.ref('chats/global').limitToLast(40).on('value', s => renderMsgs(s)); }
        function getRid(uid) { return [me.uid, uid].sort().join('_'); }

        async function showUser(uid) {
            if(uid === me.uid) return;
            const s = await db.ref(`users/${uid}`).get(); const u = s.val();
            document.getElementById('modal-name').innerText = u.full_name;
            document.getElementById('modal-pfp').innerHTML = `<img src="${u.pfp}" style="width:100%;height:100%;object-fit:cover;">`;
            document.getElementById('dm-btn').onclick = () => {
                if(confirm(`是否發送私訊權限請求給 ${u.full_name}？`)) {
                    db.ref(`dm_reqs/${uid}/${me.uid}`).set({ name: me.full_name, pfp: me.pfp });
                    alert("已發送請求！");
                }
            };
            document.getElementById('user-modal').style.display = 'flex';
        }

        function listenRequests() {
            db.ref(`dm_reqs/${me.uid}`).on('child_added', snap => {
                const req = snap.val(); const fromUid = snap.key;
                document.getElementById('dm-req-title').innerText = `${req.name} 想要與你私訊`;
                document.getElementById('dm-req-modal').style.display = 'flex';
                document.getElementById('dm-yes').onclick = () => {
                    db.ref(`users/${me.uid}/contacts/${fromUid}`).set({ name: req.name, pfp: req.pfp });
                    db.ref(`users/${fromUid}/contacts/${me.uid}`).set({ name: me.full_name, pfp: me.pfp });
                    db.ref(`dm_reqs/${me.uid}/${fromUid}`).remove();
                    document.getElementById('dm-req-modal').style.display = 'none';
                };
                document.getElementById('dm-no').onclick = () => {
                    db.ref(`dm_reqs/${me.uid}/${fromUid}`).remove();
                    document.getElementById('dm-req-modal').style.display = 'none';
                };
            });
        }

        function listenContacts() {
            db.ref(`users/${me.uid}/contacts`).on('value', snap => {
                const list = document.getElementById('dm-list'); list.innerHTML = '';
                snap.forEach(d => {
                    const u = d.val(); const div = document.createElement('div');
                    div.className = `dm-nav ${currentChat === d.key ? 'active' : ''}`;
                    div.innerHTML = `<img src="${u.pfp}"><div class="red-dot" id="dot-${d.key}"></div>`;
                    div.onclick = () => switchChat(d.key, u.name); list.appendChild(div);
                    db.ref(`chats/private/${getRid(d.key)}/unread/${me.uid}`).on('value', s => {
                        document.getElementById(`dot-${d.key}`).style.display = s.val() ? 'block' : 'none';
                    });
                });
            });
        }

        async function switchChat(id, name) {
            currentChat = id; document.getElementById('main-title').innerText = id === 'global' ? '全球大廳' : name;
            document.getElementById('ban-icon').style.display = id === 'global' ? 'none' : 'block';
            if(id !== 'global') {
                const s = await db.ref(`users/${me.uid}/banlist/${id}`).get();
                document.getElementById('ban-icon').style.color = s.val() ? 'var(--danger)' : '#555';
                db.ref(`chats/private/${getRid(id)}/unread/${me.uid}`).set(false);
                db.ref(`chats/private/${getRid(id)}/msgs`).off();
                db.ref(`chats/private/${getRid(id)}/msgs`).limitToLast(40).on('value', s => renderMsgs(s));
            } else listenGlobal();
        }

        async function toggleBan() {
            const s = await db.ref(`users/${me.uid}/banlist/${currentChat}`).get();
            const state = !s.val();
            await db.ref(`users/${me.uid}/banlist/${currentChat}`).set(state);
            document.getElementById('ban-icon').style.color = state ? 'var(--danger)' : '#555';
        }

        function openPwdModal() { document.getElementById('pwd-modal').style.display = 'flex'; }
        function closePwdModal() { 
            document.getElementById('pwd-modal').style.display = 'none';
            document.getElementById('pwd-step1').style.display = 'block';
            document.getElementById('pwd-step2').style.display = 'none';
        }
        function verifyOldPw() {
            const input = document.getElementById('old-pw-input').value;
            if(input === me.temp_pw) {
                document.getElementById('pwd-step1').style.display = 'none';
                document.getElementById('pwd-step2').style.display = 'block';
            } else alert("舊密碼錯誤");
        }
        async function submitNewPw() {
            const newPw = document.getElementById('new-pw-input').value;
            if(!newPw) return alert("請輸入新密碼");
            await db.ref(`users/${me.uid}`).update({ temp_pw: newPw });
            me.temp_pw = newPw; localStorage.setItem('tacker_session', JSON.stringify(me));
            alert("密碼已更新！"); closePwdModal();
        }

        async function send() {
            const inp = document.getElementById('m-input'); if(!inp.value && !pendingImg) return;
            if(currentChat !== 'global') {
                const s = await db.ref(`users/${currentChat}/banlist/${me.uid}`).get();
                if(s.val()) return alert("對方已禁止你發送訊息");
            }
            const data = { u: me.full_name, uid: me.uid, pfp: me.pfp || '', t: pendingImg || inp.value, ts: Date.now() };
            const path = currentChat === 'global' ? 'chats/global' : `chats/private/${getRid(currentChat)}/msgs`;
            db.ref(path).push(data);
            if(currentChat !== 'global') db.ref(`chats/private/${getRid(currentChat)}/unread/${currentChat}`).set(true);
            inp.value = ''; pendingImg = "";
        }

        function handleFile(input, type) {
            const f = input.files[0]; const r = new FileReader();
            r.onload = e => { if(type==='chat') pendingImg=e.target.result; else document.getElementById('current-pfp').src=e.target.result; };
            r.readAsDataURL(f);
        }
        async function saveProfile() {
            const up = { full_name: document.getElementById('edit-name').value, pfp: document.getElementById('current-pfp').src };
            await db.ref(`users/${me.uid}`).update(up);
            me = {...me, ...up}; localStorage.setItem('tacker_session', JSON.stringify(me));
            alert("儲存成功");
        }
        function tab(t) { document.getElementById('chat-tab').style.display = t==='chat'?'flex':'none'; document.getElementById('me-tab').style.display = t==='me'?'block':'none'; }
        function logout() { localStorage.removeItem('tacker_session'); location.reload(); }
    </script>
</body>
</html>
