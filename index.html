<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tacker Pro | V667-STABLE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        :root { --bg: #000; --card: #111; --acc: #23a559; --text: #fff; --sub: #888; --danger: #f23f43; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body, html { margin:0; padding:0; height:100%; background:#fff; overflow:hidden; }

        /* --- Take OS Toast (非原生) --- */
        #toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 9999; }
        .os-toast { background: #1a1a1a; color: #fff; padding: 12px 20px; border-radius: 10px; border-left: 4px solid var(--acc); box-shadow: 0 5px 20px rgba(0,0,0,0.5); margin-top: 10px; animation: slideIn 0.3s forwards; }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }

        /* --- 頁面結構 --- */
        .screen { position: absolute; width: 100%; height: 100%; display: none; flex-direction: column; z-index: 10; align-items:center; justify-content:center; }
        .active { display: flex; }

        /* --- 動畫 --- */
        @keyframes titleZoom { 0% { transform: scale(3); opacity: 0; filter: blur(20px); } 100% { transform: scale(1); opacity: 1; filter: blur(0); } }
        .zoom-title { font-weight: 900; font-size: 85px; animation: titleZoom 1.1s forwards; }
        .slide-up-btn { margin-top: 40px; padding: 16px 65px; background: #000; color: #fff; border-radius: 50px; font-weight: bold; border:none; cursor: pointer; }

        /* --- App 核心介面 (還原 v667) --- */
        #s-app { background: var(--bg); color: var(--text); align-items: stretch; }
        .rail { width: 72px; background: #050505; flex-shrink: 0; display: flex; flex-direction: column; align-items: center; padding: 15px 0; border-right: 1px solid #222; }
        .nav-icon { width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #444; font-size: 20px; margin-bottom: 15px; overflow: hidden; }
        .nav-icon img { width: 100%; height: 100%; object-fit: cover; }
        .nav-icon.active { color: var(--acc); }
        #nav-me { margin-top: auto; }

        .main { flex-grow: 1; background: #111; display: flex; flex-direction: column; position: relative; }
        
        /* --- 頂部狀態列 --- */
        header { height: 60px; border-bottom: 1px solid #222; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; background: #0a0a0a; }
        .stat-group { display: flex; gap: 8px; }
        .stat-tag { background: #1a1a1a; padding: 4px 10px; border-radius: 6px; font-size: 11px; color: var(--sub); border: 1px solid #222; }
        .stat-tag b { color: var(--acc); }

        /* --- 輸入框比例修正 --- */
        .input-area { padding: 15px; border-top: 1px solid #222; background: #0a0a0a; display: flex; gap: 12px; align-items: center; }
        .input-area input { flex-grow: 1; padding: 14px 18px; background: #1a1a1a; border: 1px solid #333; color: #fff; border-radius: 12px; outline: none; font-size: 15px; }
        .input-btn { width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; border-radius: 12px; cursor: pointer; border: none; }
        .add-file { color: #888; font-size: 24px; }
        .send-btn { background: var(--acc); color: #fff; font-size: 18px; }

        /* --- 個人設定面板 (盾牌內容還原) --- */
        .me-view { padding: 30px; overflow-y: auto; height: 100%; width: 100%; max-width: 600px; margin: 0 auto; }
        .me-header { display: flex; align-items: center; gap: 20px; margin-bottom: 30px; }
        .me-pfp-big { width: 90px; height: 90px; border-radius: 50%; border: 4px solid #222; overflow: hidden; background: #1a1a1a; }
        .me-pfp-big img { width: 100%; height: 100%; object-fit: cover; }
        .me-section { margin-bottom: 25px; }
        .me-label { display: block; color: var(--sub); font-size: 12px; margin-bottom: 8px; font-weight: bold; text-transform: uppercase; }
        .me-input { width: 100%; background: #1a1a1a; border: 1px solid #333; color: #fff; padding: 12px 15px; border-radius: 10px; outline: none; font-size: 15px; }
        .me-save-btn { background: var(--acc); color: #fff; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; margin-top: 10px; cursor: pointer; }
        .me-pw-btn { width: 100%; text-align: left; background: #1a1a1a; color: #fff; border: 1px solid #333; padding: 12px 15px; border-radius: 10px; cursor: pointer; margin-top: 5px; }
        #pw-group { display: none; margin-top: 15px; background: #0a0a0a; padding: 15px; border-radius: 10px; border: 1px dashed #333; }
        .logout-btn { width: 100%; padding: 15px; background: var(--danger); color: #fff; border: none; border-radius: 12px; font-weight: bold; margin-top: 40px; cursor: pointer; }

        /* --- 個資卡片修正 --- */
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:1000; align-items:center; justify-content:center; backdrop-filter:blur(10px); }
        .user-card { width: 330px; background: #111; border-radius: 25px; border: 1px solid #333; overflow: hidden; }
        .card-banner { height: 100px; background: linear-gradient(45deg, #23a559, #1a7a42); }
        .card-body { padding: 0 20px 25px; text-align: center; margin-top: -45px; }
        .card-pfp { width: 90px; height: 90px; border-radius: 50%; border: 6px solid #111; margin: 0 auto; overflow: hidden; background: #222; }
        .card-pfp img { width:100%; height:100%; object-fit: cover; }

        .msg-row { display: flex; gap: 12px; padding: 12px 20px; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="toast-container"></div>

    <section id="s-intro" class="screen active">
        <div class="zoom-title">Tacker</div>
        <button class="slide-up-btn" onmousedown="handleEnter()">進入系統</button>
    </section>

    <section id="s-login" class="screen" style="background:#f9f9f9;">
        <div style="background:#fff; width:330px; padding:40px; border-radius:20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05);">
            <h2 style="color:#000; margin:0 0 30px; font-weight:900; letter-spacing:-1px;">IDENTITY</h2>
            <input id="u-id" placeholder="帳號 ID" style="width:100%; padding:14px; margin-bottom:12px; border:1px solid #eee; border-radius:10px;">
            <input id="u-pw" type="password" placeholder="密碼" style="width:100%; padding:14px; margin-bottom:25px; border:1px solid #eee; border-radius:10px;">
            <button onmousedown="auth()" style="width:100%; padding:16px; background:#000; color:#fff; border:none; border-radius:12px; font-weight:bold; cursor:pointer;">驗證登入</button>
        </div>
    </section>

    <section id="s-loader" class="screen">
        <div style="text-align:center;">
            <div style="font-weight:900; font-size:45px; letter-spacing:-2px; margin-bottom:15px;">Tacker</div>
            <div style="width:240px; height:4px; background:#222; border-radius:10px; overflow:hidden; margin:auto;">
                <div id="load-bar" style="width:0%; height:100%; background:var(--acc); transition: 0.1s;"></div>
            </div>
            <div id="load-text" style="margin-top:12px; font-family:monospace; color:#888;">0%</div>
        </div>
    </section>

    <section id="s-app" class="screen">
        <div style="display:flex; height:100%; width:100%;">
            <nav class="rail">
                <div onmousedown="tab('chat')" id="nav-chat" class="nav-icon active"><i class="fa-solid fa-earth-asia"></i></div>
                <div id="private-list"></div>
                <div onmousedown="tab('me')" id="nav-me" class="nav-icon"><i class="fa-solid fa-shield-halved"></i></div>
            </nav>
            
            <main id="chat-tab" class="main">
                <header>
                    <b id="chat-title" style="font-size:18px;">全球大廳</b>
                    <div class="stat-group">
                        <div class="stat-tag">用戶總量: <b id="total-u">0</b></div>
                        <div class="stat-tag">線上人數: <b id="online-u">0</b></div>
                    </div>
                </header>
                <div id="chat-flow" style="flex-grow:1; overflow-y:auto;"><div id="messages"></div></div>
                <div class="input-area">
                    <label for="f-in" class="input-btn add-file"><i class="fa-solid fa-circle-plus"></i></label>
                    <input type="file" id="f-in" style="display:none;" onchange="handleFile(this)">
                    <input id="m-input" placeholder="撰寫訊息..." onkeypress="if(event.key==='Enter') send()">
                    <button onmousedown="send()" class="input-btn send-btn"><i class="fa-solid fa-paper-plane"></i></button>
                </div>
            </main>

            <main id="me-tab" class="main" style="display:none; background:#080808;">
                <div class="me-view">
                    <div class="me-header">
                        <div class="me-pfp-big"><img id="me-img" src=""></div>
                        <div>
                            <h2 style="margin:0; font-size:26px;">個人設定</h2>
                            <span style="color:var(--sub); font-size:12px;">UID: <span id="me-uid-show"></span></span>
                        </div>
                    </div>

                    <div class="me-section">
                        <label class="me-label">顯示名稱</label>
                        <input id="me-name-in" class="me-input">
                    </div>

                    <div class="me-section">
                        <label class="me-label">自我介紹</label>
                        <textarea id="me-bio-in" class="me-input" style="height:100px; resize:none;"></textarea>
                        <button onmousedown="updateProfile()" class="me-save-btn">更新個人資訊</button>
                    </div>

                    <div class="me-section">
                        <label class="me-label">帳戶安全</label>
                        <button onmousedown="togglePw()" class="me-pw-btn"><i class="fa-solid fa-key"></i> 修改登入密碼</button>
                        <div id="pw-group">
                            <input id="pw-old" type="password" placeholder="目前密碼" class="me-input" style="margin-bottom:10px;">
                            <input id="pw-new" type="password" placeholder="設定新密碼" class="me-input" style="margin-bottom:10px;">
                            <input id="pw-cfm" type="password" placeholder="再次確認新密碼" class="me-input">
                            <button onmousedown="updatePw()" class="me-save-btn">儲存新密碼</button>
                        </div>
                    </div>

                    <button onmousedown="logout()" class="logout-btn">登出 Tacker 系統</button>
                </div>
            </main>
        </div>
    </section>

    <div id="user-modal" class="modal" onclick="this.style.display='none'">
        <div class="user-card" onclick="event.stopPropagation()">
            <div class="card-banner"></div>
            <div class="card-body">
                <div class="card-pfp" id="modal-pfp"></div>
                <div id="modal-name" style="font-size:24px; font-weight:800; color:#fff; margin-top:15px;"></div>
                <div id="modal-bio" style="color:#888; font-size:14px; margin:10px 0 25px; min-height:40px;"></div>
                <button id="dm-btn" style="width:100%; padding:15px; background:var(--acc); color:#fff; border:none; border-radius:12px; font-weight:bold; cursor:pointer;">發送私訊邀請</button>
            </div>
        </div>
    </div>

    <script>
        const config = { apiKey: "AIzaSyB56chNeodbgAYa8k3xspOOAMYt6C5M4cw", databaseURL: "https://tacker-ebc5a-default-rtdb.firebaseio.com", projectId: "tacker-ebc5a" };
        firebase.initializeApp(config);
        const db = firebase.database();
        let me = null;

        function osToast(m) {
            const c = document.getElementById('toast-container');
            const t = document.createElement('div'); t.className = 'os-toast'; t.innerText = m;
            c.appendChild(t); setTimeout(() => t.remove(), 3000);
        }

        function handleEnter() {
            const s = localStorage.getItem('tacker_session');
            if(s) { me = JSON.parse(s); startLoading(); } else go('s-login');
        }

        async function auth() {
            const id = document.getElementById('u-id').value.trim();
            const pw = document.getElementById('u-pw').value.trim();
            const s = await db.ref(`users/${id}`).get();
            if(s.exists() && s.val().temp_pw === pw) {
                me = { uid: id, ...s.val() };
                localStorage.setItem('tacker_session', JSON.stringify(me));
                startLoading();
            } else osToast("驗證失敗");
        }

        function startLoading() {
            go('s-loader');
            let p = 0;
            const t = setInterval(() => {
                p += Math.floor(Math.random() * 8) + 2;
                if(p >= 100) { clearInterval(t); document.getElementById('load-bar').style.width = '100%'; setTimeout(initApp, 400); }
                else { document.getElementById('load-bar').style.width = p + '%'; document.getElementById('load-text').innerText = p + '%'; }
            }, 40);
        }

        function initApp() {
            go('s-app');
            listenGlobal();
            listenStats();
            document.getElementById('me-img').src = me.pfp || '';
            document.getElementById('me-uid-show').innerText = me.uid;
            document.getElementById('me-name-in').value = me.full_name;
            document.getElementById('me-bio-in').value = me.bio || '';
        }

        function go(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
        function tab(t) {
            document.getElementById('chat-tab').style.display = t==='chat'?'flex':'none';
            document.getElementById('me-tab').style.display = t==='me'?'block':'none';
            document.querySelectorAll('.nav-icon').forEach(i => i.classList.remove('active'));
            document.getElementById(t==='chat'?'nav-chat':'nav-me').classList.add('active');
        }

        // --- 設定面板功能 ---
        function togglePw() { const g = document.getElementById('pw-group'); g.style.display = g.style.display==='block'?'none':'block'; }
        async function updateProfile() {
            const n = document.getElementById('me-name-in').value;
            const b = document.getElementById('me-bio-in').value;
            await db.ref(`users/${me.uid}`).update({ full_name: n, bio: b });
            me.full_name = n; me.bio = b;
            localStorage.setItem('tacker_session', JSON.stringify(me));
            osToast("個人資料已更新");
        }
        async function updatePw() {
            const o = document.getElementById('pw-old').value;
            const n1 = document.getElementById('pw-new').value;
            const n2 = document.getElementById('pw-cfm').value;
            if(o === me.temp_pw && n1 === n2 && n1.length > 3) {
                await db.ref(`users/${me.uid}`).update({ temp_pw: n1 });
                osToast("密碼已變更，請重新登入");
                logout();
            } else osToast("密碼輸入有誤");
        }

        // --- 核心通訊 ---
        function listenGlobal() {
            db.ref('chats/global').limitToLast(40).on('value', snap => {
                const box = document.getElementById('messages'); box.innerHTML = '';
                snap.forEach(d => {
                    const m = d.val();
                    let content = m.t;
                    if(m.t.includes('data:image')) content = `<img src="${m.t}" class="msg-img" onclick="window.open('${m.t}')">`;
                    box.innerHTML += `<div class="msg-row">
                        <div class="pfp" onmousedown="showUser('${m.uid}')"><img src="${m.pfp || ''}"></div>
                        <div><b style="color:var(--acc); font-size:12px; cursor:pointer;" onmousedown="showUser('${m.uid}')">${m.u}</b>
                        <div style="color:#eee; font-size:15px; margin-top:4px;">${content}</div></div></div>`;
                });
                document.getElementById('chat-flow').scrollTop = document.getElementById('chat-flow').scrollHeight;
            });
        }

        async function showUser(uid) {
            if(uid === me.uid) return;
            const s = await db.ref(`users/${uid}`).get();
            const u = s.val();
            document.getElementById('modal-name').innerText = u.full_name;
            document.getElementById('modal-bio').innerText = u.bio || "Tacker 認證成員";
            document.getElementById('modal-pfp').innerHTML = `<img src="${u.pfp || ''}">`;
            document.getElementById('dm-btn').onclick = async () => {
                await db.ref(`dm_requests/${uid}/${me.uid}`).set({ fromName: me.full_name, fromPfp: me.pfp || '', ts: Date.now(), type: "friend_request" });
                osToast("邀請已發送");
                document.getElementById('user-modal').style.display = 'none';
            };
            document.getElementById('user-modal').style.display = 'flex';
        }

        function handleFile(i) {
            const f = i.files[0]; if(!f) return;
            if(f.type.startsWith('video/')) { osToast("禁止傳送影片"); return; }
            const r = new FileReader();
            r.onload = (e) => db.ref('chats/global').push({ u: me.full_name, uid: me.uid, pfp: me.pfp || '', t: e.target.result, ts: Date.now() });
            r.readAsDataURL(f);
        }

        function send() {
            const i = document.getElementById('m-input'); if(!i.value.trim()) return;
            db.ref('chats/global').push({ u: me.full_name, uid: me.uid, pfp: me.pfp || '', t: i.value, ts: Date.now() });
            i.value = '';
        }

        function listenStats() {
            db.ref('users').on('value', s => { document.getElementById('total-u').innerText = s.numChildren(); });
            db.ref('online_count').on('value', s => { document.getElementById('online-u').innerText = s.val() || 1; });
        }

        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
