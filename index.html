<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tacker | Premium Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --bg-deep: #1e1f22; --bg-main: #313338; --bg-side: #2b2d31; 
            --brand: #5865f2; --brand-hover: #4752c4;
            --text-p: #f2f3f5; --text-s: #b5bac1; --danger: #fa777c;
        }
        body { margin: 0; background: var(--bg-deep); color: var(--text-p); font-family: 'PingFang TC', sans-serif; height: 100vh; overflow: hidden; }
        .hidden { display: none !important; }

        /* --- 側邊欄 --- */
        #app-root { display: grid; grid-template-columns: 240px 1fr; height: 100vh; }
        .sidebar { background: var(--bg-side); display: flex; flex-direction: column; position: relative; }
        .sidebar-nav { padding: 12px; flex: 1; }
        .nav-title { font-size: 12px; font-weight: 800; color: var(--text-s); text-transform: uppercase; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        
        /* --- 左下角個資區塊 (依照 P1 手稿) --- */
        .user-panel { background: #232428; padding: 6px 8px; display: flex; align-items: center; gap: 8px; position: absolute; bottom: 0; width: 100%; box-sizing: border-box; }
        .u-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--brand); cursor: pointer; transition: 0.2s; }
        .u-avatar:hover { filter: brightness(1.2); }
        .u-info { flex: 1; min-width: 0; }
        .u-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .u-tag { font-size: 11px; color: var(--text-s); }
        .u-settings-btn { cursor: pointer; padding: 4px; border-radius: 4px; color: var(--text-s); transition: 0.2s; font-size: 16px; }
        .u-settings-btn:hover { background: #3f4147; color: white; }

        /* --- 訊息區域 (Discord Style) --- */
        .chat-view { background: var(--bg-main); display: flex; flex-direction: column; }
        #msg-flow { flex: 1; padding: 20px 0; overflow-y: auto; }
        .msg-group { display: flex; padding: 2px 16px; gap: 16px; transition: background 0.1s; margin-top: 15px; }
        .msg-group:hover { background: rgba(0,0,0,0.05); }
        .m-avatar { width: 40px; height: 40px; border-radius: 50%; background: #4e5058; cursor: pointer; flex-shrink: 0; }
        .m-body { flex: 1; }
        .m-header { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
        .m-user { font-weight: 600; color: white; cursor: pointer; font-size: 15px; }
        .m-user:hover { text-decoration: underline; }
        .m-time { font-size: 11px; color: var(--text-s); }
        .m-text { font-size: 15px; line-height: 1.4; color: #dbdee1; }

        /* --- 打字區 --- */
        .input-area { padding: 0 16px 24px; }
        .input-wrapper { background: #383a40; border-radius: 8px; display: flex; align-items: center; padding: 0 12px; height: 44px; gap: 12px; }
        .input-wrapper input { background: transparent; border: none; flex: 1; color: white; outline: none; font-size: 15px; }

        /* --- 彈窗：他人個資小卡 (圖二) --- */
        .pop-card { position: fixed; width: 300px; background: #111214; border-radius: 8px; overflow: hidden; box-shadow: 0 8px 16px rgba(0,0,0,0.4); z-index: 2000; display: none; }
        .pop-banner { height: 60px; background: var(--brand); }
        .pop-content { padding: 12px; position: relative; padding-top: 45px; }
        .pop-avatar { width: 80px; height: 80px; border-radius: 50%; border: 6px solid #111214; position: absolute; top: -40px; left: 12px; background: #313338; }
        .pop-bio { font-size: 12px; color: var(--text-p); border-top: 1px solid #2b2d31; margin-top: 12px; padding-top: 12px; }

        /* --- 彈窗：設定中心 (圖二詳細版) --- */
        .full-modal { position: fixed; inset: 0; background: var(--bg-main); z-index: 3000; display: none; }
        .modal-inner { display: grid; grid-template-columns: 280px 1fr; height: 100vh; }
        .modal-side { background: var(--bg-side); display: flex; justify-content: flex-end; padding-top: 60px; }
        .modal-nav { width: 200px; padding-right: 20px; }
        .modal-main { padding: 60px 40px; overflow-y: auto; max-width: 700px; }
        .tab-item { padding: 6px 10px; border-radius: 4px; cursor: pointer; color: var(--text-s); margin-bottom: 2px; font-size: 14px; }
        .tab-item:hover { background: #3f4147; color: white; }
        .tab-item.active { background: #454950; color: white; }
        .close-circle { position: fixed; top: 60px; left: calc(280px + 740px); cursor: pointer; width: 36px; height: 36px; border: 2px solid var(--text-s); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--text-s); }
    </style>
</head>
<body>

    <div id="app-root">
        <aside class="sidebar">
            <div class="sidebar-nav">
                <div class="nav-title">加好友 <span onclick="alert('加好友彈窗')" style="cursor:pointer; color:var(--brand);">⊕</span></div>
                <div style="font-size:14px; color:var(--text-s); text-align:center; margin-top:20px;">目前沒有對話</div>
            </div>
            
            <div class="user-panel">
                <img id="f-ava" class="u-avatar" onclick="openSettings()">
                <div class="u-info" onclick="openSettings()">
                    <div id="f-name" class="u-name">載入中...</div>
                    <div id="f-tag" class="u-tag">@id</div>
                </div>
                <div class="u-settings-btn" onclick="openSettings()">⚙️</div>
            </div>
        </aside>

        <main class="chat-view">
            <div id="msg-flow">
                </div>
            <div class="input-area">
                <div class="input-wrapper">
                    <span style="color:var(--text-s); cursor:pointer; font-size:20px;">⊕</span>
                    <input type="text" id="m-in" placeholder="傳送訊息到 Tacker...">
                    <button onclick="send()" style="background:none; border:none; color:var(--brand); font-weight:bold; cursor:pointer;">發送</button>
                </div>
            </div>
        </main>
    </div>

    <div id="user-pop" class="pop-card">
        <div class="pop-banner" id="p-banner"></div>
        <div class="pop-content">
            <img class="pop-avatar" id="p-ava">
            <h3 id="p-name" style="margin:0;"></h3>
            <div id="p-tag" style="color:var(--text-s); font-size:13px;"></div>
            <div class="pop-bio">
                <b style="font-size:11px; color:var(--text-s); text-transform:uppercase;">自我介紹</b>
                <p id="p-bio" style="margin-top:8px;"></p>
            </div>
        </div>
    </div>

    <div id="set-ui" class="full-modal">
        <div class="close-circle" onclick="closeSettings()">✕</div>
        <div class="modal-inner">
            <div class="modal-side">
                <div class="modal-nav">
                    <div style="font-size:11px; font-weight:800; color:var(--text-s); margin-bottom:10px; padding-left:10px;">使用者設定</div>
                    <div class="tab-item active" onclick="switchTab('base')">基本資訊</div>
                    <div class="tab-item" onclick="switchTab('look')">外觀</div>
                    <div class="tab-item" onclick="switchTab('acc')">帳戶</div>
                    <hr style="opacity:0.05; margin:15px 0;">
                    <div class="tab-item" style="color:var(--danger);" onclick="location.reload()">登出帳號</div>
                </div>
            </div>
            <div class="modal-main">
                <div id="tab-base">
                    <h2 style="margin-top:0;">基本資訊</h2>
                    <p style="font-size:12px; color:var(--text-s); font-weight:bold;">顯示名稱</p>
                    <input type="text" id="in-name" style="width:100%; background:#1e1f22; border:none; padding:12px; color:white; border-radius:4px;">
                    <p style="font-size:12px; color:var(--text-s); font-weight:bold; margin-top:20px;">帳號 ID (更改需密碼認證)</p>
                    <input type="text" id="in-id" style="width:100%; background:#1e1f22; border:none; padding:12px; color:white; border-radius:4px;">
                    <button onclick="save()" style="margin-top:20px; background:var(--brand); color:white; border:none; padding:10px 20px; border-radius:4px; font-weight:bold; cursor:pointer;">儲存變更</button>
                </div>
                <div id="tab-look" class="hidden">
                    <h2>外觀設定</h2>
                    <p style="font-size:12px; color:var(--text-s); font-weight:bold;">頭像網址</p>
                    <input type="text" id="in-ava" style="width:100%; background:#1e1f22; border:none; padding:12px; color:white; border-radius:4px;">
                    <p style="font-size:12px; color:var(--text-s); font-weight:bold; margin-top:20px;">自我介紹</p>
                    <textarea id="in-bio" style="width:100%; background:#1e1f22; border:none; padding:12px; color:white; border-radius:4px; height:80px;"></textarea>
                    <button onclick="save()" style="margin-top:20px; background:var(--brand); color:white; border:none; padding:10px 20px; border-radius:4px; font-weight:bold; cursor:pointer;">更新外觀</button>
                </div>
                <div id="tab-acc" class="hidden">
                    <h2>帳戶設定</h2>
                    <button style="background:#4e5058; color:white; border:none; padding:10px 20px; border-radius:4px; cursor:pointer;">變更密碼</button>
                    <p style="margin-top:40px; border-top:1px solid #3f4147; padding-top:20px;">
                        <button style="background:var(--danger); color:white; border:none; padding:10px 20px; border-radius:4px; cursor:pointer;">移除帳戶 (需 Gmail 驗證)</button>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const _s = supabase.createClient('https://coyiifxxfopvabpjszis.supabase.co', 'Sb_publishable_ZaDrVW5Goe5QFqL4rBvNCg_JrwHKIFH');
        const MY_UID = "dev_boss_999";

        function openSettings() { document.getElementById('set-ui').style.display = 'block'; }
        function closeSettings() { document.getElementById('set-ui').style.display = 'none'; }
        
        function switchTab(t) {
            ['base','look','acc'].forEach(x => document.getElementById('tab-'+x).classList.add('hidden'));
            document.getElementById('tab-'+t).classList.remove('hidden');
            document.querySelectorAll('.tab-item').forEach(el => el.classList.remove('active'));
            event.currentTarget.classList.add('active');
        }

        async function showPop(uid, e) {
            e.stopPropagation();
            const { data } = await _s.from('profiles').select('*').eq('id', uid).maybeSingle();
            if(!data) return;
            const pop = document.getElementById('user-pop');
            document.getElementById('p-name').innerText = data.full_name;
            document.getElementById('p-tag').innerText = "@" + data.tacker_id;
            document.getElementById('p-ava').src = data.avatar_url;
            document.getElementById('p-bio').innerText = data.bio || "無自我介紹";
            pop.style.display = 'block';
            pop.style.top = (e.clientY > window.innerHeight - 250 ? e.clientY - 250 : e.clientY) + 'px';
            pop.style.left = (e.clientX + 20) + 'px';
        }

        document.addEventListener('click', () => document.getElementById('user-pop').style.display = 'none');

        async function save() {
            await _s.from('profiles').upsert({
                id: MY_UID, 
                full_name: document.getElementById('in-name').value,
                tacker_id: document.getElementById('in-id').value,
                avatar_url: document.getElementById('in-ava').value,
                bio: document.getElementById('in-bio').value
            });
            location.reload();
        }

        async function load() {
            const { data } = await _s.from('profiles').select('*').eq('id', MY_UID).maybeSingle();
            if(data) {
                document.getElementById('f-name').innerText = data.full_name;
                document.getElementById('f-tag').innerText = "@" + data.tacker_id;
                document.getElementById('f-ava').src = data.avatar_url;
                document.getElementById('in-name').value = data.full_name;
                document.getElementById('in-id').value = data.tacker_id;
                document.getElementById('in-ava').value = data.avatar_url;
                document.getElementById('in-bio').value = data.bio;
            }
            const { data: msgs } = await _s.from('messages').select('*').order('created_at');
            if(msgs) msgs.forEach(render);
        }

        async function send() {
            const val = document.getElementById('m-in').value;
            if(!val) return;
            await _s.from('messages').insert([{ user_id: MY_UID, user_name: document.getElementById('f-name').innerText, content: val }]);
            document.getElementById('m-in').value = '';
        }

        function render(m) {
            const flow = document.getElementById('msg-flow');
            const div = document.createElement('div');
            div.className = "msg-group";
            div.innerHTML = `
                <img class="m-avatar" src="https://via.placeholder.com/40" onclick="showPop('${m.user_id}', event)">
                <div class="m-body">
                    <div class="m-header">
                        <span class="m-user" onclick="showPop('${m.user_id}', event)">${m.user_name}</span>
                        <span class="m-time">${new Date(m.created_at).toLocaleTimeString()}</span>
                    </div>
                    <div class="m-text">${m.content}</div>
                </div>
            `;
            flow.appendChild(div);
            flow.scrollTop = flow.scrollHeight;
        }

        _s.channel('room').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, p => render(p.new)).subscribe();
        window.onload = load;
    </script>
</body>
</html>
