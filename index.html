<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tacker | FR Technology</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary-green: #00ff41; /* 駭客綠 */
            --bg-dark: #0d1117;      /* 深黑背景 */
            --bg-card: #161b22;      /* 卡片背景 */
            --text-gray: #8b949e;
            --border-color: #30363d;
        }
        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg-dark); color: white; overflow: hidden; }
        
        /* 登入牆樣式 */
        #login-screen {
            display: flex; align-items: center; justify-content: center; height: 100vh;
            background: radial-gradient(circle, #1a2f1a 0%, #0d1117 100%);
        }
        .login-box {
            background: var(--bg-card); padding: 40px; border-radius: 12px; width: 350px;
            border: 1px solid var(--border-color); box-shadow: 0 0 20px rgba(0, 255, 65, 0.1);
        }
        h2 { text-align: center; color: var(--primary-green); margin-bottom: 25px; letter-spacing: 2px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 12px; color: var(--text-gray); margin-bottom: 5px; text-transform: uppercase; }
        input[type="email"], input[type="password"], .chat-input {
            width: 100%; padding: 12px; background: #010409; border: 1px solid var(--border-color);
            border-radius: 6px; color: white; box-sizing: border-box;
        }
        .btn-main {
            width: 100%; padding: 12px; background: var(--primary-green); color: black;
            border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 10px;
        }
        .btn-discord {
            width: 100%; padding: 12px; background: transparent; color: white;
            border: 1px solid #5865F2; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 10px;
        }
        .link-text { font-size: 13px; color: var(--primary-green); text-align: center; margin-top: 15px; cursor: pointer; }

        /* 主介面樣式 (登入後) */
        #main-app { display: none; height: 100vh; grid-template-columns: 70px 240px 1fr; }
        .sidebar { background: #010409; display: flex; flex-direction: column; align-items: center; padding-top: 15px; border-right: 1px solid var(--border-color); }
        .channel-list { background: #0d1117; padding: 15px; border-right: 1px solid var(--border-color); }
        .chat-area { display: flex; flex-direction: column; }
        .messages { flex: 1; padding: 20px; overflow-y: auto; background: var(--bg-dark); }
        .input-area { padding: 20px; border-top: 1px solid var(--border-color); }
        
        .nav-icon { width: 45px; height: 45px; background: #161b22; border-radius: 10px; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 1px solid transparent; }
        .nav-icon:hover { border-color: var(--primary-green); color: var(--primary-green); }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2 id="form-title">TACKER SYSTEM</h2>
            
            <div class="input-group">
                <label id="lbl-email">電子郵件 EMAIL</label>
                <input type="email" id="email" placeholder="name@company.com">
            </div>
            <div class="input-group">
                <label id="lbl-pw">密碼 PASSWORD</label>
                <input type="password" id="password" placeholder="••••••••">
            </div>

            <button class="btn-main" onclick="handleEmailAuth()" id="btn-auth">登入 LOGIN</button>
            <button class="btn-discord" onclick="loginWithDiscord()">使用 Discord 登入</button>
            
            <div class="link-text" onclick="toggleAuthMode()" id="auth-toggle">還沒有帳號？點此註冊</div>
        </div>
    </div>

    <div id="main-app">
        <nav class="sidebar">
            <div class="nav-icon">T</div>
            <div class="nav-icon">＋</div>
        </nav>
        <aside class="channel-list">
            <h4 style="color: var(--primary-green); font-size: 12px;">FR TECHNOLOGY</h4>
            <div style="margin-top: 15px; color: var(--text-gray);"># 公告宣佈</div>
            <div style="margin-top: 10px; color: white;"># 🧊 大廳聊天</div>
        </aside>
        <main class="chat-area">
            <div class="messages" id="chat-messages">
                <div style="color: var(--text-gray); font-size: 12px; margin-bottom: 20px;">--- 歡迎進入 Tacker 加密通訊頻道 ---</div>
            </div>
            <div class="input-area">
                <input type="text" class="chat-input" placeholder="輸入訊息並按 Enter...">
            </div>
        </main>
    </div>

    <script>
        const supabaseUrl = 'https://coyiifxxfopvabpjszis.supabase.co';
        const supabaseKey = 'sb_publishable_auth_coyiifxxfopvabpjszis';
        const supabase = supabase.createClient(supabaseUrl, supabaseKey);

        let isSignUp = false;

        // 切換登入或註冊模式
        function toggleAuthMode() {
            isSignUp = !isSignUp;
            document.getElementById('form-title').innerText = isSignUp ? 'CREATE ACCOUNT' : 'TACKER SYSTEM';
            document.getElementById('btn-auth').innerText = isSignUp ? '註冊 SIGN UP' : '登入 LOGIN';
            document.getElementById('auth-toggle').innerText = isSignUp ? '已有帳號？返回登入' : '還沒有帳號？點此註冊';
        }

        // Email 登入/註冊邏輯
        async function handleEmailAuth() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if (isSignUp) {
                const { error } = await supabase.auth.signUp({ email, password });
                if (error) alert("註冊失敗: " + error.message);
                else alert("註冊成功！請檢查信箱驗證。");
            } else {
                const { error } = await supabase.auth.signInWithPassword({ email, password });
                if (error) alert("登入失敗: " + error.message);
                else location.reload();
            }
        }

        // Discord 登入
        async function loginWithDiscord() {
            await supabase.auth.signInWithOAuth({
                provider: 'discord',
                options: { redirectTo: window.location.href }
            });
        }

        // 偵測狀態切換畫面
        async function checkSession() {
            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-app').style.display = 'grid';
            }
        }
        checkSession();
    </script>
</body>
</html>
