<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tacker v2.0</title>
    <style>
        :root { --p-green: #00ff41; --bg: #010409; --card: #161b22; --brd: #30363d; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .login-box { background: var(--card); padding: 30px; border-radius: 12px; border: 1px solid var(--brd); width: 90%; max-width: 360px; text-align: center; }
        input { width: 100%; padding: 14px; margin-bottom: 12px; background: #000; border: 1px solid var(--brd); color: white; border-radius: 6px; font-size: 16px; }
        .btn { width: 100%; padding: 14px; border-radius: 6px; font-weight: bold; cursor: pointer; border: none; margin-top: 10px; font-size: 16px; }
        .btn-main { background: var(--p-green); color: black; }
        #app { display: none; position: fixed; inset: 0; background: #0d1117; z-index: 100; padding: 20px; }
    </style>
</head>
<body>

    <div id="auth-page">
        <div class="login-box">
            <h2 id="ui-title" style="color:var(--p-green)">TACKER 系統</h2>
            <input type="email" id="u-email" placeholder="輸入信箱">
            <input type="password" id="u-pass" placeholder="輸入密碼">
            <button class="btn btn-main" onclick="handleButtonClick()">登入系統</button>
            <p id="ui-sw" onclick="toggleMode()" style="color:var(--p-green); cursor:pointer; margin-top:20px; font-size:13px;">[ 沒有帳號？點此註冊 ]</p>
        </div>
    </div>

    <div id="app">
        <h2 style="color:var(--p-green)">連線成功</h2>
        <p>歡迎回來，負責人。</p>
        <button onclick="location.reload()" style="color:red; background:none; border:none; cursor:pointer;">[ 登出系統 ]</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const S_URL = 'https://coyiifxxfopvabpjszis.supabase.co';
        const S_KEY = 'sb_publishable_ZaDrVW5Goe5QFqL4rBvNCg_JrwHKIFH';
        let supabase;
        let isSignUp = false;

        // 立即初始化
        try {
            supabase = window.supabase.createClient(S_URL, S_KEY);
        } catch(e) { console.log("等待加載..."); }

        function toggleMode() {
            isSignUp = !isSignUp;
            document.getElementById('ui-title').innerText = isSignUp ? "建立帳號" : "TACKER 系統";
            document.getElementById('ui-sw').innerText = isSignUp ? "[ 返回登入 ]" : "[ 沒有帳號？點此註冊 ]";
        }

        // 按鈕點擊的主邏輯
        async function handleButtonClick() {
            const email = document.getElementById('u-email').value;
            const pass = document.getElementById('u-pass').value;

            if(!email || !pass) {
                alert("請填寫帳號密碼");
                return;
            }

            // 如果 Supabase 還沒加載完，給予提示而不是沒反應
            if(!supabase || !window.supabase) {
                alert("系統初始化中，請稍候 2 秒再試");
                return;
            }

            try {
                const { data, error } = isSignUp 
                    ? await supabase.auth.signUp({ email, password: pass })
                    : await supabase.auth.signInWithPassword({ email, password: pass });

                if(error) {
                    alert("連線失敗：" + error.message);
                } else {
                    document.getElementById('auth-page').style.display = 'none';
                    document.getElementById('app').style.display = 'block';
                }
            } catch(err) {
                alert("網路異常，請檢查連線");
            }
        }

        // 自動登入檢查
        window.onload = async () => {
            setTimeout(async () => {
                if(supabase) {
                    const { data } = await supabase.auth.getSession();
                    if(data?.session) {
                        document.getElementById('auth-page').style.display = 'none';
                        document.getElementById('app').style.display = 'block';
                    }
                }
            }, 1000);
        };
    </script>
</body>
</html>
