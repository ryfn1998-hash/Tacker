<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tacker Official | Production</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg-auth: #313338; --bg-input: #1e1f22; --accent: #5865f2; --text: #f2f3f5; --text-muted: #b5bac1; }
        * { box-sizing: border-box; font-family: 'gg sans', sans-serif; margin: 0; padding: 0; }
        body { background: #5865f2 url('https://discord.com/assets/7c01f740da893444036e.png') center/cover; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .auth-card { background: var(--bg-auth); width: 480px; padding: 32px; border-radius: 8px; color: var(--text); box-shadow: 0 8px 16px rgba(0,0,0,0.3); }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; color: var(--text-muted); font-size: 12px; font-weight: bold; text-transform: uppercase; margin-bottom: 8px; }
        input, select { width: 100%; padding: 10px; background: var(--bg-input); border: none; border-radius: 3px; color: white; outline: none; }
        .dob-wrap { display: flex; gap: 10px; }
        .btn-primary { width: 100%; padding: 12px; background: var(--accent); color: white; border: none; border-radius: 3px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="register-view" class="auth-card">
        <h2 style="text-align:center; margin-bottom:20px;">建立帳號</h2>
        <div class="input-group">
            <label>電子郵件</label>
            <input type="email" id="reg-email" placeholder="你的 Gmail">
        </div>
        <div class="input-group">
            <label>使用者名稱 (帳號代碼)</label>
            <input type="text" id="reg-id" placeholder="英文與數字">
        </div>
        <div class="input-group">
            <label>密碼</label>
            <input type="password" id="reg-pass">
        </div>
        <div class="input-group">
            <label>出生日期</label>
            <div class="dob-wrap">
                <select id="birth-year"></select>
                <select id="birth-month"></select>
                <select id="birth-day"></select>
            </div>
        </div>
        <button class="btn-primary" id="reg-btn" onclick="realSignUp()">繼續</button>
    </div>

    <div id="verify-view" class="auth-card hidden">
        <h2 style="text-align:center;">請檢查您的 Gmail</h2>
        <p style="text-align:center; color:var(--text-muted); margin: 20px 0;" id="verify-msg"></p>
        <div style="background:#2b2d31; padding:15px; border-radius:5px; text-align:center; color:#23a55a; font-weight:bold;">
            信件已發送！請點擊信中連結完成驗證。
        </div>
        <button class="btn-primary" style="background:#4e5058; margin-top:20px;" onclick="location.reload()">返回登入</button>
    </div>

    <script>
        // 1. 初始化 Supabase (使用 FR Technology 金鑰)
        const supabaseUrl = 'https://coyiifxxfopvabpjszis.supabase.co';
        const supabaseKey = 'sb_publishable_ZaDrVW5Goe5QFqL4rBvNCg_JrwHKIFH';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        // 2. 初始化日期選擇器
        (function initDate() {
            const y = document.getElementById('birth-year');
            const m = document.getElementById('birth-month');
            const d = document.getElementById('birth-day');
            for(let i=2026; i>=1950; i--) y.options.add(new Option(i, i));
            for(let i=1; i<=12; i++) m.options.add(new Option(i + "月", i));
            for(let i=1; i<=31; i++) d.options.add(new Option(i, i));
            y.value = "2010";
        })();

        // 3. 實戰註冊邏輯 (真的會發信)
        async function realSignUp() {
            const btn = document.getElementById('reg-btn');
            const email = document.getElementById('reg-email').value;
            const password = document.getElementById('reg-pass').value;
            const username = document.getElementById('reg-id').value;

            if(!email || !password || !username) return alert("請填寫完整資訊！");
            if(!/^[a-zA-Z0-9]+$/.test(username)) return alert("帳號代碼僅限英文與數字！");

            btn.innerText = "正在處理...";
            btn.disabled = true;

            // 呼叫 Supabase Auth 發信
            const { data, error } = await _supabase.auth.signUp({
                email: email,
                password: password,
                options: {
                    data: {
                        username: username,
                        birthday: `${document.getElementById('birth-year').value}-${document.getElementById('birth-month').value}-${document.getElementById('birth-day').value}`
                    }
                }
            });

            if (error) {
                alert("錯誤：" + error.message);
                btn.innerText = "繼續";
                btn.disabled = false;
            } else {
                // 成功後切換至驗證畫面
                document.getElementById('verify-msg').innerText = `我們已向 ${email} 發送了驗證連結，請前往確認。`;
                document.getElementById('register-view').classList.add('hidden');
                document.getElementById('verify-view').classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
