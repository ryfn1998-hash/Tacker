<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tacker Private | FR Tech</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --p-green: #00ff41; --bg: #0d1117; --side: #161b22; --brd: #30363d; --ds: #5865F2; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: #010409; color: white; font-family: sans-serif; height: 100vh; overflow: hidden; }
        
        /* 登入介面 */
        #login-screen { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: #010409; z-index: 9999; }
        .login-box { background: var(--side); padding: 30px; border-radius: 12px; border: 1px solid var(--brd); width: 90%; max-width: 360px; text-align: center; }
        input { width: 100%; padding: 14px; margin-bottom: 12px; background: #000; border: 1px solid var(--brd); color: white; border-radius: 6px; font-size: 16px; }
        .btn { width: 100%; padding: 14px; border-radius: 6px; font-weight: bold; cursor: pointer; border: none; margin-top: 10px; font-size: 16px; display: block; }
        .btn-main { background: var(--p-green); color: #000; }
        .btn-ds { background: var(--ds); color: #fff; }

        /* 主程式 */
        #main-app { display: none; height: 100vh; flex-direction: row; }
        .sidebar { width: 260px; background: var(--side); border-right: 1px solid var(--brd); display: flex; flex-direction: column; }
        .tabs { display: flex; border-bottom: 1px solid var(--brd); }
        .tab { flex: 1; padding: 15px; text-align: center; cursor: pointer; font-size: 13px; color: #8b949e; }
        .tab.active { color: var(--p-green); border-bottom: 2px solid var(--p-green); }
        
        .chat-view { flex: 1; display: flex; flex-direction: column; background: var(--bg); }
        .msgs { flex: 1; padding: 20px; overflow-y: auto; }
        .input-area { padding: 20px; }
        .in-box { background: #1c2128; border: 1px solid var(--brd); border-radius: 8px; padding: 10px; display: flex; }
        #msg-in { flex: 1; background: transparent; border: none; color: white; font-size: 16px; }

        @media (max-width: 600px) { .sidebar { width: 100%; } .chat-view { display: none; } }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2 id="title" style="color:var(--p-green)">TACKER 系統</h2>
            <input type="email" id="u-email" placeholder="信箱">
            <input type="password" id="u-pw" placeholder="密碼">
            <button class="btn btn-main" onclick="authAction()">進入系統</button>
            <button class="btn btn-ds" onclick="dsLogin()">Discord 登入</button>
            <p id="switch" onclick="toggle()" style="color:var(--p-green); cursor:pointer; margin-top:20px; font-size:14px;">[ 沒有帳號？點此註冊 ]</p>
        </div>
    </div>

    <div id="main-app">
        <aside class="sidebar">
            <div style="padding:20px; font-weight:bold; color:var(--p-green); border-bottom:1px solid var(--brd)">TACKER PRIVATE</div>
            <div class="tabs">
                <div class="tab active" id="tab-f" onclick="changeTab('fr')">好友</div>
                <div class="tab" id="tab-g" onclick="changeTab('gr')">私人群組</div>
            </div>
            <div id="list" style="flex:1; padding:10px;"></div>
            <button onclick="location.reload()" style="padding:15px; background:none; color:red; border:none; cursor:pointer;">登出 🚪</button>
        </aside>
        <main class="chat-view">
            <div style="padding:15px; border-bottom:1px solid var(--brd); font-weight:bold;" id="chat-t"># 大廳</div>
            <div class="msgs" id="msg-list"></div>
            <div class="input-area">
                <div class="in-box">
                    <input type="text" id="msg-in" placeholder="輸入訊息..." onkeypress="if(event.key==='Enter') send()">
                    <b onclick="send()" style="color:var(--p-green); cursor:pointer">發送</b>
                </div>
            </div>
        </main>
    </div>

    <script>
        const S_URL = 'https://coyiifxxfopvabpjszis.supabase.co';
        const S_KEY = 'sb_publishable_ZaDrVW5Goe5QFqL4rBvNCg_JrwHKIFH';
        const supabase = window.supabase.createClient(S_URL, S_KEY);

        let isSignUp = false;
        let currentTab = 'fr';

        async function check() {
            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-app').style.display = 'flex';
                updateList();
            }
        }

        function toggle() {
            isSignUp = !isSignUp;
            document.getElementById('title').innerText = isSignUp ? "建立帳號" : "TACKER 系統";
            document.getElementById('switch').innerText = isSignUp ? "[ 已有帳號？點此登入 ]" : "[ 沒有帳號？點此註冊 ]";
        }

        async function authAction() {
            const e = document.getElementById('u-email').value;
            const p = document.getElementById('u-pw').value;
            if(!e || !p) return alert("請填寫資料");

            const { error } = isSignUp 
                ? await supabase.auth.signUp({ email: e, password: p })
                : await supabase.auth.signInWithPassword({ email: e, password: p });

            if(error) alert(error.message); else check();
        }

        async function dsLogin() { await supabase.auth.signInWithOAuth({ provider: 'discord' }); }

        function changeTab(t) {
            currentTab = t;
            document.getElementById('tab-f').className = t==='fr' ? 'tab active' : 'tab';
            document.getElementById('tab-g').className = t==='gr' ? 'tab active' : 'tab';
            updateList();
        }

        function updateList() {
            const l = document.getElementById('list');
            l.innerHTML = currentTab === 'fr' 
                ? `<div onclick="openChat('Shadow')" style="padding:10px; cursor:pointer;">👤 Shadow (管理員)</div>`
                : `<div onclick="openChat('FR官方群組')" style="padding:10px; cursor:pointer;">🔒 FR 核心群組</div>`;
        }

        function openChat(n) {
            document.getElementById('chat-t').innerText = "# " + n;
            document.getElementById('msg-list').innerHTML = `<p style="color:gray;">已建立安全加密連線。</p>`;
        }

        function send() {
            const i = document.getElementById('msg-in');
            if(!i.value) return;
            document.getElementById('msg-list').innerHTML += `<div style="margin-bottom:10px;"><b>我:</b> ${i.value}</div>`;
            i.value = '';
        }

        window.onload = check;
    </script>
</body>
</html>
