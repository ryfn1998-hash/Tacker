<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tacker</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        :root { --bg: #000; --card: #111; --acc: #23a559; --text: #fff; --sub: #888; --danger: #f23f43; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body, html { margin:0; padding:0; height:100%; background:var(--bg); color:var(--text); overflow:hidden; }

        /* --- 靈敏度與互動 --- */
        .screen { position: absolute; width: 100%; height: 100%; display: none; flex-direction: column; }
        .active { display: flex; }
        button, .pfp, .dm-nav, .nav-icon, label, .fa-ban, .fa-trash { 
            cursor: pointer !important; transition: 0.1s; pointer-events: auto !important; 
        }
        button:active, .dm-nav:active, label:active { transform: scale(0.92); opacity: 0.8; }

        .rail { width: 65px; background: #050505; flex-shrink: 0; display: flex; flex-direction: column; align-items: center; padding: 20px 0; gap: 15px; border-right: 1px solid #222; overflow-y: auto; }
        .main { flex-grow: 1; background: #111; display: flex; flex-direction: column; }
        
        .dm-nav { width: 45px; height: 45px; border-radius: 50%; border: 2px solid transparent; position: relative; }
        .dm-nav img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        .dm-nav.active { border-color: var(--acc); }
        .red-dot { position: absolute; top: 0; right: 0; width: 12px; height: 12px; background: var(--danger); border-radius: 50%; border: 2px solid #000; display: none; }

        .msg-row { display: flex; gap: 12px; margin-bottom: 18px; padding: 0 15px; position: relative; }
        .pfp { width: 42px; height: 42px; border-radius: 50%; overflow: hidden; border: 1px solid #333; flex-shrink: 0; }
        .msg-content { flex-grow: 1; position: relative; }
        .msg-img { max-width: 80%; max-height: 300px; border-radius: 10px; margin-top: 5px; border: 1px solid #333; }
        .del-btn { font-size: 12px; color: var(--danger); margin-left: 10px; opacity: 0.5; }
        .del-btn:hover { opacity: 1; }

        .input-bar { padding: 12px; border-top: 1px solid #222; background: #0a0a0a; display: flex; gap: 12px; align-items: center; }
        .input-bar input { flex-grow: 1; padding: 12px; background: #1e1e1e; border: none; color: #fff; border-radius: 12px; outline: none; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; align-items: center; justify-content: center; }
        .user-card { width: 300px; background: var(--card); border-radius: 20px; padding: 20px; border: 1px solid #333; }
    </style>
</head>
<body>

    <section id="s-home" class="screen active" style="align-items:center; justify-content:center;">
        <h1 style="font-size:60px;">Tacker</h1>
        <button onclick="checkAuth()" style="padding:15px 50px; border-radius:50px; background:#fff; color:#000; border:none; font-weight:bold;">進入</button>
    </section>

    <section id="s-login" class="screen" style="justify-content:center; align-items:center;">
        <div style="width:300px; background:#111; padding:30px; border-radius:15px; border:1px solid #222;">
            <h2>登入</h2>
            <input id="u-id" placeholder="帳號 ID" style="width:100%; padding:12px; margin-bottom:10px; background:#222; border:none; color:#fff; border-radius:8px;">
            <input id="u-pw" type="password" placeholder="密碼" style="width:100%; padding:12px; margin-bottom:20px; background:#222; border:none; color:#fff; border-radius:8px;">
            <button onclick="auth()" style="width:100%; padding:12px; background:var(--acc); color:#fff; border:none; border-radius:8px;">登入</button>
        </div>
    </section>

    <section id="s-app" class="screen">
        <div style="display:flex; height:100%;">
            <nav class="rail">
                <div onclick="tab('chat')" class="nav-icon" style="color:var(--acc); font-size:22px;"><i class="fa-solid fa-earth-asia"></i></div>
                <div onclick="tab('me')" class="nav-icon" style="color:#444; font-size:22px;"><i class="fa-solid fa-user-gear"></i></div>
                <hr style="width:30px; border-color:#222;">
                <div id="dm-list"></div>
            </nav>

            <main id="chat-tab" class="main">
                <header style="padding:15px; border-bottom:1px solid #222; display:flex; justify-content:space-between; align-items:center;">
                    <b id="main-title">全球大廳</b>
                    <i id="block-btn" class="fa-solid fa-ban" style="display:none; color:var(--sub);" onclick="toggleBlock()"></i>
                </header>
                <div id="chat-flow" style="flex-grow:1; overflow-y:auto; padding:15px 0;"><div id="messages"></div></div>
                <div id="upload-preview" style="display:none; padding:10px; background:#000; align-items:center; gap:10px; border-top:1px solid #222;">
                    <img id="preview-img" style="height:40px; border-radius:4px;">
                    <i class="fa-solid fa-times" onclick="cancelUpload()" style="margin-left:auto; color:var(--danger);"></i>
                </div>
                <div class="input-bar">
                    <label for="file-input"><i class="fa-solid fa-plus-circle" style="color:var(--sub); font-size:24px;"></i></label>
                    <input type="file" id="file-input" accept="image/*" style="display:none;" onchange="handleFile(this, 'chat')">
                    <input id="m-input" placeholder="說點什麼..." onkeypress="if(event.key==='Enter') send()">
                    <button onclick="send()" style="background:var(--acc); color:#fff; border:none; padding:10px 15px; border-radius:10px;"><i class="fa-solid fa-paper-plane"></i></button>
                </div>
            </main>

            <main id="me-tab" class="main" style="display:none; padding:20px; overflow-y:auto;">
                <h3>個人設定</h3>
                <div style="text-align:center; margin-bottom:20px;">
                    <label for="pfp-input"><img id="current-pfp" style="width:80px; height:80px; border-radius:50%; border:2px solid var(--acc); object-fit:cover;"></label>
                    <input type="file" id="pfp-input" style="display:none;" onchange="handleFile(this, 'pfp')">
                </div>
                <p style="font-size:12px; color:var(--sub);">顯示名稱</p>
                <input id="edit-name" style="width:100%; padding:12px; background:#222; color:#fff; border:none; border-radius:10px; margin-bottom:20px;">
                
                <hr style="border-color:#222; margin-bottom:20px;">
                <p style="font-size:12px; color:var(--sub);">三段式改密碼</p>
                <input type="password" id="old-pw" placeholder="輸入舊密碼" style="width:100%; padding:12px; background:#222; color:#fff; border:none; border-radius:10px; margin-bottom:10px;">
                <input type="password" id="new-pw1" placeholder="輸入新密碼" style="width:100%; padding:12px; background:#222; color:#fff; border:none; border-radius:10px; margin-bottom:10px;">
                <input type="password" id="new-pw2" placeholder="再次確認新密碼" style="width:100%; padding:12px; background:#222; color:#fff; border:none; border-radius:10px; margin-bottom:20px;">
                
                <button onclick="saveAll()" style="width:100%; padding:15px; background:var(--acc); color:#fff; border:none; border-radius:10px; font-weight:bold;">儲存變更</button>
                <button onclick="logout()" style="width:100%; margin-top:20px; background:none; border:1px solid #333; color:var(--danger); padding:10px; border-radius:10px;">登出</button>
            </main>
        </div>
    </section>

    <div id="user-modal" class="modal" onclick="this.style.display='none'">
        <div class="user-card" onclick="event.stopPropagation()" style="text-align:center;">
            <div id="modal-pfp-box" style="width:70px; height:70px; border-radius:50%; margin:0 auto 15px; overflow:hidden;"></div>
            <h3 id="modal-name"></h3>
            <button id="dm-btn" style="width:100%; padding:12px; background:var(--acc); color:#fff; border:none; border-radius:10px; margin-top:15px; font-weight:bold;">發送私訊</button>
        </div>
    </div>

    <div id="req-modal" class="modal">
        <div class="user-card" style="text-align:center;">
            <h4 id="req-text">想要跟你私訊</h4>
            <div style="display:flex; gap:10px; margin-top:20px;">
                <button id="req-yes" style="flex:1; padding:10px; background:var(--acc); border:none; border-radius:8px; color:#fff;">同意</button>
                <button id="req-no" style="flex:1; padding:10px; background:var(--danger); border:none; border-radius:8px; color:#fff;">不同意</button>
            </div>
        </div>
    </div>

    <script>
        const config = { apiKey: "AIzaSyB56chNeodbgAYa8k3xspOOAMYt6C5M4cw", databaseURL: "https://tacker-ebc5a-default-rtdb.firebaseio.com", projectId: "tacker-ebc5a" };
        firebase.initializeApp(config);
        const db = firebase.database();
        let me = null, pendingImg = "", currentChat = "global";

        function checkAuth() { const s = localStorage.getItem('tacker_session'); if(s){ me = JSON.parse(s); initApp(); } else go('s-login'); }
        function go(id) { document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
        async function auth() {
            const uid = document.getElementById('u-id').value, pw = document.getElementById('u-pw').value;
            const s = await db.ref(`users/${uid}`).get();
            if(s.exists() && s.val().temp_pw === pw) { me = {uid, ...s.val()}; localStorage.setItem('tacker_session', JSON.stringify(me)); initApp(); } else alert("密碼錯誤");
        }

        function initApp() {
            go('s-app');
            document.getElementById('current-pfp').src = me.pfp || '';
            document.getElementById('edit-name').value = me.full_name;
            listenGlobal(); listenContacts(); listenRequests();
        }

        // --- 渲染訊息 (含刪除功能) ---
        function renderMsgs(snap) {
            const box = document.getElementById('messages'); box.innerHTML = '';
            snap.forEach(d => {
                const m = d.val(); const mid = d.key;
                const isImg = (m.t && m.t.startsWith('data:image'));
                const canDel = (m.uid === me.uid || me.role === 'admin');
                const content = isImg ? `<img src="${m.t}" class="msg-img">` : `<div style="color:#eee;">${m.t}</div>`;
                box.innerHTML += `
                    <div class="msg-row">
                        <div class="pfp" onclick="showUser('${m.uid}')"><img src="${m.pfp}"></div>
                        <div class="msg-content">
                            <b style="color:var(--acc);font-size:12px;">${m.u}</b>
                            ${canDel ? `<i class="fa-solid fa-trash del-btn" onclick="delMsg('${mid}')"></i>` : ''}
                            ${content}
                        </div>
                    </div>`;
            });
            document.getElementById('chat-flow').scrollTop = document.getElementById('chat-flow').scrollHeight;
        }

        function delMsg(mid) { 
            const path = currentChat === 'global' ? `chats/global/${mid}` : `chats/private/${getRid(currentChat)}/msgs/${mid}`;
            if(confirm("確定刪除此訊息？")) db.ref(path).remove();
        }

        function listenGlobal() { db.ref('chats/global').off(); db.ref('chats/global').limitToLast(30).on('value', s => renderMsgs(s)); }
        function getRid(uid) { return [me.uid, uid].sort().join('_'); }

        // --- 私訊請求與禁止 ---
        async function showUser(uid) {
            if(uid === me.uid) return;
            const s = await db.ref(`users/${uid}`).get(); const u = s.val();
            document.getElementById('modal-name').innerText = u.full_name;
            document.getElementById('modal-pfp-box').innerHTML = `<img src="${u.pfp}" style="width:100%;height:100%;object-fit:cover;">`;
            document.getElementById('dm-btn').onclick = () => {
                if(confirm(`是否要發送私訊權限給 ${u.full_name}？`)) {
                    db.ref(`requests/${uid}/${me.uid}`).set({ name: me.full_name, pfp: me.pfp });
                    alert("已發送請求，請等待對方同意");
                }
            };
            document.getElementById('user-modal').style.display = 'flex';
        }

        function listenRequests() {
            db.ref(`requests/${me.uid}`).on('child_added', snap => {
                const req = snap.val(); const fromUid = snap.key;
                document.getElementById('req-text').innerText = `${req.name} 想要跟你私訊`;
                document.getElementById('req-modal').style.display = 'flex';
                document.getElementById('req-yes').onclick = () => {
                    db.ref(`users/${me.uid}/contacts/${fromUid}`).set({ name: req.name, pfp: req.pfp });
                    db.ref(`users/${fromUid}/contacts/${me.uid}`).set({ name: me.full_name, pfp: me.pfp });
                    db.ref(`requests/${me.uid}/${fromUid}`).remove();
                    document.getElementById('req-modal').style.display = 'none';
                };
                document.getElementById('req-no').onclick = () => {
                    db.ref(`requests/${me.uid}/${fromUid}`).remove();
                    document.getElementById('req-modal').style.display = 'none';
                };
            });
        }

        function listenContacts() {
            db.ref(`users/${me.uid}/contacts`).on('value', snap => {
                const box = document.getElementById('dm-list'); box.innerHTML = '';
                snap.forEach(d => {
                    const u = d.val();
                    const div = document.createElement('div'); div.className = `dm-nav ${currentChat===d.key?'active':''}`;
                    div.innerHTML = `<img src="${u.pfp}"><div class="red-dot" id="dot-${d.key}"></div>`;
                    div.onclick = () => switchChat(d.key, u.name); box.appendChild(div);
                    db.ref(`chats/private/${getRid(d.key)}/unread/${me.uid}`).on('value', s => {
                        document.getElementById(`dot-${d.key}`).style.display = s.val() ? 'block' : 'none';
                    });
                });
            });
        }

        async function switchChat(id, name) {
            currentChat = id;
            document.getElementById('main-title').innerText = id === 'global' ? '全球大廳' : name;
            document.getElementById('block-btn').style.display = id === 'global' ? 'none' : 'block';
            if(id !== 'global') {
                const s = await db.ref(`users/${me.uid}/blocked/${id}`).get();
                document.getElementById('block-btn').style.color = s.val() ? 'var(--danger)' : 'var(--sub)';
            }
            if(id === 'global') listenGlobal(); 
            else {
                db.ref(`chats/private/${getRid(id)}/unread/${me.uid}`).set(false);
                db.ref(`chats/private/${getRid(id)}/msgs`).off();
                db.ref(`chats/private/${getRid(id)}/msgs`).limitToLast(30).on('value', s => renderMsgs(s));
            }
        }

        async function toggleBlock() {
            const target = currentChat;
            const s = await db.ref(`users/${me.uid}/blocked/${target}`).get();
            const newState = !s.val();
            await db.ref(`users/${me.uid}/blocked/${target}`).set(newState);
            document.getElementById('block-btn').style.color = newState ? 'var(--danger)' : 'var(--sub)';
            alert(newState ? "已禁止對方發送訊息" : "已解除禁止");
        }

        // --- 發送訊息 (檢查禁止狀態) ---
        async function send() {
            const inp = document.getElementById('m-input'); if(!inp.value && !pendingImg) return;
            if(currentChat !== 'global') {
                const s = await db.ref(`users/${currentChat}/blocked/${me.uid}`).get();
                if(s.val()) return alert("對方已禁止你發送訊息");
            }
            const data = { u: me.full_name, uid: me.uid, pfp: me.pfp || '', t: pendingImg || inp.value, ts: Date.now() };
            const path = currentChat === 'global' ? 'chats/global' : `chats/private/${getRid(currentChat)}/msgs`;
            db.ref(path).push(data);
            if(currentChat !== 'global') db.ref(`chats/private/${getRid(currentChat)}/unread/${currentChat}`).set(true);
            inp.value = ''; cancelUpload();
        }

        // --- 個人資料儲存 (含三段改密碼) ---
        async function saveAll() {
            const newName = document.getElementById('edit-name').value;
            const oldPw = document.getElementById('old-pw').value;
            const np1 = document.getElementById('new-pw1').value;
            const np2 = document.getElementById('new-pw2').value;
            
            let upData = { full_name: newName, pfp: document.getElementById('current-pfp').src };

            if(oldPw || np1 || np2) {
                if(oldPw !== me.temp_pw) return alert("舊密碼不正確");
                if(!np1 || np1 !== np2) return alert("新密碼不一致或為空");
                upData.temp_pw = np1;
            }

            await db.ref(`users/${me.uid}`).update(upData);
            me = {...me, ...upData};
            localStorage.setItem('tacker_session', JSON.stringify(me));
            alert("儲存成功！");
        }

        function handleFile(input, type) {
            const f = input.files[0]; const r = new FileReader();
            r.onload = e => { 
                if(type==='chat'){ pendingImg=e.target.result; document.getElementById('preview-img').src=pendingImg; document.getElementById('upload-preview').style.display='flex'; } 
                else document.getElementById('current-pfp').src=e.target.result; 
            };
            r.readAsDataURL(f);
        }
        function cancelUpload() { pendingImg=""; document.getElementById('upload-preview').style.display='none'; }
        function tab(t) { document.getElementById('chat-tab').style.display = t==='chat'?'flex':'none'; document.getElementById('me-tab').style.display = t==='me'?'block':'none'; }
        function logout() { localStorage.removeItem('tacker_session'); location.reload(); }
    </script>
</body>
</html>
