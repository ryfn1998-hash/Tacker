<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tacker OS - Official</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        :root { --bg: #000; --card: #1e1f22; --acc: #23a559; --text: #fff; --sub: #b5bac1; --danger: #f23f43; --vip: #f1c40f; --official: #5865f2; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body, html { margin:0; padding:0; height:100%; background:var(--bg); color:var(--text); overflow:hidden; user-select: none; }

        .screen { position: absolute; width: 100%; height: 100%; display: none; flex-direction: column; z-index: 10; }
        .active { display: flex; }

        /* 左側導覽列 (手稿 P4) */
        .rail { width: 72px; background: #050505; flex-shrink: 0; display: flex; flex-direction: column; align-items: center; padding: 15px 0; border-right: 1px solid #222; }
        .rail-item { width: 48px; height: 48px; border-radius: 50%; background: #222; margin-bottom: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer; position: relative; color: #fff; border: 2px solid transparent; }
        .rail-item img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
        .rail-item.active { border-radius: 15px; border-color: var(--acc); }
        .unread-dot { position: absolute; top: 0; right: 0; width: 14px; height: 14px; background: var(--danger); border-radius: 50%; border: 2px solid #000; }

        .main { flex-grow: 1; background: #111; display: flex; flex-direction: column; position: relative; }
        
        /* 訊息樣式 */
        #chat-flow { flex-grow: 1; overflow-y: auto; padding: 20px; }
        .msg-row { display: flex; gap: 12px; margin-bottom: 18px; }
        .pfp-msg { width: 40px; height: 40px; border-radius: 50%; cursor: pointer; flex-shrink: 0; }
        .tag-vip { color: var(--vip); font-weight: bold; margin-left: 4px; }
        .tag-official { background: var(--official); color: #fff; font-size: 10px; padding: 2px 5px; border-radius: 3px; margin-left: 4px; }

        /* 用戶卡片 & 後台 (手稿 P3/P4) */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; align-items: center; justify-content: center; }
        .dc-card { width: 340px; background: var(--card); border-radius: 12px; overflow: hidden; position: relative; border: 1px solid #333; }
        .dc-banner { height: 65px; background: var(--official); }
        .dc-pfp-large { width: 85px; height: 85px; border-radius: 50%; border: 6px solid var(--card); position: absolute; top: 25px; left: 16px; background: #000; }
        .dc-body { padding: 55px 20px 20px; }
        
        /* 按鈕群 */
        .btn { width: 100%; padding: 12px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 8px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-green { background: var(--acc); color: #fff; }
        .btn-danger { background: var(--danger); color: #fff; }
        .btn-outline { background: transparent; border: 1px solid #444; color: #fff; }

        /* 頂部狀態 (手稿 P4) */
        .top-bar { padding: 15px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; background: #111; }
        .status-tag { display: flex; align-items: center; gap: 6px; font-size: 13px; }
        .dot-online { width: 10px; height: 10px; border-radius: 50%; background: var(--acc); }
    </style>
</head>
<body oncontextmenu="return false;">

    <section id="s-app" class="screen active">
        <div style="display:flex; height:100%;">
            <nav class="rail">
                <div class="rail-item active" id="rail-global" onclick="switchMode('global')">
                    <i class="fa-solid fa-earth-americas"></i>
                </div>
                <div id="dm-list-container" style="display:flex; flex-direction:column; gap:10px; width:100%; align-items:center;">
                    </div>
                <div style="flex-grow:1;"></div>
                <div class="rail-item" onclick="showMe()"><i class="fa-solid fa-shield-halved"></i></div>
            </nav>

            <main class="main">
                <div class="top-bar">
                    <b id="view-title">全球大廳</b>
                    <div id="partner-status" style="display:none;" class="status-tag">
                        <div class="dot-online"></div> 在線
                        <i class="fa-solid fa-ban" style="margin-left:10px; color:var(--danger); cursor:pointer;" onclick="toggleBlock()"></i>
                    </div>
                </div>

                <div id="chat-flow"><div id="messages"></div></div>

                <div id="preview-area" style="display:none; padding:10px; background:#222; display:flex; gap:8px;"></div>

                <div style="padding:20px; background:#1e1f22;">
                    <div id="dm-notice" style="display:none; color:var(--sub); font-size:12px; margin-bottom:10px; text-align:center;">
                        對方尚未同意私聊，發送訊息後對方會收到請求
                    </div>
                    <div style="display:flex; gap:12px; align-items:center; background:#383a40; padding:8px 15px; border-radius:8px;">
                        <label for="f-in" style="cursor:pointer; color:var(--sub);"><i class="fa-solid fa-circle-plus"></i></label>
                        <input type="file" id="f-in" multiple style="display:none;" onchange="handleFiles(this)">
                        <input id="m-in" placeholder="傳送訊息..." style="flex-grow:1; background:none; border:none; color:#fff; outline:none;">
                        <button onclick="send()" style="background:none; border:none; color:var(--acc); font-weight:bold; cursor:pointer;">發送</button>
                    </div>
                </div>
            </main>
        </div>
    </section>

    <div id="u-modal" class="modal" onclick="this.style.display='none'">
        <div class="dc-card" onclick="event.stopPropagation()">
            <div class="dc-banner"></div>
            <img class="dc-pfp-large" id="md-pfp">
            <div class="dc-body">
                <div style="display:flex; align-items:center; gap:5px;">
                    <b id="md-name" style="font-size:22px;">用戶</b>
                    <span id="md-tags"></span>
                </div>
                <div id="md-uid" style="color:var(--sub); margin-bottom:20px;">@ID</div>
                
                <div id="user-actions">
                    <button class="btn btn-green" id="btn-msg"><i class="fa-solid fa-paper-plane"></i> 發送訊息</button>
                </div>

                <div id="admin-panel" style="display:none; margin-top:20px; padding-top:15px; border-top:1px solid #333;">
                    <b style="font-size:12px; color:var(--official);">[ 官方管理授權 ]</b>
                    <div style="display:flex; flex-direction:column; gap:8px; margin-top:10px;">
                        <div style="display:flex; justify-content:space-between; align-items:center; background:#111; padding:10px; border-radius:5px;">
                            <span>會員資格</span>
                            <input type="checkbox" id="md-vip-check" onchange="toggleVipStatus()">
                        </div>
                        <button class="btn btn-danger" onclick="adminCmd('mute')">禁言成員</button>
                        <button class="btn btn-danger" onclick="adminCmd('kick')">強制登出</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 1. 防曝光保護 (手稿 P1)
        document.onkeydown = e => { if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && e.keyCode == 73) || (e.ctrlKey && e.keyCode == 85)) return false; };

        const config = { apiKey: "AIzaSyB56chNeodbgAYa8k3xspOOAMYt6C5M4cw", databaseURL: "https://tacker-ebc5a-default-rtdb.firebaseio.com", projectId: "tacker-ebc5a" };
        firebase.initializeApp(config);
        const db = firebase.database();

        let me = null;
        let mode = 'global'; 
        let targetUID = null;

        // 2. 登入與同步 (手稿 P1)
        async function checkAuth() {
            const saved = localStorage.getItem('tacker_session');
            if(!saved) return location.reload();
            me = JSON.parse(saved);
            
            // 即時同步會員資格 (手稿 P2)
            db.ref(`users/${me.uid}`).on('value', s => {
                const updated = s.val();
                if(updated) {
                    me = { ...me, ...updated };
                    if(me.status === 'kicked') { logout(); alert("你已被官方強制登出"); }
                }
            });
            initApp();
        }

        function initApp() {
            listenGlobal();
            listenDMs();
        }

        // 3. 私聊與官方授權邏輯 (手稿 P4/P3)
        async function openCard(uid) {
            const s = await db.ref(`users/${uid}`).get();
            const u = s.val();
            targetUID = uid;
            
            document.getElementById('md-name').innerText = u.full_name;
            document.getElementById('md-uid').innerText = "@" + uid;
            document.getElementById('md-pfp').src = u.pfp;
            document.getElementById('md-tags').innerHTML = (u.role === 'official' ? '<span class="tag-official">官方帳戶 [v]</span>' : '') + (u.level === 'vip' ? '<span class="tag-vip">★</span>' : '');
            
            // 顯示管理後台 (僅官方可見)
            document.getElementById('admin-panel').style.display = (me.role === 'official' && uid !== me.uid) ? 'block' : 'none';
            document.getElementById('md-vip-check').checked = (u.level === 'vip');

            // 私聊按鈕 (不可加自己)
            document.getElementById('user-actions').style.display = (uid === me.uid) ? 'none' : 'block';
            document.getElementById('btn-msg').onclick = () => startDM(uid, u.full_name);

            document.getElementById('u-modal').style.display = 'flex';
        }

        function startDM(uid, name) {
            mode = 'dm';
            targetUID = uid;
            document.getElementById('view-title').innerText = name;
            document.getElementById('partner-status').style.display = 'flex';
            document.getElementById('u-modal').style.display = 'none';
            
            // 官方權限：不用同意即可發訊
            if(me.role !== 'official') {
                document.getElementById('dm-notice').style.display = 'block';
            }
            
            db.ref(`chats/dms/${[me.uid, uid].sort().join('_')}`).limitToLast(50).on('value', s => render(s));
        }

        // 4. 會員功能與限制 (手稿 P2)
        function send() {
            const val = document.getElementById('m-in').value;
            // 後台如果取消會員勾選，這裡會立刻判定
            const charLimit = me.level === 'vip' ? 4000 : 100;
            if(val.length > charLimit) return alert(`會員限制：字數不能超過 ${charLimit}`);

            const path = mode === 'global' ? 'chats/global' : `chats/dms/${[me.uid, targetUID].sort().join('_')}`;
            
            db.ref(path).push({
                u: me.full_name, uid: me.uid, pfp: me.pfp,
                t: val, role: me.role, level: me.level
            });
            document.getElementById('m-in').value = '';
        }

        // 5. 後台管理執行 (手稿 P3)
        async function toggleVipStatus() {
            const isVip = document.getElementById('md-vip-check').checked;
            await db.ref(`users/${targetUID}`).update({ level: isVip ? 'vip' : 'free' });
            alert("會員資格已更新，對方特權將立刻暫停或啟用");
        }

        async function adminCmd(type) {
            if(type === 'kick') {
                await db.ref(`users/${targetUID}`).update({ status: 'kicked' });
                alert("已執行強制登出");
            } else {
                alert("已執行禁言");
            }
        }

        function render(snap) {
            const box = document.getElementById('messages'); box.innerHTML = '';
            snap.forEach(d => {
                const m = d.val();
                const official = m.role === 'official' ? '<span class="tag-official">官方帳戶 [v]</span>' : '';
                const vip = m.level === 'vip' ? '<span class="tag-vip">★</span>' : '';
                box.innerHTML += `
                    <div class="msg-row">
                        <img src="${m.pfp}" class="pfp-msg" onclick="openCard('${m.uid}')">
                        <div>
                            <b onclick="openCard('${m.uid}')" style="cursor:pointer; color:var(--acc);">${m.u}</b>${official}${vip}
                            <div style="word-break:break-all; color:#eee; margin-top:4px;">${m.t}</div>
                        </div>
                    </div>`;
            });
            document.getElementById('chat-flow').scrollTop = document.getElementById('chat-flow').scrollHeight;
        }

        function listenGlobal() { db.ref('chats/global').limitToLast(50).on('value', s => render(s)); }
        function listenDMs() { /* 監聽私訊名單與紅點提示 */ }
        function logout() { localStorage.removeItem('tacker_session'); location.reload(); }

        checkAuth();
    </script>
</body>
</html>
