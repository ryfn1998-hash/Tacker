<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tacker</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        :root { --bg: #000; --card: #111; --acc: #23a559; --official: #f1c40f; --text: #fff; --sub: #888; }
        * { box-sizing: border-box; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        body, html { margin:0; padding:0; height:100%; background:var(--bg); color:var(--text); overflow:hidden; }

        .screen { position: absolute; width: 100%; height: 100%; display: none; flex-direction: column; }
        .active { display: flex; }

        /* 進度條樣式 */
        #progress-box { width: 70%; height: 8px; background: #222; border-radius: 4px; overflow: hidden; margin-bottom: 10px; }
        #bar { width: 0%; height: 100%; background: var(--acc); transition: 0.1s; }

        /* 單一社群版導航 */
        .rail { width: 65px; background: #050505; flex-shrink: 0; display: flex; flex-direction: column; align-items: center; padding: 20px 0; gap: 20px; }
        .main { flex-grow: 1; background: #111; display: flex; flex-direction: column; }
        
        /* 公告樣式 */
        .ann-card { background: rgba(241, 196, 15, 0.1); border-left: 4px solid var(--official); padding: 10px; margin-bottom: 15px; border-radius: 4px; }
        .official-tag { background: var(--official); color: #000; font-size: 10px; padding: 2px 5px; border-radius: 3px; margin-left: 5px; font-weight: bold; }
        
        .chat-flow { flex-grow: 1; overflow-y: auto; padding: 15px; }
        .msg { margin-bottom: 15px; }
        .input-area { padding: 15px; background: #0a0a0a; border-top: 1px solid #222; display: flex; gap: 10px; }
        input { flex-grow: 1; padding: 12px; background: #1e1e1e; border: none; color: #fff; border-radius: 8px; outline: none; }
    </style>
</head>
<body>

    <section id="s-home" class="screen active" style="background:#fff; color:#000; align-items:center; justify-content:center;">
        <div style="border:2px solid #000; padding:50px; text-align:center;">
            <h1>Tacker</h1><p>永遠.FR.</p>
            <button onclick="go('s-login')" style="background:#007bff; color:#fff; border:none; padding:10px 40px; border-radius:4px;">進入</button>
        </div>
    </section>

    <section id="s-login" class="screen" style="background:#eee; color:#333; align-items:center; justify-content:center;">
        <div style="background:#fff; width:300px; padding:25px; border-radius:8px;">
            <h2>登入</h2>
            <input id="u-id" placeholder="帳號" style="width:100%; margin-bottom:10px; padding:10px; border:1px solid #ddd;">
            <input id="u-pw" type="password" placeholder="密碼" style="width:100%; margin-bottom:15px; padding:10px; border:1px solid #ddd;">
            <button onclick="auth()" style="width:100%; padding:10px; background:var(--acc); color:#fff; border:none; border-radius:4px;">確認</button>
        </div>
    </section>

    <section id="s-load" class="screen" style="align-items:center; justify-content:center;">
        <div id="progress-box"><div id="bar"></div></div>
        <div id="percent" style="font-size:12px; color:var(--sub);">正在連線至大廳... 0%</div>
    </section>

    <section id="s-app" class="screen">
        <div style="display:flex; height:100%;">
            <nav class="rail">
                <div onclick="tab('chat')" style="color:var(--acc); font-size:20px;"><i class="fa-solid fa-comments"></i></div>
                <div onclick="tab('me')" style="color:#444; font-size:20px;"><i class="fa-solid fa-user-gear"></i></div>
            </nav>

            <main id="chat-tab" class="main">
                <header style="height:55px; border-bottom:1px solid #222; display:flex; align-items:center; padding:0 15px; justify-content:space-between;">
                    <b>全球大廳</b>
                    <span style="font-size:12px; color:var(--acc);">● <span id="online-count">0</span> 在線</span>
                </header>
                
                <div id="chat-flow" class="chat-flow">
                    <div id="official-ann"></div>
                    <div id="messages"></div>
                </div>

                <div class="input-area">
                    <input id="m-input" placeholder="說點什麼...">
                    <button onclick="send()" style="background:var(--acc); border:none; color:#fff; width:45px; border-radius:8px;"><i class="fa-solid fa-paper-plane"></i></button>
                </div>
            </main>

            <main id="me-tab" class="main" style="display:none; padding:20px;">
                <h3>帳戶設定</h3>
                <label style="font-size:12px; color:var(--sub);">顯示名稱</label>
                <input id="edit-name" style="width:100%; background:#222; border:1px solid #333; margin:8px 0 20px 0;">
                
                <label style="font-size:12px; color:var(--sub);">修改密碼</label>
                <input id="edit-pw" type="password" placeholder="留空則不修改" style="width:100%; background:#222; border:1px solid #333; margin-top:8px;">
                
                <button onclick="saveProfile()" style="width:100%; margin-top:30px; padding:12px; background:var(--acc); border:none; color:#fff; font-weight:bold; border-radius:8px;">儲存修改</button>
            </main>
        </div>
    </section>

    <script>
        const config = { 
            apiKey: "AIzaSyB56chNeodbgAYa8k3xspOOAMYt6C5M4cw",
            databaseURL: "https://tacker-ebc5a-default-rtdb.firebaseio.com",
            projectId: "tacker-ebc5a"
        };
        firebase.initializeApp(config);
        const db = firebase.database();
        let me = null;

        function go(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }

        async function auth() {
            const uid = document.getElementById('u-id').value.trim();
            const pw = document.getElementById('u-pw').value.trim();
            const s = await db.ref(`users/${uid}`).get();
            if(s.exists() && s.val().temp_pw === pw) { me = { uid, ...s.val() }; startLoad(); }
            else { alert("驗證失敗"); }
        }

        function startLoad() {
            go('s-load');
            let p = 0;
            const t = setInterval(() => {
                p += 10;
                if(p >= 100) { clearInterval(t); initApp(); }
                document.getElementById('bar').style.width = p + '%';
                document.getElementById('percent').innerText = `連線中... ${p}%`;
            }, 50);
        }

        function initApp() {
            go('s-app');
            db.ref(`presence/${me.uid}`).set(true);
            db.ref(`presence/${me.uid}`).onDisconnect().remove();
            db.ref('presence').on('value', s => document.getElementById('online-count').innerText = s.numChildren());

            // 監聽公告
            db.ref('announcements').limitToLast(1).on('value', snap => {
                const annArea = document.getElementById('official-ann');
                annArea.innerHTML = '';
                snap.forEach(d => {
                    annArea.innerHTML = `<div class="ann-card"><b>Tacker官方公告</b><br><span style="font-size:14px;">${d.val().t}</span></div>`;
                });
            });

            // 監聽訊息
            db.ref('chats/global').limitToLast(40).on('value', snap => {
                const mBox = document.getElementById('messages'); mBox.innerHTML = '';
                snap.forEach(d => {
                    const m = d.val();
                    const isOfficial = m.u === "Tacker官方";
                    mBox.innerHTML += `<div class="msg">
                        <span style="font-weight:bold; color:${isOfficial ? 'var(--official)' : 'var(--acc)'};">${m.u}</span>
                        ${isOfficial ? '<span class="official-tag">官方</span>' : ''}
                        <div style="font-size:14px; margin-top:4px;">${m.t}</div>
                    </div>`;
                });
                document.getElementById('chat-flow').scrollTop = document.getElementById('chat-flow').scrollHeight;
            });
            
            document.getElementById('edit-name').value = me.full_name;
        }

        function send() {
            const val = document.getElementById('m-input').value.trim();
            if(!val) return;
            
            // 官方帳號檢查邏輯
            if(val.startsWith("/ann ") && me.full_name === "Tacker官方") {
                db.ref('announcements').push({ t: val.replace("/ann ", ""), ts: Date.now() });
            } else {
                db.ref('chats/global').push({ u: me.full_name, t: val, ts: Date.now() });
            }
            document.getElementById('m-input').value = '';
        }

        async function saveProfile() {
            let newName = document.getElementById('edit-name').value.trim();
            const newPw = document.getElementById('edit-pw').value.trim();

            // 禁用字檢查
            if(newName.includes("官方") || newName.toLowerCase().includes("tacker")) {
                alert("禁止使用包含「Tacker官方」或「Tacker」的名字！");
                return;
            }

            let updates = { full_name: newName };
            if(newPw) updates.temp_pw = newPw;

            await db.ref(`users/${me.uid}`).update(updates);
            me.full_name = newName;
            alert("資料已更新！");
        }

        function tab(t) {
            document.getElementById('chat-tab').style.display = t === 'chat' ? 'flex' : 'none';
            document.getElementById('me-tab').style.display = t === 'me' ? 'block' : 'none';
        }
    </script>
</body>
</html>
