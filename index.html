<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tacker Client | Flagship V1</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, set, update, get, push, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // --- Firebase 配置 (對接你的專案) ---
        const firebaseConfig = {
            apiKey: "AIzaSyB56chNeodbgAYa8k3xspOOAMYt6C5M4cw",
            authDomain: "tacker-ebc5a.firebaseapp.com",
            databaseURL: "https://tacker-ebc5a-default-rtdb.firebaseio.com",
            projectId: "tacker-ebc5a",
            storageBucket: "tacker-ebc5a.firebasestorage.app",
            messagingSenderId: "689763297968",
            appId: "1:689763297968:web:7acf6b857fc89a17d62975"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let currentUser = null;

        // --- 1. 登入進度條與邏輯 (對應手稿頁面 1) ---
        window.startLogin = async () => {
            const id = document.getElementById('l-id').value;
            const pw = document.getElementById('l-pw').value;
            if(!id || !pw) return alert("請輸入 ID 與密碼");

            // 顯示進度條
            document.getElementById('login-box').style.display = 'none';
            document.getElementById('loading-box').style.display = 'block';
            let progress = 0;
            const bar = document.getElementById('progress-bar');
            
            const timer = setInterval(() => {
                progress += Math.random() * 20;
                if(progress > 100) progress = 100;
                bar.style.width = progress + '%';
                document.getElementById('progress-text').innerText = Math.floor(progress) + '%';
                if(progress >= 100) clearInterval(timer);
            }, 200);

            try {
                const snap = await get(ref(db, 'users/' + id));
                if(snap.exists()) {
                    const data = snap.val();
                    
                    // 行政攔截：若 CEO 設為 false 則無法登入
                    if(data.is_active === false) {
                        setTimeout(() => {
                            alert("🚫 帳號停用中：請聯繫 CEO 恢復權限");
                            location.reload();
                        }, 1500);
                        return;
                    }

                    if(data.temp_pw === pw) {
                        currentUser = { id, ...data };
                        setTimeout(() => enterSystem(), 1800);
                    } else {
                        setTimeout(() => { alert("密碼錯誤"); location.reload(); }, 1000);
                    }
                } else {
                    setTimeout(() => { alert("找不到帳號"); location.reload(); }, 1000);
                }
            } catch(e) { console.error(e); }
        };

        // --- 2. 進入系統 (對應手稿頁面 2) ---
        function enterSystem() {
            document.getElementById('auth-view').style.display = 'none';
            document.getElementById('app-view').style.display = 'flex';
            document.getElementById('u-name-display').innerText = currentUser.full_name;
            initChat();
            loadUserProfile();
        }

        // --- 3. 社群功能：全球聊天 (對應手稿頁面 3) ---
        function initChat() {
            onValue(ref(db, 'global_chat'), (snap) => {
                const chatBox = document.getElementById('chat-window');
                chatBox.innerHTML = '';
                const msgs = snap.val();
                for(let id in msgs) {
                    const m = msgs[id];
                    const isMe = m.uid === currentUser.id;
                    chatBox.innerHTML += `
                        <div class="message ${isMe ? 'me' : ''}">
                            <div class="msg-content">
                                <small>${m.name}</small>
                                <p>${m.text}</p>
                            </div>
                        </div>`;
                }
                chatBox.scrollTop = chatBox.scrollHeight;
            });
        }

        window.sendMsg = () => {
            const input = document.getElementById('msg-input');
            if(!input.value.trim()) return;
            push(ref(db, 'global_chat'), {
                uid: currentUser.id,
                name: currentUser.full_name,
                text: input.value,
                timestamp: serverTimestamp()
            });
            input.value = '';
        };

        // --- 4. 個人檔案設定 (對應手稿頁面 2) ---
        function loadUserProfile() {
            document.getElementById('set-name').value = currentUser.full_name || '';
            document.getElementById('set-bio').value = currentUser.bio || '';
            document.getElementById('set-banner').value = currentUser.banner_url || '';
        }

        window.updateProfile = () => {
            const updates = {
                full_name: document.getElementById('set-name').value,
                bio: document.getElementById('set-bio').value,
                banner_url: document.getElementById('set-banner').value
            };
            update(ref(db, 'users/' + currentUser.id), updates)
                .then(() => alert("✅ 設定已同步至 Firebase"));
        };
    </script>
    <style>
        :root { --dark: #0b0c0d; --panel: #1e1f22; --item: #2b2d31; --brand: #5865f2; --text: #dbdee1; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; background: var(--dark); color: var(--text); }
        
        /* 登入視圖 */
        #auth-view { height: 100vh; display: flex; align-items: center; justify-content: center; background: #000; }
        .auth-card { background: var(--panel); padding: 40px; border-radius: 12px; width: 320px; text-align: center; border: 1px solid #333; }
        input { width: 100%; background: #000; border: 1px solid #444; color: #fff; padding: 12px; margin: 10px 0; border-radius: 5px; box-sizing: border-box; }
        .btn-blue { width: 100%; background: var(--brand); color: #fff; border: none; padding: 12px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        
        /* 進度條樣式 */
        .progress-container { width: 100%; height: 8px; background: #333; border-radius: 10px; margin: 20px 0; overflow: hidden; }
        .progress-fill { width: 0%; height: 100%; background: #23a559; transition: 0.1s; }

        /* 主程式佈局 */
        #app-view { display: none; height: 100vh; }
        .sidebar { width: 260px; background: var(--panel); display: flex; flex-direction: column; border-right: 1px solid #333; }
        .main-content { flex: 1; display: flex; flex-direction: column; background: var(--item); }
        
        /* 聊天區 */
        #chat-window { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .message { max-width: 70%; align-self: flex-start; }
        .message.me { align-self: flex-end; }
        .msg-content { background: #383a40; padding: 10px; border-radius: 8px; }
        .message.me .msg-content { background: var(--brand); color: white; }
        .input-area { padding: 20px; background: var(--panel); }

        /* 設定區 */
        .settings-overlay { padding: 30px; }
        .nav-btn { padding: 12px; cursor: pointer; border-radius: 5px; margin: 5px; }
        .nav-btn:hover { background: #3f4147; }
    </style>
</head>
<body>

    <div id="auth-view">
        <div class="auth-card" id="login-box">
            <h2 style="color:var(--brand)">TACKER ENTER</h2>
            <input id="l-id" placeholder="Tacker ID">
            <input id="l-pw" type="password" placeholder="Password">
            <button class="btn-blue" onclick="startLogin()">進入系統</button>
        </div>
        <div class="auth-card" id="loading-box" style="display:none;">
            <h3>正在對接雲端節點...</h3>
            <div class="progress-container"><div id="progress-bar" class="progress-fill"></div></div>
            <div id="progress-text">0%</div>
        </div>
    </div>

    <div id="app-view">
        <div class="sidebar">
            <div style="padding:20px; font-weight:bold; border-bottom:1px solid #333;">Tacker 旗艦版</div>
            <div class="nav-btn" onclick="document.getElementById('chat-section').style.display='flex'; document.getElementById('set-section').style.display='none';">💬 全球聊天室</div>
            <div class="nav-btn" onclick="document.getElementById('chat-section').style.display='none'; document.getElementById('set-section').style.display='block';">⚙️ 個人檔案設定</div>
            <div style="margin-top:auto; padding:15px; background:#232428; display:flex; align-items:center; gap:10px;">
                <div style="width:32px; height:32px; background:var(--brand); border-radius:50%;"></div>
                <div id="u-name-display" style="font-size:14px; font-weight:bold;">Name</div>
            </div>
        </div>

        <div class="main-content" id="chat-section">
            <div id="chat-window"></div>
            <div class="input-area">
                <input id="msg-input" placeholder="傳送訊息至全球大廳..." onkeypress="if(event.key==='Enter') sendMsg()">
            </div>
        </div>

        <div class="main-content" id="set-section" style="display:none;">
            <div class="settings-overlay">
                <h2>個人檔案設定</h2>
                <label>顯示名稱</label><input id="set-name">
                <label>個人簡介 (Bio)</label><input id="set-bio">
                <label>橫幅背景 URL</label><input id="set-banner">
                <button class="btn-blue" style="background:#23a559" onclick="updateProfile()">儲存並覆寫雲端</button>
            </div>
        </div>
    </div>

</body>
</html>
