<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tacker | Encrypted Social</title>
    <style>
        :root {
            --bg-deep: #050508; --bg-card: #0f0f12; --bg-input: #000000;
            --accent: #8b5cf6; --text: #f4f4f5; --text-dim: #71717a; --border: #27272a;
        }
        * { box-sizing: border-box; font-family: 'Inter', system-ui, sans-serif; }
        body { margin: 0; background: var(--bg-deep); color: var(--text); height: 100vh; overflow: hidden; }

        /* --- 登錄/註冊 介面 --- */
        #auth-screen { 
            position: fixed; inset: 0; background: var(--bg-deep); z-index: 9999; 
            display: flex; align-items: center; justify-content: center; 
        }
        .auth-container { 
            width: 100%; max-width: 420px; background: var(--bg-card); padding: 40px; 
            border-radius: 20px; border: 1px solid var(--border); text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .auth-tabs { display: flex; gap: 20px; justify-content: center; margin-bottom: 30px; }
        .auth-tab { cursor: pointer; color: var(--text-dim); font-weight: bold; padding-bottom: 5px; border-bottom: 2px solid transparent; }
        .auth-tab.active { color: var(--accent); border-color: var(--accent); }

        .input-group { text-align: left; margin-bottom: 15px; }
        label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; font-weight: 800; }
        input { 
            width: 100%; padding: 12px; margin-top: 5px; background: var(--bg-input); 
            border: 1px solid var(--border); color: white; border-radius: 8px; outline: none;
            transition: 0.3s;
        }
        input:focus { border-color: var(--accent); box-shadow: 0 0 10px rgba(139, 92, 246, 0.2); }
        .btn-auth { 
            width: 100%; padding: 14px; background: var(--accent); color: white; border: none; 
            border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px;
        }

        /* --- 主程式佈局 --- */
        #main-app { display: none; height: 100vh; width: 100%; }
        .sidebar { width: 280px; background: #0b0b0e; border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .user-bar { padding: 15px; background: rgba(0,0,0,0.2); border-top: 1px solid var(--border); display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .user-bar:hover { background: var(--border); }
        .pfp-main { width: 36px; height: 36px; border-radius: 10px; background: var(--accent); display:flex; align-items:center; justify-content:center; font-weight:bold; }

        /* --- 設定牆 (Discord 側滑感) --- */
        #settings-ui { 
            position: fixed; inset: 0; background: var(--bg-deep); z-index: 10000; display: none; 
            animation: slideUp 0.3s ease-out;
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .settings-content { width: 100%; max-width: 800px; margin: 0 auto; padding: 60px 20px; }
        .profile-header { display: flex; align-items: center; gap: 20px; margin-bottom: 40px; }
        .close-btn { position: absolute; top: 40px; right: 40px; font-size: 30px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-container">
            <h1 style="margin-bottom:10px; color:var(--accent); letter-spacing: 2px;">TACKER</h1>
            <div class="auth-tabs">
                <div class="auth-tab active" id="tab-login" onclick="toggleAuthMode('login')">帳號登錄</div>
                <div class="auth-tab" id="tab-register" onclick="toggleAuthMode('register')">註冊新帳號</div>
            </div>

            <div id="auth-fields">
                <div class="input-group">
                    <label>電子信箱 / 使用者名稱</label>
                    <input type="text" id="auth-email" placeholder="輸入您的連網憑證">
                </div>
                <div class="input-group">
                    <label>訪問密鑰</label>
                    <input type="password" id="auth-pass" placeholder="輸入加密密碼">
                </div>
                <div class="input-group" id="reg-only-field" style="display:none;">
                    <label>確認密鑰</label>
                    <input type="password" id="auth-pass-confirm" placeholder="再次輸入密碼">
                </div>
                <button class="btn-auth" id="auth-submit-btn" onclick="processAuth()">確認進入</button>
            </div>
            <p style="font-size:11px; color:var(--text-dim); margin-top:20px;">由 FR Technology 提供端對端加密技術支援</p>
        </div>
    </div>

    <div id="main-app">
        <aside class="sidebar">
            <div style="padding:25px; font-weight:900; color:var(--accent); letter-spacing:1px;">TACKER CORE</div>
            <div style="flex:1; padding:20px; text-align:center; color:var(--text-dim); font-size:13px; border-top:1px solid var(--border);">
                等待通訊連線...
            </div>
            
            <div class="user-bar" onclick="showSettings(true)">
                <div class="pfp-main" id="nav-pfp">U</div>
                <div style="flex:1; overflow:hidden;">
                    <b id="nav-name" style="font-size:14px; display:block;">未登錄</b>
                    <span id="nav-tag" style="font-size:11px; color:var(--text-dim);">@guest</span>
                </div>
                <span style="font-size:18px;">⚙️</span>
            </div>
        </aside>

        <main style="flex:1; display:flex; align-items:center; justify-content:center; background:#08080a;">
            <div style="text-align:center; opacity:0.5;">
                <div style="font-size:50px;">🛰️</div>
                <p>請從左側選擇對話或加好友</p>
            </div>
        </main>
    </div>

    <div id="settings-ui">
        <div class="settings-content">
            <div class="close-btn" onclick="showSettings(false)">✕</div>
            <div class="profile-header">
                <div class="pfp-main" style="width:80px; height:80px; font-size:32px;" id="set-pfp">U</div>
                <div>
                    <h2 id="set-display-name" style="margin:0">用戶名稱</h2>
                    <p id="set-display-tag" style="color:var(--text-dim); margin:5px 0 0;">@username</p>
                </div>
            </div>

            <div style="background:var(--bg-card); border:1px solid var(--border); padding:30px; border-radius:15px;">
                <div class="input-group">
                    <label>更換顯示名稱</label>
                    <input type="text" id="edit-name">
                </div>
                <div class="input-group">
                    <label>個人簡介 (BIO)</label>
                    <input type="text" id="edit-bio" placeholder="這是一個高級的社群平台...">
                </div>
                <button class="btn-auth" onclick="saveUserData()">儲存並同步雲端</button>
                <button class="btn-auth" style="background:none; color:#ff4d4d; border:1px solid #ff4d4d; margin-top:20px;" onclick="handleLogout()">登出帳戶</button>
            </div>
        </div>
    </div>

    <script>
        let isLoginMode = true;

        // 1. 登錄/註冊切換
        function toggleAuthMode(mode) {
            isLoginMode = mode === 'login';
            document.getElementById('tab-login').classList.toggle('active', isLoginMode);
            document.getElementById('tab-register').classList.toggle('active', !isLoginMode);
            document.getElementById('reg-only-field').style.display = isLoginMode ? 'none' : 'block';
            document.getElementById('auth-submit-btn').innerText = isLoginMode ? '確認登錄' : '立即註冊';
        }

        // 2. 身份驗證邏輯
        function processAuth() {
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-pass').value;

            if(!email || !pass) return alert("請填寫完整資訊");

            if(isLoginMode) {
                // 模擬從 Supabase 驗證
                const userData = { name: email.split('@')[0], tag: email.toLowerCase() };
                localStorage.setItem('tacker_session', JSON.stringify(userData));
                enterApp();
            } else {
                // 註冊邏輯
                alert("註冊成功！現在請登錄。");
                toggleAuthMode('login');
            }
        }

        function enterApp() {
            const session = JSON.parse(localStorage.getItem('tacker_session'));
            if(session) {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('main-app').style.display = 'flex';
                updateUI(session);
            }
        }

        function handleLogout() {
            localStorage.removeItem('tacker_session');
            location.reload(); // 徹底重啟跳回登錄頁
        }

        // 3. UI 同步與設定
        function updateUI(data) {
            document.getElementById('nav-name').innerText = data.name;
            document.getElementById('nav-tag').innerText = "@" + data.tag;
            document.getElementById('nav-pfp').innerText = data.name[0].toUpperCase();
            document.getElementById('set-display-name').innerText = data.name;
            document.getElementById('set-display-tag').innerText = "@" + data.tag;
            document.getElementById('edit-name').value = data.name;
        }

        function showSettings(show) {
            document.getElementById('settings-ui').style.display = show ? 'block' : 'none';
        }

        function saveUserData() {
            const newName = document.getElementById('edit-name').value;
            const session = JSON.parse(localStorage.getItem('tacker_session'));
            session.name = newName;
            localStorage.setItem('tacker_session', JSON.stringify(session));
            updateUI(session);
            alert("雲端同步成功！");
            showSettings(false);
        }

        window.onload = () => {
            if(localStorage.getItem('tacker_session')) enterApp();
        };
    </script>
</body>
</html>
