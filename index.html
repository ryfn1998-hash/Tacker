<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tacker v2.0 | FR Tech</title>
    <style>
        :root { --p-green: #00ff41; --bg: #010409; --card: #161b22; --brd: #30363d; --ds: #5865F2; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .login-box { background: var(--card); padding: 30px; border-radius: 12px; border: 1px solid var(--brd); width: 90%; max-width: 360px; text-align: center; }
        input { width: 100%; padding: 14px; margin-bottom: 12px; background: #000; border: 1px solid var(--brd); color: white; border-radius: 6px; font-size: 16px; }
        .btn { width: 100%; padding: 14px; border-radius: 6px; font-weight: bold; cursor: pointer; border: none; margin-top: 10px; font-size: 16px; transition: 0.2s; }
        .btn-main { background: var(--p-green); color: black; }
        .btn-ds { background: var(--ds); color: white; }
        #app { display: none; position: fixed; inset: 0; background: #0d1117; z-index: 100; flex-direction: row; }
        .side { width: 260px; background: var(--card); border-right: 1px solid var(--brd); }
    </style>
</head>
<body>

    <div id="auth-page">
        <div class="login-box">
            <h2 id="ui-title" style="color:var(--p-green)">TACKER v2.0</h2>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="pass" placeholder="Password">
            <button class="btn btn-main" onclick="handleAuth()">進入系統</button>
            <button class="btn btn-ds" onclick="handleDS()">Discord 登入</button>
            <p id="ui-sw" onclick="toggleMode()" style="color:var(--p-green); cursor:pointer; margin-top:20px; font-size:13px;">[ 沒有帳號？點此註冊 ]</p>
        </div>
    </div>

    <div id="app">
        <aside class="side">
            <div style="padding:20px; font-weight:bold; color:var(--p-green); border-bottom:1px solid var(--brd)">TACKER PRIVATE</div>
            <div style="padding:15px; cursor:pointer;" onclick="alert('載入好友中...')">👤 Shadow (管理員)</div>
            <button onclick="location.reload()" style="margin-top:auto; padding:15px; background:none; color:red; border:none; cursor:pointer;">登出系統</button>
        </aside>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const S_URL = 'https://coyiifxxfopvabpjszis.supabase.co';
        const S_KEY = 'sb_publishable_ZaDrVW5Goe5QFqL4rBvNCg_JrwHKIFH';
        let supabase;
        
        try {
            supabase = window.supabase.createClient(S_URL, S_KEY);
        } catch(e) {
            console.error("Supabase 初始化失敗");
        }

        let isSign = false;

        function toggleMode() {
            isSign = !isSign;
            document.getElementById('ui-title').innerText = isSign ? "建立新帳號" : "TACKER v2.0";
            document.getElementById('ui-sw').innerText = isSign ? "[ 已有帳號？返回登入 ]" : "[ 沒有帳號？點此註冊 ]";
        }

        async function handleAuth() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            if(!email || !pass) return alert("請輸入完整帳密");

            try {
                const { error } = isSign 
                    ? await supabase.auth.signUp({ email, password: pass })
                    : await supabase.auth.signInWithPassword({ email, password: pass });
                
                if(error) alert(error.message);
                else location.reload(); // 成功後刷新自動進入
            } catch(e) {
                alert("網路連線異常，請重試");
            }
        }

        async function handleDS() {
            await supabase.auth.signInWithOAuth({ provider: 'discord' });
        }

        // 自動檢查登入
        window.onload = async () => {
            const { data } = await supabase.auth.getSession();
            if (data?.session) {
                document.getElementById('auth-page').style.display = 'none';
                document.getElementById('app').style.display = 'flex';
            }
        }
    </script>
</body>
</html>
