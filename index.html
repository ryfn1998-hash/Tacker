<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tacker | Google Login</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg-auth: #313338; --accent: #5865f2; --text: #f2f3f5; }
        * { box-sizing: border-box; font-family: 'gg sans', sans-serif; margin: 0; padding: 0; }
        body { 
            background: #5865f2 url('https://discord.com/assets/7c01f740da893444036e.png') center/cover; 
            height: 100vh; display: flex; align-items: center; justify-content: center; 
        }
        .auth-card { 
            background: var(--bg-auth); width: 400px; padding: 32px; border-radius: 8px; 
            text-align: center; color: var(--text); box-shadow: 0 8px 16px rgba(0,0,0,0.3); 
        }
        .google-btn {
            width: 100%; padding: 12px; background: white; color: #757575; border: none; 
            border-radius: 4px; font-weight: bold; cursor: pointer; display: flex; 
            align-items: center; justify-content: center; gap: 10px; margin-top: 20px;
            font-size: 16px; transition: 0.2s;
        }
        .google-btn:hover { background: #eeeeee; }
    </style>
</head>
<body>

    <div class="auth-card">
        <h2>Tacker</h2>
        <p style="color:#b5bac1; margin-top:8px;">使用 Google 帳號安全進入</p>
        
        <button class="google-btn" onclick="loginWithGoogle()">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20">
            使用 Google 登入
        </button>

        <p style="font-size: 12px; color: #949ba4; margin-top: 24px;">
            登入即代表同意 FR Technology 的服務條款。
        </p>
    </div>

    <script>
        const _supabase = supabase.createClient(
            'https://coyiifxxfopvabpjszis.supabase.co', 
            'sb_publishable_ZaDrVW5Goe5QFqL4rBvNCg_JrwHKIFH'
        );

        async function loginWithGoogle() {
            const { data, error } = await _supabase.auth.signInWithOAuth({
                provider: 'google',
                options: {
                    // 登入成功後，跳轉回你目前的網頁
                    redirectTo: window.location.href 
                }
            });

            if (error) alert("Google 登入失敗：" + error.message);
        }

        // 檢查是否已經登入成功（從 Google 跳轉回來後）
        async function checkUser() {
            const { data: { user } } = await _supabase.auth.getUser();
            if (user) {
                alert("歡迎回來，" + user.user_metadata.full_name);
                // 這裡直接銜接進入你的主程式畫面 (圖一、圖三)
                enterMainApp(user);
            }
        }
        window.onload = checkUser;

        function enterMainApp(user) {
            // 負責人，這裡我們會放入你之前的圖一、圖三 HTML 代碼
            console.log("已登入用戶個資：", user);
        }
    </script>
</body>
</html>
