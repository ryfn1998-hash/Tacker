<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tacker Fix</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #010409; color: #00ff41; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: #161b22; padding: 30px; border: 1px solid #30363d; border-radius: 8px; width: 300px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #30363d; color: #fff; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #00ff41; color: #000; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .link { margin-top: 20px; font-size: 14px; cursor: pointer; text-decoration: underline; }
        #main { display: none; padding: 20px; text-align: center; }
    </style>
</head>
<body>

    <div id="auth-ui" class="box">
        <h2 id="title">TACKER 登入</h2>
        <input type="email" id="email" placeholder="信箱">
        <input type="password" id="pw" placeholder="密碼">
        <button id="btn" onclick="handle()">立即進入</button>
        <div class="link" id="switch" onclick="toggle()">[ 沒有帳號？點此註冊 ]</div>
    </div>

    <div id="main">
        <h1>連線成功</h1>
        <p>歡迎進入 FR Tech 系統</p>
        <button onclick="location.reload()" style="background:#ff4141">登出</button>
    </div>

    <script>
        const S_URL = 'https://coyiifxxfopvabpjszis.supabase.co';
        const S_KEY = 'sb_publishable_ZaDrVW5Goe5QFqL4rBvNCg_JrwHKIFH';
        const supabase = window.supabase.createClient(S_URL, S_KEY);

        let isSign = false;

        function toggle() {
            isSign = !isSign;
            document.getElementById('title').innerText = isSign ? "註冊帳號" : "TACKER 登入";
            document.getElementById('btn').innerText = isSign ? "立即註冊" : "立即進入";
            document.getElementById('switch').innerText = isSign ? "[ 已有帳號？返回登入 ]" : "[ 沒有帳號？點此註冊 ]";
        }

        async function handle() {
            const e = document.getElementById('email').value;
            const p = document.getElementById('pw').value;
            if(!e || !p) return alert("請輸入帳密");

            const { data, error } = isSign 
                ? await supabase.auth.signUp({email:e, password:p})
                : await supabase.auth.signInWithPassword({email:e, password:p});

            if(error) {
                alert("錯誤: " + error.message);
            } else {
                document.getElementById('auth-ui').style.display = 'none';
                document.getElementById('main').style.display = 'block';
            }
        }
    </script>
</body>
</html>
