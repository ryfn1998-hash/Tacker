<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tacker Pro | Ultimate Official Version</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        :root { 
            --bg: #000; 
            --card: #111; 
            --acc: #23a559; 
            --official: #f1c40f; 
            --text: #fff; 
            --sub: #888; 
            --danger: #f23f43; 
        }
        
        * { box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
        body, html { margin:0; padding:0; height:100%; background:var(--bg); color:var(--text); overflow:hidden; }

        .screen { position: absolute; width: 100%; height: 100%; display: none; flex-direction: column; z-index: 10; }
        .active { display: flex; }

        /* --- 原版開場動畫 (嚴格保留) --- */
        #s-home { background: #fff; color: #000; align-items: center; justify-content: center; text-align: center; }
        .big-tacker { font-weight: 900; transform: scale(10); opacity: 0; animation: zoomIn 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes zoomIn { 
            0% { transform: scale(12); opacity: 0; } 
            100% { transform: scale(1); opacity: 1; font-size: clamp(60px, 15vw, 100px); letter-spacing: 2px; } 
        }
        .float-btn { 
            margin-top: 50px; padding: 18px 60px; background: #000; color: #fff; border: none; border-radius: 50px; 
            font-size: 18px; font-weight: bold; cursor: pointer; opacity: 0; transform: translateY(30px); 
            animation: fadeUp 0.8s 1s forwards; transition: 0.3s; 
        }
        @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

        /* --- 側邊欄 (Rail) --- */
        .rail { width: 65px; background: #050505; flex-shrink: 0; display: flex; flex-direction: column; align-items: center; padding: 25px 0; gap: 20px; border-right: 1px solid #222; overflow-y: auto; }
        .rail div { cursor: pointer; transition: 0.2s; position: relative; }
        .rail i { pointer-events: none; }
        
        .dm-nav { width: 45px; height: 45px; border-radius: 50%; border: 2px solid transparent; overflow: visible; }
        .dm-nav img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        .dm-nav.active { border-color: var(--acc); }
        .red-dot { position: absolute; top: -2px; right: -2px; width: 14px; height: 14px; background: var(--danger); border-radius: 50%; border: 2.5px solid #000; display: none; }

        /* --- 主內容區 --- */
        .main { flex-grow: 1; background: #111; display: flex; flex-direction: column; }
        header { height: 60px; border-bottom: 1px solid #222; display: flex; align-items: center; padding: 0 20px; justify-content: space-between; }
        
        /* --- 右上角數據儀表板 --- */
        .badge-box { display: flex; gap: 8px; }
        .badge { background: rgba(255,255,255,0.05); padding: 5px 12px; border-radius: 20px; color: var(--sub); border: 1px solid #222; font-size: 12px; white-space: nowrap; }
        .badge b { color: var(--text); margin-left: 4px; }

        /* --- 訊息串流 --- */
        #chat-flow { flex-grow: 1; overflow-y: auto; padding: 15px 0; scroll-behavior: smooth; }
        .msg-row { display: flex; gap: 12px; margin-bottom: 22px; padding: 0 15px; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        .pfp { width: 44px; height: 44px; border-radius: 50%; background: #222; border: 1px solid #333; flex-shrink: 0; cursor: pointer; overflow: hidden; }
        .pfp img { width: 100%; height: 100%; object-fit: cover; }
        
        .msg-content { flex-grow: 1; }
        .msg-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
        .msg-text { color: #eee; font-size: 15px; word-break: break-all; line-height: 1.4; }
        .msg-img { max-width: 250px; max-height: 350px; border-radius: 12px; margin-top: 8px; border: 1px solid #333; cursor: zoom-in; display: block; }

        /* --- 輸入框 --- */
        .input-bar { padding: 15px; border-top: 1px solid #222; background: #0a0a0a; display: flex; gap: 12px; align-items: center; }
        .input-bar input { flex-grow: 1; padding: 13px 18px; background: #1e1e1e; border: 1px solid #333; color: #fff; border-radius: 25px; outline: none; transition: 0.2s; }
        .input-bar input:focus { border-color: var(--acc); background: #252525; }
        .send-btn { background: var(--acc); border: none; color: #fff; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .send-btn:active { transform: scale(0.9); }

        /* --- Modal 彈窗 --- */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .panel { background: var(--card); border: 1px solid #333; border-radius: 24px; width: 320px; overflow: hidden; position: relative; }
        .panel button { width: 100%; padding: 14px; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .panel button:active { opacity: 0.8; }
    </style>
</head>
<body>

    <section id="s-home" class="screen active">
        <div class="big-tacker">Tacker</div>
        <button class="float-btn" onclick="checkAuth()">進入 ——＞</button>
    </section>

    <section id="s-login" class="screen" style="background:#f5f5f5; align-items:center; justify-content:center;">
        <div style="background:#fff; width:340px; padding:40px; border-radius:20px; color:#333; box-shadow: 0 20px 40px rgba(0,0,0,0.1);">
            <h2 style="margin:0 0 10px; font-weight:900; font-size: 28px;">Welcome</h2>
            <p style="color:#888; margin-bottom: 30px;">請驗證您的 Tacker 帳號</p>
            <input id="u-id" placeholder="帳號 ID" style="width:100%; padding:15px; margin-bottom:15px; border:1px solid #ddd; border-radius:12px; outline:none;">
            <input id="u-pw" type="password" placeholder="密碼" style="width:100%; padding:15px; margin-bottom:25px; border:1px solid #ddd; border-radius:12px; outline:none;">
            <button onclick="auth()" style="width:100%; padding:16px; background:#000; color:#fff; border:none; border-radius:12px; font-weight:bold; font-size:16px; cursor:pointer;">登入系統</button>
        </div>
    </section>

    <section id="s-load" class="screen" style="align-items:center; justify-content:center; background:#000;">
        <div style="width:200px; height:4px; background:#222; border-radius:10px; overflow:hidden; margin-bottom:15px;">
            <div id="bar" style="width:0%; height:100%; background:var(--acc); transition:0.1s;"></div>
        </div>
        <div id="percent" style="font-size:12px; color:var(--sub); font-weight:bold; letter-spacing: 1px;">INITIALIZING... 0%</div>
    </section>

    <section id="s-app" class="screen">
        <div style="display:flex; height:100%;">
            <nav class="rail">
                <div onclick="tab('chat')" id="nav-chat" style="color:var(--acc); font-size:24px;"><i class="fa-solid fa-earth-asia"></i></div>
                <div onclick="tab('me')" id="nav-me" style="color:#444; font-size:24px;"><i class="fa-solid fa-shield-halved"></i></div>
                <div style="width:30px; height:1px; background:#222; margin:5px 0;"></div>
                <div id="dm-list" style="display:flex; flex-direction:column; gap:18px; align-items:center;"></div>
            </nav>

            <main id="chat-tab" class="main">
                <header>
                    <b id="main-title" style="font-size:18px; letter-spacing: 0.5px;">全球大廳</b>
                    <div style="display:flex; align-items:center; gap:15px;">
                        <i id="block-btn" class="fa-solid fa-ban" style="display:none; cursor:pointer; font-size:20px; color:#444;" onclick="toggleBlock()"></i>
                        <div class="badge-box">
                            <div class="badge">用戶 <b id="total-count">0</b></div>
                            <div class="badge">在線 <b id="online-count">0</b></div>
                        </div>
                    </div>
                </header>
                
                <div id="chat-flow">
                    <div id="messages"></div>
                </div>

                <div class="input-bar">
                    <input id="m-input" placeholder="撰寫訊息..." onkeypress="if(event.key==='Enter') send()">
                    <button class="send-btn" onclick="send()"><i class="fa-solid fa-paper-plane"></i></button>
                </div>
            </main>

            <main id="me-tab" class="main" style="display:none; padding:30px; overflow-y:auto;">
                <h2 style="font-weight:900; font-size: 32px; margin-bottom: 30px;">Profile</h2>
                <div style="text-align:center; margin-bottom:40px;">
                    <div style="position:relative; display:inline-block;">
                        <img id="current-pfp" style="width:120px; height:120px; border-radius:50%; border:4px solid var(--acc); object-fit:cover; background:#222;">
                    </div>
                </div>
                <label style="color:var(--sub); font-size: 12px; font-weight: bold; margin-bottom: 8px; display: block;">顯示名稱</label>
                <input id="edit-name" style="width:100%; background:#1e1e1e; border:1px solid #333; color:#fff; padding:15px; border-radius:12px; margin-bottom:20px; outline:none;">
                
                <label style="color:var(--sub); font-size: 12px; font-weight: bold; margin-bottom: 8px; display: block;">個人簡介</label>
                <textarea id="edit-bio" style="width:100%; height:100px; background:#1e1e1e; border:1px solid #333; color:#fff; padding:15px; border-radius:12px; resize:none; margin-bottom:30px; outline:none;"></textarea>
                
                <button onclick="saveProfile()" style="width:100%; padding:18px; background:var(--acc); color:#fff; font-weight:bold; border-radius:15px; border:none; font-size:16px; margin-bottom:15px;">儲存變更</button>
                <button onclick="logout()" style="width:100%; padding:10px; color:var(--danger); background:none; border:none; font-weight:bold; cursor:pointer;">登出目前帳號</button>
            </main>
        </div>
    </section>

    <div id="user-modal" class="modal" onclick="this.style.display='none'">
        <div class="panel" onclick="event.stopPropagation()">
            <div style="height:100px; background:linear-gradient(135deg, #111, #333);"></div>
            <div style="padding:0 25px 25px; margin-top:-40px;">
                <div id="modal-pfp" style="width:80px; height:80px; border-radius:50%; border:5px solid var(--card); background:#000; overflow:hidden;"></div>
                <h2 id="modal-name" style="margin:15px 0 5px; font-weight:800;"></h2>
                <p id="modal-bio" style="font-size:14px; color:#aaa; min-height:45px; line-height:1.5; margin-bottom:20px;"></p>
                <div id="modal-actions" style="display:flex; flex-direction:column; gap:10px;"></div>
            </div>
        </div>
    </div>

    <script>
        // --- 1. 初始化與 Firebase 配置 ---
        const config = { 
            apiKey: "AIzaSyB56chNeodbgAYa8k3xspOOAMYt6C5M4cw", 
            databaseURL: "https://tacker-ebc5a-default-rtdb.firebaseio.com", 
            projectId: "tacker-ebc5a" 
        };
        firebase.initializeApp(config);
        const db = firebase.database();

        // 【官方特權 ID 名單】
        const OFFICIAL_UIDS = ['admin', 'your_id_here']; 
        let me = null;
        let currentChat = 'global';

        function isOfficial(uid = me?.uid) { return OFFICIAL_UIDS.includes(uid); }

        // --- 2. 登入邏輯 (老實寫，不簡化) ---
        function checkAuth() {
            const saved = localStorage.getItem('tacker_session');
            if(saved) {
                me = JSON.parse(saved);
                startLoad();
            } else {
                go('s-login');
            }
        }

        async function auth() {
            const uid = document.getElementById('u-id').value.trim();
            const pw = document.getElementById('u-pw').value.trim();
            if(!uid || !pw) return alert("請輸入完整帳密");

            try {
                const s = await db.ref(`users/${uid}`).get();
                if(s.exists()) {
                    const data = s.val();
                    if(data.temp_pw === pw) {
                        me = { uid, ...data };
                        localStorage.setItem('tacker_session', JSON.stringify(me));
                        startLoad();
                    } else {
                        alert("密碼不正確");
                    }
                } else {
                    alert("該帳號不存在");
                }
            } catch (e) {
                alert("連接資料庫失敗");
            }
        }

        function startLoad() {
            go('s-load');
            let p = 0;
            const t = setInterval(() => {
                p += 5;
                if(p > 100) {
                    clearInterval(t);
                    initApp();
                }
                document.getElementById('bar').style.width = p + '%';
                document.getElementById('percent').innerText = `INITIALIZING... ${p}%`;
            }, 30);
        }

        // --- 3. 核心應用程式初始化 ---
        function initApp() {
            go('s-app');
            // 在線狀態監控
            db.ref(`presence/${me.uid}`).set(true);
            db.ref(`presence/${me.uid}`).onDisconnect().remove();
            
            // 右上角雙儀表板監聽
            db.ref('presence').on('value', s => document.getElementById('online-count').innerText = s.numChildren());
            db.ref('users').on('value', s => document.getElementById('total-count').innerText = s.numChildren());
            
            // 載入個人資料
            document.getElementById('current-pfp').src = me.pfp || "";
            document.getElementById('edit-name').value = me.full_name || "";
            document.getElementById('edit-bio').value = me.bio || "";

            listenGlobal();
            listenContacts();
        }

        function go(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        // --- 4. 訊息渲染 (全功能版：圖片 + 官方刪除權限) ---
        function render(snap, path) {
            const box = document.getElementById('messages');
            box.innerHTML = '';
            
            snap.forEach(d => {
                const m = d.val();
                const mid = d.key;
                const isOff = isOfficial(m.uid);
                
                // 權限判斷：官方能刪除所有、一般人能刪除自己
                const canDel = isOfficial(me.uid) || (m.uid === me.uid);
                
                // 圖片偵測邏輯
                let body = `<div class="msg-text">${m.t}</div>`;
                if (m.t.match(/\.(jpeg|jpg|gif|png|webp|bmp)/i) || m.t.startsWith('data:image')) {
                    body = `<img src="${m.t}" class="msg-img" onclick="window.open('${m.t}')">`;
                }

                box.innerHTML += `
                    <div class="msg-row">
                        <div class="pfp" onclick="showUser('${m.uid}')"><img src="${m.pfp}"></div>
                        <div class="msg-content">
                            <div class="msg-header">
                                <b style="color:${isOff ? 'var(--official)' : 'var(--acc)'}; font-size:12px;">
                                    ${m.u} ${isOff ? '<i class="fa-solid fa-circle-check"></i>' : ''}
                                </b>
                                ${canDel ? `<i class="fa-solid fa-trash-can" style="cursor:pointer; color:#444; font-size:12px;" onclick="deleteMsg('${path}/${mid}')"></i>` : ''}
                            </div>
                            ${body}
                        </div>
                    </div>`;
            });
            const flow = document.getElementById('chat-flow');
            flow.scrollTop = flow.scrollHeight;
        }

        async function deleteMsg(fullPath) {
            if(confirm("確定要刪除這條訊息嗎？")) {
                await db.ref(fullPath).remove();
            }
        }

        // --- 5. 發送邏輯 (含禁言檢查) ---
        async function send() {
            const inp = document.getElementById('m-input');
            const val = inp.value.trim();
            if(!val) return;

            // 非官方用戶需檢查權限
            if(!isOfficial()) {
                if(currentChat === 'global') {
                    const mute = await db.ref(`global_mutes/${me.uid}`).get();
                    if(mute.exists()) return alert("你已被官方禁言。");
                } else {
                    const block = await db.ref(`users/${currentChat}/blocks/${me.uid}`).get();
                    if(block.exists()) return alert("對方已封鎖你。");
                }
            }

            const data = { 
                u: me.full_name, 
                uid: me.uid, 
                pfp: me.pfp || '', 
                t: val, 
                ts: Date.now() 
            };

            if(currentChat === 'global') {
                db.ref('chats/global').push(data);
            } else {
                const rid = getRoomId(currentChat);
                db.ref(`chats/private/${rid}/msgs`).push(data);
                db.ref(`chats/private/${rid}/unread/${currentChat}`).set(true);
            }
            inp.value = '';
        }

        // --- 6. 導覽與私聊邏輯 ---
        function tab(t) {
            document.getElementById('chat-tab').style.display = t==='chat'?'flex':'none';
            document.getElementById('me-tab').style.display = t==='me'?'block':'none';
            document.getElementById('nav-chat').style.color = t==='chat'?'var(--acc)':'#444';
            document.getElementById('nav-me').style.color = t==='me'?'var(--acc)':'#444';
            
            if(t==='chat') {
                currentChat = 'global';
                document.getElementById('main-title').innerText = '全球大廳';
                document.getElementById('block-btn').style.display = 'none';
                document.querySelectorAll('.dm-nav').forEach(el => el.classList.remove('active'));
                listenGlobal();
            }
        }

        function switchChat(id, name) {
            currentChat = id;
            tab('chat');
            document.getElementById('nav-chat').style.color = '#444';
            document.getElementById('main-title').innerText = name;
            
            // 標示點選狀態
            document.querySelectorAll('.dm-nav').forEach(el => el.classList.remove('active'));
            const navIcon = document.getElementById(`nav-dm-${id}`);
            if(navIcon) navIcon.classList.add('active');

            // 封鎖按鈕持久化修復
            const bBtn = document.getElementById('block-btn');
            bBtn.style.display = 'block';
            db.ref(`users/${me.uid}/blocks/${id}`).on('value', s => {
                bBtn.style.color = s.exists() ? 'var(--danger)' : '#444';
            });

            // 清除未讀紅點
            db.ref(`chats/private/${getRoomId(id)}/unread/${me.uid}`).set(false);
            listenPrivate(id);
        }

        function listenContacts() {
            db.ref(`users/${me.uid}/contacts`).on('value', snap => {
                const list = document.getElementById('dm-list');
                list.innerHTML = '';
                snap.forEach(d => {
                    const u = d.val();
                    const uid = d.key;
                    list.innerHTML += `
                        <div class="dm-nav" id="nav-dm-${uid}" onclick="switchChat('${uid}', '${u.name}')">
                            <img src="${u.pfp}">
                            <div class="red-dot" id="dot-${uid}"></div>
                        </div>`;
                    // 監聽各別紅點
                    db.ref(`chats/private/${getRoomId(uid)}/unread/${me.uid}`).on('value', s => {
                        const dot = document.getElementById(`dot-${uid}`);
                        if(dot) dot.style.display = s.val() ? 'block' : 'none';
                    });
                });
            });
        }

        // --- 7. 管理員權限面板 ---
        async function showUser(uid) {
            const s = await db.ref(`users/${uid}`).get();
            if(!s.exists()) return;
            const u = s.val();

            document.getElementById('modal-name').innerHTML = u.full_name + (isOfficial(uid) ? ' <i class="fa-solid fa-circle-check" style="color:var(--official)"></i>' : '');
            document.getElementById('modal-bio').innerText = u.bio || "這個人很懶，什麼都沒留下。";
            document.getElementById('modal-pfp').innerHTML = `<img src="${u.pfp}" style="width:100%;height:100%;object-fit:cover;">`;
            
            const actions = document.getElementById('modal-actions');
            actions.innerHTML = '';

            // 基本私訊按鈕
            const dmBtn = document.createElement('button');
            dmBtn.style.background = "var(--acc)";
            dmBtn.style.color = "#fff";
            dmBtn.innerText = isOfficial() ? "官方強制發訊" : "發起私訊邀請";
            dmBtn.onclick = async () => {
                if(isOfficial()) {
                    await db.ref(`users/${me.uid}/contacts/${uid}`).set({ name: u.full_name, pfp: u.pfp });
                    switchChat(uid, u.full_name);
                } else {
                    db.ref(`dm_requests/${uid}/${me.uid}`).set({ fromName: me.full_name, fromPfp: me.pfp });
                    alert("邀請已發送");
                }
                document.getElementById('user-modal').style.display = 'none';
            };
            actions.appendChild(dmBtn);

            // 官方專用：全球禁言按鈕
            if(isOfficial() && uid !== me.uid) {
                const muteBtn = document.createElement('button');
                const muteRef = db.ref(`global_mutes/${uid}`);
                const isMuted = (await muteRef.get()).exists();
                
                muteBtn.innerText = isMuted ? "解除全球禁言" : "禁止全球發言";
                muteBtn.style.background = isMuted ? "#444" : "var(--danger)";
                muteBtn.style.color = "#fff";
                muteBtn.onclick = async () => {
                    if(isMuted) await muteRef.remove();
                    else await muteRef.set(true);
                    alert("操作成功");
                    document.getElementById('user-modal').style.display = 'none';
                };
                actions.appendChild(muteBtn);
            }

            document.getElementById('user-modal').style.display = 'flex';
        }

        // --- 8. 輔助函數 ---
        function getRoomId(uid) { return [me.uid, uid].sort().join('_'); }
        function listenGlobal() { db.ref('chats/global').limitToLast(50).on('value', s => render(s, 'chats/global')); }
        function listenPrivate(uid) { db.ref(`chats/private/${getRoomId(uid)}/msgs`).limitToLast(50).on('value', s => render(s, `chats/private/${getRoomId(uid)}/msgs`)); }

        async function toggleBlock() {
            const ref = db.ref(`users/${me.uid}/blocks/${currentChat}`);
            const s = await ref.get();
            if(s.exists()) await ref.remove(); else await ref.set(true);
        }

        async function saveProfile() {
            const n = document.getElementById('edit-name').value;
            const b = document.getElementById('edit-bio').value;
            await db.ref(`users/${me.uid}`).update({ full_name: n, bio: b });
            me.full_name = n; me.bio = b;
            localStorage.setItem('tacker_session', JSON.stringify(me));
            alert("個人資料已更新");
        }

        function logout() {
            localStorage.removeItem('tacker_session');
            location.reload();
        }
    </script>
</body>
</html>
