<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tacker Ultimate | FR Technology</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, set, update, get, push, remove, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // Firebase 配置
        const firebaseConfig = {
            apiKey: "AIzaSyB56chNeodbgAYa8k3xspOOAMYt6C5M4cw",
            authDomain: "tacker-ebc5a.firebaseapp.com",
            databaseURL: "https://tacker-ebc5a-default-rtdb.firebaseio.com",
            projectId: "tacker-ebc5a",
            storageBucket: "tacker-ebc5a.firebasestorage.app",
            appId: "1:689763297968:web:7acf6b857fc89a17d62975"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let currentUser = null;

        // --- 1. 首頁入口與智慧跳轉邏輯 ---
        window.checkEntry = async () => {
            const savedID = localStorage.getItem('tacker_id');
            const savedPW = localStorage.getItem('tacker_pw');

            if (savedID && savedPW) {
                // 自動嘗試登入
                const snap = await get(ref(db, 'users/' + savedID));
                if (snap.exists() && snap.val().temp_pw === savedPW) {
                    currentUser = { id: savedID, ...snap.val() };
                    enterApp();
                    return;
                }
            }
            // 無登入紀錄則進入登入介面
            document.getElementById('home-screen').style.display = 'none';
            document.getElementById('auth-screen').style.display = 'flex';
        };

        // --- 2. 登入邏輯與 Aternos 進度條 ---
        window.startLogin = async () => {
            const id = document.getElementById('l-id').value;
            const pw = document.getElementById('l-pw').value;
            if(!id || !pw) return alert("請輸入完整帳密");

            document.getElementById('login-box').style.display = 'none';
            document.getElementById('loader').style.display = 'flex';
            
            let prog = 0;
            const bar = document.getElementById('p-bar');
            const interval = setInterval(async () => {
                prog += Math.random() * 15;
                if(prog >= 100) {
                    prog = 100;
                    clearInterval(interval);
                    const snap = await get(ref(db, 'users/' + id));
                    if(snap.exists() && snap.val().temp_pw === pw) {
                        localStorage.setItem('tacker_id', id);
                        localStorage.setItem('tacker_pw', pw);
                        currentUser = { id, ...snap.val() };
                        enterApp();
                    } else { alert("驗證失敗"); location.reload(); }
                }
                bar.style.width = prog + '%';
            }, 100);
        };

        // --- 3. 進入主介面與左上角自介系統 ---
        function enterApp() {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('home-screen').style.display = 'none';
            document.getElementById('app-view').style.display = 'flex';
            
            // 更新左上角狀態
            updateStatus('online');
            syncUserData();
            syncChat();
            syncFriends();
        }

        function updateStatus(status) {
            update(ref(db, 'users/' + currentUser.id), { status: status });
            const colors = { online: '#23a559', dnd: '#f23f43', idle: '#faa61a', offline: '#80848e' };
            document.getElementById('status-dot').style.backgroundColor = colors[status];
        }

        // --- 4. 訊息邏輯：靠左對齊、編輯與刪除 ---
        window.sendMsg = () => {
            const input = document.getElementById('chat-input');
            const txt = input.value.trim();
            if(!txt || txt.length > 1000) return;

            push(ref(db, 'global_chat'), {
                uid: currentUser.id,
                name: currentUser.full_name,
                msg: txt,
                time: serverTimestamp()
            });
            input.value = '';
        };

        function syncChat() {
            onValue(ref(db, 'global_chat'), (snap) => {
                const flow = document.getElementById('chat-flow');
                flow.innerHTML = '';
                const data = snap.val();
                for(let k in data) {
                    const m = data[k];
                    const isMe = m.uid === currentUser.id;
                    flow.innerHTML += `
                        <div class="msg-row">
                            <div class="msg-avatar" onclick="showProfile('${m.uid}')"></div>
                            <div class="msg-body">
                                <div class="msg-header">
                                    <b>${m.name}</b> <small>${new Date(m.time).toLocaleTimeString()}</small>
                                    ${isMe ? `<span class="msg-ops" onclick="deleteMsg('${k}')"><i class="fa-solid fa-trash"></i></span>` : ''}
                                </div>
                                <div class="msg-text">${m.msg}</div>
                            </div>
                        </div>`;
                }
                flow.scrollTop = flow.scrollHeight;
            });
        }

        window.deleteMsg = (key) => { if(confirm("確定刪除訊息？")) remove(ref(db, 'global_chat/' + key)); };

        // --- 5. 好友邀請與消失機制 ---
        window.handleFriend = (reqId, action) => {
            if(action === 'accept') {
                // 建立雙向好友關係
                update(ref(db, `friends/${currentUser.id}/${reqId}`), { status: 'friend' });
                update(ref(db, `friends/${reqId}/${currentUser.id}`), { status: 'friend' });
            }
            // 拒絕或接受後皆移除請求通知
            remove(ref(db, `requests/${currentUser.id}/${reqId}`));
        };

        function syncUserData() {
            onValue(ref(db, 'users/' + currentUser.id), (snap) => {
                const d = snap.val();
                document.getElementById('u-name').innerText = d.full_name;
                document.getElementById('u-tag').innerText = `@${currentUser.id}`;
                document.getElementById('p-card-name').innerText = d.full_name;
                document.getElementById('p-card-bio').innerText = d.bio || "無介紹";
                document.getElementById('p-card-banner').style.backgroundColor = d.banner_color || '#5865f2';
            });
        }
    </script>
    <style>
        :root { --bg: #0b0c0d; --panel: #1e1f22; --main: #313338; --brand: #5865f2; --text: #dbdee1; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }

        /* --- 1. 首頁入口 --- */
        #home-screen { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #000; }
        .home-title { font-size: 60px; color: var(--brand); letter-spacing: 10px; margin: 0; }
        .home-sub { color: #888; margin: 10px 0 40px; }
        .entry-btn { position: fixed; bottom: 50px; right: 50px; background: var(--brand); color: #fff; border: none; padding: 15px 40px; border-radius: 5px; font-weight: bold; cursor: pointer; }

        /* --- 2. 登入與進度條 --- */
        #auth-screen { display: none; height: 100vh; align-items: center; justify-content: center; background: #111; }
        .login-card { background: var(--panel); padding: 40px; border-radius: 10px; width: 300px; text-align: center; box-shadow: 0 10px 30px #000; }
        .p-track { width: 100%; height: 8px; background: #333; border-radius: 10px; margin: 20px 0; overflow: hidden; }
        .p-bar { width: 0%; height: 100%; background: #23a559; transition: 0.1s; }

        /* --- 3. 主佈局 --- */
        #app-view { display: none; height: 100vh; }
        .sidebar { width: 240px; background: var(--panel); display: flex; flex-direction: column; border-right: 1px solid #111; }
        
        /* 左上角自介區 */
        .top-profile { padding: 15px; background: rgba(0,0,0,0.2); border-bottom: 1px solid #333; position: relative; cursor: pointer; }
        .avatar-wrap { position: relative; width: 40px; height: 40px; }
        .u-avatar { width: 40px; height: 40px; background: var(--brand); border-radius: 50%; }
        .status-dot { width: 12px; height: 12px; border-radius: 50%; border: 3px solid var(--panel); position: absolute; bottom: 0; right: 0; }

        /* 聊天區：靠左對齊 */
        .main-chat { flex: 1; display: flex; flex-direction: column; background: var(--main); }
        #chat-flow { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .msg-row { display: flex; gap: 15px; align-items: flex-start; text-align: left; }
        .msg-avatar { width: 40px; height: 40px; background: #444; border-radius: 50%; flex-shrink: 0; cursor: pointer; }
        .msg-body { max-width: 80%; }
        .msg-ops { margin-left: 10px; color: #f23f43; cursor: pointer; font-size: 12px; opacity: 0.5; }
        .msg-ops:hover { opacity: 1; }

        /* 檔案卡片 */
        .p-card { position: fixed; top: 70px; left: 10px; width: 280px; background: #111; border-radius: 10px; display: none; border: 1px solid #333; z-index: 1000; overflow: hidden; }
        .p-banner { height: 60px; }
        .p-info { padding: 40px 15px 15px; position: relative; }
        .p-avatar-big { width: 60px; height: 60px; background: #555; border: 4px solid #111; border-radius: 50%; position: absolute; top: -30px; left: 15px; }
    </style>
</head>
<body>

    <div id="home-screen">
        <h1 class="home-title">TACKER</h1>
        <p class="home-sub">永遠・免費</p>
        <button class="entry-btn" onclick="checkEntry()">進入 <i class="fa-solid fa-arrow-right"></i></button>
    </div>

    <div id="auth-screen">
        <div class="login-card" id="login-box">
            <h2 style="color:var(--brand)">TACKER 登入</h2>
            <input id="l-id" placeholder="Tacker ID">
            <input id="l-pw" type="password" placeholder="Password">
            <button class="entry-btn" style="position:static; margin-top:20px; width:100%;" onclick="startLogin()">登入</button>
        </div>
        <div class="login-card" id="loader" style="display:none; flex-direction:column;">
            <h3>對接雲端資料中...</h3>
            <div class="p-track"><div id="p-bar" class="p-bar"></div></div>
        </div>
    </div>

    <div id="app-view">
        <aside class="sidebar">
            <div class="top-profile" onclick="document.getElementById('my-p-card').style.display='block'">
                <div style="display:flex; align-items:center; gap:12px;">
                    <div class="avatar-wrap">
                        <div class="u-avatar"></div>
                        <div id="status-dot" class="status-dot"></div>
                    </div>
                    <div>
                        <div id="u-name" style="font-weight:bold; font-size:14px;">Name</div>
                        <div id="u-tag" style="font-size:11px; color:#888;">@ID</div>
                    </div>
                </div>
            </div>
            
            <div style="flex:1; padding:20px;">
                <div style="font-size:12px; color:#888; text-transform:uppercase; margin-bottom:10px;">好友請求</div>
                <div id="friend-req-list"></div>
            </div>
        </aside>

        <main class="main-chat">
            <header style="height:48px; border-bottom:1px solid #222; display:flex; align-items:center; padding:0 20px;"># 全球大廳</header>
            <div id="chat-flow"></div>
            <div style="padding:20px;">
                <input id="chat-input" placeholder="傳送訊息 (限制 1000 字)..." onkeypress="if(event.key==='Enter') sendMsg()" style="background:#383a40; border:none; padding:15px; width:100%; color:#fff; border-radius:8px; box-sizing:border-box;">
            </div>
        </main>

        <div id="my-p-card" class="p-card" onclick="this.style.display='none'">
            <div id="p-card-banner" class="p-banner"></div>
            <div class="p-info">
                <div class="p-avatar-big"></div>
                <h3 id="p-card-name" style="margin:0;">Name</h3>
                <p id="p-card-bio" style="font-size:13px; color:#bbb; margin:10px 0;">Bio</p>
                <div style="font-size:11px; color:#888; border-top:1px solid #333; padding-top:10px;">點擊任意處關閉</div>
            </div>
        </div>
    </div>

</body>
</html>
