<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tacker | Official v1.0</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #313338; --side: #2b2d31; --dark: #1e1f22; --accent: #5865f2; --text: #f2f3f5; --muted: #949ba4; }
        * { box-sizing: border-box; font-family: 'gg sans', sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); height: 100vh; display: flex; overflow: hidden; }
        .hidden { display: none !important; }

        /* P1: 登入與註冊補完頁面 */
        .overlay { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .card { background: var(--side); padding: 32px; border-radius: 8px; width: 400px; text-align: center; box-shadow: 0 8px 16px rgba(0,0,0,0.4); }
        input { width: 100%; padding: 12px; background: var(--dark); border: none; color: white; border-radius: 4px; margin: 10px 0; outline: none; }
        .btn-google { width: 100%; padding: 12px; background: white; color: #444; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-confirm { width: 100%; padding: 12px; background: var(--accent); color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; margin-top: 10px; }

        /* 主介面 (圖一/圖三) */
        #sidebar { width: 260px; background: var(--side); display: flex; flex-direction: column; border-right: 1px solid #1e1f22; }
        #main { flex: 1; position: relative; display: flex; flex-direction: column; }
        .user-tag { background: #232428; padding: 10px; display: flex; align-items: center; gap: 10px; font-size: 13px; }
        .pfp { width: 32px; height: 32px; border-radius: 50%; background: var(--accent); }

        /* 聊天室 (圖三) */
        #chat-window { flex: 1; display: flex; flex-direction: column; }
        .msg-area { flex: 1; padding: 20px; overflow-y: auto; }
        .input-wrap { padding: 20px; }
        .chat-bar { background: #383a40; border-radius: 8px; display: flex; align-items: center; padding: 0 12px; }
        .chat-bar input { background: transparent; flex: 1; padding: 12px 0; margin: 0; }
    </style>
</head>
<body>

    <div id="login-layer" class="overlay">
        <div class="card">
            <h2>Tacker</h2>
            <p style="color:var(--muted); margin: 10px 0 24px;">使用 Google 驗證身分</p>
            <button class="btn-google" onclick="signIn()">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18"> Google 登入
            </button>
        </div>
    </div>

    <div id="setup-layer" class="overlay hidden">
        <div class="card">
            <h3>完善 Tacker 資料</h3>
            <p style="font-size:12px; color:var(--muted); margin-bottom:10px;">Google 驗證成功！請設定您的帳號 ID</p>
            <input type="text" id="set-name" placeholder="顯示名稱 (例如: 暗影)">
            <input type="text" id="set-id" placeholder="帳號 ID (僅限英文與數字)">
            <button class="btn-confirm" onclick="completeSetup()">進入 Tacker</button>
        </div>
    </div>

    <div id="app" class="hidden" style="width:100%; display:flex;">
        <aside id="sidebar">
            <div style="padding:16px; font-weight:bold;">好友列表</div>
            <div style="flex:1; padding:10px;" id="friend-list">
                <div style="color:var(--muted); cursor:pointer;" onclick="alert('開啟圖二加好友視窗')">目前沒有好友 ⊕</div>
            </div>
            <div class="user-tag">
                <div class="pfp"></div>
                <div style="flex:1">
                    <div id="my-display">---</div>
                    <div id="my-uid" style="color:var(--muted); font-size:11px;">ID: ---</div>
                </div>
                <div style="cursor:pointer" onclick="alert('P1 自訂設定頁')">✏️</div>
            </div>
        </aside>

        <main id="main">
            <div id="empty-ui" style="margin:auto; text-align:center;">
                <div style="font-size:60px; opacity:0.2;">#</div>
                <h3>這裡什麼都沒有 :/</h3>
            </div>

            <div id="chat-window" class="hidden">
                <div class="msg-area" id="msg-flow"></div>
                <div class="input-wrap">
                    <div class="chat-bar">
                        <span style="cursor:pointer; margin-right:12px;" onclick="document.getElementById('f').click()">⊕</span>
                        <input type="text" id="chat-in" placeholder="發送訊息..." onkeypress="if(event.key==='Enter')send()">
                    </div>
                </div>
            </div>
        </main>
    </div>

    <input type="file" id="f" class="hidden" onchange="checkFile(this)">

    <script>
        const _s = supabase.createClient('https://coyiifxxfopvabpjszis.supabase.co', 'sb_publishable_ZaDrVW5Goe5QFqL4rBvNCg_JrwHKIFH');

        // 1. Google 登入
        async function signIn() {
            await _s.auth.signInWithOAuth({ 
                provider: 'google',
                options: { redirectTo: window.location.href }
            });
        }

        // 2. 登入後狀態檢查
        async function checkStatus() {
            const { data: { user } } = await _s.auth.getUser();
            if (!user) return;

            document.getElementById('login-layer').classList.add('hidden');
            
            // 這裡模擬：如果資料庫還沒有這個 ID，就顯示 P1 補完頁面
            // 正式版建議在此處增加資料庫查詢邏輯
            document.getElementById('setup-layer').classList.remove('hidden');
            document.getElementById('set-name').value = user.user_metadata.full_name;
        }

        // 3. 完成 P1 補完 (ID 限制)
        function completeSetup() {
            const id = document.getElementById('set-id').value;
            const name = document.getElementById('set-name').value;

            if(!/^[a-zA-Z0-9]+$/.test(id)) return alert("帳號 ID 格式錯誤！");

            document.getElementById('setup-layer').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            document.getElementById('my-display').innerText = name;
            document.getElementById('my-uid').innerText = "ID: " + id;
        }

        // 4. 檔案檢查 (10MB 限制)
        function checkFile(input) {
            const file = input.files[0];
            if (file.size > 10 * 1024 * 1024) {
                alert("檔案過大！請限制在 10MB 以內。");
                input.value = "";
            } else {
                alert("已選擇檔案: " + file.name + " (符合 10MB 規範)");
            }
        }

        window.onload = checkStatus;
    </script>
</body>
</html>
