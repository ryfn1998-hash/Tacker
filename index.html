<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tacker v667 Final Fix</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        :root { --bg: #000; --acc: #23a559; --text: #fff; --sub: #888; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body, html { margin:0; padding:0; height:100%; background:#fff; overflow:hidden; }

        /* 啟動動畫 */
        @keyframes tacker-zoom { 0% { transform: scale(3.5); opacity: 0; filter: blur(20px); } 100% { transform: scale(1); opacity: 1; filter: blur(0); } }
        @keyframes btn-float-up { 0% { transform: translateY(50px); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }

        #s-intro { background: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .tacker-logo { font-weight: 900; font-size: 85px; letter-spacing: -5px; color: #000; animation: tacker-zoom 1s forwards; }
        .entry-btn { margin-top: 50px; padding: 15px 60px; background: #000; color: #fff; border: none; border-radius: 50px; font-weight: bold; opacity: 0; animation: btn-float-up 0.8s 0.8s forwards; cursor: pointer; }

        #loading-wrap { display: none; margin-top: 30px; width: 200px; text-align: center; }
        .load-rail { width: 100%; height: 6px; background: #eee; border-radius: 10px; overflow: hidden; }
        .load-bar { width: 0%; height: 100%; background: #000; }

        /* 旁白 (左下角) */
        #toast-container { position: fixed; bottom: 20px; left: 20px; z-index: 9999; }
        .os-toast { background: #1a1a1a; color: #fff; padding: 12px 20px; border-radius: 10px; border-left: 4px solid var(--acc); font-size: 14px; margin-top: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }

        .screen { position: absolute; width: 100%; height: 100%; display: none; z-index: 10; }
        .active { display: flex; flex-direction: column; }

        /* 側邊欄：確保盾牌與好友按鈕能按 */
        #s-app { background: #000; }
        .app-body { display: flex; height: 100%; width: 100%; }
        .rail { width: 72px; background: #050505; border-right: 1px solid #222; display: flex; flex-direction: column; align-items: center; padding: 15px 0; flex-shrink: 0; position: relative; }
        .nav-icon { width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #444; margin-bottom: 12px; overflow: hidden; z-index: 100; transition: 0.2s; }
        .nav-icon img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }
        .nav-icon.active { color: var(--acc); background: rgba(35, 165, 89, 0.2); border-radius: 15px; }
        #nav-me { position: absolute; bottom: 20px; font-size: 22px; color: #444; }

        .main { flex-grow: 1; background: #111; display: flex; flex-direction: column; min-width: 0; }
        header { height: 55px; background: #0a0a0a; border-bottom: 1px solid #222; display: flex; align-items: center; padding: 0 15px; color: #fff; font-weight: bold; }

        #chat-flow { flex-grow: 1; overflow-y: auto; padding-bottom: 20px; }
        .msg-row { display: flex; gap: 12px; padding: 12px 15px; border-bottom: 1px solid rgba(255,255,255,0.02); }
        .pfp-mini { width: 40px; height: 40px; border-radius: 50%; overflow: hidden; flex-shrink: 0; cursor: pointer; }
        .pfp-mini img { width: 100%; height: 100%; object-fit: cover; }

        /* 圖片顯示修正 */
        .msg-img-body { max-width: 280px; width: 100%; border-radius: 12px; margin-top: 10px; border: 2px solid #333; display: block; cursor: pointer; }

        .input-area { padding: 15px; background: #0a0a0a; border-top: 1px solid #222; display: flex; gap: 10px; align-items: center; }
        .input-wrap { flex-grow: 1; background: #1a1a1a; border-radius: 20px; padding: 0 15px; display: flex; align-items: center; border: 1px solid #333; }
        .input-wrap input { flex-grow: 1; background: transparent; border: none; color: #fff; padding: 12px 0; outline: none; }

        /* 彈窗 GUI */
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:2000; align-items:center; justify-content:center; backdrop-filter:blur(10px); }
        .user-card { width: 300px; background: #111; border-radius: 20px; border: 1px solid #333; text-align: center; overflow: hidden; padding-bottom: 25px; }
        .card-pfp { width: 80px; height: 80px; border-radius: 50%; border: 4px solid #111; margin: -40px auto 10px; overflow: hidden; background: #222; }
    </style>
</head>
<body>

    <div id="toast-container"></div>

    <section id="s-intro" class="screen active">
        <div class="tacker-logo">Tacker</div>
        <button id="start-btn" class="entry-btn" onmousedown="runLoading()">進入系統</button>
        <div id="loading-wrap">
            <div id="load-num" style="font-weight:900; margin-bottom:5px;">1%</div>
            <div class="load-rail"><div class="load-bar" id="load-bar"></div></div>
        </div>
    </section>

    <section id="s-login" class="screen" style="background:#f4f4f4; align-items:center; justify-content:center;">
        <div style="background:#fff; width:310px; padding:30px; border-radius:20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);">
            <h2 style="margin:0 0 20px; font-weight:900;">驗證</h2>
            <input id="u-id" placeholder="帳號 ID" style="width:100%; padding:12px; border:1px solid #ddd; border-radius:10px; margin-bottom:10px; outline:none;">
            <input id="u-pw" type="password" placeholder="密碼" style="width:100%; padding:12px; border:1px solid #ddd; border-radius:10px; margin-bottom:20px; outline:none;">
            <button onmousedown="auth()" style="width:100%; background:#000; color:#fff; padding:15px; border:none; border-radius:10px; font-weight:bold;">登入系統</button>
        </div>
    </section>

    <section id="s-app" class="screen">
        <div class="app-body">
            <nav class="rail">
                <div onmousedown="tab('global')" id="nav-global" class="nav-icon active"><i class="fa-solid fa-earth-asia"></i></div>
                <div id="private-list" style="width:100%; display:flex; flex-direction:column; align-items:center; gap:10px;"></div>
                <div id="nav-me" class="nav-icon" onmousedown="openMe()"><i class="fa-solid fa-shield-halved"></i></div>
            </nav>
            <main class="main">
                <header><span id="chat-title">全球大廳</span></header>
                <div id="chat-flow"><div id="messages"></div></div>
                <div class="input-area">
                    <label for="f-in" style="font-size:24px; color:var(--acc); cursor:pointer;"><i class="fa-solid fa-circle-plus"></i></label>
                    <input type="file" id="f-in" style="display:none;" onchange="handleFile(this)" accept="image/*">
                    <div class="input-wrap">
                        <input id="m-input" placeholder="撰寫訊息..." onkeypress="if(event.key==='Enter') send()">
                        <i class="fa-solid fa-paper-plane" onmousedown="send()" style="color:var(--acc); cursor:pointer;"></i>
                    </div>
                </div>
            </main>
        </div>
    </section>

    <div id="user-modal" class="modal" onmousedown="this.style.display='none'">
        <div class="user-card" onmousedown="event.stopPropagation()">
            <div style="height:70px; background:linear-gradient(45deg, #23a559, #1a7a42);"></div>
            <div class="card-pfp" id="modal-pfp"></div>
            <h3 id="modal-name" style="color:#fff; margin:0;"></h3>
            <p id="modal-uid" style="color:var(--sub); font-size:11px; margin:5px 0 20px;"></p>
            <button id="invite-btn" style="width:85%; padding:12px; background:var(--acc); color:#fff; border:none; border-radius:10px; font-weight:bold; cursor:pointer;">發送邀請</button>
        </div>
    </div>

    <script>
        const config = { apiKey: "AIzaSyB56chNeodbgAYa8k3xspOOAMYt6C5M4cw", databaseURL: "https://tacker-ebc5a-default-rtdb.firebaseio.com", projectId: "tacker-ebc5a" };
        firebase.initializeApp(config);
        const db = firebase.database();
        let me = null, currentChat = 'global', preImg = null;

        function osToast(m) {
            const t = document.createElement('div'); t.className = 'os-toast'; t.innerText = m;
            document.getElementById('toast-container').appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }

        function runLoading() {
            document.getElementById('start-btn').style.display = 'none';
            document.getElementById('loading-wrap').style.display = 'block';
            let p = 1;
            let t = setInterval(() => {
                p += Math.floor(Math.random() * 8) + 2;
                if(p >= 100) { p = 100; clearInterval(t); setTimeout(checkSess, 500); }
                document.getElementById('load-num').innerText = p + '%';
                document.getElementById('load-bar').style.width = p + '%';
            }, 35);
        }

        function checkSess() {
            const s = localStorage.getItem('tacker_session');
            if(s) { me = JSON.parse(s); initApp(); } else go('s-login');
        }

        async function auth() {
            const id = document.getElementById('u-id').value.trim();
            const pw = document.getElementById('u-pw').value.trim();
            const s = await db.ref(`users/${id}`).get();
            if(s.exists() && s.val().temp_pw === pw) {
                me = { uid: id, ...s.val() };
                localStorage.setItem('tacker_session', JSON.stringify(me));
                initApp();
            } else osToast("驗證錯誤");
        }

        function initApp() { go('s-app'); listenChat('global'); listenInvites(); }
        function go(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }

        function tab(type, tid = null, tname = '全球大廳') {
            document.querySelectorAll('.nav-icon').forEach(i => i.classList.remove('active'));
            if(type === 'global') {
                currentChat = 'global';
                document.getElementById('nav-global').classList.add('active');
                document.getElementById('chat-title').innerText = '全球大廳';
                listenChat('global');
            } else {
                currentChat = `dm_${[me.uid, tid].sort().join('_')}`;
                document.getElementById('chat-title').innerText = tname;
                listenChat(currentChat);
            }
        }

        function handleFile(input) {
            const f = input.files[0]; if(!f) return;
            const r = new FileReader(); r.onload = (e) => { preImg = e.target.result; osToast("圖片已載入"); }; r.readAsDataURL(f);
        }

        function send() {
            const i = document.getElementById('m-input');
            if(!i.value.trim() && !preImg) return;
            const path = currentChat === 'global' ? 'chats/global' : `chats/privates/${currentChat}`;
            db.ref(path).push({ u: me.full_name, uid: me.uid, pfp: me.pfp || '', t: i.value, img: preImg || null, ts: Date.now() });
            i.value = ''; preImg = null;
        }

        // --- 核心：圖片渲染修正 ---
        function listenChat(room) {
            const path = room === 'global' ? 'chats/global' : `chats/privates/${room}`;
            db.ref(path).off();
            db.ref(path).limitToLast(40).on('value', snap => {
                const box = document.getElementById('messages'); box.innerHTML = '';
                snap.forEach(d => {
                    const m = d.val();
                    let content = m.t;
                    // 如果文字內容是長串亂碼(Base64)或網址，自動偵測
                    if(content.length > 200 || content.startsWith('http')) {
                        const imgTest = /(https?:\/\/.*\.(?:png|jpg|jpeg|gif|webp)|data:image\/.*)/i;
                        if(imgTest.test(content)) {
                            content = `<img src="${content}" class="msg-img-body" onmousedown="window.open('${content}')">`;
                        }
                    }
                    let upload = m.img ? `<img src="${m.img}" class="msg-img-body" onmousedown="window.open('${m.img}')">` : '';

                    box.innerHTML += `<div class="msg-row">
                        <div class="pfp-mini" onmousedown="openInvite('${m.uid}')"><img src="${m.pfp || ''}"></div>
                        <div style="flex:1;">
                            <div style="color:var(--acc); font-weight:900; font-size:13px; cursor:pointer;" onmousedown="openInvite('${m.uid}')">${m.u}</div>
                            <div style="color:#fff; font-size:15px; word-break:break-all;">${content}</div>
                            ${upload}
                        </div>
                    </div>`;
                });
                document.getElementById('chat-flow').scrollTop = document.getElementById('chat-flow').scrollHeight;
            });
        }

        async function openInvite(uid) {
            if(uid === me.uid) return openMe();
            const s = await db.ref(`users/${uid}`).get(); const u = s.val();
            document.getElementById('modal-name').innerText = u.full_name;
            document.getElementById('modal-uid').innerText = "UID: " + uid;
            document.getElementById('modal-pfp').innerHTML = `<img src="${u.pfp}" style="width:100%;height:100%;object-fit:cover;">`;
            document.getElementById('invite-btn').innerText = "發送私訊邀請";
            document.getElementById('invite-btn').onmousedown = async () => {
                await db.ref(`dm_invites/${uid}/${me.uid}`).set({ name: me.full_name, pfp: me.pfp || '', ts: Date.now() });
                osToast("已發送邀請"); document.getElementById('user-modal').style.display = 'none';
            };
            document.getElementById('user-modal').style.display = 'flex';
        }

        function openMe() {
            document.getElementById('modal-name').innerText = me.full_name + " (你自己)";
            document.getElementById('modal-uid').innerText = "你的帳號: " + me.uid;
            document.getElementById('modal-pfp').innerHTML = `<img src="${me.pfp}" style="width:100%;height:100%;object-fit:cover;">`;
            document.getElementById('invite-btn').innerText = "登出系統";
            document.getElementById('invite-btn').onmousedown = () => { localStorage.clear(); location.reload(); };
            document.getElementById('user-modal').style.display = 'flex';
        }

        function listenInvites() {
            db.ref(`dm_invites/${me.uid}`).on('value', snap => {
                const list = document.getElementById('private-list'); list.innerHTML = '';
                snap.forEach(d => {
                    const v = d.val(); const uid = d.key;
                    const icon = document.createElement('div'); icon.className = 'nav-icon';
                    icon.innerHTML = `<img src="${v.pfp || ''}">`;
                    icon.onmousedown = () => {
                        document.querySelectorAll('.nav-icon').forEach(el => el.classList.remove('active'));
                        icon.classList.add('active'); tab('dm', uid, v.name);
                    };
                    list.appendChild(icon);
                });
            });
        }
    </script>
</body>
</html>
