<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tacker Pro | Final Stable</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <script>
        // 1. 初始化 Firebase
        const firebaseConfig = { 
            apiKey: "AIzaSyB56chNeodbgAYa8k3xspOOAMYt6C5M4cw",
            databaseURL: "https://tacker-ebc5a-default-rtdb.firebaseio.com",
            projectId: "tacker-ebc5a",
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let currentUser = null;

        // 2. 導航邏輯 (保證可點擊)
        function navToLogin() {
            document.getElementById('gate-screen').style.display = 'none';
            document.getElementById('login-screen').style.display = 'flex';
        }

        async function doLogin() {
            const id = document.getElementById('l-id').value.trim();
            const pw = document.getElementById('l-pw').value.trim();
            if(!id || !pw) return alert("請輸入 ID 與密碼");

            const snapshot = await db.ref('users/' + id).get();
            if(snapshot.exists() && snapshot.val().temp_pw === pw) {
                localStorage.setItem('t_id', id);
                localStorage.setItem('t_pw', pw);
                currentUser = { id, ...snapshot.val() };
                launch();
            } else {
                alert("驗證失敗");
            }
        }

        function launch() {
            document.getElementById('gate-screen').style.display = 'none';
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app-ui').style.display = 'flex';
            
            // 開始同步訊息
            db.ref('chats/global').on('value', (s) => {
                const flow = document.getElementById('chat-flow');
                flow.innerHTML = '';
                s.forEach(child => {
                    const m = child.val();
                    flow.innerHTML += `
                        <div class="msg-box">
                            <div class="msg-pfp"></div>
                            <div class="msg-body">
                                <b>${m.u}</b> <small>${new Date(m.ts).toLocaleTimeString()}</small>
                                <div>${m.t}</div>
                            </div>
                        </div>`;
                });
                flow.scrollTop = flow.scrollHeight;
            });

            // 同步個人資料
            document.getElementById('u-name').innerText = currentUser.full_name;
            document.getElementById('u-tag').innerText = '#' + currentUser.id;
        }

        function sendChat() {
            const inp = document.getElementById('chat-input');
            if(!inp.value.trim()) return;
            db.ref('chats/global').push({
                u: currentUser.full_name,
                t: inp.value,
                ts: Date.now(),
                uid: currentUser.id
            });
            inp.value = '';
        }

        // 自動登入檢查
        window.onload = () => {
            const id = localStorage.getItem('t_id'), pw = localStorage.getItem('t_pw');
            if(id && pw) {
                db.ref('users/' + id).get().then(s => {
                    if(s.exists() && s.val().temp_pw === pw) {
                        currentUser = { id, ...s.val() };
                        launch();
                    }
                });
            }
        };
    </script>

    <style>
        :root { --b0: #1e1f22; --b1: #2b2d31; --b2: #313338; --acc: #5865f2; --text: #dbdee1; --sub: #949ba4; }
        body, html { margin:0; padding:0; height:100vh; width:100vw; background:#000; color:var(--text); font-family: sans-serif; overflow:hidden; }

        /* 介面比例修正 */
        .full { height:100vh; width:100vw; display:flex; flex-direction:column; align-items:center; justify-content:center; }
        
        #app-ui { display:none; height:100vh; flex-direction: row; }
        .rail { width:72px; background:var(--b0); display:flex; flex-direction:column; align-items:center; padding-top:12px; flex-shrink:0; }
        .side { width:240px; background:var(--b1); display:flex; flex-direction:column; flex-shrink:0; }
        .chat { flex-grow:1; background:var(--b2); display:flex; flex-direction:column; min-width:0; }

        /* 視覺優化 */
        .hero-btn { background:var(--acc); color:#fff; border:none; padding:15px 45px; border-radius:50px; font-weight:bold; cursor:pointer; font-size:18px; }
        .auth-card { background:var(--b0); padding:40px; border-radius:10px; width:350px; text-align:center; }
        input { background:#111; border:1px solid #333; color:#fff; padding:12px; width:100%; border-radius:5px; margin:10px 0; outline:none; }

        #chat-flow { flex-grow:1; overflow-y:auto; padding:20px; }
        .msg-box { display:flex; gap:15px; margin-bottom:20px; }
        .msg-pfp { width:40px; height:40px; background:#4e5058; border-radius:50%; flex-shrink:0; }
        .msg-body b { font-size:15px; color:#fff; }
        .msg-body small { color:var(--sub); font-size:12px; margin-left:8px; }

        .input-area { padding:0 20px 24px; }
        .input-wrap { background:#383a40; border-radius:8px; padding:12px; }
        .u-info { margin-top:auto; background:rgba(0,0,0,0.2); padding:10px; display:flex; align-items:center; gap:10px; }
    </style>
</head>
<body>

    <div id="gate-screen" class="full">
        <h1 style="font-size:70px; letter-spacing:15px; color:var(--acc); margin:0;">TACKER</h1>
        <p style="color:var(--sub); margin-bottom:50px;">VERSION 1.0 PRO</p>
        <button class="hero-btn" onclick="navToLogin()">進入 Tacker</button>
    </div>

    <div id="login-screen" class="full" style="display:none">
        <div class="auth-card">
            <h3>身分驗證</h3>
            <input id="l-id" placeholder="Tacker ID">
            <input id="l-pw" type="password" placeholder="密碼">
            <button class="hero-btn" style="width:100%; margin-top:10px;" onclick="doLogin()">確認並登入</button>
        </div>
    </div>

    <div id="app-ui">
        <div class="rail">
            <div style="width:48px; height:48px; background:var(--acc); border-radius:50%; cursor:pointer;"></div>
        </div>
        <div class="side">
            <div style="padding:15px; font-weight:bold; font-size:12px; color:var(--sub);">頻道</div>
            <div style="margin:0 8px; padding:10px; background:rgba(255,255,255,0.05); border-radius:4px;"><i class="fa-solid fa-hashtag"></i> 全球大廳</div>
            <div class="u-info">
                <div style="width:32px; height:32px; background:var(--acc); border-radius:50%;"></div>
                <div>
                    <div id="u-name" style="font-weight:bold; font-size:14px;">User</div>
                    <div id="u-tag" style="font-size:11px; color:var(--sub);">#0000</div>
                </div>
            </div>
        </div>
        <div class="chat">
            <header style="height:48px; border-bottom:1px solid #222; padding:0 15px; display:flex; align-items:center; font-weight:bold;"># 全球大廳</header>
            <div id="chat-flow"></div>
            <div class="input-area">
                <div class="input-wrap">
                    <input id="chat-input" placeholder="在 #全球大廳 聊點什麼..." onkeypress="if(event.key==='Enter') sendChat()" style="background:none; border:none; color:#fff; width:100%;">
                </div>
            </div>
        </div>
    </div>

</body>
</html>
