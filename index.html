<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tacker | Official</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg-p: #313338; --bg-s: #2b2d31; --bg-t: #232428; --brand: #5865f2; --success: #23a559; --danger: #f23f43; --text: #dbdee1; --muted: #949ba4; --white: #ffffff; --gray-card: #383a40; }
        body, html { margin: 0; padding: 0; font-family: 'PingFang TC', sans-serif; height: 100vh; overflow: hidden; }
        .hidden { display: none !important; }

        /* 1. 進入首頁 (使用你提供的電繪圖) */
        #welcome-screen { position: fixed; inset: 0; background: #fff; z-index: 2000; display: flex; justify-content: center; align-items: center; }
        #welcome-screen img { max-width: 100%; max-height: 100%; cursor: pointer; }
        .entry-trigger { position: absolute; bottom: 10%; right: 10%; width: 120px; height: 60px; background: transparent; border: none; cursor: pointer; z-index: 2001; }

        /* 2. 登入介面 (image_1.png ②) */
        #auth-wall { position: fixed; inset: 0; background: var(--white); z-index: 1500; display: none; justify-content: center; align-items: center; }
        .login-card { background: var(--gray-card); width: 320px; padding: 40px; border-radius: 8px; position: relative; color: white; text-align: center; }
        .login-card input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 4px; border: none; background: #1e1f22; color: white; outline: none; }
        .green-arrow { background: var(--success); color: white; border: none; width: 60px; height: 40px; border-radius: 4px; cursor: pointer; font-size: 20px; margin-top: 10px; }
        .error-hint { color: var(--danger); font-size: 12px; height: 15px; margin-top: 5px; }
        .apply-link { position: absolute; bottom: 10px; right: 10px; color: var(--brand); font-size: 10px; text-decoration: none; }

        /* 3. 過場動畫 */
        #loader { position: fixed; inset: 0; background: #fff; z-index: 3000; display: none; justify-content: center; align-items: center; flex-direction: column; }
        .circle { width: 50px; height: 50px; border: 5px solid #f3f3f3; border-top: 5px solid var(--brand); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* 4. 主程式 (image_3.png & P1/P2) */
        #main-app { display: none; grid-template-columns: 240px 1fr; height: 100vh; background: var(--bg-p); color: white; }
        .sidebar { background: var(--bg-s); display: flex; flex-direction: column; border-right: 1px solid #1e1f22; }
        .friend-list { flex: 1; padding: 10px; overflow-y: auto; }
        .add-btn { background: none; border: 1px dashed var(--muted); color: var(--muted); width: 30px; height: 30px; border-radius: 50%; cursor: pointer; margin-left: 10px; }
        
        /* 使用者區塊 */
        .user-footer { background: #232428; padding: 10px; display: flex; align-items: center; gap: 10px; }
        .u-ava { width: 32px; height: 32px; border-radius: 50%; background: #5865f2; }

        /* 彈窗系統 */
        #modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 5000; display: none; justify-content: center; align-items: center; }
        .modal-box { background: var(--gray-card); padding: 30px; border-radius: 8px; width: 300px; position: relative; }
        .close-x { position: absolute; top: 10px; right: 15px; cursor: pointer; font-size: 20px; }
    </style>
</head>
<body>

    <div id="welcome-screen">
        <img src="https://i.imgur.com/2sS9lU3.png" alt="Tacker">
        <button class="entry-trigger" onclick="toAuth()"></button>
    </div>

    <div id="auth-wall">
        <div class="login-card">
            <h2 style="margin-top:0;">登入</h2>
            <input type="text" id="t-id" placeholder="帳號 ID">
            <input type="password" id="t-pw" placeholder="密碼">
            <div id="err-hint" class="error-hint"></div>
            <button class="green-arrow" onclick="doLogin()"> → </button>
            <a href="XXXXXXXXXXXXXXXXXXXX" class="apply-link">點擊申請帳號</a>
        </div>
    </div>

    <div id="loader">
        <div class="circle"></div>
        <p style="color:black; margin-top:15px; font-weight:bold;">載入數據中...</p>
    </div>

    <div id="main-app">
        <div class="sidebar">
            <div style="padding:20px 10px; font-size:12px; color:var(--muted); font-weight:bold;">
                目前尚未有好朋友 <button class="add-btn" onclick="openAdd()">+</button>
            </div>
            <div class="friend-list" id="f-list">
                </div>
            <div class="user-footer">
                <img id="my-ava" class="u-ava">
                <div style="flex:1; overflow:hidden;">
                    <div id="my-name" style="font-weight:bold; font-size:13px; text-overflow:ellipsis; white-space:nowrap;">載入中...</div>
                    <div id="my-tag" style="color:var(--muted); font-size:10px;">@id</div>
                </div>
                <div style="cursor:pointer;" onclick="alert('設定開發中')">✎</div>
            </div>
        </div>
        <div style="display:flex; flex-direction:column; justify-content:center; align-items:center; color:var(--muted);">
            <div style="font-size:60px;">#</div>
            <p>這裡目前什麼都沒有 :/</p>
        </div>
    </div>

    <div id="modal-overlay">
        <div class="modal-box">
            <span class="close-x" onclick="closeAdd()">✕</span>
            <h3 style="margin-top:0;">新增好友</h3>
            <p style="font-size:12px; color:var(--muted);">輸入對方的帳號 ID</p>
            <input type="text" id="target-id" style="width:100%; padding:10px; background:#1e1f22; border:none; color:white; border-radius:4px;" placeholder="帳號 ID">
            <button style="width:100%; margin-top:15px; background:var(--brand); border:none; color:white; padding:10px; border-radius:4px; cursor:pointer;" onclick="sendRequest()">確認</button>
        </div>
    </div>

    <script>
        // 修正後的 Supabase 連線
        const _s = supabase.createClient('https://coyiifxxfopvabpjszis.supabase.co', 'Sb_publishable_ZaDrVW5Goe5QFqL4rBvNCg_JrwHKIFH');

        function toAuth() {
            document.getElementById('welcome-screen').classList.add('hidden');
            document.getElementById('auth-wall').style.display = 'flex';
        }

        async function doLogin() {
            const tid = document.getElementById('t-id').value;
            const tpw = document.getElementById('t-pw').value;
            const hint = document.getElementById('err-hint');

            // 帳號 666666 測試邏輯
            const { data, error } = await _s.from('profiles').select('*').eq('tacker_id', tid).eq('temp_pw', tpw).maybeSingle();

            if (data) {
                hint.innerText = "";
                document.getElementById('auth-wall').style.display = 'none';
                document.getElementById('loader').style.display = 'flex';
                
                setTimeout(() => {
                    document.getElementById('loader').style.display = 'none';
                    document.getElementById('main-app').style.display = 'grid';
                    document.getElementById('my-name').innerText = data.full_name;
                    document.getElementById('my-tag').innerText = "@" + data.tacker_id;
                    document.getElementById('my-ava').src = data.avatar_url || "https://via.placeholder.com/32";
                }, 800); // 載入圈 0.8秒
            } else {
                hint.innerText = "帳號或密碼錯誤"; // 紅字提醒
            }
        }

        function openAdd() { document.getElementById('modal-overlay').style.display = 'flex'; }
        function closeAdd() { document.getElementById('modal-overlay').style.display = 'none'; }
        
        async function sendRequest() {
            const target = document.getElementById('target-id').value;
            if(!target) return;
            alert("已向 " + target + " 發送好友請求！ (功能對接中)");
            closeAdd();
        }
    </script>
</body>
</html>
